<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Lost Signal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0b10;--surface:#13151c;--surface2:#1a1d27;
  --accent:#e8b84b;--accent2:#c97b3a;
  --text:#e8e4d8;--muted:#7a7670;
  --good:#4caf82;--neutral:#5b9bc8;--bad:#c0504a;--weird:#9b7fd4;
  --border:rgba(232,184,75,.15);--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Lato',sans-serif;font-weight:300;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
.bg-noise{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}
.wrap{position:relative;z-index:1;width:100%;max-width:740px;padding:2rem 1.5rem 5rem;}
header{text-align:center;padding:2.5rem 0 1.8rem;border-bottom:1px solid var(--border);margin-bottom:2.2rem;}
.logo{font-family:'Playfair Display',serif;font-size:clamp(2rem,6vw,3.2rem);font-weight:700;color:var(--accent);letter-spacing:.03em;line-height:1;}
.tagline{font-size:.78rem;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-top:.5rem;}
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;}
.ch-label{font-size:.74rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
.tbtn{background:transparent;border:1px solid var(--border);border-radius:50px;padding:.38rem .9rem;color:var(--muted);font-family:'Lato',sans-serif;font-size:.76rem;cursor:pointer;transition:border-color .2s,color .2s;display:inline-flex;align-items:center;gap:.35rem;}
.tbtn:hover{border-color:var(--accent);color:var(--accent);}
.pbar{height:2px;background:var(--surface2);border-radius:2px;margin-bottom:2rem;overflow:hidden;}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:width .6s ease;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.8rem 1.8rem 1.6rem;margin-bottom:1.6rem;animation:rise .4s ease;}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.scene-banner{width:100%;height:140px;border-radius:8px;background:var(--surface2);margin-bottom:1.2rem;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.3rem;position:relative;overflow:hidden;}
.scene-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 120%,rgba(232,184,75,.07) 0%,transparent 70%);}
.sem{font-size:2.8rem;position:relative;}
.slabel{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);position:relative;}
.stitle{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--accent);margin-bottom:.85rem;line-height:1.3;}
.stext{font-size:.98rem;line-height:1.82;color:var(--text);font-weight:300;}
.stext p{margin-bottom:.75rem;}
.stext p:last-child{margin-bottom:0;}
.stext em{color:var(--muted);}
.stext strong{color:var(--accent);font-weight:700;}
.choices{display:flex;flex-direction:column;gap:.8rem;margin-bottom:1.4rem;}
.cbtn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1.15rem;color:var(--text);font-family:'Lato',sans-serif;font-size:.93rem;font-weight:400;text-align:left;cursor:pointer;transition:background .18s,border-color .18s,transform .14s;display:flex;align-items:flex-start;gap:.7rem;line-height:1.5;}
.cbtn:hover{background:var(--surface2);border-color:var(--accent);transform:translateX(5px);}
.cbtn:active{transform:translateX(3px) scale(.99);}
.cletter{min-width:24px;height:24px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--accent);flex-shrink:0;margin-top:2px;}
.ebadge{display:inline-flex;align-items:center;gap:.4rem;padding:.28rem .85rem;border-radius:50px;font-size:.72rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;margin-bottom:.9rem;}
.eg{background:rgba(76,175,130,.12);color:var(--good);border:1px solid rgba(76,175,130,.25);}
.en{background:rgba(91,155,200,.12);color:var(--neutral);border:1px solid rgba(91,155,200,.25);}
.eb{background:rgba(192,80,74,.12);color:var(--bad);border:1px solid rgba(192,80,74,.25);}
.ew{background:rgba(155,127,212,.12);color:var(--weird);border:1px solid rgba(155,127,212,.25);}
.rrow{display:flex;gap:.65rem;flex-wrap:wrap;margin-top:.9rem;}
.rbtn{border:none;border-radius:var(--radius);padding:.75rem 1.3rem;font-family:'Lato',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .14s;}
.rbtn:hover{opacity:.83;transform:scale(1.02);}
.rbtn.ra{background:var(--accent);color:#1a1200;}
.rbtn.rb{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.modal-bg{position:fixed;inset:0;background:rgba(5,6,12,.9);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:620px;padding:1.8rem;margin:auto;animation:rise .3s ease;}
.mhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.3rem;padding-bottom:.85rem;border-bottom:1px solid var(--border);}
.mtitle{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--accent);}
.mclose{background:transparent;border:1px solid var(--border);border-radius:7px;width:30px;height:30px;color:var(--muted);font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .2s,border-color .2s;}
.mclose:hover{color:var(--accent);border-color:var(--accent);}
.hlist{display:flex;flex-direction:column;gap:.8rem;}
.hitem{background:var(--surface2);border-radius:8px;padding:.8rem 1rem;border-left:3px solid var(--border);}
.hititle{font-size:.73rem;font-weight:700;color:var(--accent);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.28rem;}
.hitext{font-size:.83rem;color:var(--muted);line-height:1.5;}
.hich{font-size:.75rem;color:var(--accent2);margin-top:.4rem;font-style:italic;}
@media(max-width:500px){.wrap{padding:1rem 1rem 3rem;}.card{padding:1.3rem 1.1rem;}.cbtn{font-size:.89rem;}}
</style>
</head>
<body>
<div class="bg-noise"></div>
<div class="wrap">
  <header>
    <div class="logo">The Lost Signal</div>
    <div class="tagline">A Choose Your Own Adventure</div>
  </header>
  <div class="toolbar">
    <div style="display:flex;gap:.5rem;margin-left:auto;">
      <button class="tbtn" id="restartbtn">↺ Restart</button>
      <button class="tbtn" id="historybtn">📖 Story so far</button>
    </div>
  </div>
  <div class="pbar"><div class="pfill" id="pfill" style="width:3%"></div></div>
  <div id="arena"></div>
</div>
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="mhead">
      <div class="mtitle">Story So Far</div>
      <button class="mclose" id="mclose">✕</button>
    </div>
    <div id="mcontents"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════
   THE LOST SIGNAL — single story, massive branching tree
   You = Alex, 15. Sam = best friend. Night 1 of camping trip.
   Cast grows organically per branch — never mentioned early.
═══════════════════════════════════════════════════════════ */
const SC = {

/* ── ACT 1: THE SIGNAL ── */
start:{d:3,em:"📡",el:"forest at night",ch:"Night One",
ti:"Something in the Trees",
tx:`<p>It's the first night of the school camping trip. Everyone is asleep — everyone except you and your best friend Sam, sitting outside your tent, watching the fire die down.</p>
<p>That's when you hear it. A signal. Repeating. Coming from deep in the forest — not an animal sound, not the wind. Something mechanical. Something deliberate.</p>
<p>Sam grabs your arm. Through the trees, about a hundred metres in, a pale light blinks in perfect time with the sound. On. Off. On. Off.</p>
<p>"That is not a firefly," Sam whispers.</p>`,
cx:[
  {t:"Grab a torch and run towards it.",nx:"run_in"},
  {t:"Sneak in quietly, no torch — you don't want to scare it off.",nx:"sneak_in"},
  {t:"Wake up your teacher, Mr. Davies. Adults should know.",nx:"wake_davies"},
]},

run_in:{d:8,em:"🏃",el:"crashing through undergrowth",ch:"Into the Dark",
ti:"Running Blind",
tx:`<p>You sprint into the trees, torch blazing, Sam right behind you. Branches whip at your arms. The signal gets louder — close now, very close — and then you burst into a small clearing.</p>
<p>In the centre of the clearing is a hole in the ground. Not a natural hole. The edges are perfectly smooth, like someone bored it with a drill. It's about two metres wide. The signal is coming from inside it. The blinking light too.</p>
<p>And it smells — strange. Like burning metal and something sweeter underneath, like rain on hot stone.</p>
<p>Sam shines the torch down. The hole goes deep. At the bottom, something moves.</p>`,
cx:[
  {t:"Jump in. You only live once.",nx:"jump_hole"},
  {t:"Call into the hole. \"Hello?\"",nx:"call_hole"},
  {t:"Back away slowly. This is way too weird.",nx:"back_away_hole"},
  {t:"Pull out your phone and film it.",nx:"film_hole"},
]},

sneak_in:{d:6,em:"🌙",el:"quiet forest path",ch:"Into the Dark",
ti:"Stepping Carefully",
tx:`<p>You and Sam move without torches, letting your eyes adjust to the moonlight that filters through the canopy. Every twig you step on sounds enormous. You freeze. Wait. Move again.</p>
<p>You reach the source before it knows you're there.</p>
<p>It's a device — small, silver, half-buried in the ground — unlike anything you've seen. Rounded, seamless, pulsing with soft blue light. The signal comes from it in a clean, repeating pattern. But that's not what stops your heart.</p>
<p>Sitting beside the device, examining it with three long fingers, is a creature that is most definitely not human.</p>`,
cx:[
  {t:"Stand perfectly still. Don't move, don't breathe loud.",nx:"freeze_alien"},
  {t:"Step on a twig on purpose. Make it know you're there.",nx:"announce_yourself"},
  {t:"Grab the device and run.",nx:"grab_device"},
  {t:"Whisper to Sam: circle around behind it.",nx:"circle_behind"},
]},

wake_davies:{d:5,em:"🧑‍🏫",el:"teacher's tent",ch:"The Sensible Choice",
ti:"Waking Mr. Davies",
tx:`<p>You unzip his tent flap. He's awake instantly — teachers on camping trips never really sleep. You describe the signal, the blinking light. He listens, expression shifting from sleepy to sharp.</p>
<p>"Show me," he says, and he's pulling on boots before you finish the sentence.</p>
<p>The three of you approach carefully. The signal leads you to a small clearing where an enormous shape sits in the trees, dark and angular, clearly metallic. It's bigger than a bus. The trees around it are bent outward, as if something landed here with enormous force not long ago.</p>
<p>Mr. Davies says one word, very quietly: <strong>"Oh."</strong></p>`,
cx:[
  {t:"Walk up to the metallic shape and knock on it.",nx:"knock_ship"},
  {t:"Suggest you all go back and call for help.",nx:"call_help_early"},
  {t:"Circle the shape looking for a door.",nx:"circle_ship"},
  {t:"The shape suddenly lights up — and a door opens.",nx:"ship_opens"},
]},

/* ── ALIEN BRANCH ── */
freeze_alien:{d:10,em:"👽",el:"alien in moonlight",ch:"First Contact",
ti:"Don't Move",
tx:`<p>You stop breathing. The creature doesn't look up — it's focused entirely on the device, making tiny adjustments with those long fingers. It's roughly humanoid: tall, very thin, with a wide flat head and skin that seems to shift colour slightly depending on where the moonlight hits it. Grey, then blue, then grey again.</p>
<p>Sam is a statue beside you.</p>
<p>The creature taps the device twice. The signal changes — slower now, almost like a question. Then it tilts its head, the way a dog does when it hears something strange, and turns directly towards you.</p>
<p>It can see you perfectly in the dark.</p>
<p>It makes a sound — not frightening, surprisingly. More like a note played on a instrument you've never heard.</p>`,
cx:[
  {t:"Make the same sound back.",nx:"mimic_sound"},
  {t:"Say your name. Maybe communication is possible.",nx:"say_name"},
  {t:"Hold up both hands, palms out — the universal peace sign.",nx:"peace_sign"},
  {t:"Run. Now.",nx:"run_from_alien"},
]},

announce_yourself:{d:9,em:"👟",el:"twig snap in silence",ch:"First Contact",
ti:"Snap",
tx:`<p>You step on the twig deliberately. The crack is enormous in the silence. The creature spins round — faster than anything that size should move — and sees you and Sam immediately.</p>
<p>For a long moment nothing happens. You stare at each other. Its eyes are very large and very dark, and the moonlight catches them in a way that makes them look almost kind.</p>
<p>Then it does something unexpected: it sits down, crossing its legs, and places both hands on its knees, palms up. Like it's waiting.</p>`,
cx:[
  {t:"Sit down too. Match its posture.",nx:"sit_with_alien"},
  {t:"Point at yourself and say your name.",nx:"say_name"},
  {t:"Point at the device. What is that thing?",nx:"point_device"},
  {t:"Back away slowly. This is above your pay grade.",nx:"back_get_davies"},
  {t:"Tell it: we are no trouble. We just want to understand.",nx:"no_trouble"}
]},

grab_device:{d:9,em:"💨",el:"sprinting through trees",ch:"Thief in the Night",
ti:"Grab and Go",
tx:`<p>You dart in, snatch the device off the ground, and sprint. Behind you the creature makes a sound — not angry, more like surprised. You crash through the undergrowth, Sam sprinting beside you, back towards camp.</p>
<p>The device buzzes in your hand. Warm. Vibrating. The light inside it changes colour — blue to green to something you don't have a word for.</p>
<p>You reach the camp and dive into your tent. You look at the device. It looks back at you — or it seems to. And then it does something unexpected.</p>
<p>It speaks.</p>
<p><strong>"Returning unit requested. Non-hostile. Please."</strong></p>`,
cx:[
  {t:"Answer it. \"Who are you?\"",nx:"device_talks"},
  {t:"Give it back. Take it back into the forest right now.",nx:"return_device"},
  {t:"Wake Sam. They need to hear this.",nx:"wake_sam_device"},
  {t:"Put it in your bag. You're keeping it.",nx:"keep_device"},
  {t:"The device speaks. In English. Directly to you.",nx:"device_talks"}
]},

circle_behind:{d:8,em:"🌲",el:"circling through undergrowth",ch:"Flanking",
ti:"Two Sides",
tx:`<p>You and Sam split. You go left, Sam goes right, moving silently through the trees to get behind the creature. It's still focused on the device. You're close now — close enough to see the texture of its skin, which seems almost translucent in the moonlight, faint traceries of something like veins visible underneath, glowing faintly blue.</p>
<p>You and Sam make eye contact through the trees. Sam holds up three fingers. Two. One.</p>
<p>You both step into the open from opposite sides.</p>
<p>The creature looks at you, then at Sam, then back at you. Then it makes a sound that might — just might — be laughter.</p>`,
cx:[
  {t:"Laugh too. This is sort of funny.",nx:"laugh_together"},
  {t:"Say: \"We don't want trouble.\"",nx:"no_trouble"},
  {t:"Ask Sam to keep it talking while you grab the device.",nx:"distract_grab"},
]},

mimic_sound:{d:12,em:"🎵",el:"moonlit clearing",ch:"Language",
ti:"You Try",
tx:`<p>You open your mouth and try to reproduce the sound. It comes out wrong — too flat, too human — but you try again, and the creature's head tilts further. It makes the sound again. You copy. It modifies it slightly. You copy the modification. </p>
<p>Sam watches in silence, barely breathing.</p>
<p>This goes on for several minutes. By the end of it something improbable has happened: you've established a tiny vocabulary. Three sounds. One that seems to mean <em>yes</em>. One that seems to mean <em>danger</em>. And one that seems to mean something like <em>here/this place/now</em>.</p>
<p>The creature points at the device. Makes the third sound. Points at the sky. Makes the second sound. Then looks at you.</p>
<p>The device is dangerous, and something is happening in the sky.</p>`,
cx:[
  {t:"Ask (in sounds) what the danger in the sky is.",nx:"ask_sky_danger"},
  {t:"Look up at the sky right now.",nx:"look_up_sky"},
  {t:"Point at the device. Offer to help.",nx:"offer_help"},
]},

say_name:{d:11,em:"🗣️",el:"moonlit face to face",ch:"Language",
ti:"Hello",
tx:`<p>"My name is Alex," you say slowly, pointing at yourself. Sam says: "Sam." </p>
<p>The creature watches your mouth move with intense curiosity. Then it touches its own chest — what might be its chest — and makes a sound that is somewhere between a chord and a breath. Three syllables, none of which have human equivalents.</p>
<p>"I'm going to call you Bree," you say. "Sorry."</p>
<p>Bree tilts its head. Points at you. Says something that sounds extremely close to <em>Alex</em>. Then points at itself. <em>Bree.</em></p>
<p>Sam grabs your arm. "Oh my god," Sam whispers. "It's learning."</p>`,
cx:[
  {t:"Teach it more words. Start with: help, danger, friend.",nx:"teach_words"},
  {t:"Ask Bree where it came from by pointing at the sky.",nx:"point_at_sky"},
  {t:"Show Bree your phone. Let it see a photo of Earth from space.",nx:"show_earth"},
]},

peace_sign:{d:10,em:"✌️",el:"two humans, one alien",ch:"First Contact",
ti:"Universal Symbol (Probably)",
tx:`<p>You raise both hands, palms out. The creature stares at your hands for a very long moment. Then it raises its own — three fingers on each — and mirrors the gesture exactly.</p>
<p>You both stand there in the moonlit forest with your hands up like you're surrendering to each other. Sam bites their lip to stop from laughing.</p>
<p>Then the creature does something that changes everything: it kneels and turns the device towards you, as if offering it. The signal stops. In the sudden silence, you can hear your own heartbeat.</p>`,
cx:[
  {t:"Take the device. Gently.",nx:"accept_device"},
  {t:"Don't touch it. Kneel down too and look at it.",nx:"look_device_close"},
  {t:"Point at the device, then at the sky, then give it back gesture.",nx:"gesture_return"},
]},

run_from_alien:{d:7,em:"🏃",el:"crashing through dark trees",ch:"Retreat",
ti:"Nope. Absolutely Not.",
tx:`<p>You run. Sam is already three steps ahead of you somehow. You crash through the undergrowth, branches everywhere, heart hammering. You reach the camp and collapse against a tree.</p>
<p>Nothing follows you.</p>
<p>You lie there panting, staring at the stars. "We have to go back," Sam says eventually. "We can't just — we can't just leave that there." "I absolutely can," you say. But even as you say it, you know Sam is right.</p>
<p>The signal is still going. Steady. Patient. Almost like it's waiting for you specifically.</p>`,
cx:[
  {t:"Go back. This time quietly, no torch.",nx:"sneak_in"},
  {t:"Wake Mr. Davies. You can't handle this alone.",nx:"wake_davies_late"},
  {t:"Stay here. Whatever that is, the morning will make it clearer.",nx:"wait_for_dawn"},
]},

sit_with_alien:{d:13,em:"🧘",el:"sitting in moonlit clearing",ch:"Conversation",
ti:"Cross-Legged",
tx:`<p>You sit down. Cross your legs. The creature watches you carefully and seems — pleased? Something changes in its expression, which is not quite a face in any human sense but communicates clearly anyway.</p>
<p>Sam sits too, after a moment's hesitation.</p>
<p>For ten minutes you sit in silence with an alien in the forest. Slowly it begins to make sounds — musical, layered, patient — and point at things. The device. The trees. The sky. You. It seems to be trying to explain something, with enormous patience, to creatures who barely speak at all.</p>`,
cx:[
  {t:"Try to copy the sounds. Attempt a reply.",nx:"mimic_sound"},
  {t:"Take out your phone and show it pictures.",nx:"show_earth"},
  {t:"Slowly reach out a hand, like you're asking to shake.",nx:"handshake_alien"},
]},

point_device:{d:11,em:"📟",el:"alien device glowing blue",ch:"The Device",
ti:"What Is That?",
tx:`<p>You point at the device. The creature's expression shifts — something like worry. It picks it up carefully and shows you the underside: there's a crack running along the casing, and through the crack leaks a light that pulses irregularly, wrong somehow, like a heartbeat with a missed beat.</p>
<p>It's damaged.</p>
<p>It points at the sky, then at the device, then makes a gesture that clearly means <em>broken</em> — a mime of something splitting apart. Then it looks at you with those enormous dark eyes.</p>
<p>It needs help fixing it.</p>`,
cx:[
  {t:"I have no idea how to fix alien technology, but I'll try.",nx:"fix_device"},
  {t:"Take out your camping toolkit. Maybe something fits.",nx:"toolkit_fix"},
  {t:"You can't fix it, but maybe Mr. Davies can. He's good with electronics.",nx:"davies_fix"},
]},

back_get_davies:{d:8,em:"🔦",el:"torchlight back to camp",ch:"Getting Help",
ti:"Going for Backup",
tx:`<p>You and Sam back away silently. The creature doesn't follow — it stays sitting with its hands on its knees, patient as a mountain. You reach camp and shake Mr. Davies awake.</p>
<p>He follows you back without asking too many questions. When he sees the creature he stops very still. The creature looks at him. Mr. Davies looks at the creature.</p>
<p>"Right," Mr. Davies says, in the tone he uses when a student hands in a truly surprising piece of work. "Okay then."</p>
<p>He sits down in the same cross-legged position you showed him you'd tried. The creature tilts its head. And something that might be a smile crosses its face.</p>`,
cx:[
  {t:"Let Mr. Davies handle this. He seems bizarrely calm.",nx:"davies_leads"},
  {t:"Introduce yourself to the creature now that you have adult backup.",nx:"say_name"},
  {t:"Something is moving in the trees behind the creature.",nx:"something_behind"},
]},

laugh_together:{d:11,em:"😄",el:"three beings laughing(ish)",ch:"Connection",
ti:"Ha",
tx:`<p>You laugh. Sam laughs. The creature makes its sound again — that chest-resonating chord — louder this time, and something about the way it does it is unmistakeably laughing along. Three beings on a camping trip in the dark, laughing at the absurdity of the situation.</p>
<p>After that, things move faster. The creature shows you the device. Points at the crack in the casing. Points at the sky. Makes increasingly urgent gestures. There's something wrong — something wrong up there — and the device is supposed to fix it or signal about it, and it's broken.</p>`,
cx:[
  {t:"Examine the cracked device. Maybe you can help.",nx:"fix_device"},
  {t:"Ask — in gestures — what is wrong up there.",nx:"ask_sky_danger"},
  {t:"The sky answers the question for you: something is descending through the clouds.",nx:"ship_descending"},
]},

no_trouble:{d:10,em:"🤝",el:"moonlit standoff",ch:"Contact",
ti:"No Trouble",
tx:`<p>"We don't want trouble," you say, hands raised. Sam mirrors you. The creature looks at you both for a long moment, and then does something that surprises you completely: it nods. An actual human nod. Had it seen humans before?</p>
<p>It points at the sky. Then at the ground. Then at you. Urgent now.</p>
<p>Something is coming. It was supposed to have fixed the device and signalled before it arrived. It hasn't. And whatever is coming does not know you're friendly.</p>`,
cx:[
  {t:"Point at yourself: I'll help.",nx:"offer_help"},
  {t:"Look up at the sky. What's coming?",nx:"look_up_sky"},
  {t:"What if what's coming is more like you, and less like it?",nx:"other_humans"},
  {t:"Tell it plainly: we are no trouble. We just want to understand.",nx:"no_trouble_offer"}
]},

distract_grab:{d:8,em:"💨",el:"quick hands",ch:"Opportunist",
ti:"Grab",
tx:`<p>You signal Sam with your eyes. Sam steps forward, arms wide, making a sound — it works, the creature's head swivels towards Sam — and you lunge for the device. You get it. It's warm, heavier than it looks.</p>
<p>The creature makes a sound that is immediately recognisable as alarm — not anger, alarm — and reaches out. Sam steps between you and it. You run.</p>
<p>Back at camp you examine the device. It speaks, in perfect English: <strong>"That was unnecessary. The beacon must be returned within forty minutes or the replacement vessel will engage full extraction protocol. Extraction will affect a significant area."</strong></p>
<p>You and Sam look at each other.</p>
<p>"Significant area," Sam repeats.</p>`,
cx:[
  {t:"Return it. Right now. At a run.",nx:"return_device"},
  {t:"Ask the device what extraction protocol means exactly.",nx:"ask_extraction"},
  {t:"Maybe Mr. Davies knows what to do with alien ultimatums.",nx:"davies_ultimatum"},
]},

/* ── DEVICE / ALIEN TECH BRANCH ── */
device_talks:{d:12,em:"📟",el:"glowing device in tent",ch:"The Beacon",
ti:"It Speaks",
tx:`<p>"Who are you?" you ask the device, feeling extremely foolish.</p>
<p><strong>"I am a navigation beacon. Carrier designation: Survey Unit Eleven. I have been separated from my operator by approximately three of your hours. My operator requires my return to complete the departure sequence. Without me, the vessel cannot leave."</strong></p>
<p>Sam has their hand over their mouth. You are both sitting very still.</p>
<p><strong>"The replacement vessel will arrive in thirty-seven of your minutes. It will not ask questions. It will simply retrieve."</strong></p>
<p>"Retrieve what?" you ask.</p>
<p><strong>"Everything in a two-kilometre radius that contains the beacon's signal. That includes this camp."</strong></p>`,
cx:[
  {t:"Return the device to its operator immediately.",nx:"return_device"},
  {t:"Ask the device to explain the retrieval. What does it mean exactly?",nx:"ask_extraction"},
  {t:"Ask it to contact the original vessel and explain the delay.",nx:"contact_vessel"},
  {t:"Run and wake everyone in the camp. Now.",nx:"wake_whole_camp"},
  {t:"Ask what you're supposed to do next.",nx:"device_instructions"},
  {t:"Ask who it belongs to — who is the operator?",nx:"device_owner"},
  {t:"Ask why it speaks English.",nx:"device_why_english"},
]},

return_device:{d:11,em:"🏃",el:"sprinting back into forest",ch:"Return",
ti:"Give It Back",
tx:`<p>You run back into the forest. Sam runs with you. The device pulses faster in your hands — you're going the right direction, it's guiding you. Left here. Straight through there. Across the stream.</p>
<p>You burst into the clearing. The creature is there, pacing — which is very strange looking with its proportions. It sees you. Stops. You hold out the device with both hands.</p>
<p>It takes it. Presses it to its chest. Makes a long low sound — relief, absolutely unmistakeably relief. The crack in the device seals over. The signal changes. Something in the trees hums.</p>
<p>The creature looks at you for a long moment. Then it reaches into itself — through itself, somehow — and pulls out an object and holds it out to you.</p>`,
cx:[
  {t:"Take it. Whatever it is.",nx:"alien_gift"},
  {t:"Wave it away. You don't need payment.",nx:"decline_gift"},
  {t:"The trees light up — the vessel is here.",nx:"vessel_arrives"},
]},

wake_sam_device:{d:10,em:"😴",el:"tent in darkness",ch:"The Beacon",
ti:"Sam Needs to Hear This",
tx:`<p>You shake Sam. "Wake up, the thing is talking." Sam sits up, blinks, and the device repeats its message in full. Sam stares at it. Then looks at you. Then at it.</p>
<p>"Okay," Sam says slowly. "Okay. So we have — " a glance at the device — "thirty-four minutes before an alien retrieval craft comes and takes the entire campsite." A pause. "And everyone in it." Another pause. "Including the whole school group." </p>
<p>"Yes," you say.</p>
<p>Sam gets up and puts shoes on. "We have to return it."</p>`,
cx:[
  {t:"Yes. Let's go right now.",nx:"return_device"},
  {t:"What if the operator has already left? The vessel might not come anyway.",nx:"ask_extraction"},
  {t:"Wake everyone first. The group should know.",nx:"wake_whole_camp"},
]},

keep_device:{d:8,em:"🎒",el:"device in bag",ch:"Consequences",
ti:"Finders Keepers",
tx:`<p>You put the device in your bag. It goes quiet — either respecting your decision or strategically conserving power. You lie down in your sleeping bag and stare at the tent ceiling.</p>
<p>Twenty minutes later, the sky turns white.</p>
<p>Not lightning. Not dawn. A sustained, bright, sourceless white that filters through the tent fabric and makes every shadow crisp. Then a sound — not loud, but felt in your chest — and the device in your bag vibrates so hard it buzzes off the ground.</p>
<p>Outside, every single person in the camp wakes up at once.</p>`,
cx:[
  {t:"Get out of the tent. See what's happening.",nx:"camp_witness"},
  {t:"Try to turn the device off. Fast.",nx:"device_panic"},
  {t:"You know what this is. Run for the trees with the device.",nx:"run_device"},
  {t:"The device says: Hello. In English. Directly to you.",nx:"device_speaks"}
]},

ask_extraction:{d:10,em:"📟",el:"device in torchlight",ch:"The Beacon",
ti:"Define Extraction",
tx:`<p>"What does extraction mean?" you ask.</p>
<p><strong>"The replacement vessel is equipped for emergency retrieval. It will create a containment field around the beacon signal and transport the contents to the survey vessel in high orbit. Contents will be catalogued. Non-native specimens — such as yourselves — will be processed and returned within approximately eighteen of your months."</strong></p>
<p>Eighteen months.</p>
<p>"In space?" Sam asks.</p>
<p><strong>"In orbit, primarily. Some specimens are of sufficient interest to retain longer."</strong></p>
<p>Silence.</p>`,
cx:[
  {t:"Return the device immediately.",nx:"return_device"},
  {t:"Ask: is there any way to contact the original operator?",nx:"contact_vessel"},
  {t:"Ask: what counts as 'sufficient interest'?",nx:"what_is_interesting"},
  {t:"Ask: what do we need to do to stop this?",nx:"how_stop"},
]},

contact_vessel:{d:11,em:"📡",el:"device broadcasting",ch:"Hailing",
ti:"Can You Reach Them?",
tx:`<p>"Can you contact the original vessel?" you ask. "Tell them there's been a delay?"</p>
<p><strong>"The beacon requires operator-level authentication to broadcast. However — if a non-operator provides a signal of sufficient novelty, the primary vessel may choose to receive it."</strong></p>
<p>"Novelty," Sam says. "It means if we're interesting enough, they might listen."</p>
<p>The device blinks, waiting.</p>`,
cx:[
  {t:"Sing into it. Loudest, strangest thing you know.",nx:"sing_to_ship"},
  {t:"Play music from your phone through it.",nx:"phone_music"},
  {t:"Tell them your name and where you're from and ask them nicely not to take everyone.",nx:"polite_broadcast"},
  {t:"Say: we have your operator and we will return them safely in exchange for leaving the camp alone.",nx:"negotiate"},
]},

wake_whole_camp:{d:9,em:"😱",el:"chaos in camp",ch:"Everyone Up",
ti:"Wakey Wakey",
tx:`<p>You go tent to tent. You keep it brief: "There is an alien spacecraft above us. We have about twenty minutes. Get dressed and follow me into the trees." Most people don't believe you. Then the sky starts to glow.</p>
<p>Everyone believes you after that.</p>
<p>Twelve students and Mr. Davies standing in a field at midnight staring at a light in the sky that is definitely not a star and definitely getting bigger.</p>
<p>"Alex," Mr. Davies says very calmly, "I think you should tell me everything very fast."</p>`,
cx:[
  {t:"Tell him everything. Fast.",nx:"brief_davies"},
  {t:"No time to explain. Run for the trees — the forest might shield the signal.",nx:"forest_shield"},
  {t:"Someone in the group has an idea: the old mine shaft two kilometres north.",nx:"mine_shaft"},
]},

/* ── SKY / VESSEL BRANCH ── */
look_up_sky:{d:11,em:"🌌",el:"sky above forest",ch:"The Sky",
ti:"Looking Up",
tx:`<p>You tilt your head back. The stars are extraordinary — you're far from any city light. But there's something wrong with the sky. One of the "stars" is moving. Slowly. Too slowly to be a plane, too fast to be a satellite. And it's getting bigger.</p>
<p>Then two more appear. Then four. Then you lose count because they're moving in formation and the pattern they're making is clearly, unmistakeably deliberate.</p>
<p>"That's not weather," Sam says.</p>
<p>The creature beside you is watching them too. Its expression, if you've read it right at all, is something like: <em>we are out of time.</em></p>`,
cx:[
  {t:"Ask the creature: are those yours?",nx:"are_they_yours"},
  {t:"Ask the creature: are those coming for us?",nx:"coming_for_us"},
  {t:"Something else is in the sky — not the lights. Something much larger.",nx:"mothership"},
]},

ask_sky_danger:{d:11,em:"🌌",el:"sky through the trees",ch:"What's Up There?",
ti:"What Is It?",
tx:`<p>You point at the sky. Make the danger sound. Look at the creature.</p>
<p>It nods — a very human nod, which surprises you — and points upward. Then it holds up what might be eight fingers, in two groups. Then closes its hand once. Opens it again. A countdown.</p>
<p>"Eight somethings," Sam whispers. "Eight what?"</p>
<p>The creature points at itself. Points at the sky. Points at the device.</p>
<p>Eight of them. Coming down. The device is meant to signal them away from this location. And it's broken.</p>`,
cx:[
  {t:"Fix the device. Or try.",nx:"fix_device"},
  {t:"Eight is fine. We can handle eight.",nx:"eight_is_fine"},
  {t:"Look up. Are they here already?",nx:"look_up_sky"},
  {t:"Lead the creature to Mr. Davies. More brains on this.",nx:"back_get_davies"},
]},

are_they_yours:{d:12,em:"🛸",el:"lights in formation",ch:"Not Alone",
ti:"Yours?",
tx:`<p>You point at the lights, then at the creature. <em>Yours?</em></p>
<p>Its answer is complicated. It nods — yes. Then shakes its head — no. Then makes a gesture: two hands pressing against each other, but not quite touching. <em>Same kind, but separate.</em></p>
<p>"There are different groups," Sam says. "And the ones coming might not be on the same side."</p>
<p>The creature points at you. Points at itself. Makes the pressing-hands gesture again. Then spreads its hands outward — apart. Whatever is coming, you and this creature are on the same side. The incoming ones are not.</p>`,
cx:[
  {t:"Ask: what do we do?",nx:"what_do_we_do"},
  {t:"Ask: do they know we're here?",nx:"do_they_know"},
  {t:"Say: we know somewhere you can hide.",nx:"offer_hiding"},
]},

coming_for_us:{d:10,em:"😰",el:"lights descending",ch:"Run",
ti:"Oh No",
tx:`<p>The creature shakes its head — a clear, unmistakeable no, they are not coming for it. Then very deliberately points at you. And Sam. And gestures broadly around the camp.</p>
<p>They're coming for the humans.</p>
<p>"Why?" Sam asks. The creature doesn't understand the word, but it mimes something — a box, something inside the box, something looking at it. Studying it. Collecting.</p>
<p>"We're specimens," Sam says flatly. "We're specimens and they're coming to collect us."</p>`,
cx:[
  {t:"Ask the creature how to stop them.",nx:"how_stop"},
  {t:"Run back to camp and wake everyone.",nx:"wake_whole_camp"},
  {t:"The device. It could signal them away.",nx:"fix_device"},
]},

mothership:{d:13,em:"🛸",el:"vast shape above clouds",ch:"The Ship",
ti:"Oh.",
tx:`<p>Behind the small moving lights, something darker moves through the clouds. Something vast. You can only tell how big it is because it covers the stars. A shape like a disc the size of a city, drifting without sound above the forest. No lights on it at all, just darkness that moves.</p>
<p>Sam doesn't say anything for a very long time.</p>
<p>"Is that..." Sam begins.</p>
<p>The creature beside you stands very still and makes a low, long sound that could be either a prayer or a warning.</p>`,
cx:[
  {t:"That thing is not here for sightseeing. Run.",nx:"run_from_mothership"},
  {t:"Stay. Running from something that size is pointless. Find out what it wants.",nx:"face_mothership"},
  {t:"The device in your pocket suddenly goes hot.",nx:"device_activates"},
]},

ship_descending:{d:12,em:"🛸",el:"craft coming through clouds",ch:"Arrival",
ti:"Something's Coming Down",
tx:`<p>Through the trees you can see it: a craft descending through the cloud cover, slow and enormous, throwing no light but displacing the clouds around it. It is not the same as whatever brought the creature here — this one is bigger. Much bigger. And not quiet the way the first one was. This one vibrates the ground slightly.</p>
<p>The creature sees it too. Grabs your arm — its grip surprisingly strong — and makes an urgent sound. Then it points at the broken device.</p>
<p>You have — maybe — minutes.</p>`,
cx:[
  {t:"Smash the device against a rock. Maybe destroying it stops the signal.",nx:"smash_device"},
  {t:"Try to fix it. Now. What have you got?",nx:"fix_device"},
  {t:"Get the creature to run with you into the old mine shaft north of camp.",nx:"mine_shaft"},
  {t:"Stand your ground. You want to see who gets out of that thing.",nx:"face_mothership"},
]},

/* ── FIX / TECH BRANCH ── */
fix_device:{d:10,em:"🔧",el:"cracked alien device",ch:"Engineering",
ti:"Okay. Think.",
tx:`<p>You take the device and look at it properly. The crack runs along a seam — like a clamshell that's popped open slightly. The light escaping through the gap pulses in a broken rhythm. But the two halves are held together by something — not screws, not clips. More like a magnetic seal that's lost its charge.</p>
<p>Sam watches over your shoulder. "What are you thinking?"</p>
<p>"I'm thinking," you say slowly, "that we need something that can create a magnetic seal."</p>`,
cx:[
  {t:"The camping toolkit has a powerful neodymium magnet for the compass.",nx:"magnet_fix"},
  {t:"Your phone has wireless charging coils inside. Maybe the field helps.",nx:"phone_fix"},
  {t:"Ask the creature — in gestures — if it has anything to fix it with.",nx:"creature_fix_help"},
  {t:"The device picks up a second signal — something is jamming the first.",nx:"freq_war_start"}
]},

toolkit_fix:{d:10,em:"🔦",el:"camping gear spread out",ch:"Engineering",
ti:"The Toolkit",
tx:`<p>You dump your camping toolkit on the ground. Head torch. Paracord. A folding multi-tool. Waterproof matches. Compass. Emergency whistle. You pick up the compass. The needle swings wildly near the device — heavy magnetic field. You pull the compass apart and extract the small but powerful neodymium magnet inside it.</p>
<p>The creature watches this with great intensity.</p>`,
cx:[
  {t:"Press the magnet against the crack in the device.",nx:"magnet_fix"},
  {t:"Show it to the creature. Maybe it understands what you're trying to do.",nx:"creature_fix_help"},
]},

davies_fix:{d:9,em:"🧑‍🏫",el:"teacher examining device",ch:"Adult Supervision",
ti:"Mr. Davies Is Actually Good At This",
tx:`<p>You run to get Mr. Davies. He takes one look at the cracked device — you've already explained the whole situation in ninety seconds on the way back — and picks it up, turning it in the torch beam. "Magnetic closure," he says immediately. "Lost its charge. You need a strong external field to reseal it." He looks at you. "Does your compass have a neodymium magnet?" You blink. "Yes?" "Get it."</p>`,
cx:[
  {t:"Get the magnet. Fast.",nx:"magnet_fix"},
  {t:"Mr. Davies pulls something from his own bag. He carries a rare-earth magnet for some reason.",nx:"davies_magnet"},
]},

magnet_fix:{d:14,em:"✨",el:"device sealing itself",ch:"It Works",
ti:"Click",
tx:`<p>You press the magnet against the crack. For a moment nothing happens. Then you feel it — a pull, a shift, the two halves of the casing drawing together. The leaked light withdraws inside. The broken heartbeat of the pulse smooths out into something steady and clean. The signal changes — not broken now, full-strength.</p>
<p>The creature makes a sound you've never heard from it before. Bright. Resonant. If it had a human equivalent it would be <em>yes yes yes yes.</em></p>
<p>The signal transmits. Above the trees something enormous changes direction.</p>`,
cx:[
  {t:"Ask the creature: did it work? Are they leaving?",nx:"are_they_leaving"},
  {t:"The sky is changing — you need to see this.",nx:"sky_clearing"},
  {t:"The creature is leaving too. It's heading back into the trees.",nx:"creature_leaves"},
]},

phone_fix:{d:11,em:"📱",el:"phone against device",ch:"Wireless",
ti:"Worth a Shot",
tx:`<p>You switch your phone to wireless charging mode and hold it against the crack. Nothing happens for six seconds. Then the device makes a sound — low, confused, almost questioning. Then the crack begins, very slowly, to narrow. The field isn't perfect but it's enough to hold the two halves together in a kind of truce.</p>
<p>The signal transmits — rough, patchy, but transmitting. Above you, something changes.</p>`,
cx:[
  {t:"Keep the phone pressed against it. Don't move.",nx:"sky_clearing"},
  {t:"Pass it to Sam — your arm's going numb.",nx:"sam_holds"},
  {t:"The creature indicates: that's enough. It takes the device.",nx:"creature_leaves"},
]},

creature_fix_help:{d:11,em:"👽",el:"alien and human working together",ch:"Teamwork",
ti:"Together",
tx:`<p>You show the creature the magnet and mime pressing it to the crack. The creature's eyes widen — those enormous dark eyes — and it makes a rapid sound. It reaches into what might be a pocket in its clothing (which isn't clothing exactly but functions like it) and produces something: a small disc, silvery-blue, that immediately clings to the magnet in your hand.</p>
<p>Together — you holding the magnet, it holding the disc — you press them to opposite sides of the crack. The seal forms perfectly. Instantly.</p>
<p>The device sings.</p>`,
cx:[
  {t:"Watch the sky. Something is changing up there.",nx:"sky_clearing"},
  {t:"The creature grabs your hand and points urgently at the trees.",nx:"run_together"},
  {t:"The camp — did the signal wake anyone?",nx:"camp_witness"},
  {t:"The ground ahead is glowing. The creature is pointing you towards it.",nx:"bioluminescent_field"}
]},

/* ── RESOLUTION BRANCHES ── */
are_they_leaving:{d:15,em:"🌠",el:"lights departing",ch:"Departure",
ti:"Going",
tx:`<p>The creature looks at the sky, then at the device, then back at the sky. Makes a slow, long sound — relief, unmistakeably. It points upward. The formation of lights — which you can now see clearly between the trees — is changing. They're pulling back. Ascending. Leaving.</p>
<p>The creature turns to you. It puts one hand on its chest. Bows its head once, slowly. Then it holds out its other hand.</p>
<p>In its palm is a small object: smooth, dark, warm, shaped like nothing you've ever seen.</p>`,
cx:[
  {t:"Take it.",nx:"alien_gift"},
  {t:"Decline. The experience was the gift.",nx:"decline_gift"},
  {t:"Ask what it is.",nx:"what_is_gift"},
]},

sky_clearing:{d:14,em:"🌌",el:"sky above clearing",ch:"Departure",
ti:"The Sky Clears",
tx:`<p>You walk to a gap in the tree cover and look up. The formation of lights is ascending — slowly at first, then faster, then impossibly fast — tearing upward through the atmosphere like reversed meteors. The vast darkness behind them — the mothership, if that's what it was — withdraws into the clouds and then beyond them.</p>
<p>In thirty seconds the sky is normal again. Stars. Moon. The sound of the forest.</p>
<p>Sam stands beside you. "Did we just — " "Yes," you say. "I think so." A long silence. "Should we tell anyone?" "I don't know," you say honestly.</p>`,
cx:[
  {t:"Tell everyone tomorrow. This is too big to keep quiet.",nx:"tell_everyone"},
  {t:"Tell no one. Who would believe you?",nx:"secret_ending"},
  {t:"Mr. Davies already knows — or at least suspects. Go talk to him.",nx:"davies_knows"},
  {t:"The creature is still here. It didn't leave.",nx:"creature_stayed"},
  {t:"Everything tonight connects. You can feel the shape of it now.",nx:"everything_connects"}
]},

creature_leaves:{d:13,em:"👋",el:"creature in forest",ch:"Goodbye",
ti:"Leaving",
tx:`<p>The creature walks back into the trees. It doesn't run. It moves with dignity and purpose. About twenty metres in it turns and looks at you once — both of you — and makes a sound that resonates in your chest. Then it's gone.</p>
<p>The forest is quiet. The signal has stopped. The lights in the sky are moving away.</p>
<p>You and Sam stand in the moonlit clearing for a long time, not talking.</p>`,
cx:[
  {t:"Follow it. Maybe it will lead somewhere.",nx:"follow_creature"},
  {t:"Let it go. Say goodbye and mean it.",nx:"secret_ending"},
  {t:"Check what it left behind in the clearing.",nx:"clearing_remains"},
  {t:"The creature pauses — then turns back. Something changed its mind.",nx:"bree_returns"}
]},

alien_gift:{d:16,em:"🪐",el:"small alien object",ch:"The Gift",
ti:"A Piece of Somewhere Else",
tx:`<p>The object is warm and heavier than it looks. As soon as you close your hand around it, it pulses — once — with a light that seems to come from inside your palm. Then it goes still and dark.</p>
<p>The creature watches you hold it. Makes a sound that might be approval.</p>
<p>You don't find out what it actually does until three weeks later, when you wake up at 3am and the object is glowing on your bedside table, and outside your bedroom window something is hovering that is very clearly not a helicopter.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: It's Not Over",
etx:"You survived first contact, fixed the device, saved the campsite — and were given something extraordinary in return. Whatever it is, it isn't finished yet. Good ending. Really good ending. The story continues somewhere you can't see yet.",
cx:[
  {t:"Hold it and try to understand what it does.",nx:"alien_gift_use"}
]},

decline_gift:{d:15,em:"🌙",el:"moonlit clearing",ch:"No Thanks",
ti:"I'm Good",
tx:`<p>"No, thanks," you say, gently pushing the hand back. "You should keep it." The creature tilts its head. You put your hand on your own chest. "It's enough." It holds your gaze for a long moment. Then it puts the object away and makes a long, slow sound — the one you've started to associate with understanding. Acceptance.</p>
<p>It turns and walks into the trees. You and Sam stand in the clearing. The sky above is completely ordinary now. Stars. Moon. A bat. An owl.</p>
<p>You go back to camp. You never see it again. But sometimes, late at night, the stars feel different — like they're closer than before.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Nothing to Prove",
etx:"You didn't need a souvenir. The experience changed you. Sometimes the best endings are the ones that leave something invisible behind.",
cx:[
  {t:"The creature accepts your refusal. Something remains.",nx:"gift_mark_return"}
]},

what_is_gift:{d:14,em:"🪐",el:"alien object in palm",ch:"What Is It?",
ti:"You Ask",
tx:`<p>You point at the object. Make a questioning gesture. The creature looks at it, then at you, and then does something complicated: it mimes an eye — then two eyes — then many, many eyes. Then it gestures at the stars, and back at the object, and makes the sound for <em>here/this place/now.</em></p>
<p>"It lets you see?" Sam guesses. "See what's here?"</p>
<p>Or maybe: see everywhere that's here.</p>`,
cx:[
  {t:"Take it.",nx:"alien_gift"},
  {t:"Still decline. Seeing everywhere sounds like too much.",nx:"decline_gift"},
]},

/* ── PIRATE BRANCH ── */
call_hole:{d:9,em:"🕳️",el:"hole in the ground",ch:"The Hole",
ti:"Hello?",
tx:`<p>"Hello?" you call into the hole. Your voice goes down and keeps going, which is physically wrong — the hole can't be more than three metres deep, but the echo suggests something much larger below.</p>
<p>Something calls back. Not in words. In a complex series of tones that seem to respond directly to your exact voice pattern. Like a lock recognising a key.</p>
<p>The hole gets wider. Not gradually — suddenly, like a pupil dilating. It's now four metres across. A rope ladder drops out of it.</p>
<p>"That's an invitation," Sam says. "That's either an invitation or a trap."</p>
<p>"Both, possibly," you say.</p>`,
cx:[
  {t:"Climb down the ladder.",nx:"climb_down"},
  {t:"Tie something to the top of the ladder first so you can find your way back.",nx:"anchor_ladder"},
  {t:"Drop a stone in first and count the seconds.",nx:"drop_stone"},
]},

back_away_hole:{d:7,em:"🌲",el:"stepping back",ch:"Second Thoughts",
ti:"Nope",
tx:`<p>You back away. The signal keeps going. The light keeps blinking. The hole doesn't move or change. It just sits there being extremely wrong about the laws of physics.</p>
<p>You back up to the tree line and watch it from a distance. After about a minute, a hand appears from inside the hole. A human hand. It waves.</p>`,
cx:[
  {t:"Wave back.",nx:"wave_back"},
  {t:"Run.",nx:"run_from_alien"},
  {t:"Call out: who's there?",nx:"whos_there"},
  {t:"Look around for where the signal actually started.",nx:"signal_investigation"}
]},

film_hole:{d:8,em:"📱",el:"phone screen in forest",ch:"Documentation",
ti:"Recording",
tx:`<p>You film it. The device works fine at first — the hole, the light, the signal. But when you play back the footage immediately, the hole isn't there. The clearing is empty. Your phone camera recorded a normal patch of forest floor.</p>
<p>"It's not visible on camera," Sam says.</p>
<p>"But we can see it with our eyes," you say.</p>
<p>"So it's either real and camera-proof," Sam says slowly, "or we're both hallucinating the same thing, which is more worrying."</p>
<p>While you're talking about it, the hole starts humming.</p>`,
cx:[
  {t:"Jump in.",nx:"jump_hole"},
  {t:"Call into it.",nx:"call_hole"},
  {t:"The humming is actually music. Recognisable music.",nx:"familiar_music"},
]},

climb_down:{d:12,em:"⬇️",el:"rope ladder descending",ch:"Going Down",
ti:"Below",
tx:`<p>You climb down the rope ladder. Sam insists on going first which you find both touching and terrifying. You follow. The hole closes above you — not all the way, just enough to block the moonlight — and you're in a shaft that smells of salt water and old rope.</p>
<p>That's odd. You're landlocked, hours from the sea.</p>
<p>You reach the bottom. It opens into a cavern — enormous, lit by lanterns, and full of people. People in old clothes. People with cutlasses and maps and one man at the far end of the cavern who is clearly in charge and who looks at you and Sam with an expression you cannot immediately read.</p>
<p>"Another two from the surface," he says. "Wonderful. We were running low."</p>`,
cx:[
  {t:"Running low on what? Ask him directly.",nx:"running_low"},
  {t:"There are maps everywhere. Look at one.",nx:"look_at_map"},
  {t:"Find the exit before he finishes that sentence.",nx:"find_exit"},
  {t:"These people are clearly pirates. Talk to the nearest one.",nx:"talk_pirate"},
]},

anchor_ladder:{d:11,em:"🪢",el:"rope tied to tree",ch:"Safety First",
ti:"Tied Off",
tx:`<p>You tie the top of the rope ladder to a tree root with a solid bowline knot — Mr. Davies made you all practice knots on day one. Then you climb down.</p>
<p>Sam follows. The cavern below is lit by lanterns and smells of salt. It's vast — far bigger than the hole above it should allow. There are people here: roughly twenty, dressed in clothes that seem to belong to several different centuries simultaneously. One of them, a woman with short white hair and an expression of absolute command, turns and looks at you.</p>
<p>"Oh good," she says. "We needed two more."</p>`,
cx:[
  {t:"Two more what?",nx:"two_more_what"},
  {t:"Back up the ladder immediately.",nx:"run_from_pirate"},
  {t:"Ask her where you are.",nx:"where_are_we"},
]},

drop_stone:{d:9,em:"🪨",el:"stone disappearing into hole",ch:"Caution",
ti:"Scientific Method",
tx:`<p>You drop a stone in. You count. One. Two. Three. Four. Five. Six. Seven. You stop counting at twelve because the stone still hasn't hit anything, which is geometrically impossible for a three-metre hole.</p>
<p>"That hole," Sam says carefully, "is not a hole."</p>
<p>"No," you agree.</p>
<p>"It's a door."</p>
<p>"Yes," you say.</p>
<p>"Where to?"</p>
<p>Below, very faintly, the stone finally hits something — and you hear it hit something that sounds like water. And then someone shouts: <em>"Who's throwing rocks?"</em></p>`,
cx:[
  {t:"Shout back: sorry! Who are you?",nx:"whos_there"},
  {t:"Climb down.",nx:"climb_down"},
  {t:"Drop another stone.",nx:"climb_down"},
]},

wave_back:{d:10,em:"👋",el:"hand waving from hole",ch:"Communication",
ti:"Waving",
tx:`<p>You wave back. The hand disappears. A moment later a head appears — a boy, roughly your age, with messy hair and a look of profound irritation. "Finally," he says. "Do you have any rope?" "Yes," Sam says immediately. "Of course I have rope." The boy's expression shifts to something like hope.</p>
<p>"The ladder broke," he explains. "I've been in here for—" he pauses, looking confused "—I don't actually know how long. Time's weird down here. Can you pull me out?"</p>`,
cx:[
  {t:"Pull him out.",nx:"pull_out_boy"},
  {t:"Ask what's down there first.",nx:"what_is_down"},
  {t:"Ask how he got in.",nx:"how_got_in"},
]},

whos_there:{d:9,em:"🕳️",el:"hole glowing faintly",ch:"Contact",
ti:"Who's There?",
tx:`<p>"Who's there?" you call into the hole. A pause. Then: "That depends on which direction you're asking from." It's a young voice — someone your age, maybe slightly older. "From the surface," you say. Another pause. "Oh, surface-side. Great. Are you alone?" "No," Sam says. "There are two of us." "Better," says the voice. "I need exactly two people for what I'm trying to do. Are you good with heights?"</p>`,
cx:[
  {t:"Say yes. Climb down.",nx:"climb_down"},
  {t:"Ask what you're needed for before you commit.",nx:"what_is_down"},
  {t:"This feels like a trap. Back off.",nx:"back_away_hole"},
  {t:"Call back: do you know anything about the original signal here?",nx:"fin_knowledge"}
]},

running_low:{d:13,em:"⚓",el:"lantern-lit cavern",ch:"Pirates",
ti:"Running Low On?",
tx:`<p>"Running low on what?" you ask. The man in charge — who you can now see is wearing an extraordinarily complex coat that seems to have too many pockets — smiles. "Navigators," he says. "The surface world keeps producing them. We keep needing them. The geometry of the Underchart is not static." He spreads a map on the table. It shows what appears to be an enormous underground ocean with no visible borders. "We sail it," he says simply. "And we need people who haven't learned yet that it's impossible."</p>`,
cx:[
  {t:"Ask if you can see the ship.",nx:"see_the_ship"},
  {t:"Ask what happens if you say no.",nx:"say_no"},
  {t:"Look at the map properly.",nx:"look_at_map"},
  {t:"Sam is already asking about the navigation system.",nx:"sam_navigates"},
]},

look_at_map:{d:12,em:"🗺️",el:"impossible map",ch:"The Underchart",
ti:"The Map",
tx:`<p>The map is drawn on something that isn't quite paper. It shows an ocean — but the ocean is wrong. The currents go in impossible directions. The compass rose has fourteen directions. Islands appear and disappear as you look at them, as if the map is updating in real time.</p>
<p>"It's a living chart," says a voice behind you. You turn: a girl your age, with grease on her hands and a telescope tucked under one arm. "Updates every six hours. The Underchart rearranges itself. You have to plot a course based on predicted geometry, not current geometry." She pauses. "You're good at maths?"</p>`,
cx:[
  {t:"\"Yes, actually.\" (You are)",nx:"join_navigation"},
  {t:"\"No.\" (You're really not) — but Sam is.",nx:"sam_navigates"},
  {t:"Ask her what's at the centre of the map.",nx:"map_centre"},
  {t:"Something answers the map — not the cartographer girl.",nx:"cartographer_start"}
]},

find_exit:{d:10,em:"🚪",el:"cavern walls",ch:"Escape",
ti:"Exit Strategy",
tx:`<p>You scan the cavern walls immediately. There — in the far left corner — a low door, iron-banded, hanging slightly open. You elbow Sam and nod towards it. Sam nods back. You edge along the cavern wall. Nobody stops you. Nobody even seems to particularly notice. These are busy, absorbed people.</p>
<p>You reach the door. Open it. Inside: a narrow stone corridor leading down, and down, and down. From somewhere below comes a smell of sea air and the sound of something enormous slowly rocking.</p>`,
cx:[
  {t:"Go down the corridor.",nx:"down_corridor"},
  {t:"Actually you want to know more. Go back into the cavern.",nx:"running_low"},
  {t:"Wait and listen. You can hear voices below.",nx:"hear_voices"},
]},

talk_pirate:{d:11,em:"⚓",el:"pirate with cutlass",ch:"Local Knowledge",
ti:"The Nearest One",
tx:`<p>The nearest person is a woman sitting cross-legged on a barrel, sharpening a blade. She looks at you with the patient expression of someone who has seen stranger things than two teenagers drop in from the ceiling. "First time?" she asks. "Yes," you say. "Below the surface?" "Yes." She nods. "It gets easier. The second time you climb down you don't even hesitate." "I'm not planning on a second time," you say. She smiles in a way that suggests she's heard that before.</p>`,
cx:[
  {t:"Ask her: what is this place?",nx:"where_are_we"},
  {t:"Ask her: where does that corridor go?",nx:"down_corridor"},
  {t:"Ask her: is there a way back to the surface that doesn't involve the rope ladder?",nx:"other_way_out"},
]},

two_more_what:{d:13,em:"⚓",el:"white-haired captain",ch:"The Crew",
ti:"Two More Crew",
tx:`<p>"Crew," the woman says simply. "The chart-ship sails in six hours. We need two more crew to balance the navigation rings. It's not optional — the geometry requires exactly balanced pairs or the ship tears along the fold-lines." She looks you over with the practiced eye of someone assessing a tool. "Have you sailed before?" "On a lake," Sam says. "Once." The woman looks at Sam. Something in her expression relaxes slightly. "Good. Lake sailors don't have bad habits yet."</p>`,
cx:[
  {t:"Ask what happens if you refuse.",nx:"say_no"},
  {t:"Ask her to explain what a navigation ring is.",nx:"nav_ring"},
  {t:"Say you'll do it. Both of you.",nx:"join_crew"},
]},

run_from_pirate:{d:9,em:"🏃",el:"climbing back up",ch:"Retreat",
ti:"Going Up",
tx:`<p>You're back up the ladder in fifteen seconds. You untie it from the tree root. The hole narrows. You back away through the forest.</p>
<p>The signal is still going. But differently now — not a repeated loop, more like it's following you. Every time you stop it stops. When you move it moves.</p>
<p>"It's tracking us," Sam says.</p>
<p>"Yes," you say.</p>
<p>"Why?"</p>
<p>"I think," you say slowly, "because they really do need two more people."</p>`,
cx:[
  {t:"Turn around. Go back. Fine.",nx:"climb_down"},
  {t:"Keep moving. Get back to camp and wake Mr. Davies.",nx:"wake_davies_late"},
  {t:"Ask the signal — out loud — what it wants.",nx:"ask_signal"},
  {t:"The device crackles. A broadcast — dated 1908.",nx:"last_broadcast"}
]},

where_are_we:{d:12,em:"🌊",el:"underground cavern",ch:"Geography",
ti:"Where Is This?",
tx:`<p>"Where are we?" you ask. The white-haired woman — who you are increasingly certain is the captain of something — spreads her hands to indicate the cavern around you. "Under," she says. "The Underchart has no geographic name because it sits between geographies. Below every ocean on the surface there is another ocean. We sail the lower one." A pause. "We have been sailing it for approximately four hundred years." "All of you?" Sam asks. "Some longer," she says. "Some shorter."</p>`,
cx:[
  {t:"Four hundred years. Ask if they can get back to the surface.",nx:"can_go_back"},
  {t:"Ask what they're looking for down here.",nx:"what_looking_for"},
  {t:"Ask her name.",nx:"captain_name"},
]},

see_the_ship:{d:14,em:"⛵",el:"impossible ship",ch:"The Vessel",
ti:"The Ship",
tx:`<p>He leads you through the iron door and down the corridor. You smell the sea before you see it: vast, dark, luminous in a way that isn't reflected light but something produced by the water itself. And on it — a ship. Not a sailing ship exactly. Something between a galleon and something that has no name. Three masts, but the sails are made of a material that reacts to the underground currents, not wind. The hull is covered in geometric carvings that glow faintly.</p>
<p>"The Permanent Exception," he says. "She's been sailing the Underchart since 1687."</p>`,
cx:[
  {t:"Get on the ship.",nx:"board_ship"},
  {t:"Ask where it's going.",nx:"ship_destination"},
  {t:"Sam has run ahead and is already on the gangplank.",nx:"board_ship"},
]},

say_no:{d:11,em:"🚪",el:"iron door",ch:"Refusal",
ti:"What If I Say No?",
tx:`<p>"What happens if we say no?" The man in the coat looks at you steadily. "Then you climb back up the ladder and return to your camp and have a nice camping trip. The hole will close. You won't find it again." He pauses. "You'll also forget most of this within a few days. The Underchart prefers its secrets." He doesn't seem bothered either way. "But if you say yes — " he gestures at the ship — "you see where no surface-person has been in four hundred years. And you remember all of it."</p>`,
cx:[
  {t:"Say yes.",nx:"join_crew"},
  {t:"Say no. Remember nothing. Go back to camp.",nx:"choose_mundane"},
  {t:"Ask if you can decide after seeing the ship.",nx:"see_the_ship"},
]},

join_crew:{d:15,em:"⚓",el:"boarding the chart-ship",ch:"Crew",
ti:"All Right Then",
tx:`<p>You join the crew. You don't sleep. For the next six hours you are taught the navigation rings — two brass rings, one held by you, one by Sam, that must be kept in specific orientation to each other or the ship loses its path through the folding geometry of the Underchart. It's the most complicated thing you've ever done. It's also the best.</p>
<p>The Permanent Exception sails. The underground ocean is full of things — lights below the surface, sounds that don't have names, things that surface briefly and are gone. You see things that have no names and some that have very old ones.</p>`,
cx:[
  {t:"Ask the captain where they're ultimately going.",nx:"final_destination"},
  {t:"Something surfaces beside the ship that you want to look at.",nx:"creature_in_water"},
  {t:"Sam has found something in the ship's library.",nx:"ships_library"},
]},

map_centre:{d:13,em:"🗺️",el:"map centre marking",ch:"The Middle",
ti:"What's There?",
tx:`<p>"What's at the centre?" you ask. The girl with the telescope pauses for a moment. "Nothing," she says. Then: "Everything. Depends on the day." Another pause. "The Underchart is like a sea-chart for a sea that's also a mind. The centre is where it thinks. Where it pays attention." She looks at you. "Nobody has sailed to the centre and come back the same. Most come back. They're just — adjusted."</p>
<p>"Adjusted how?" Sam asks.</p>
<p>She smiles. "Differently."</p>`,
cx:[
  {t:"I want to go to the centre.",nx:"sail_centre"},
  {t:"Hard no on the centre. What's the safest route?",nx:"join_navigation"},
  {t:"Ask her why she stays, if it's that strange.",nx:"why_she_stays"},
]},

board_ship:{d:15,em:"⛵",el:"deck of the chart-ship",ch:"Aboard",
ti:"The Deck",
tx:`<p>The deck of the Permanent Exception is larger than it should be for its hull. You notice this and mention it and the man in the coat says: "Yes, she's dimensionally inconsistent. You get used to it." The crew moves around you with practised efficiency. Someone hands you a jacket — not quite the right century for fashion but the right temperature for underground sailing. The sails fill with current-wind.</p>
<p>You are sailing on an underground ocean. This is happening.</p>`,
cx:[
  {t:"Ask someone where the ship is going.",nx:"ship_destination"},
  {t:"Go to the front of the ship and look out.",nx:"look_forward"},
  {t:"Find Sam. You want to stay together.",nx:"find_sam_ship"},
]},

ship_destination:{d:14,em:"🧭",el:"navigation room",ch:"Course",
ti:"Where Are We Going?",
tx:`<p>The captain spreads the living chart on the table. "Here," she says, tapping a point that keeps moving slightly. "The Seventh Compression. An island that only exists in the Underchart for approximately forty-eight of your hours before it folds back under. It contains — " she pauses, choosing the word carefully "— records. Records of everything the Underchart has seen." She looks at you. "Four hundred years of below-surface history."</p>
<p>"Why do you want that?" Sam asks.</p>
<p>"Because," she says simply, "someone up there is trying to drain the Underchart. And we need to know who started it."</p>`,
cx:[
  {t:"Ask: drain it how?",nx:"draining"},
  {t:"Ask: what happens if it's drained?",nx:"what_happens_drain"},
  {t:"Offer to help. You're in now.",nx:"join_quest"},
]},

/* ── DIMENSION / MAGIC BRANCH ── */
jump_hole:{d:12,em:"✨",el:"falling through light",ch:"The Jump",
ti:"You Jump",
tx:`<p>You jump. Sam jumps a half-second behind you — you don't ask Sam to, Sam just does, which is why Sam is your best friend.</p>
<p>You fall for less time than you should. Then you land — softly, which is wrong — on something that feels like grass but glows faintly blue. You're in a space that has no ceiling but also no sky. The light is sourceless. The air smells like ozone and lavender.</p>
<p>You look up. The hole is a hole in the air above you, ten metres up. Through it you can see the moonlit forest.</p>
<p>You look around. You're in a clearing of blue-grass surrounded by trees with silver bark. In the centre of the clearing, sitting at a small table as if expecting you, is a girl about your age, pouring tea.</p>`,
cx:[
  {t:"Sit down at the table.",nx:"sit_table"},
  {t:"Stay standing. Ask where you are.",nx:"ask_where"},
  {t:"Sam points: those are not normal animals in the trees.",nx:"not_normal_animals"},
]},

familiar_music:{d:10,em:"🎵",el:"music from underground",ch:"Recognition",
ti:"That Song",
tx:`<p>It's a song from a film. Specifically, it's a song from a film that came out eleven months ago, which makes it impossible for anyone underground to know. You and Sam look at each other. "That's coming from down there," Sam says. "Yes," you say. "Someone down there is listening to a song from this year." "Which means either they have access to music from up here," Sam says slowly, "or they've been up here recently." "Or both," you say. The music shifts to something else. Something you recognise even better — it's the playlist you made two weeks ago. Nobody has access to that.</p>`,
cx:[
  {t:"Call into the hole: is someone down there listening to my playlist?",nx:"whos_there"},
  {t:"Jump in. You need to meet whoever this is.",nx:"jump_hole"},
  {t:"This is deeply unsettling. Back off entirely.",nx:"back_away_hole"},
]},

pull_out_boy:{d:11,em:"🤝",el:"pulling someone from a hole",ch:"Rescue",
ti:"Pulling",
tx:`<p>You and Sam take the rope and pull. The boy comes up over the edge and sits on the ground, catching his breath. He's wearing clothes that are almost normal — jeans, a jacket — except the jacket has a symbol on it you don't recognise, and his phone, which he pulls out immediately, has no brand on it whatsoever. He looks at his phone. "Twenty-two hours," he says. "I was down there twenty-two hours." He looks at you. "How long has it been up here?" "Since about midnight," you say. "So maybe two hours." He stares. "That's the fold-time," he says, as if that means something.</p>`,
cx:[
  {t:"Ask: what's fold-time?",nx:"fold_time"},
  {t:"Ask: what's down there?",nx:"what_is_down"},
  {t:"Ask: who are you?",nx:"who_is_boy"},
]},

what_is_down:{d:11,em:"🕳️",el:"peering into hole",ch:"Below",
ti:"What's Down There?",
tx:`<p>"What's down there?" you ask. A pause. Then: "A sea," the voice says. "An underground sea with an underground ocean on it. And a ship. And I've been trying to get off the ship for—" a pause "—a while. But the ladder broke when I climbed up here and I can't get back to the surface without rope." Another pause. "Do you have rope?" "Sam has rope," you say, because Sam always has rope. "Sam is a genius," the voice says.</p>`,
cx:[
  {t:"Pass the rope down. Help whoever this is.",nx:"pull_out_boy"},
  {t:"Climb down instead. You want to see the sea.",nx:"climb_down"},
]},

how_got_in:{d:10,em:"🕳️",el:"rope over edge",ch:"Origin Story",
ti:"How Did You Get In?",
tx:`<p>"How did you get in?" you ask. The head disappears. You hear him thinking. "I was following a signal," he says eventually. "Three months ago. Well. Three months on the surface, apparently. Twenty-two hours for me." You and Sam exchange looks. "We were following a signal too," Sam says. "Just now." A very long pause from inside the hole. "What kind of signal?" "Beeping," you say. "Blue light." Silence. Then: "Oh no," he says. "It found two more."</p>`,
cx:[
  {t:"Two more what? Pull him out and ask.",nx:"pull_out_boy"},
  {t:"Drop the rope and leave. 'It found you' is a terrifying sentence.",nx:"run_from_alien"},
  {t:"Ask from up here: what does 'two more' mean?",nx:"fold_time"},
]},

fold_time:{d:13,em:"⏰",el:"strange clock",ch:"Fold-Time",
ti:"Fold-Time",
tx:`<p>"Fold-time," the boy says, sitting on the grass and looking at his phone. "Down there, time folds. An hour below is maybe twelve or fifteen up here. Or sometimes it's the other way — a week down there is a day up here. It's not consistent. It depends on how deep you are and what the Underchart is doing." He looks at you. "You have — if you go down — maybe two real hours before people start noticing you're missing. Below that's like a day and a half of time." Sam looks at you. You look at Sam.</p>`,
cx:[
  {t:"Two real hours is enough. Go down.",nx:"climb_down"},
  {t:"Too risky. Don't go.",nx:"choose_mundane"},
  {t:"Ask him: did you go down voluntarily?",nx:"who_is_boy"},
  {t:"Something is wrong with this clearing. The trees are different.",nx:"wrong_world"}
]},

who_is_boy:{d:12,em:"👦",el:"strange boy on forest floor",ch:"Identity",
ti:"Who Are You?",
tx:`<p>"Who are you?" you ask. He seems surprised by the question. "Finn," he says. "I was on a school trip. Six months ago. Well — twenty hours ago for me, six months on the surface apparently." He checks his phone again. "My family thinks I'm missing. I've been sailing the Underchart trying to find a way back out." He looks at his phone with something complicated in his expression. "I know more about the underground ocean than anyone alive now. And I am extremely tired." He pauses. "Will you help me get back?"</p>`,
cx:[
  {t:"Yes. What do you need?",nx:"help_finn"},
  {t:"What do you know about the Underchart?",nx:"finn_knowledge"},
  {t:"If the entrance hole appears twice, maybe you know how to open it again.",nx:"reopen_hole"},
]},

help_finn:{d:15,em:"🤝",el:"forest at night",ch:"The Mission",
ti:"Yes",
tx:`<p>Finn knows things. He's been on the Permanent Exception for twenty subjective hours. He knows the ship's schedule, the captain's patterns, the geometry of the fold-exits. There are three points on the Underchart where the boundary between below and above is thin enough to break through — and one of them is directly below the forest you're in right now. But it can only be opened from above. "If you go down and hold the exit point open," Finn explains, "I can bring the ship to it and the crew can surface." He pauses. "They've been trying to get back for four hundred years."</p>`,
cx:[
  {t:"Go down and hold the exit point open.",nx:"climb_down"},
  {t:"What does 'hold it open' mean exactly?",nx:"how_hold_open"},
  {t:"Four hundred years is a long time. Ask Finn if they want to come back.",nx:"do_they_want_back"},
]},

/* ── COMMON RESOLUTION NODES ── */
ask_signal:{d:9,em:"📡",el:"forest at night",ch:"Questions",
ti:"Asking the Signal",
tx:`<p>"What do you want?" you ask the forest, feeling extremely strange. The signal changes — not an answer in words, but a shift in pattern. It was beeping in fives. Now it beeps in pairs. Steadily. Like a heartbeat. Like it's walking with you. "It likes us," Sam says uncertainly. "It's herding us," you say. "Back towards the hole." You look at each other. The hole is behind you. The camp is ahead. The signal is between.</p>`,
cx:[
  {t:"Go back to the hole. You're clearly meant to.",nx:"call_hole"},
  {t:"Get to camp. Whatever this is, adults need to know.",nx:"wake_davies"},
  {t:"Stand your ground. Stop moving and see what the signal does.",nx:"stop_and_wait"},
]},

stop_and_wait:{d:8,em:"🌙",el:"still forest",ch:"Patience",
ti:"Standing Still",
tx:`<p>You stop. Sam stops. The signal continues its heartbeat pattern for thirty seconds. Then it slows. Then it stops. The forest is completely silent. Then the silence breaks — a sound above the trees, an enormous low tone, felt more than heard — and the sky fills with light for exactly three seconds. Then dark again. Then stars. Then nothing.</p>
<p>Sam exhales. "Did it just leave?" "I think it just left," you say. "Were we supposed to go with it?" Sam asks. You think about it. "Maybe." You both stand in the dark for a long time. The camping trip continues without incident. Nothing else strange happens.</p>
<p>You never entirely get over it.</p>`,
ty:"ending",en:"neutral",
eti:"★ Ending: The One That Got Away",
etx:"You stayed put, and the mystery left. Sometimes inaction is its own choice. You'll wonder for the rest of your life what was on the other end of that signal.",
cx:[
  {t:"The signal slows. Something responds.",nx:"stop_response"}
]},

wait_for_dawn:{d:8,em:"🌅",el:"dawn in the forest",ch:"Morning",
ti:"Waiting",
tx:`<p>You and Sam wait. The signal fades around 4am. The light goes with it. At dawn, you go to where it was. There is nothing there — no device, no hole, no marks. Only a patch of flattened grass that might be nothing.</p>
<p>Mr. Davies finds you both sitting at the edge of the forest at breakfast time and gives you a look but doesn't ask. Over the next three days, neither of you can bring yourself to tell anyone. The signal lives in your memory perfectly, though — crystal clear, repeating, always just almost making sense.</p>`,
ty:"ending",en:"neutral",
eti:"★ Ending: Morning After",
etx:"You waited, and it passed. Maybe the safe choice. Maybe not. You'll be left wondering what the signal was trying to say.",
cx:[
  {t:"Dawn comes. You made it through the night.",nx:"morning_after_all"}
]},

wake_davies_late:{d:7,em:"🧑‍🏫",el:"teacher's tent at night",ch:"Getting Help",
ti:"Mr. Davies",
tx:`<p>You wake Mr. Davies. He sits up and you explain — as fast and as clearly as you can — what you saw. He doesn't laugh, which surprises you. He listens to the whole thing. Then he puts on his boots.</p>
<p>"Show me," he says. The hole is gone by the time you get there — just flat ground. But the flattened grass is there. Mr. Davies crouches and looks at it. Stands up. Looks at the sky. "Right," he says. Then he looks at you. "You did the right thing telling me." He doesn't say whether he believes you or not. But he makes two cups of camp tea, and the three of you sit outside until dawn, just in case anything else happens. Nothing does.</p>`,
ty:"ending",en:"neutral",
eti:"★ Ending: Adult Supervision",
etx:"You made the safe choice. Whatever was out there, you weren't alone with it. Sometimes that's all you can do — and it's enough.",
cx:[
  {t:"Mr. Davies listens and stands up. Let's go.",nx:"late_davies_help"}
]},

choose_mundane:{d:5,em:"🏕️",el:"peaceful camp",ch:"Going Back",
ti:"No Thanks",
tx:`<p>You climb back up the ladder. You untie it from the tree. The hole closes. You walk back to camp and get into your sleeping bag. Sam gets into their sleeping bag. For a while you lie there, hearts still hammering, looking at the tent ceiling. "We're going to regret that," Sam says. "Probably," you say. "Should we go back?" "The hole's gone," you say. "Yeah," Sam says.</p>
<p>You both fall asleep eventually. In the morning it feels like a dream. But Sam remembers every detail, and so do you, and you both know it was real, and that's almost better anyway.</p>`,
ty:"ending",en:"neutral",
eti:"★ Ending: The Road Not Taken",
etx:"You turned down the adventure. That's a valid choice — adventures have costs. But you'll both remember this night clearly for the rest of your lives.",
cx:[
  {t:"In the morning, walk back past the clearing.",nx:"mundane_morning"}
]},

/* ── PIRATE / UNDERCHART ENDINGS ── */
sail_centre:{d:16,em:"🌀",el:"centre of the underchart",ch:"The Middle",
ti:"Sailing to the Centre",
tx:`<p>The Permanent Exception sails for what feels like days but is probably hours. The sea changes as you approach the centre — less water, more light, more geometry. The chart shifts until it shows only a single point. The crew are very quiet.</p>
<p>You reach it. There's nothing to see — and everything. A place where the Underchart pays attention to you specifically. Asks you something without words. You answer without knowing what you said.</p>
<p>When you come back to camp — and you do come back, through a fold-exit that opens exactly where it needs to — it's two hours later. Sam says you look different. You feel different. You can't explain it. But the map — the impossible living map — is burned into your memory in perfect detail. Every island. Every current. Every fold.</p>
<p>You don't know what to do with that yet. But you will.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: Adjusted",
etx:"You sailed to the centre and came back different. Not wrong — different. The Underchart gave you something. You're going to need years to work out what.",
cx:[
  {t:"You reach the centre. What's there?",nx:"quest_seventh"}
]},

ship_resolution:{d:16,em:"⛵",el:"ship breaking surface",ch:"Surfacing",
ti:"They Made It",
tx:`<p>The Permanent Exception breaks the surface at dawn — actually breaks it, like a whale, the whole ship erupting up through the water of a lake in the middle of the forest, which shouldn't exist but does, this one time. The crew stand on the deck and look at the sky and the trees and the normal light of a normal morning and some of them are crying, which pirates absolutely do not do, but here they are.</p>
<p>The captain looks at you and Sam from the bow. "You did that," she says. "You held the exit point." You shrug. She throws something — an object, small, dense, like a coin but not — and you catch it without thinking. "Spend it somewhere strange," she says.</p>
<p>Then the ship sails back underwater and is gone.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Four Hundred Years Coming",
etx:"You freed a crew that had been lost for four hundred years. They went home — wherever home is now. You have a coin that is definitely not from any country on any surface map. Good luck with that.",
cx:[
  {t:"They're out. The voyage ends. What now?",nx:"tell_everyone"}
]},

draining:{d:14,em:"🌊",el:"underground ocean",ch:"The Problem",
ti:"Draining How?",
tx:`<p>"Someone on the surface is boring shafts," the captain says. "Too many, too deep, too precise. The Underchart is leaking upward — you might have seen it. Sinkholes. Flooding in unexpected places. Aquifers going dry." She pauses. "And the signals. They're mapping us." She looks at you with sudden directness. "You heard a signal tonight, yes? Before you climbed down?" "Yes," you say. "That's one of theirs. A survey device." She spreads the chart. "They've placed forty-seven in this forest alone."</p>`,
cx:[
  {t:"Ask who they are.",nx:"who_is_draining"},
  {t:"You know where those devices are. You passed one earlier.",nx:"know_the_location"},
