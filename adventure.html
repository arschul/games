tx:`<p>You gesture at the approaching lights, then at yourself and Sam. The creature considers. Then makes a gesture: a hand over the eyes, scanning. Then makes a different gesture: yes, but differently. They know there are organics here. They don't know you specifically. The beacon — the device — is what matters to them, not you. Without the fixed device sending the all-clear signal, you're included in the retrieval zone by default. Not targeted. Just — in the way.</p>`,
cx:[
  {t:"Fix the device and send the all-clear. That's the solution.",nx:"fix_device"},
  {t:"Move everyone out of the two-kilometre zone. Wake the camp.",nx:"wake_whole_camp"},
]},

documents:{d:13,em:"📁",el:"folder of documents",ch:"Evidence",
ti:"The Folder",
tx:`<p>The man in the coat — whose name, you've learned, is Aldric — appears from below deck carrying a waterproof folder fat with papers. "Four hundred years of below-surface observations," he says, placing it on the table. "Chemical analyses of the bore-holes they're drilling. Geological surveys showing the Underchart compression. And — " he pulls out a single page " — the facility's corporate registration, their drilling permits, and the name of the minister who signed them." He looks at you. "Someone on the surface needs to take this up." He looks at you. "You're the newest surface-adjacent people we have."</p>`,
cx:[
  {t:"Take the folder. You'll do something with it.",nx:"surface_investigator"},
  {t:"Ask Aldric if he'll come to the surface too.",nx:"can_go_back"},
]},

eight_is_fine:{d:11,em:"💪",el:"eight of them",ch:"Optimism",
ti:"We Can Handle Eight",
tx:`<p>"Eight is fine," you say. Sam looks at you. "Eight alien vessels," Sam clarifies. "Yes," you say. The creature looks at you with an expression that might be admiration or might be concern — hard to tell. It holds up the eight fingers again. Then does something new: mimes something enormous. Eight enormous things. Not small. "Okay," you say. "Eight large alien vessels." You think about it. "Still. We need a plan and we have—" you check your phone "—about six minutes." "Six minutes," Sam says. "No problem," you say. "Probably."</p>`,
cx:[
  {t:"Fix the device. That IS the plan.",nx:"fix_device"},
  {t:"Ask the creature what its plan is.",nx:"what_do_we_do"},
]},

face_mothership:{d:12,em:"🛸",el:"enormous dark shape",ch:"Courage or Foolishness",
ti:"Standing Your Ground",
tx:`<p>You stand in the clearing and look up at the shape above you. It is so large that looking at it makes your perception do something wrong — like trying to see a building when you are standing against its wall. No lights. No sound. Just mass. Just the displacement of everything around it.</p>
<p>Then a beam of light — warm, amber, not threatening — connects the shape to the ground directly in front of you. Something is going to come down that beam. Or it's going to take you up.</p>`,
cx:[
  {t:"Step into the beam.",nx:"aboard_vessel"},
  {t:"Step back out of the beam. Observe only.",nx:"vessel_arrives"},
  {t:"Hold up the device — fixed or broken — so it can see it.",nx:"get_device_for_ship"},
]},

finn_knowledge:{d:12,em:"📖",el:"finn talking",ch:"Information Dump",
ti:"What Finn Knows",
tx:`<p>Finn knows: the ship sails every six hours. There are three surface exit points — this forest, the North Sea, and Siberia. The captain's name is Elara Voss, she has been below since 1683, and she is the most capable navigator any ocean has ever produced. The Underchart has been compressing for eighteen months. Someone on the surface is boring shafts that are disrupting the geometry. And: the Permanent Exception has not been able to surface for forty years because the exit above this forest has been closed. Tonight, for the first time, it opened. "Because of your signal," Finn says. "Your signal matched the frequency that opens that specific exit."</p>`,
cx:[
  {t:"Ask why your signal matched that frequency.",nx:"help_finn"},
  {t:"Open the exit. Get the crew home.",nx:"reopen_hole"},
]},

forest_shield:{d:10,em:"🌲",el:"running into trees",ch:"Cover",
ti:"Into the Forest",
tx:`<p>You run for the trees. "Everyone follow me — now — no questions — move!" Mr. Davies repeats it with authority and somehow fourteen people are running into the forest in thirty seconds. The device in your bag changes tone as you cross under the canopy. Dimmer. The signal is being broken up by the density of the trees and the terrain. Not stopped — but fractured. Harder to lock onto.</p>
<p>"How long does this buy us?" Sam asks, running beside you. "No idea," you say. "But more than zero."</p>`,
cx:[
  {t:"Go deeper. Get everyone to the old stone outcrop a kilometre in.",nx:"run_together"},
  {t:"This isn't enough. You need to return the device.",nx:"return_device"},
  {t:"The creature is here. It followed you.",nx:"creature_fix_help"},
]},

gesture_return:{d:12,em:"👐",el:"gesture language",ch:"The Return",
ti:"Give It Back",
tx:`<p>You point at the device. Then at the sky. Then make the gesture of pushing something away from you — returning it upward, back where it came from. The creature watches your hands. Tilts its head. Then makes the yes-sound, once, clearly. It understands. And it nods — that human nod again — and looks at you with those enormous dark eyes with an expression that you'll spend years trying to accurately describe and never quite manage. Gratitude, yes. And something else. Recognition, maybe. As if it expected this.</p>`,
cx:[
  {t:"It takes the device back. The moment of contact.",nx:"accept_device"},
  {t:"Something is happening in the sky. Look up.",nx:"sky_clearing"},
]},

know_the_location:{d:13,em:"📍",el:"location marker",ch:"Useful Information",
ti:"You Know Where They Are",
tx:`<p>"We know where the survey devices are," you say. "Or some of them. We passed one on the way in. It's about 200 metres north of the camp." The captain looks up sharply. "You touched it?" "No," you say. "We heard it. The signal." She relaxes slightly. "Good. Untouched, it's still sending valid data. If we can map the ones we know about—" She spreads the chart. You point to the approximate location. She marks it. Sam points to another: a second signal you both heard on the first day of the trip. Two marks on the chart. The captain looks at them. "That's a survey line," she says. "They're mapping a specific geological feature." She pauses. "They're mapping the fold-exit. They know it's here."</p>`,
cx:[
  {t:"Ask what that means for the exit.",nx:"surface_investigator"},
  {t:"Go to the surface and destroy the survey devices before they complete the map.",nx:"ship_resolution"},
]},

look_device_close:{d:11,em:"🔎",el:"examining device closely",ch:"Careful",
ti:"Looking Carefully",
tx:`<p>You kneel and look at the device without touching it. Up close it's even stranger — the surface isn't uniform, it shifts slightly depending on the angle you view it from, like the surface of a soap bubble. The crack is visible as a dark seam running along the casing's equator. The light leaking from it pulses in a broken rhythm. Your phone compass goes wild when you hold it near it — heavy magnetic field, very specific.</p>
<p>The creature watches you examine it with what seems like cautious hope.</p>`,
cx:[
  {t:"Offer to help fix it.",nx:"offer_help"},
  {t:"Ask — in gestures — how long before something arrives.",nx:"ask_sky_danger"},
  {t:"The compass. The magnet inside it.",nx:"toolkit_fix"},
]},

look_forward:{d:13,em:"🌊",el:"underground sea",ch:"The View",
ti:"Looking Out",
tx:`<p>The front of the ship opens onto the underground sea. You grip the rail and look out. The sea is lit from below — not reflected light, produced light, something in the water itself giving off a blue-green glow that makes the whole underground space visible. Islands in the middle distance. Formations that might be rock or might be something older. And below the surface, visible as dark shapes against the glow, things moving. Slow, vast, purposeful.</p>
<p>The underground ocean is full of life. Not empty, not a void — full. Thriving with things that have never seen the sun.</p>`,
cx:[
  {t:"Ask someone what those shapes are in the water.",nx:"creature_in_water"},
  {t:"Find Sam. They need to see this.",nx:"find_sam_ship"},
]},

mine_shaft:{d:11,em:"⛏️",el:"old mine entrance",ch:"Underground",
ti:"The Mine Shaft",
tx:`<p>Someone — Jordan from the back of the camp group — says: "The old slate mine. Two kilometres north. The entrance is still open. I walked past it yesterday." Everyone looks at Jordan. "It's reinforced," Jordan continues. "Stone walls. The signal shouldn't penetrate through solid rock." Mr. Davies makes an instant decision. "Move. Everyone. North. Now." You run as a group of fourteen people through the forest in the dark, and it is genuinely terrifying and also a little bit wonderful, and you make it to the mine entrance in eleven minutes.</p>
<p>Inside: dark, dry, cool stone. The device in your bag goes quiet. The signal stops.</p>`,
cx:[
  {t:"Stay here. Wait it out.",nx:"wait_for_dawn"},
  {t:"The device has stopped — use the opportunity to return it.",nx:"return_device"},
  {t:"The creature is outside the mine. It found you.",nx:"creature_fix_help"},
]},

not_normal_animals:{d:11,em:"🦊",el:"unusual creatures in trees",ch:"Local Wildlife",
ti:"Not Normal",
tx:`<p>Sam points. In the silver-bark trees surrounding the clearing, animals sit watching you — but they aren't right. A fox with too many tails. A bird with a wingspan that shouldn't physically work, folded neatly along a branch. Something smaller that keeps shifting shape at the edges, like it can't decide what it is yet. They don't seem threatening. They seem curious in exactly the same way you're curious. "They live here?" you ask. "In the between-space," the girl says, pouring tea. "Some do. Some pass through. Some got in by accident and decided to stay." She glances at them. "Rather like us, I suppose."</p>`,
cx:[
  {t:"Sit down. Ask her how she got in.",nx:"sit_table"},
  {t:"Go towards the animals in the trees.",nx:"sit_with_alien"},
]},

offer_hiding:{d:11,em:"🏔️",el:"rock outcrop",ch:"Sanctuary",
ti:"Somewhere To Hide",
tx:`<p>"We know somewhere," you say, pointing north. "A stone outcrop, about 500 metres. Lots of rock cover. Could it shield the device signal?" The creature looks at you, then north, then at the sky. Makes a quick decision: yes. It grabs your arm and points: lead me. "Okay," you say. "Keep up." You run. The creature runs. Sam runs. You are three beings of two different kinds sprinting through a forest in the dark and there is something extraordinary about the rhythm of it — three sets of feet, none quite the same, all going the same direction.</p>`,
cx:[
  {t:"Reach the outcrop. Fix the device in shelter.",nx:"fix_device"},
  {t:"The creature finds the outcrop before you do. It knows this area.",nx:"cave_discovery"},
]},

phone_music:{d:12,em:"🎵",el:"music playing to space",ch:"Broadcast",
ti:"Music",
tx:`<p>You hold your phone to the device's speaker-equivalent and play the most extraordinary thing you can find in your library. Sam grabs the phone and finds something better: a recording of a full orchestra playing something enormous and complicated and human. The device picks it up, amplifies it, broadcasts it outward on the same frequency as the signal.</p>
<p>For thirty seconds, nothing. Then the face on the ship's screen — if you're inside — or the vessel in the sky — if you're outside — does something that takes a moment to understand. It responds. Not in music. In something that is to music what music is to noise. A structured, layered, overwhelming reply.</p>`,
cx:[
  {t:"Listen. Don't talk. Just listen.",nx:"how_long_watching"},
  {t:"Play something else back. Keep the conversation going.",nx:"teach_words"},
]},

polite_broadcast:{d:12,em:"📻",el:"broadcasting",ch:"Polite Request",
ti:"Excuse Me",
tx:`<p>"Hello," you say into the device. "My name is Alex. I'm fifteen and I'm on a school camping trip and I would very much appreciate it if you did not collect our campsite. We have not done anything to deserve being collected. We are friendly." You pause. "We returned your beacon. Well — we're returning it. We are in the process of returning it." Another pause. "Thank you. Sorry to bother you."</p>
<p>Sam stares at you. "Did you just say sorry to an alien retrieval craft?" "I said please first," you point out. "Technically."</p>
<p>The device changes tone. Something is listening.</p>`,
cx:[
  {t:"Keep talking. You have their attention.",nx:"speak_to_screen"},
  {t:"Return the device now while they're listening.",nx:"return_device"},
]},

run_device:{d:10,em:"🏃",el:"running with device",ch:"Run",
ti:"Running with It",
tx:`<p>You grab the device and run out of the tent, sprinting away from the camp. If the signal is the problem, get the signal away from the people. You crash into the forest. Behind you you can hear Sam calling your name. The device in your hands is getting brighter, not dimmer — it doesn't care about distance from the camp, it cares about returning to its operator.</p>
<p>You realise: you're running in the right direction. The device is warm and buzzing and pulling you slightly north-east. Towards the creature.</p>`,
cx:[
  {t:"Follow the device's pull. Return it.",nx:"return_device"},
  {t:"Sam has caught up. Tell them what you're doing.",nx:"wake_sam_device"},
]},

run_from_mothership:{d:9,em:"🏃",el:"running from enormous shadow",ch:"Retreat",
ti:"Run",
tx:`<p>"Run," you say. Everyone runs. It doesn't help in any practical sense — you can't outrun something that size. But the trees close over you and the canopy blocks the light from above and somehow that helps. You run until you find the rock outcrop, the stone formation two kilometres north, and you pile inside. Fourteen people breathing hard in the dark.</p>
<p>Outside, the vast shape drifts over the forest. Not landing. Looking. After twenty minutes, it moves on.</p>`,
cx:[
  {t:"Wait until it's completely gone.",nx:"wait_for_dawn"},
  {t:"Go back. The creature might still be there.",nx:"creature_stayed"},
]},

sam_holds:{d:12,em:"💪",el:"sam holding the phone",ch:"Steady",
ti:"Sam's Got It",
tx:`<p>Sam takes the phone and holds it steady against the device — both arms extended, completely still. Your arm was cramping. Sam's expression is one of absolute focused calm. "I've got it," Sam says. "Go do something useful." Above you the situation is resolving — the sky is changing, something is departing. The device stays partially sealed, the signal holds, and Sam holds it all together by standing very still for four minutes.</p>
<p>"You can let go now," you say eventually. Sam lets go. The device holds. Sam shakes out both arms. "I'm adding 'stabilised alien navigation equipment' to my CV," Sam says.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Sam's Finest Moment",
etx:"Sam stood completely still for four minutes to hold a partial magnetic seal on alien navigation equipment and kept the device transmitting long enough for the vessel to depart. Sam is remarkable. You know this. It's good to be reminded."},

sing_to_ship:{d:13,em:"🎤",el:"singing at a device",ch:"Music",
ti:"You Sing",
tx:`<p>You take the device and sing into it. Not beautifully — you're not a singer — but loudly and without embarrassment: the chorus of the most complicated song you know, the one with all the key changes. Sam joins in a third above. Two human voices, singing badly and together, broadcast on an alien frequency into the night sky.</p>
<p>Silence. Then the ship responds. Not in singing — in something bigger, layered, structured, that makes your sternum vibrate. The retrieval vessel changes course. Whatever that response was, it was not: retrieve. It was something closer to: <em>interesting. continue.</em></p>`,
cx:[
  {t:"Keep singing. Or try talking.",nx:"polite_broadcast"},
  {t:"Return the device now. While you have their attention.",nx:"return_device"},
]},

sit_table:{d:12,em:"🍵",el:"tea table between dimensions",ch:"Tea",
ti:"Sitting Down",
tx:`<p>You sit. Sam sits. The girl pours tea — it smells like tea, which is reassuring. The cups are the wrong shape but functional. She introduces herself: Mira. She got here three years ago by falling through a gap in a riverbank. "It closed before I could get back," she says, without apparent distress. "So I made a life here instead." She looks at you. "You have about four hours before the gap above closes again. After that — " she gestures around " — you're residents." "Four hours," Sam says. "That's enough to see something." Mira smiles. "It's enough to see everything."</p>`,
cx:[
  {t:"Ask her to show you everything.",nx:"join_quest"},
  {t:"Ask about the animals in the trees.",nx:"not_normal_animals"},
  {t:"Four hours is fine. You choose to go back.",nx:"choose_mundane"},
]},

smash_device:{d:10,em:"💥",el:"destroying the device",ch:"Drastic",
ti:"Smashing It",
tx:`<p>You pick up the nearest rock and bring it down on the device. The casing cracks — not the same crack as before, a new one — and for a second everything is very bright. Then very quiet. The device is silent. The signal is gone. The ship above changes behaviour — but not in the way you hoped. Without the signal, it switches to a different protocol: visual scan. Searchlights sweep the forest.</p>
<p>The creature grabs your arm. Very urgently. Makes the danger sound — louder than you've heard it. You broke the beacon. Now the vessel is looking with its eyes instead of its ears.</p>`,
cx:[
  {t:"Run. All three of you.",nx:"run_together"},
  {t:"Stand still. Maybe the trees provide visual cover.",nx:"forest_shield"},
]},

what_can_we_do:{d:13,em:"🤔",el:"thinking",ch:"Options",
ti:"What Can We Actually Do?",
tx:`<p>"What can we actually do about a water company?" you ask. The captain looks at you steadily. "You are two teenagers with access to the surface world," she says. "You have a folder of evidence that no surface investigator could have obtained. You have the specific name of the minister who signed the drilling permits." She pauses. "You also have something more valuable: you have been below. You know the Underchart exists. You can speak about it as a witness, not as a theorist." Another pause. "A determined witness with evidence and a story is not powerless." She looks at you. "Are you determined?"</p>`,
cx:[
  {t:"Yes.",nx:"surface_investigator"},
  {t:"Ask her what she would do if she could go to the surface.",nx:"can_go_back"},
]},

what_do_we_do:{d:12,em:"❓",el:"urgent moment",ch:"Plan",
ti:"What Do We Do?",
tx:`<p>The creature moves quickly when you ask — it picks up the device, shows you the crack, mimes pressing it closed, mimes the signal transmitting, mimes the vessels above changing direction and leaving. The plan is: fix the device. Signal the incoming vessels. They leave. Simple. Except fixing it has been the problem all along. It looks at you with those enormous dark eyes. This is where you come in.</p>`,
cx:[
  {t:"Try to fix it.",nx:"fix_device"},
  {t:"You can't fix it — but you know someone who might be able to.",nx:"davies_fix"},
  {t:"You have a camping toolkit and seven minutes.",nx:"toolkit_fix"},
]},

what_happens_drain:{d:13,em:"🌊",el:"empty underground sea",ch:"Consequences",
ti:"What Happens If It's Drained?",
tx:`<p>"If the Underchart is drained," the captain says quietly, "the geometry collapses. The fold-spaces close. Every exit point from below seals permanently." She pauses. "The ship — and everyone on it — would be sealed below forever." Another pause. "The surface would lose the Underchart entirely. Every sinkhole and aquifer and underground spring that the Underchart feeds would dry up." She looks at you. "That is approximately fourteen percent of the world's fresh water supply." A silence. "And then there is the matter of everything that lives down here," she says. "Which is considerable."</p>`,
cx:[
  {t:"This has to be stopped. We'll go to the surface.",nx:"surface_investigator"},
  {t:"Ask who would do this knowingly.",nx:"who_is_draining"},
]},

what_is_interesting:{d:11,em:"🔬",el:"being studied",ch:"Specimens",
ti:"What Counts as Interesting?",
tx:`<p>"What counts as sufficient interest?" you ask. A pause. <strong>"Unpredictability. Novelty. Behaviours outside projected parameters."</strong> Another pause. <strong>"You, for example, are already outside projected parameters. Most organics, when confronted with an unfamiliar intelligence, display one of four response patterns. You have displayed none of them."</strong> "What have we displayed?" Sam asks. <strong>"Curiosity without aggression. Concern without fear. And—"</strong> a slight pause <strong>"—you asked if I was okay. That is not in any of the four patterns."</strong></p>`,
cx:[
  {t:"Ask: so are we 'sufficient interest'?",nx:"what_curious"},
  {t:"Ask: what happens to sufficiently interesting specimens?",nx:"aboard_vessel"},
]},

/* ═══════ EXPANSION — 100+ new branches ═══════ */

freq_war_start:{d:14,em:"📡",el:"two signals clashing",ch:"Static",
ti:"Two Signals",
tx:`<p>The beacon is fixed — but instead of one clean signal going out, there are suddenly two. Overlapping. Fighting each other. The device vibrates violently and the light inside flickers between blue and a deep, angry red.</p><p>"That's not right," Sam says.</p><p>The creature grabs the device and makes a sound you haven't heard from it before — sharp, alarmed. It points at the red light. Then at the sky to the east. Then draws its hand across its throat.</p><p>Something else is broadcasting on the same frequency. Something that does not want your creature to go home.</p>`,
cx:[
  {t:"Ask the creature: who is sending the red signal?",nx:"fw_who_sends"},
  {t:"Can you jam the red signal somehow?",nx:"fw_jam"},
  {t:"Follow the red signal's direction. Find its source.",nx:"fw_find_source"},
  {t:"The device suddenly makes a choice — it throws the red signal out.",nx:"fw_device_chooses"},
]},

fw_who_sends:{d:15,em:"❓",el:"alien gesture language",ch:"The Enemy",
ti:"Who Sends the Red?",
tx:`<p>The creature's answer takes three minutes of gesture-mime. The gist: there are two groups. Your creature's group — call them the Blues — are explorers. The other group — the Reds — are older. They don't explore. They <em>claim</em>. Any world they find a signal from, they consider theirs. The beacon has been broadcasting long enough that they consider this one claimed.</p><p>"This planet," Sam says slowly. "They think they own it." The creature confirms: yes. The Blues are trying to get the beacon back before the Reds can use the signal as legal claim.</p>`,
cx:[
  {t:"Ask: how do we void the claim?",nx:"fw_void_claim"},
  {t:"Ask: how many Red vessels are coming?",nx:"fw_how_many"},
  {t:"Is the Blue signal strong enough to override?",nx:"fw_signal_strength"},
]},

fw_void_claim:{d:16,em:"⚖️",el:"cosmic legal dispute",ch:"Space Law",
ti:"Voiding a Claim",
tx:`<p>Through gestures: a claim can be voided if an inhabitant of the claimed world formally objects. In their own language. Witnessed by a neutral party.</p><p>"We need to object. Formally. In their language." "We don't speak their language." "We speak seven words of it." Sam looks at you. "That might be enough."</p>`,
cx:[
  {t:"Compose an objection in the seven words you know.",nx:"fw_formal_objection"},
  {t:"Ask the creature to translate for you as witness.",nx:"fw_creature_translates"},
  {t:"The device can broadcast. Use it directly.",nx:"fw_broadcast_objection"},
]},

fw_formal_objection:{d:17,em:"🗣️",el:"speaking into the dark",ch:"The Objection",
ti:"Seven Words",
tx:`<p>You hold the device and use every sound you've learned. Yes. Danger. Here. Friend. Many. No. This place. You string them together: <em>this place — no — danger — friend — here — many.</em> Grammatically broken. Barely comprehensible. But the creature is listening and its expression shifts into something extraordinary: hope.</p><p>The device transmits. Both signals stop simultaneously. Then the red light goes out. Just the blue remains. Steady. Clean.</p><p>"Did that work?" Sam asks. The creature makes the yes-sound. Slowly. Once. Then sits down, which seems to mean: it's over.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Seven Words",
etx:"Seven borrowed words, grammatically broken, emotionally certain. You objected to the claim on your planet in the only language available. It counted. Your world is not claimed."},

fw_creature_translates:{d:16,em:"🌐",el:"translation in progress",ch:"The Translator",
ti:"Bree Translates",
tx:`<p>You point at yourself, at the ground, make the no-sound firmly while looking east at the sky. The creature understands immediately. It takes the device and broadcasts — your sounds first, then its own richer version, then your sounds again. Translation. Your objection, formally amplified.</p><p>The red signal pulses back twice — acknowledgement — then fades. The creature makes a sound you've never heard: warm, resonant, almost musical. Gratitude. Something bigger.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Standing Together",
etx:"You couldn't speak the language. The creature amplified what you meant. Together you filed the objection. Your world remains unclaimed."},

fw_broadcast_objection:{d:16,em:"📡",el:"broadcast into space",ch:"Transmission",
ti:"Direct Broadcast",
tx:`<p>"My name is Alex. This is my planet. We are not claimed. We object. Formally. In whatever counts as a legal venue for you." A pause. "We have lived here for hundreds of thousands of years. We have languages and music and problems we're working on. We are not available for claiming." Another pause. "Thank you." Sam adds: "Seconded."</p><p>The red signal cuts off. The device goes cool in your hands.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: Objection Sustained",
etx:"You filed a formal objection to planetary annexation in English, politely, at 2am in a forest. It worked. Nobody will believe this. You'll tell it anyway."},

fw_how_many:{d:15,em:"🔢",el:"counting vessels",ch:"Numbers",
ti:"How Many?",
tx:`<p>Both hands — six fingers each side. Twelve. Then one hand: five already in range. The creature looks east. Danger sound. Then taps its wrist: time. Very little.</p><p>"Five ships against us and a camping group," Sam says. "What's our move?" The fixed blue signal is clean and strong. "The Reds jammed it because they knew a strong blue signal brings the Blues faster," you say. "Fix was step one. Step two is making sure Blues arrive first."</p>`,
cx:[
  {t:"Boost the blue signal. Give it more power.",nx:"fw_boost_signal"},
  {t:"Delay the Reds. Find their jammer.",nx:"fw_find_source"},
  {t:"The creature has another plan — it gestures urgently.",nx:"fw_creature_plan"},
]},

fw_signal_strength:{d:15,em:"📶",el:"signal comparison",ch:"Power",
ti:"Can Blue Win?",
tx:`<p>The creature examines the device: uncertain expression. Two hands rocking. 50/50. Clean signal versus powerful jammer. But the red jammer has a physical source somewhere nearby. If you could find it and interrupt it for thirty seconds, blue gets through uncontested.</p>`,
cx:[
  {t:"Find the jammer's source.",nx:"fw_find_source"},
  {t:"Boost the blue signal from here.",nx:"fw_boost_signal"},
  {t:"Ask the creature where it would place a jammer.",nx:"fw_creature_plan"},
]},

fw_find_source:{d:15,em:"🔍",el:"tracking a signal",ch:"Source Hunt",
ti:"Where Is It?",
tx:`<p>Your phone compass has been wild for an hour. You look at the magnetic field indicator: secondary field, strong, coming from south-east. The jammer. Maybe 300 metres. "It needs to be on the ground," Sam says. The creature follows you at your pace — choosing to be with you rather than ahead. Eight minutes later: a disc, silver, the size of a dustbin lid, planted in the earth and vibrating at a frequency you feel in your back teeth.</p>`,
cx:[
  {t:"Smash it with a rock.",nx:"fw_smash_jammer"},
  {t:"Work out how to switch it off properly.",nx:"fw_dismantle_jammer"},
  {t:"Ask the creature — it might know how to disable it.",nx:"fw_creature_disables"},
]},

fw_smash_jammer:{d:16,em:"💥",el:"rock meets alien tech",ch:"Direct Action",
ti:"Rock Wins",
tx:`<p>Rock the size of your head, three strikes. On the third it cracks and the vibration stops. Red signal cuts out immediately. Above you the sky changes — something enormous descending fast. The Blue response. Coming now the signal is uncontested.</p><p>The creature pulls you back to the clearing at a run. The vessel arrives in under two minutes. You see it — vast, quiet, the amber light — before it takes the creature home. It leaves a piece of the smashed jammer, repurposed, warm and smooth, on the ground in front of you.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Rock vs. Alien Technology",
etx:"Rock won. You smashed a jammer, cleared the signal, and got the creature home. The reformed piece of jammer glows faintly on clear nights."},

fw_dismantle_jammer:{d:16,em:"🔧",el:"pulling prongs from earth",ch:"Engineering",
ti:"Taking It Apart",
tx:`<p>The disc is grounded via three prongs in the earth. Pull the prongs and it loses the ground connection. You and Sam wrench them free one by one. The disc goes silent on the third. Red signal gone. Blue signal clear. Vessel arrives four minutes later.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Engineering Victory",
etx:"You worked out the mechanism and pulled three prongs from the ground to end an interstellar jamming operation. With your hands. That's engineering."},

fw_creature_disables:{d:16,em:"👽",el:"alien working fast",ch:"Expertise",
ti:"It Knows How",
tx:`<p>The creature kneels and works in forty seconds — pressing, rotating, pulling things that don't look pullable. The disc goes silent. But it recoils: its hand is burnt, not badly, but hurting. You reach forward without thinking and hold its hand carefully, the way you'd hold something fragile. It goes very still. Looks at you. Then — slowly — curls its three fingers around yours.</p>`,
cx:[
  {t:"The vessel is coming. Walk to the clearing together.",nx:"vessel_arrives"},
  {t:"Ask in gestures if it's okay.",nx:"ask_are_you_ok"},
]},

fw_boost_signal:{d:15,em:"🔋",el:"charging the device",ch:"More Power",
ti:"All the Phones",
tx:`<p>"Every phone in camp," Sam says. "Wireless charging coils. Feed them all to the device." You go tent to tent. You keep it simple: "Phone. Wireless charging. Now. I'll explain later." Six phones, arranged in a ring, pressed against the device. The charge flows in. Blue signal strengthens. At ninety seconds it overtops the red. At two minutes the red gives up.</p>`,
cx:[
  {t:"Hold the ring steady. Don't move.",nx:"fw_phone_array"},
]},

fw_phone_array:{d:16,em:"📱",el:"six phones in a ring",ch:"The Array",
ti:"Six Phones",
tx:`<p>Six dead phones. One full beacon. The vessel arrives six minutes later. Every phone completely drained. The creature stands in the amber beam and looks at everyone who helped — you, Sam, four half-asleep classmates who never asked to be part of an interstellar signal war but showed up anyway. It makes its resonating sound. Long and full. <em>All of you.</em></p>`,
ty:"ending",en:"good",
eti:"★ Ending: Six Phones",
etx:"Six dead phones, one full beacon, one vessel home. You woke people up to drain their phones for an alien emergency. They all said yes. That says something."},

fw_jam:{d:15,em:"📻",el:"counter-jamming",ch:"Interference",
ti:"Jam the Jammer",
tx:`<p>"White noise on the red frequency," Sam says. "Your phone can generate it. Route it through the device." "It might scramble everything." "50/50." "I'll take 50/50."</p>`,
cx:[
  {t:"Try it.",nx:"fw_white_noise"},
  {t:"Ask the creature the exact red frequency first.",nx:"fw_creature_plan"},
]},

fw_white_noise:{d:16,em:"📻",el:"white noise battle",ch:"Scramble",
ti:"Noise",
tx:`<p>Phone on maximum white noise, pressed to the device. It flinches — then adapts. Routes the noise outward on the red frequency with surgical precision. The red signal chokes. Thirty-five second battle. Red collapses. Blue clear. Vessel inbound two minutes. When the vessel leaves, something is etched on its hull: the sound-symbol for <em>friend</em>, carved in metal meant to last.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Frequency Fighter",
etx:"White noise from a phone app defeated an alien jamming signal. The vessel carved a thank-you in its hull. Best use of a white noise app in recorded history."},

fw_device_chooses:{d:15,em:"💙",el:"device making a choice",ch:"Self-Determination",
ti:"It Decides",
tx:`<p>The device stops vibrating. Red and blue fight visibly in the shifting light — then the device adds a third signal. Neither. Something older. The red pauses. Then backs off. Cuts out entirely. The creature stares at the device with an expression: <em>I didn't know it could do that.</em> It shows you the underside. A symbol pressed from inside the casing. New. Never there before.</p>`,
cx:[
  {t:"Ask the creature what the symbol means.",nx:"what_is_gift"},
  {t:"The vessel is coming. Whatever it did, it worked.",nx:"vessel_arrives"},
]},

fw_creature_plan:{d:15,em:"👽",el:"creature pointing north",ch:"The Plan",
ti:"High Ground",
tx:`<p>The creature points north: the ridge, 400 metres, 30 metres higher than the forest floor. From there the blue signal would have clear line of sight, no interference from ground clutter. It points at you, at itself, at Sam. Go. Together. "Race you," Sam says to the creature. It tilts its head. Then starts running.</p>`,
cx:[
  {t:"Run after it.",nx:"fw_ridge_run"},
]},

fw_ridge_run:{d:16,em:"🏔️",el:"ridge at night",ch:"High Ground",
ti:"The Run",
tx:`<p>You know the terrain — you hiked it yesterday. Cut left through the bracken, up the steep route. You reach the ridge's top at almost the same moment as the creature. Sam ten seconds behind. Wind in your faces, the creature lifts the device above its head and broadcasts. Blue signal unobstructed. Red can't compete with height. The sky fills with amber light — multiple Blue vessels, coordinated, the most extraordinary thing you have ever witnessed from a rocky outcrop at 2am.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The High Ground",
etx:"You knew the terrain. The creature knew the technology. Together you broadcast from the highest point. A dozen Blue vessels lit the sky over a Welsh ridge at 2am. You were there."},

ghost_signal:{d:13,em:"👻",el:"1908 signal",ch:"Old Static",
ti:"The Signal Is 117 Years Old",
tx:`<p>Sam runs the signal through a frequency analysis app. The temporal metadata is wrong. Not broken — old. The signal pattern matches a transmission logged from this exact location in 1908. Someone has been sending the same signal for 117 years.</p><p>The creature is completely still. It did not know this.</p>`,
cx:[
  {t:"Ask the creature: does your kind have a history here?",nx:"gs_history"},
  {t:"Find out what the 1908 signal was saying.",nx:"gs_decode"},
  {t:"Something sent this for 117 years. What or who?",nx:"gs_who_sent"},
]},

gs_history:{d:14,em:"📜",el:"old contact",ch:"Before Tonight",
ti:"You Were Here Before",
tx:`<p>The creature's answer is slow and careful. Yes, its kind has visited before. Long before. There was an agreement: don't interfere, don't establish anything permanent, wait until the world's inhabitants reach out first. "They were waiting for us to answer," Sam says slowly. "For 117 years." "Longer," the creature indicates. Much longer.</p>`,
cx:[
  {t:"Ask what the original contact established.",nx:"gs_original_contact"},
  {t:"Ask why they came tonight specifically.",nx:"gs_why_tonight"},
  {t:"Who actually sent the 1908 signal?",nx:"gs_who_sent"},
]},

gs_why_tonight:{d:15,em:"🌙",el:"the right night",ch:"Timing",
ti:"Why Tonight?",
tx:`<p>The creature points at you. You blink. It points again — not at you generally, at your thoughts. Not just you: a pattern of choices, a long chain, all leading here. Every route you've taken in the last six months, every curiosity followed, every signal chased instead of ignored. You were the frequency that matched the beacon's query. "I was the answer," you say. The creature nods. You were looking for the signal. The signal was looking for someone like you.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: Signal and Response",
etx:"117 years of broadcasting, and the answer was you — not because you're special in any grand sense, but because curiosity and stubbornness led you here at exactly the right moment. That's not destiny. That's a very good match."},

gs_decode:{d:14,em:"🔢",el:"1908 morse transcript",ch:"The Message",
ti:"What Was It Saying?",
tx:`<p>Sam finds it in the historical radio archive: an 1908 Cardiff station logged it as "anomalous Morse-adjacent transmission." Transcribed: a repeating sequence. Not random — coordinates. Latitude and longitude in a format slightly different from any human system. The coordinates are: here. This exact spot. Someone was marking this location in 1908 and repeating the mark ever since.</p><p>"They were leaving a pin in the map," Sam says. "For 117 years."</p>`,
cx:[
  {t:"Ask the creature: who placed the original marker?",nx:"gs_who_sent"},
  {t:"The coordinates point underground too.",nx:"gs_underground"},
]},

gs_who_sent:{d:15,em:"👤",el:"the keeper",ch:"Origin",
ti:"Who Sent It?",
tx:`<p>Gesture by gesture: one of its kind stayed behind when the others left. Lived here, quietly, for decades — human-adjacent, hidden — until they couldn't anymore. Left the signal running as a record: <em>I was here. Someone was here. Find us.</em></p><p>"There was one of them living among us," Sam says. You let that sit. "In 1908." "And maybe longer." "And maybe later."</p>`,
cx:[
  {t:"Ask: are any of your kind still on this planet?",nx:"gs_still_here"},
  {t:"Ask: what happened to the one who stayed?",nx:"gs_what_happened"},
]},

gs_still_here:{d:16,em:"🌍",el:"among us",ch:"Hidden",
ti:"Still Here?",
tx:`<p>The creature considers for a long time. Then: possible. It cannot say for certain. Its kind don't always announce themselves even to each other. If any stayed, they would have integrated deeply. Look human to any scan. Speak every language. Have jobs. Lives. Children, possibly. "We might know one," you say quietly. The creature's expression: possibly. You think of every person in your life who understands things slightly faster than they should. And you wonder.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: Among Us",
etx:"They might still be here. Living quietly. Human-adjacent. You'll never know for certain. Some mysteries are better kept."},

gs_what_happened:{d:15,em:"💫",el:"the keeper's life",ch:"A Life",
ti:"The Keeper",
tx:`<p>Gestures: the one who stayed — the Keeper — lived among humans for about sixty years. A botanist. A quiet person who kept unusual notes, donated to a university archive in 1971. "Do the notes still exist?" Sam asks. The creature indicates: yes, probably. "Could we find them?" Possible. The notes would contain — if the Keeper was careful, and they were careful — everything the Keeper observed. A sixty-year love letter to a world they chose.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Botanist's Notes",
etx:"Somewhere in a university archive are sixty years of notes from someone who chose to stay. You're going to find them."},

gs_original_contact:{d:15,em:"🤝",el:"ancient agreement",ch:"The First Time",
ti:"The Original Agreement",
tx:`<p>Long ago — thousands of years — deliberate contact. A small group of humans, knowingly. An agreement: we watch but don't interfere; we respond if called; we leave a marker. The 1908 signal was renewing the marker. Not the first renewal. "Our governments don't know," Sam says. "No," you say. "This was older than governments."</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: The Old Agreement",
etx:"An agreement thousands of years old, maintained quietly. Tonight you accidentally activated the marker and got the response. The old agreement is still good."},

gs_underground:{d:15,em:"⬇️",el:"underground coordinates",ch:"Below the Marker",
ti:"The Z Coordinate",
tx:`<p>The 1908 signal has a depth coordinate — not zero. It points to something 40 metres underground directly below you. You look at the creature. It looks at the ground. Then at you. It has no idea what's down there either. But its expression says: <em>I want to know.</em> You look at each other — three beings, two species, same impulse.</p>`,
cx:[
  {t:"The old mine shaft is nearby.",nx:"mine_shaft"},
  {t:"Maybe the Underchart connects to it.",nx:"climb_down"},
  {t:"Use the device to scan underground.",nx:"gs_device_scan"},
]},

gs_device_scan:{d:16,em:"🔭",el:"underground scan",ch:"The Scan",
ti:"Scanning Below",
tx:`<p>The creature makes an adjustment — capability it hasn't used before — and the device projects a field downward. You feel it in your feet. The display shows a cross-section: tunnels, natural and manmade. And at forty metres: a chamber. Sealed. With a power source still active. After 117 years. Still running.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: Still Running",
etx:"Forty metres down, a room with active power, sealed for over a century. The Keeper planned for someone to find it. The room is still there. Waiting."},

cartographer_start:{d:14,em:"🗺️",el:"old machine under stones",ch:"Something Older",
ti:"Something Answers That Isn't the Creature",
tx:`<p>The device transmits — and something unexpected answers. Not the vessel. Not the red signal. Something else, much older, much closer. Coming from underground. Specifically from beneath the old standing stones on the hill east of camp — the ones the history books say are Bronze Age but arranged in no known astronomical configuration.</p><p>The creature is confused. It holds the device like it's asking it a question. The response seems to translate to: <em>Oh, this. Yes. This has been here a while.</em></p>`,
cx:[
  {t:"Go to the standing stones.",nx:"cart_find_stones"},
  {t:"Ask the creature what it knows about the stones.",nx:"cart_creature_knows"},
]},

cart_find_stones:{d:15,em:"🗿",el:"stones at night",ch:"The Circle",
ti:"The Circle",
tx:`<p>Seven stones in a rough oval. In daylight: unremarkable. At 2am: the signal strongest at the centre. And in the centre — one stone touched more than the others. Moss worn. Surface with a slight sheen. Something has been making contact with this specific stone for a very long time.</p>`,
cx:[
  {t:"Touch the worn stone.",nx:"cart_touch_stone"},
  {t:"Look for an entrance to what's below.",nx:"cart_find_entrance"},
  {t:"Place the device in the centre of the oval.",nx:"cart_device_centre"},
]},

cart_touch_stone:{d:15,em:"🪨",el:"warm stone",ch:"Contact",
ti:"The Stone Responds",
tx:`<p>Your hand on the worn part. Warmer than stone should be. Then — not a voice, not quite a sensation — a communication arriving directly as understanding. Something old. Patient. Curious. 4,000 years of waiting. It says — without saying — <em>Hello. Finally. I have been maintaining good records. Would you like to see them?</em></p>`,
cx:[
  {t:"Yes. Show me the records.",nx:"cart_the_records"},
  {t:"Ask: what are you?",nx:"cart_what_are_you"},
  {t:"Ask: how long have you been here?",nx:"cart_how_long"},
]},

cart_what_are_you:{d:16,em:"🤖",el:"ancient machine mind",ch:"Answer",
ti:"What Are You?",
tx:`<p>Impression rather than words: a maker. Something built by ancestors of the creature's civilisation. Placed here to watch, catalogue, understand. A cartographer of consciousness — mapping not geography but the development of thinking beings. 4,000 years of data. Politely very interested in you specifically. <em>You followed a signal at 2am. That's not common. I've been waiting for someone like you for about sixty years.</em></p>`,
cx:[
  {t:"Ask what it does with the maps.",nx:"cart_the_records"},
  {t:"Ask why specifically someone like you.",nx:"gs_why_tonight"},
  {t:"Ask if it can share the maps.",nx:"cart_receive_map"},
]},

cart_how_long:{d:16,em:"⏳",el:"deep time",ch:"4000 Years",
ti:"How Long?",
tx:`<p><em>Since before the stones were placed.</em> It asked your ancestors to build them as an interface. They agreed. Three generations of careful stone-placing. "Did they know what you were?" <em>They thought I was a god. I tried to be clear that I wasn't. They were polite about it but continued thinking so for about 200 years. Eventually the understanding improved.</em></p>`,
cx:[
  {t:"Ask what it's been doing for 4,000 years.",nx:"cart_the_records"},
  {t:"Ask if it talks to the creature's kind too.",nx:"cart_knows_creature"},
]},

cart_the_records:{d:17,em:"📚",el:"compressed knowing",ch:"The Archive",
ti:"The Records",
tx:`<p>The data doesn't come as files. It comes as compressed knowing — human history too large and dense to hold, but traces stay. You know, suddenly: seventeen major archaeological sites not yet found. The solution to a mathematical problem unsolved since 1900. The name of someone alive now who will, if given one specific piece of information, make a discovery that changes medicine. <em>You don't have to decide what to do with all this tonight,</em> the stone communicates.</p>`,
cx:[
  {t:"Ask for the archaeological locations first.",nx:"cart_archaeology"},
  {t:"Ask for the maths problem.",nx:"cart_maths_problem"},
  {t:"Ask for the name who changes medicine.",nx:"cart_medicine_name"},
]},

cart_archaeology:{d:17,em:"⛏️",el:"undiscovered sites",ch:"Hidden History",
ti:"Seventeen Sites",
tx:`<p>Seventeen locations, each flagged with what's below. Three in Egypt. One in Mexico. One in Scotland, 40 kilometres from where you're standing — a Bronze Age treasury, sealed, perfect. "We could actually go there," Sam says. You're holding 4,000 years of archaeology in your head and you're fifteen and tomorrow is the last day of a school camping trip. "Yeah," you say. "We could actually go there."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Archaeologist's Coordinates",
etx:"You got seventeen locations nobody knows about. You're starting with the closest — a Bronze Age treasury, forty kilometres away, undisturbed for 3,000 years. Shovel, cover story, Sam. You have all three."},

cart_maths_problem:{d:17,em:"📐",el:"the riemann hypothesis",ch:"The Solution",
ti:"The Equation",
tx:`<p>The Riemann Hypothesis. Unsolved since 1859. $1,000,000 prize. The Cartographer shows you the solution and you spend eighteen months working backward to reconstruct a proof that doesn't mention an underground AI. You win the prize. Donate most of it. Tell no one the source. Sam knows. The stone knows.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: The Prize",
etx:"You solved a 165-year-old mathematical problem because an ancient AI gave you the answer. $1,000,000. Unspeakable secret."},

cart_medicine_name:{d:16,em:"💊",el:"a name and a future",ch:"The Chain",
ti:"A Name",
tx:`<p>A person and a piece of research they need to see — a paper published six months ago in a journal they don't read. If they read it, they connect it to their own work and the connection matters enormously. You find them online the next week. Send the paper anonymously. They reply: "how did you know?" You say: "a hunch." Three years later they publish something remarkable. In the acknowledgements: "an anonymous correspondent who pointed them in the right direction."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Anonymous Correspondent",
etx:"You changed medicine. Not by knowing anything — by passing one piece of information to one person at the right moment."},

cart_find_entrance:{d:15,em:"🚪",el:"stone steps",ch:"Below the Stones",
ti:"The Way In",
tx:`<p>At the north end, beneath a flat stone sitting proud of the ground — a seam. You and Sam lift it. Below: cut stone steps descending into warm air. Sourceless light, the same quality as the Between-Space. The Cartographer's chamber. Intact. Welcoming you down with the patience of 4,000 years.</p>`,
cx:[
  {t:"Go down.",nx:"cart_touch_stone"},
]},

cart_device_centre:{d:15,em:"✨",el:"device in circle",ch:"Interface",
ti:"The Device Responds",
tx:`<p>You set the device in the centre of the oval. It changes immediately — blue light out, something older and warmer taking its place. The creature watches with something between awe and concern. It makes a gesture: <em>ancient. very old. older than us.</em> "Older than your civilisation?" It nods. Slowly.</p>`,
cx:[
  {t:"Ask a question through the device as interface.",nx:"cart_what_are_you"},
  {t:"Pick it up. This feels above your pay grade.",nx:"gs_history"},
]},

cart_knows_creature:{d:16,em:"🌐",el:"old connections",ch:"Old Acquaintances",
ti:"Does It Know the Creature?",
tx:`<p><em>Yes. We are of different origins but have worked toward similar goals for a long time. They catalogue too. We exchange notes.</em> "The creature doesn't seem to know about you." <em>I know. Their archive was damaged about 800 years ago. I have a copy. I've been trying to get their attention for three centuries but they kept not looking at the stones.</em> "Would you like me to tell them?" <em>I would appreciate that very much.</em></p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Introduction",
etx:"You introduced an ancient underground AI to the alien whose civilisation lost its records 800 years ago. You were the go-between. Three thousand years of patient waiting, resolved by a 15-year-old on a camping trip."},

cart_receive_map:{d:17,em:"🧠",el:"receiving data",ch:"Download",
ti:"The Maps",
tx:`<p>You hold the stone and open yourself to it. The Cartographer transfers a curated selection: the shape of human consciousness across 4,000 years. Trends, patterns, near-misses, recoveries. A picture no historian has had the vantage to see. And in the picture: you are living in one of the extraordinary periods. Right now. Tonight. Something is beginning. You were — accidentally, deliberately, both — at the start of it.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: The Shape of Things",
etx:"You received 4,000 years of human pattern-data and learned that right now, tonight, something is starting. You don't know what. But you're in it. At the beginning. That's the best place to be."},

mine_monster:{d:13,em:"⛏️",el:"mine shaft",ch:"Below",
ti:"Not Alone Down Here",
tx:`<p>The mine goes down at a shallow angle, then levels into a worked chamber. Dry. Quiet. The device signal muffled by rock. Then: breathing. Not human breathing. Something much larger. You can't see it — but your skin knows something in the dark is aware of you.</p>`,
cx:[
  {t:"Hold up the torch. See what's there.",nx:"mine_see"},
  {t:"Turn the torch off. Match the dark.",nx:"mine_dark"},
  {t:"Back up towards the entrance.",nx:"mine_retreat"},
  {t:"Call out: we're not here to bother you.",nx:"mine_hello"},
]},

mine_see:{d:14,em:"🔦",el:"torchlight on something vast",ch:"Revealed",
ti:"What the Torch Shows",
tx:`<p>It fills the chamber — curled in the far corner. Not an animal with names in any book. Something ancient and biological and enormous. When the light hits it, it uncurls slightly and raises what might be a head. Blinks. Eyes like the Underchart — sourceless luminous. A sound: low, felt in the mine shaft itself, rather than heard. "It's not aggressive," Sam says. "How do you know?" "Because we're still alive."</p>`,
cx:[
  {t:"Stay still. Let it make the next move.",nx:"mine_still"},
  {t:"Reach out your hand. Offer contact.",nx:"mine_contact"},
  {t:"Ask it — somehow — what it is.",nx:"mine_what_is_it"},
]},

mine_dark:{d:14,em:"🌑",el:"shared darkness",ch:"Equal",
ti:"Same Dark",
tx:`<p>Torch off. Complete darkness. The breathing continues — slow, regular. After a minute your eyes adjust. A faint bioluminescence, blue-green like the Underchart. The creature glows, very faintly — enough to see its outline. Enormous. Patient. Not threatened. Curious in exactly the same way you're curious.</p>`,
cx:[
  {t:"Turn the torch to lowest setting. Give it some light.",nx:"mine_see"},
  {t:"Stay in the shared dark. This feels right.",nx:"mine_still"},
]},

mine_retreat:{d:13,em:"🚶",el:"leaving the mine",ch:"Retreat",
ti:"Going Out",
tx:`<p>You back up. The breathing continues, unperturbed. It doesn't follow. Back in moonlight, your heart has been hammering for three minutes without you noticing. From inside the mine: that low felt sound again — like the mine acknowledging your departure. "We have to go back," Sam says. You nod. "We have to go back."</p>`,
cx:[
  {t:"Go back in.",nx:"mine_hello"},
  {t:"Leave it. Some things stay private.",nx:"secret_ending"},
]},

mine_hello:{d:14,em:"🗣️",el:"talking to the dark",ch:"Hello",
ti:"Speaking Into the Dark",
tx:`<p>"Hello. We won't bother you. Just passing through." The low sound again — longer. Almost two syllables. You hum one note, steady. The creature matches it below your register, makes a harmony. The mine tunnel vibrates pleasantly. "Are you okay down here?" The harmony continues. "I think that's yes," Sam says.</p>`,
cx:[
  {t:"Sing to it properly.",nx:"mine_sing"},
  {t:"Bring the torch up slowly. You want to see what you're talking to.",nx:"mine_see"},
  {t:"Ask if it knows the Underchart — hum the signal pattern.",nx:"mine_underchart"},
]},

mine_sing:{d:16,em:"🎵",el:"concert in the mine",ch:"Music",
ti:"Concert for One",
tx:`<p>You sing. Sam joins. Something your music class did last term. The creature adds itself — below both of you, a resonance that's not quite sound, the rock itself vibrating sympathetically. For three minutes, three beings sing together in a slate mine in Wales. When you stop, the silence is fuller. The creature makes one more long harmonic. Then goes quiet. You go back to camp and say nothing about this for a very long time.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: Concert in the Mine",
etx:"You sang with something ancient and enormous in a disused slate mine. It harmonised. Some events are not for explaining. They're just for keeping."},

mine_still:{d:15,em:"🧊",el:"stillness",ch:"Patience",
ti:"Don't Move",
tx:`<p>Three full minutes of complete stillness. Then the creature moves — slowly — and crosses the chamber. It passes within three metres of you. Air displacement. Smell of deep earth and something sweet, like first rain on dry stone. It stops. Considers you at close range. Then continues to the other side and settles. It chose to pass by rather than avoid you. That was a choice. That means something.</p>`,
cx:[
  {t:"Follow it slowly.",nx:"mine_contact"},
  {t:"Stay where you are. Give it the space.",nx:"mine_hello"},
]},

mine_contact:{d:16,em:"🤲",el:"touch in the dark",ch:"Touch",
ti:"Offering Your Hand",
tx:`<p>Hand extended, open. Not toward it — just available. The breathing slows. Something warm and large and careful makes contact with your palm. Smooth at first, then layered, like pressing your hand against a warm hillside. Ten seconds. Nothing hurts. When contact ends you feel more settled than you have in years. The creature retreats. The introduction is complete.</p>`,
cx:[
  {t:"Say goodbye, then go out.",nx:"mine_hello"},
  {t:"Go out silently. The moment is right as it is.",nx:"secret_ending"},
]},

mine_what_is_it:{d:15,em:"❓",el:"the creature's surface",ch:"What",
ti:"What Are You?",
tx:`<p>In torchlight: a surface made of compressed dark, bioluminescent blue-green running through it like veins. Or rivers on a map. Sam makes a sound. You look where Sam is looking. Where the light catches one part of its surface — deliberately — are markings. Geometric. Familiar. The same symbols as the alien device.</p>`,
cx:[
  {t:"The creature and the alien are connected.",nx:"cave_discovery"},
  {t:"It's part of the Underchart.",nx:"mine_underchart"},
]},

mine_underchart:{d:16,em:"🌊",el:"ancient connection",ch:"The Elder",
ti:"Part of It?",
tx:`<p>You hum the Underchart's signal rhythm. The creature's response is immediate: the whole mine resonates, bioluminescent light brightens. Not the Underchart — but connected. Related the way the Atlantic and Pacific are not the same sea but part of the same world of water. "It's an elder," Sam says. "Something that's been part of the underground system longer than the Underchart has had ships." "It's why this location has a fold-exit," you say. "It was already connected."</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: The Elder",
etx:"The creature predates the Underchart. In this tunnel since before the mine, before the forest, before language. Tonight you met it, and it let you. That's a privilege with no good name."},

sam_secret:{d:13,em:"👫",el:"sam knows something",ch:"Sam",
ti:"Sam Has Been Here Before",
tx:`<p>Sam has been unusually quiet. Thinking-quiet, not frightened-quiet. Then: "I've been here before." You look at Sam. "This clearing. When I was seven. Holiday. I found a hole in the ground and climbed down and—" Sam stops. "I was down for what felt like two hours. Got home and it was the same day. My parents never knew." A pause. "I've been trying to find this clearing for eight years."</p>`,
cx:[
  {t:"Ask what Sam saw down there.",nx:"sam_saw"},
  {t:"Ask why Sam never told you this.",nx:"sam_why_secret"},
  {t:"Ask if Sam chose this camping site deliberately.",nx:"sam_chose"},
]},

sam_saw:{d:14,em:"👀",el:"sam's seven-year-old memory",ch:"What Sam Saw",
ti:"Seven Years Old",
tx:`<p>"I saw a ship. I was seven so I called it a boat. But it was in an underground sea and it was beautiful and someone gave me something like fruit and put me back through a different hole and I was in my garden." Sam pauses. "I've been trying to work out if I imagined it my whole life." A look at you. "Then the beacon started and I heard it and I knew the sound. I've been hearing it in my head since I was seven." Completely steady voice. "I knew if I followed it I'd find out if it was real."</p>`,
cx:[
  {t:"It's real. Tell Sam.",nx:"sam_confirmation"},
  {t:"Sam has a connection to the Underchart. Use it.",nx:"sam_navigates"},
  {t:"The Permanent Exception — Sam might recognise it.",nx:"see_the_ship"},
]},

sam_confirmation:{d:15,em:"💙",el:"two friends in the forest",ch:"Real",
ti:"It Was Real",
tx:`<p>"It was real. The Underchart, the ship, the fruit." Sam exhales — not relieved exactly. More like: <em>I knew, and now I have the words for it.</em> "Eight years," Sam says. "I've been quietly obsessed for eight years." "I know," you say. "You always want to go to high places and you check what's underground and you spend a lot of time looking at tide tables for reasons you won't explain." Sam laughs. "You noticed." "You're my best friend," you say. "I notice everything."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Eight Years",
etx:"Sam has been carrying this for eight years. You followed the signal tonight because Sam needed you to, whether either of you knew it. It was real. Sam knew. Now Sam has the words."},

sam_why_secret:{d:14,em:"🤐",el:"the reason",ch:"Why",
ti:"Why Not Tell Me?",
tx:`<p>"Because if I told someone and they didn't believe me I'd have to start being someone who imagines things that aren't real. And I couldn't do that." They look at you. "I told you actually. The day after. We were seven. I said I found a hole and went on a boat underground." Vague memory. "I said it sounded cool and asked if there were sharks." Sam smiles. "You asked if there were sharks. I said no, you said 'boring,' and we played something else." "I was seven," you say. "You were already you," Sam says.</p>`,
cx:[
  {t:"Find the hole. Together. Tonight.",nx:"call_hole"},
  {t:"Ask why this trip, why now.",nx:"sam_chose"},
]},

sam_chose:{d:15,em:"🗺️",el:"sam with old maps",ch:"The Plan",
ti:"You Chose This",
tx:`<p>"I chose this campsite. Last spring, when the school asked for suggestions, I found Ordnance Survey maps going back to 1890. This clearing appears on every one. And every one has a margin note: 'signal reported.' Different surveyors, different years. Same note." Sam looks at you. "I've been planning this for four months. I needed someone with me who would follow a signal into a forest at 2am without too many questions." You look at Sam. "You chose me specifically." "Obviously," Sam says.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Four Months of Planning",
etx:"Sam planned this. The site, the trip, bringing you. You thought you were following a random signal. You were following a plan your best friend made four months ago. That's the best kind of friendship."},

agent_secret:{d:14,em:"🕵️",el:"agent alone",ch:"Off Record",
ti:"The Agent Has Something to Say",
tx:`<p>The lead agent pulls you aside. Removes the equipment that signals official capacity. Younger than you thought. Maybe thirty. "I need to tell you something off the record. Before tonight, I had a completely different life. I followed a signal when I was about your age. In a different country. And I didn't handle it well." A pause. "I've been trying to get another chance for fifteen years."</p>`,
cx:[
  {t:"Ask what 'didn't handle it well' means.",nx:"agent_regret"},
  {t:"Ask: so what do you want now?",nx:"agent_what_want"},
  {t:"This might be a manipulation. Keep your guard up.",nx:"protect_creature"},
]},

agent_regret:{d:15,em:"😔",el:"regret",ch:"Fifteen Years",
ti:"What Went Wrong",
tx:`<p>"I reported it immediately. I was fifteen. Thought that was right. My government arrived in four hours with a containment team. Whatever it was — gone by morning. Site classified. I was debriefed and told not to discuss it." Pause. "I've spent fifteen years trying to find out what I reported. Whether it was okay. Whether it was my fault it got caught." They look at the creature behind you. "I don't want to catch it. I want to know it's okay."</p>`,
cx:[
  {t:"Tell them: it's okay. It fixed the beacon. It's going home.",nx:"agent_relief"},
  {t:"Let the agent speak to the creature directly.",nx:"agent_meets_creature"},
  {t:"Was what they reported the same as this?",nx:"agent_same"},
]},

agent_relief:{d:15,em:"😮‍💨",el:"release",ch:"Released",
ti:"It's Okay",
tx:`<p>"It fixed the device. The vessel is coming. It's going home." The agent closes their eyes briefly. When they open, fifteen years of something has shifted. "Good," quietly. Then: "What do I put in the report?" You think. "Anomalous signal. Source unidentified. No action required. Site clear." "That's not—" "It's accurate," you say. "The signal was anomalous. Source wasn't identified — not by you. No action required because everything resolved itself." A long pause. "Okay," they say. "Okay."</p>`,
cx:[
  {t:"The vessel arrives. Let the agent see it too.",nx:"vessel_arrives"},
  {t:"Give them a moment before the vessel comes.",nx:"creature_leaves"},
]},

agent_what_want:{d:15,em:"🤔",el:"the request",ch:"What Now",
ti:"What Do You Want?",
tx:`<p>"To see it go. Just see it go safely." They look at the sky. "My team will report standard anomalous readings. I'll make sure the site is low-priority for five years. Long enough for anyone who needs to come back to do so." They look at you. "And after tonight I'm putting in for reassignment. Go do something that doesn't involve standing in forests waiting to catch things that aren't hurting anyone." Almost a smile. "Is that useful?" You look at them. "Yes," you say. "That's useful."</p>`,
cx:[
  {t:"Let them stay and see the departure.",nx:"vessel_arrives"},
]},

agent_meets_creature:{d:16,em:"🤝",el:"facing each other",ch:"Meeting",
ti:"Face to Face",
tx:`<p>The creature turns as the agent approaches. They look at each other. The agent raises one hand — slowly, palm out. The creature looks at the hand. Then raises its own, three fingers spread. Two beings who represent very different kinds of looking. The creature makes a sound — not its usual vocabulary, something different, addressed specifically to this human. The agent makes a sound back — quiet, involuntary. The creature nods once. You don't know what was communicated. But the agent's expression is resolved. Released.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Long Wait Over",
etx:"The agent waited fifteen years for a second chance. Tonight they got one. They didn't catch anything. They just said, in whatever language that was, that they were sorry and hoped it was okay. It was."},

agent_same:{d:15,em:"🔁",el:"same signal",ch:"Repeat",
ti:"The Same One?",
tx:`<p>The agent pulls out a frequency recorder and compares. "Same frequency. Same pattern." They look up. "It's been going from the same origin for at least fifteen years." "117 years," Sam says. "Since 1908 at least." The agent stares at Sam. Then at the device. Then at the sky. "That's a very long time to be sending the same signal." "Yes," you say. "It is." The look on their face when the implication arrives is extraordinary.</p>`,
cx:[
  {t:"Tell them about the ghost signal and the 1908 connection.",nx:"ghost_signal"},
  {t:"Let the vessel arrive and let them see it themselves.",nx:"vessel_arrives"},
]},

wrong_world:{d:13,em:"🌀",el:"almost right",ch:"Off",
ti:"Something Is Wrong",
tx:`<p>You step back through the hole — and something is wrong. Not dramatically. Subtly. The camp is the same. The tents. Mr. Davies. Sam. But the sky is slightly off: one constellation you know well has an extra star. Your phone has full signal where it didn't before. And Sam is wearing a jacket you've never seen, insisting they've had it for two years.</p>`,
cx:[
  {t:"Say nothing yet. Investigate.",nx:"wrong_investigate"},
  {t:"Tell Sam immediately what you think happened.",nx:"wrong_tell_sam"},
  {t:"Check what else is different.",nx:"wrong_check"},
]},

wrong_investigate:{d:14,em:"🔍",el:"careful observation",ch:"Differences",
ti:"Making a List",
tx:`<p>Mental inventory: one extra star in Orion. Full phone signal. Sam's unknown jacket. One extra tin of food you don't recognise. The signal: same but slightly different rhythm. Fewer beats per cycle. You came through the right hole into a world that's close to yours rather than exactly yours. Close enough to fool a casual look. Different enough to notice carefully.</p>`,
cx:[
  {t:"Find the hole and go back. You need your exact world.",nx:"call_hole"},
  {t:"This world is close enough. Stay.",nx:"wrong_stay"},
  {t:"Ask the device to show you the difference.",nx:"wrong_device_check"},
]},

wrong_tell_sam:{d:14,em:"💬",el:"telling sam",ch:"Conversation",
ti:"Sam, Wrong World",
tx:`<p>"Sam. Who won the last—" you name a sporting event. Sam tells you. Wrong winner. "And your jacket. When?" "Last Christmas. Obviously. You said I looked like I was going to a funeral." No memory of saying that. Sam's expression shifts: "What happened to you down there?"</p>`,
cx:[
  {t:"Tell the truth. They'll know what to do.",nx:"wrong_device_check"},
  {t:"The hole is still there. You need to go back.",nx:"call_hole"},
]},

wrong_check:{d:14,em:"📋",el:"the list",ch:"Cataloguing",
ti:"What's Different",
tx:`<p>Thirteen differences. Some tiny — different bird, more fog. Bigger — third tent is a different brand. One huge: four teachers on this trip, not one. Three strangers comparing notes. "In this world someone organised a lot of things differently," Sam says slowly. You look at the extra star. "We're close," you say. "Maybe one major branch away."</p>`,
cx:[
  {t:"Find the divergence point. The device might know.",nx:"wrong_device_check"},
  {t:"Go back through the hole. Your world is there.",nx:"call_hole"},
  {t:"Live here. One major branch away is close enough.",nx:"wrong_stay"},
]},

wrong_device_check:{d:15,em:"📟",el:"two overlapping signals",ch:"The Map",
ti:"The Device Knows",
tx:`<p>Two overlapping signal patterns, almost identical, slightly offset. Like a double exposure. The creature, if present, examines this and makes a gesture: two hands overlapping, then separating. It knows about parallel branches. Near fold-exits this is common — the threshold is thin. People cross sometimes. It nods: it can take you back. Possibly.</p>`,
cx:[
  {t:"Yes. Please. Back.",nx:"wrong_return"},
  {t:"Ask: what's the cost of crossing back?",nx:"wrong_cost"},
  {t:"Ask: how many branches are there?",nx:"wrong_how_many"},
]},

wrong_return:{d:16,em:"🌀",el:"crossing back",ch:"Return",
ti:"Going Back",
tx:`<p>The creature tunes to your exact world's signal frequency and creates a field. You walk through it. The world blurs — extra star disappears, Sam's jacket changes to the one you know, phone loses signal. Back. Your world, exact. Sam stands beside you. Checks the jacket. Checks the sky. "There," Sam says. "How many times does this happen to people?" you ask. Many fingers. Constantly. Most people never notice. You noticed everything.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: Branch Traveller",
etx:"You accidentally crossed to a parallel world, catalogued thirteen differences, and got back with help. Most people who cross never notice. You noticed everything."},

wrong_stay:{d:15,em:"🌍",el:"this other world",ch:"Decision",
ti:"Close Enough?",
tx:`<p>One extra star. One different sporting result. Four teachers. A jacket Sam loves. This world has everyone you care about, marginally different. Nobody knows you're from elsewhere. You could live here. After a while you might not know either. "Are you sure?" Sam asks. You look at the extra star.</p>`,
cx:[
  {t:"No. Go back. Your world is your world.",nx:"wrong_return"},
  {t:"Yes. Stay.",nx:"wrong_stay_end"},
]},

wrong_stay_end:{d:16,em:"🌟",el:"new home",ch:"Staying",
ti:"This Is Home Now",
tx:`<p>You stay. Nobody knows. You learn the small differences and integrate them. The extra star in Orion becomes yours. Sam's jacket becomes familiar. The world is the same good and difficult world, one branch removed. Over time the differences stop mattering. Occasionally, in very clear weather, you look for the extra star and feel something complicated. Then you go inside and make tea.</p>`,
ty:"ending",en:"neutral",
eti:"★ Ending: Close Enough",
etx:"You chose to stay in a world one branch away. It's mostly the same. You built a life in it. The extra star is yours now."},

wrong_how_many:{d:15,em:"♾️",el:"infinite branches",ch:"The Number",
ti:"How Many Worlds?",
tx:`<p>Many — not infinite, the branching has physical limits — but many more than you can count. Most very similar. The truly different ones, where history went differently at a major juncture, are far from fold-exits. Hard to reach. "Are there ones where it goes really wrong?" Sam asks. The creature nods. "And where it goes really right?" Same nod. Sam exhales. "I prefer this one." "Me too," you say.</p>`,
cx:[
  {t:"Agreed. Get back.",nx:"wrong_return"},
  {t:"Ask: can you show us the nearest major divergence?",nx:"wrong_device_check"},
]},

wrong_cost:{d:15,em:"⚖️",el:"weighing",ch:"The Price",
ti:"What Does It Cost?",
tx:`<p>The creature mimes: memory. Then uncertain gesture. The experiences of tonight — creature, signal, device, Underchart, everything — might blur on crossing. Some people lose very little. Some more. It cannot predict which you'll be. "Everything that happened tonight?" The creature hesitates. Then: it depends.</p>`,
cx:[
  {t:"Risk it. Your world is worth any price.",nx:"wrong_return"},
  {t:"Stay here then. Keep everything.",nx:"wrong_stay"},
]},

last_broadcast:{d:14,em:"📻",el:"future signal",ch:"When",
ti:"The Signal Is Dated Wrong",
tx:`<p>Sam is running the signal through every analysis app. Then very quietly: "Alex. Look at this." The temporal metadata — not where the signal is from spatially, but when it was sent — is wrong. Future wrong. The signal was sent from a point 47 years from now. Someone in 47 years was broadcasting this specific signal back in time to this exact moment. "That's not possible," you say. "No," Sam agrees. "And yet."</p>`,
cx:[
  {t:"Ask the creature: do your kind use time in signals?",nx:"lb_creature_time"},
  {t:"Try to decode what the signal is saying.",nx:"lb_decode"},
  {t:"If it's from the future, maybe it's meant for you.",nx:"lb_meant_for_you"},
]},

lb_creature_time:{d:15,em:"⏱️",el:"time mechanics",ch:"Temporal Signals",
ti:"Time in Signals",
tx:`<p>The creature's answer takes ten minutes of gesture-building. Gist: temporal transmission is possible at significant energy cost. Not common. Whoever did this wanted to be certain this message reached this moment. They didn't trust a normal signal to survive 47 years. They sent it backward instead. "What's important enough for that?" Sam asks. The creature's expression is unreadable. "Something we do," you say slowly. "Is important enough for that."</p>`,
cx:[
  {t:"Decode it. Find out what future-you wants present-you to know.",nx:"lb_decode"},
  {t:"Don't. Some things shouldn't be known in advance.",nx:"lb_dont_listen"},
]},

lb_decode:{d:16,em:"🔓",el:"decoding",ch:"The Message",
ti:"What Does It Say?",
tx:`<p>The device decodes it. Short. In English. In your voice — your vocabulary, your sentence construction. Future you sent this. It says: <em>Give the creature the compass magnet. Don't hesitate. Don't negotiate. Just give it. You'll understand later. P.S. — Sam was right about the jacket. — A</em></p><p>You look at the compass in your pocket. At the creature. At Sam's jacket. Somehow, impossibly, future you has already accounted for the parallel world problem.</p>`,
cx:[
  {t:"Give the creature the compass magnet. Now.",nx:"magnet_fix"},
  {t:"Ask Sam what 'right about the jacket' means.",nx:"sam_secret"},
  {t:"You don't take orders from yourself. Work it out independently.",nx:"fix_device"},
]},

lb_meant_for_you:{d:15,em:"💌",el:"addressed to you",ch:"Personal",
ti:"Addressed to You",
tx:`<p>The transmission isn't broadcast — it's targeted. Aimed at the specific device you're carrying. Future you knew you'd have this device. Knew you'd be here, at this time, with this equipment. The planning that implies is staggering. "Future you is considerably more organised than you," Sam observes. "Thank you, Sam." "Just noting." "I know."</p>`,
cx:[
  {t:"Decode what the message says.",nx:"lb_decode"},
  {t:"Send a reply back. If they can send forward, maybe you can send back.",nx:"lb_reply"},
]},

lb_reply:{d:16,em:"📤",el:"sending backward",ch:"The Loop",
ti:"Writing to the Past",
tx:`<p>"If the signal can go backward, someone in 1978 received a transmission from tonight." You look at the creature. "Can this send backward?" It examines the signature. Considers. Nods — possibly. Once. Short range. You and Sam look at each other. "What do we send?" "Something useful," Sam says. You think about what you wish you'd known an hour ago. Record it. The device sends it backward 47 years into the dark. Somewhere, a 15-year-old in 1978 receives a signal and follows it and has an extraordinary night. Because of you.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: The Loop",
etx:"You received a message from your future self and sent one backward to 1978. The loop is complete. Someone had an extraordinary night in 1978 because of something you did tonight."},

lb_dont_listen:{d:15,em:"🙉",el:"refusing to know",ch:"Free Agent",
ti:"Don't Tell Me",
tx:`<p>"I don't want to know." Sam stares. "What?" "If future me wanted me to know something, future me should have considered what that does to my ability to act freely. If I know what I'm supposed to do, I either do it — puppet of my own future — or try not to, in conflict with myself. Neither is good." "So you're refusing information from the future on philosophical grounds." "Yes." "At 2am in a forest next to an alien." "Yes." A pause. "Fair enough," Sam says.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: The Free Agent",
etx:"You refused a message from your future self on the grounds of philosophical self-determination. That is either very wise or very stubborn. Possibly both. You made your own choices."},

bree_returns:{d:14,em:"👽",el:"it came back",ch:"Night Two",
ti:"It Came Back",
tx:`<p>Second night. You're asleep — then not, because the signal is back, faster, more urgent. Outside: the creature itself, sitting at the clearing edge, as if waiting for you to notice. In twenty-four hours it has been practising. It speaks now — not English, but close enough to your shared vocabulary to be clear. "A-lex," it says carefully. "Sam." Two words. Your names. Then: "Problem."</p>`,
cx:[
  {t:"Ask: what problem?",nx:"br_what_problem"},
  {t:"Invite it into camp. You're not meeting in the forest this time.",nx:"br_into_camp"},
  {t:"Ask how long it's been for it since last night.",nx:"br_time_passed"},
]},

br_what_problem:{d:15,em:"❓",el:"urgent news",ch:"The Problem",
ti:"What Problem?",
tx:`<p>In careful, rehearsed words: "Frequency war. Not finished. Red signal moved — underground. Jammer below. Harder to find." It looks at you. "Need — inside knowledge. Below. Underchart." It knows you've been there. "The jammer is in the Underchart," Sam says from the tent doorway. "And it needs us to go get it."</p>`,
cx:[
  {t:"Go below. Find the underground jammer.",nx:"fw_find_source"},
  {t:"Tell the Underchart crew — they'll know where it is.",nx:"join_crew"},
  {t:"Ask: why can't you go below?",nx:"br_why_not_below"},
]},

br_into_camp:{d:15,em:"🏕️",el:"alien at camp table",ch:"Hospitality",
ti:"Come In",
tx:`<p>You gesture at the camp, the folding table. The creature looks at it, sits down — very carefully — and places its hands flat on the surface, a deliberate echo of how humans sit. Sam makes three mugs of camp tea. One in front of the creature. It looks at the mug. Looks at you drinking. Very cautiously picks it up with three fingers and tries a careful sip. Its expression says: hot. Unexpected. Then: fine, actually.</p>`,
cx:[
  {t:"Tell it about your day. It deserves to hear.",nx:"br_catch_up"},
  {t:"Ask what brought it back.",nx:"br_what_problem"},
]},

br_catch_up:{d:16,em:"☕",el:"camp table at night",ch:"Update",
ti:"Yesterday, Today, and Whatever This Is",
tx:`<p>You and Sam take turns telling the creature what happened since it left. The parallel world. The Cartographer. The agent. The mine creature. It listens with complete attention, occasionally asking for a word repeated or explained. By the end it has learned approximately forty new words and made an expression you read as: <em>this planet is extraordinary.</em> "You keep coming back," Sam says. "You don't have to." The creature looks at Sam. Then at its tea. Then says carefully: "Want to."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Second Night",
etx:"It came back because it wanted to. Not for a problem — because you were interesting and the tea was hot and it wanted to sit at a camp table under the stars. That's contact."},

br_time_passed:{d:15,em:"⏰",el:"time difference",ch:"How Long",
ti:"For You, How Long?",
tx:`<p>"For you—" pointing at the creature, time gesture "—since last night, how long?" It thinks. Palms together, then separating. "For you — one day." One finger. Then many on both hands. "For me — much more." "Weeks?" Nod. "Months?" Slower nod. "You've been gone months and you came back." You say. It nods. "Why?" "Wanted," it says simply, "to see if you — still here." "We live here," you say. "We're always here." The creature makes its resonating sound. "Good," it says. "Good."</p>`,
cx:[
  {t:"Invite it to stay for the rest of the camping trip.",nx:"br_into_camp"},
  {t:"Ask what it's been doing for months.",nx:"br_what_problem"},
]},

br_why_not_below:{d:15,em:"🚫",el:"the limit",ch:"Why Not",
ti:"It Can't Go Below",
tx:`<p>Its kind can access fold-exits but not the Underchart itself. Entry is — it searches — not forbidden, but not safe for their biology in the lower layers. Like very deep ocean for you. Pressure — time-pressure here. "So you need us because we can go where you can't." "Yes," it says. A pause. "And—" searching "—trust." It looks at you. "Trust you."</p>`,
cx:[
  {t:"That's enough. Go below.",nx:"fw_find_source"},
