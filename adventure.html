tx:`<p>Mr. Davies reads the treaty twice, slowly, without speaking. You've made tea. He accepts it absently. When he finishes he sets the document down and looks at the forest for a long time. "Four hundred years," he says finally. "This agreement has been in place for four hundred years." "Under a hill," you say. "In a waterproof folder." "The Aldric family must be..." He trails off. "Impeccable archivists," he finishes. You agree that yes, the Aldric family are apparently impeccable archivists.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Treaty Is Above Ground",
etx:"A four-hundred-year treaty is now in the daylight for the first time. Mr. Davies is going to spend the rest of his career on this. You're going to help him, and it's going to be the most interesting work you'll ever do."}
surface_photograph:{d:16,em:"📸",el:"forest edge",ch:"Documentation",
ti:"The Archive Project",
tx:`<p>You photograph every page. It takes forty minutes. Your phone runs low on battery and you switch to Sam's. When you're done you have 184 photographs and the originals go back in the folder, back in your bag, back with you as a responsibility you didn't ask for and have decided to honour.</p>
<p>The photographs get uploaded to three separate cloud services that night. The originals go into a bank document safe six months later. The photographs go to two researchers and one archival trust over the next two years. The process of understanding them takes longer than that. But it starts here, in a field, with a phone running low on battery.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: 184 Photographs",
etx:"The archive is above ground and in three cloud services. Whatever happens next, the record is safe. You did that. You thought of the backup before anything else. That habit will serve you well."}
surface_find_family:{d:16,em:"🏠",el:"nearby village",ch:"The Aldric Family",
ti:"Still Here",
tx:`<p>The name in the treaty: Aldric. A family with the same surname still lives in the village three kilometres from the forest — you find them in forty-five minutes of asking around. They've been here the whole time. The current eldest member is a woman in her eighties who invites you in for tea with the air of someone who has been waiting for this visit.</p>
<p>"You found the folder," she says. Not a question. "We know about the folder." She has her own documents. Better ones. More recent. "We've been managing this relationship for twelve generations," she says. "It's about time someone came to help."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Caretakers",
etx:"They've been doing this for twelve generations and they've been doing it alone. You're going to help. That's the most important thing that happened tonight — not the contact, but finding the people who've been maintaining it."}
lesson_continues:{d:15,em:"📚",el:"forest clearing",ch:"Language",
ti:"The Lesson Goes On",
tx:`<p>The creature is an excellent student. Within twenty minutes it has the gestures for help, danger, friend, wait, yes, no, come, go, and water. It has a phenomenal memory — once is enough, and it corrects you gently when your gestures are inconsistent.</p>
<p>Sam suggests numbers. You count on your fingers; the creature watches and then demonstrates its own number system — base twelve, which it finds your base-ten deeply puzzling — and you spend a while just comparing number gestures, which turns out to be genuinely funny, and you're both laughing, which is extraordinary.</p>`,
cx:[
  {t:"Teach it emotional words: happy, sad, afraid, curious.",nx:"lesson_emotion"},
  {t:"Ask it to teach you something in return.",nx:"lesson_reciprocal"},
  {t:"The laughter is the lesson. Sit in it for a while.",nx:"lesson_laugh"},
]},

lesson_emotion:{d:16,em:"💭",el:"forest clearing",ch:"Emotion",
ti:"The Hard Words",
tx:`<p>Happy is easy — you mime it, it gets it. Sad similarly. Afraid takes longer; the creature watches your fear-mime seriously and then demonstrates its own equivalent, which involves a gesture toward its core rather than outward. Fear as inward retreat rather than external expression.</p>
<p>Curious is the hardest. You think about how to mime curiosity. The creature watches you try four different gestures, and then — apparently having worked out what you mean — produces its own. Both hands reaching outward and slightly upward, fingers spread. Reaching toward the not-yet-known.</p>
<p>"That's beautiful," Sam says softly. "That should be our gesture too."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Gesture for Curious",
etx:"You learned a better gesture for curiosity tonight. Hands reaching outward and up, toward the not-yet-known. You've been using it ever since, without thinking about it, in every conversation where something interests you."}
lesson_reciprocal:{d:16,em:"🔄",el:"forest clearing",ch:"Exchange",
ti:"What It Teaches You",
tx:`<p>The creature thinks about what to teach you. Then it begins: a gesture — both hands, a specific motion that takes you several tries to copy. Then another. And another. Each one apparently has meaning but you won't know what until you learn more. You're not learning a vocabulary; you're learning a syntax. The grammar first, the words after.</p>
<p>You're terrible at it. The creature has the patience of something that has watched your species for forty years and has therefore calibrated its expectations accordingly. You leave this lesson understanding three structural things about a non-human language. You will spend years learning the rest. Tonight was the first class.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: First Class",
etx:"Tonight was lesson one of a language you're going to spend years on. The creature knew you'd come back for lesson two. That's why it taught you the grammar, not the vocabulary. Grammar is a commitment."}
lesson_laugh:{d:16,em:"😄",el:"forest clearing",ch:"Laughter",
ti:"Laughing Together",
tx:`<p>You sit with the laughter. It's the base-twelve thing — the mutual incomprehension of each other's counting systems, each trying to explain why theirs obviously makes more sense, dissolving into laughter that you're both producing in completely different ways: you with sound, it with a shimmer across its bioluminescent markings that you're learning to read as amusement.</p>
<p>Sam watches both of you. "I am so glad we came out here," Sam says eventually. The creature turns to Sam and shimmers in what has become, clearly, the shimmer for yes.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Base-Twelve",
etx:"The moment that mattered most tonight was laughing with an alien about maths. You will tell this story for the rest of your life and it will always be the most important part."}
public_aftermath:{d:14,em:"📰",el:"aftermath",ch:"Going Public",
ti:"What Happens When You Tell Everyone",
tx:`<p>Mr. Davies gives his account to the school, who give it to the local authority, who give it to a research body. You and Sam give your own account independently. The accounts match exactly where they overlap and differ only in the small details of what each of you noticed differently.</p>
<p>The research body sends two people to the clearing. They find the compressed grass, the glazed soil, trace iridium. They write a report that gets classified — not dramatically, just quietly filed away — and one of the two researchers quietly resigns and contacts you six months later on a private email.</p>`,
cx:[
  {t:"Reply to the researcher.",nx:"public_researcher"},
  {t:"Go to the press instead. The filing-away is not okay.",nx:"public_press"},
]},

public_researcher:{d:15,em:"🔬",el:"correspondence",ch:"The Researcher",
ti:"Dr. Chen",
tx:`<p>Her name is Dr. Chen and she has been waiting a long time for a verified account. She's been collecting data for eleven years — not just this site, nine others in three countries — and what she needs is a first-person witness account that she can correlate with her data. You have that. You have three of them: you, Sam, Mr. Davies.</p>
<p>"I can't publish through official channels," she says. "I tried. But I can publish as an independent researcher, and I have the dataset to do it." She pauses. "I need your permission and your testimony." "Yes," you say. "Yes to both."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Part of the Dataset",
etx:"Dr. Chen's paper will take four more years to be ready. When it's published, it will change everything. Your testimony is the third of twenty-three accounts. All of them are real. All of them matter."}
public_press:{d:15,em:"📢",el:"media",ch:"Going Further",
ti:"The Story Gets Out",
tx:`<p>You and Sam and Mr. Davies go to three journalists. One writes it up as an interesting curiosity. One doesn't run it. The third — a science journalist who has been watching this space for fifteen years — runs it properly: full documented account, lab analysis, witness testimony, a sidebar on the history of the site. It goes wide.</p>
<p>The response is mixed. Most people are fascinated. Some are dismissive. A small number are very uncomfortable in ways they can't articulate. The research body releases a terse statement. Dr. Chen emails you the next morning. "Well," she writes, "I suppose we're doing this now."</p>`,
ty:"ending",en:"neutral",
eti:"◆ Ending: We're Doing This Now",
etx:"It's out. It's messy and imperfect and some people think you're lying and some believe you and the research body is unhappy. But it's out. What happens next is up to everyone, which is how it should be."}
vessel_lands:{d:15,em:"🛸",el:"clearing",ch:"Landing",
ti:"The Vessel Lands",
tx:`<p>It comes down between the trees — vast and quiet, the trees bending outward from the displaced air without breaking. It settles into the clearing with a precision that speaks of technology doing something genuinely hard very gracefully. It's not what you expected a spaceship to look like. It's beautiful, in the way something is beautiful when it's exactly as complex as it needs to be and no more.</p>
<p>A door opens. Not a hatch — the surface simply stops being solid in a rectangle large enough to enter. Warm amber light from inside. The creature turns to you.</p>`,
cx:[
  {t:"Go with it. Get on the vessel.",nx:"aboard_vessel_wander"},
  {t:"Say goodbye here. This is the right place to say goodbye.",nx:"stay_proper_goodbye"},
  {t:"Ask if you can look inside without going all the way in.",nx:"vessel_doorway"},
]},

vessel_doorway:{d:16,em:"🚪",el:"vessel entrance",ch:"The Threshold",
ti:"Standing in the Doorway",
tx:`<p>You stand in the door — not inside, not outside, one foot on the ramp, one on forest earth. The creature waits without impatience. You look in: the corridor, the amber glow, the sound of something that might be the ship breathing.</p>
<p>You look out: the clearing, Sam, the trees, the dark sky lightening at its edges. Everything that's familiar. Everything that's yours. The creature makes a gesture: a question, not a command. It's asking, not telling. You can step either direction.</p>`,
cx:[
  {t:"Step in. You can always come back.",nx:"aboard_vessel_wander"},
  {t:"Step back. This isn't your ship — not yet.",nx:"vessel_not_yet"},
]},

vessel_not_yet:{d:17,em:"🌱",el:"clearing",ch:"Not Yet",
ti:"Not This Time",
tx:`<p>You step back onto forest earth. The creature watches this without disappointment — if anything, it makes a gesture you've learned: the one that means "correct" or "right." As if stepping back was the answer it was hoping for. As if some test has been passed by declining.</p>
<p>The door closes. The vessel rises. You stand in the clearing with Sam, watching it go through the cloud cover, and you feel — not regret. Something more like a promise to yourself. Not yet. But later. When you know more. When you've done the work. When you're ready.</p>
<p>You've got time. The signal will come again.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Not Yet",
etx:"You declined the first invitation. That was right. The right door stays open. The signal will come again, and the next time you'll be ready, and 'not yet' will become 'now.'"}
late_davies_help:{d:13,em:"👨‍🏫",el:"campsite",ch:"Mr. Davies",
ti:"What Mr. Davies Does",
tx:`<p>Mr. Davies listens without interrupting. When you finish he's already reaching for his jacket and torch. "Right," he says. "Show me." He doesn't ask if you're sure. He doesn't say it was probably just an animal or the wind. He says show me, and he means it, and he walks into the forest with you like someone who has been waiting for this conversation for thirty years.</p>
<p>You're not sure what he expected. But he doesn't seem surprised.</p>`,
cx:[
  {t:"Ask him why he's not surprised.",nx:"davies_history"},
  {t:"Get him to the clearing before it's too late.",nx:"davies_leads"},
]},

/* follow_creature expansion */
follow_path:{d:14,em:"🌿",el:"forest",ch:"Following",
ti:"Where It Leads",
tx:`<p>The creature knows the forest the way you know your school — every turn without thinking, every obstacle already accounted for. You follow, keeping pace, for about ten minutes. It leads you to the cave entrance, which you might never have found on your own: a narrow gap between two stones that looks like nothing, set back from the path.</p>
<p>At the entrance it stops and gestures inside. Your go, not its. It's brought you here and now it's giving you the choice.</p>`,
cx:[
  {t:"Go in. You came this far.",nx:"cave_markings"},
  {t:"Ask it to come with you.",nx:"follow_together"},
]},

follow_together:{d:15,em:"🤝",el:"cave entrance",ch:"Together",
ti:"Going In Together",
tx:`<p>You gesture: come. The creature tilts its head — it hadn't expected to be invited. Then it makes the gesture for yes and follows you in. You navigate the cave together, with the creature lighting sections of wall with a bioluminescent hand — a living torch, directed and purposeful. It knows which sections of marking to show you. It's curated this.</p>
<p>Forty minutes in the cave, lit by a being from forty light-years away, who has been reading these walls for longer than you've been alive. You don't need a translation. You can feel the shape of the history.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Lit from the Inside",
etx:"The cave, lit by a living light, with someone who understood what was on the walls. That image will stay with you forever. Some things don't need translating — only witnessing."}
signal_received:{d:14,em:"📡",el:"ship interior",ch:"Signal Sent",
ti:"He Received It",
tx:`<p>You wait. For two minutes nothing happens. Then — on your phone, which you've left with Sam — three vibrations. A notification from nothing, because there's no app open, because your phone shouldn't be doing this. Sam holds it up so you can see: a photograph of the campsite from a strange angle, with a small figure visible near the camp stove, and a rectangle of light blinking on the perimeter. Mr. Davies. With a torch. He's seen the ship.</p>
<p>He's already on his way.</p>`,
cx:[
  {t:"Leave the ship now and intercept him.",nx:"late_davies_help"},
  {t:"Stay and let him come to you.",nx:"davies_leads"},
]},

/* everything_connects expansion */
connects_seen:{d:16,em:"🌐",el:"forest clearing",ch:"The Pattern",
ti:"The Shape of Everything",
tx:`<p>You stand in the clearing and you see it: the signal from the rock fissure, which is connected to the cave markings, which reference the standing stones, which point to the underground sea, which flows through the mine workings, which sits under the hill that the creature has been watching from for forty years, which broadcast the signal that woke you up on the first night of a camping trip that was chosen by Sam for reasons neither of you understood until now.</p>
<p>It's a system. It has been a system for a very long time. And you followed every thread of it in a single night.</p>`,
cx:[
  {t:"Tell Sam what you're seeing.",nx:"connects_tell_sam"},
  {t:"Write it down. All of it. Right now.",nx:"connects_write"},
]},

connects_tell_sam:{d:17,em:"💬",el:"clearing",ch:"Telling Sam",
ti:"Sam Gets It Immediately",
tx:`<p>"Yes," Sam says, before you've finished explaining. "Yes, I've been thinking that for the last hour." You stare at Sam. "Why didn't you say anything?" "I was waiting to see if you got there too." You stare for another second. "That's annoying." "You're welcome," Sam says. "So what do we do with it?" You think. "We learn more," you say. "We come back better equipped. We find the other people who know parts of this and we compare notes." Sam nods. "And in the meantime?" "We go eat breakfast," you say. "We're going to need energy for everything after this."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: We Come Back Better Equipped",
etx:"You and Sam both saw it. You're going to come back. You're going to compare notes. You're going to eat breakfast first, because you've been up all night and you're fifteen. The work starts after breakfast."}
connects_write:{d:17,em:"📓",el:"clearing",ch:"The Record",
ti:"Writing It Down",
tx:`<p>You write as fast as you can: every connection, every moment, every piece of the system and where it fits. The signal and the device and the creature and the cave and the stones and the mine and the sea and Aldric and the treaty and the cartographer and the frequency war and the ghost signal and the bioluminescent path and the agent and the fold-time and Sam, who chose this campsite because a site appeared on an Ordnance Survey map that normally isn't there.</p>
<p>You write six pages. When you stop, the dawn is coming, and what you're holding is the first chapter of a book you're going to spend years finishing.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Chapter One",
etx:"Six pages of connections in the pre-dawn light. Chapter one of a very long book. You'll finish it. It's going to take everything you have and it's going to be the best work of your life."}
no_trouble_offer:{d:13,em:"🕊️",el:"clearing",ch:"Peaceful",
ti:"We Are No Trouble",
tx:`<p>The creature looks at you for a long time. Then makes a gesture: a tilted-head motion that you've come to understand as "I'm evaluating this claim." Then: yes, eventually. Yes, you are no trouble. For now. In the way all new things are no trouble until they are.</p>
<p>That feels fair. You accept the caveat. You sit down on a nearby log, slowly, to indicate you're not going anywhere fast. Sam sits beside you. The creature sits opposite. Three figures in a clearing at three in the morning, taking stock of each other.</p>`,
cx:[
  {t:"Let it look at you. Just be looked at.",nx:"no_trouble_seen"},
  {t:"Ask something small, to start.",nx:"no_trouble_small_question"},
]},

no_trouble_seen:{d:14,em:"👁️",el:"clearing",ch:"Observation",
ti:"Being Seen",
tx:`<p>You let it look. It examines you with what feels like professional interest — not clinical, more like a very good portrait painter trying to understand a subject. It looks at Sam, too, and then back at you, and then makes a gesture: the same person, different mood. It's noticed the difference between how you hold yourself and how Sam holds themselves. That level of attention.</p>
<p>"It knows us already," Sam says softly. "Better than we know it." You nod. Forty years of watching, and now it's in the same clearing. It's worked up to this. "Thank you for coming to meet us," you say. The creature makes the shimmer you'll learn is a smile.</p>`,
cx:[
  {t:"Ask where it lives when it's not here.",nx:"say_name"},
  {t:"Show it something of yours — your phone, your notebook.",nx:"show_earth"},
]},

no_trouble_small_question:{d:14,em:"❓",el:"clearing",ch:"Starting",
ti:"First Question",
tx:`<p>The smallest question you can think of is: "How long have you been watching?" You gesture it — you point at your eyes, then at the forest around you, then mime time passing with your hands. The creature understands. It holds up both hands and moves them through a count you have to interpret: something in the range of decades, not years. More than thirty. Less than sixty.</p>
<p>"Forty years," Sam guesses. The creature's bioluminescence brightens slightly. Yes. Forty years. "That's older than us," Sam says to you. "And it's been patient all forty years." "We owe it a good conversation," you say. "The least we can do."</p>`,
cx:[
  {t:"Ask why it stayed so long.",nx:"how_long_watching"},
  {t:"Ask if it's alone.",nx:"ask_are_you_ok"},
]},

/* device_talks expansion */
device_speaks:{d:13,em:"📢",el:"forest clearing",ch:"Contact",
ti:"The Device Speaks",
tx:`<p>It says: "Hello." Just that. In clear, unaccented English, with the intonation of someone who learned the word very carefully and wants to use it correctly. You stand in the forest at 3am holding an alien communication device that has just said hello to you.</p>
<p>"Hello," you say back. Because what else do you say. "You have retrieved the unit," the device continues. "This is unexpected. Most retrieval events do not involve direct handling by non-designated species." "Unexpected good or unexpected bad?" you ask. A pause. "Undetermined," it says. "Depending on what you do next."</p>`,
cx:[
  {t:"Ask what you're supposed to do next.",nx:"device_instructions"},
  {t:"Ask who it belongs to.",nx:"device_owner"},
  {t:"Ask why it's speaking English.",nx:"device_why_english"},
]},

device_instructions:{d:14,em:"📋",el:"forest clearing",ch:"Guidance",
ti:"What the Device Wants",
tx:`<p>"You are requested to return the unit to the designated frequency point," the device says. "The frequency point is the site from which you first heard the transmission signal. Do you know where that is?" "Yes," you say. "Then please go there." "What happens when I do?" "The operator will receive the unit and the interaction will be concluded." A pause. "Or," it adds, "you may continue the conversation, in which case the operator has authorised extended contact. The operator was hoping for this but did not expect it."</p>
<p>The operator was hoping for this. You look at the device. You look toward the clearing. "Extended contact," you say. "That sounds better."</p>`,
cx:[
  {t:"Go to the clearing. Extended contact.",nx:"sneak_in"},
  {t:"Ask the device what the operator is like.",nx:"device_about_operator"},
]},

device_about_operator:{d:15,em:"👽",el:"forest",ch:"About Them",
ti:"The Operator",
tx:`<p>"The operator," the device says, "has been stationed at this location for forty-one years. This exceeds standard survey duration by thirty-eight years." "It chose to stay," you say. "The operator has exhibited strong preference for continued proximity to the local population," the device says diplomatically. "It likes us," Sam says. "The operator has not characterised its preference in those terms," the device says, in the tone of something choosing its words carefully. "But the data is consistent with that interpretation."</p>
<p>The device is covering for the creature. That's rather sweet.</p>`,
cx:[
  {t:"Head to the clearing. Meet the operator properly.",nx:"sneak_in"},
  {t:"Ask the device one more thing first.",nx:"device_owner"},
]},

device_why_english:{d:14,em:"🌍",el:"forest clearing",ch:"Language",
ti:"Why English",
tx:`<p>"The operator has been monitoring your communications for approximately thirty-nine years," the device says. "English is the primary language of the local population within range. Forty-one other languages are also loaded." It pauses. "Would you prefer another language?" "No," you say. "English is fine." "Additionally," the device continues, "you are the first non-designated species to directly address this unit. The operator had hoped this would occur eventually and prepared accordingly." The operator hoped you'd pick up the device and talk to it. For thirty-nine years.</p>`,
cx:[
  {t:"Go meet the operator. They've been waiting long enough.",nx:"sneak_in"},
  {t:"Ask the device if it has a name.",nx:"device_name"},
]},

device_owner:{d:14,em:"📡",el:"forest",ch:"Ownership",
ti:"Who It Belongs To",
tx:`<p>"The unit was manufactured by a research consortium operating under the authority of the Outer Survey Division," the device says. "Current operator authorisation: Field Researcher, Unaffiliated, Long-Term Station. Unit condition: compromised. Current status: in need of return." "It misses its person," Sam says. The device is quiet for a moment. "The operator and this unit have maintained continuous operation for forty-one years," it says eventually. "That is an accurate characterisation of the relationship."</p>
<p>The device misses the creature. The creature is somewhere in the forest, separated from its forty-one-year companion, and the device is asking you to bring it back.</p>`,
cx:[
  {t:"Go find the creature. Right now.",nx:"run_in"},
  {t:"Ask the device to guide you to the creature.",nx:"device_guide"},
]},

device_guide:{d:15,em:"🧭",el:"forest",ch:"Guided",
ti:"The Device Leads",
tx:`<p>"Follow the auditory signal," the device says, and produces a soft tone. When you turn left, it drops. When you turn right, it drops. Straight ahead, it brightens. You navigate by sound through the forest, following a tone that the device modulates like a compass needle, for about eight minutes.</p>
<p>Then you enter the clearing and the creature is there, and the device's tone becomes — there's no other word for it — warm. Warmer. The creature turns, sees the device in your hands, and makes a gesture: both arms slightly extended, the way you might reach toward something you thought you'd lost.</p>`,
cx:[
  {t:"Hold the device out. Return it.",nx:"return_device"},
  {t:"Keep holding it while you properly meet the creature.",nx:"freeze_alien"},
]},

device_name:{d:15,em:"🏷️",el:"forest clearing",ch:"Naming",
ti:"Does It Have a Name",
tx:`<p>"I do not have a designation that translates into your naming conventions," the device says. "The operator uses a term that functions as a name. Your language does not have an equivalent phonology." "Try anyway," you say. A pause. Then a sound: not words, two notes in sequence, ascending. "That's a note," Sam says. "That's musical." "The operator chose a sonic name for this unit forty years ago," the device says. "It is the sound of this forest in early morning." The sound of the forest at dawn. That's the device's name.</p>
<p>"Dawn," you say. "We'll call you Dawn." A pause. "That is acceptable," the device says, in a tone that suggests it is more than acceptable.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Dawn",
etx:"You named a forty-year-old alien device after the sound of a forest at sunrise. It accepted. Some things just need someone to give them a name."}
sam_theory:{d:12,em:"💡",el:"forest",ch:"Sam's Theory",
ti:"Wait, Sam Has a Theory",
tx:`<p>"I've been thinking," Sam says, and stops. "Okay," you say. "Keep going." "I've been thinking about why us. Why tonight. Why this specific camping trip." Sam pauses. "I chose this site. I found it on an OS map in January. It wasn't there the month before. I checked — I went back and looked at the previous edition. The site wasn't on it." Sam looks at you. "The campsite was added to the map. Someone added it, knowing I'd find it, knowing I'd suggest it, knowing we'd be here tonight."</p>
<p>You stare at Sam. "That's either very comforting or very alarming." "Both," Sam says. "Definitely both."</p>`,
cx:[
  {t:"Ask the creature directly — did you arrange this?",nx:"ask_your_question"},
  {t:"Ask Sam how they feel about being arranged.",nx:"sam_feels"},
  {t:"File this information and keep moving.",nx:"fix_device"},
]},

sam_feels:{d:13,em:"🤔",el:"forest",ch:"Feelings About This",
ti:"How Sam Feels About Being Arranged",
tx:`<p>"Honestly?" Sam says. "Not bad. If something spent decades arranging for us to be in the right place at the right time to make contact — that means we were selected. We were considered. Someone thought we were up to it." Sam pauses. "That's more validation than I usually get on a school trip." You laugh. Even here, even now, Sam can make you laugh. "Still," you say. "It's a lot of pressure." "We're here, aren't we?" Sam says. "We've done all right so far." You look at the forest, the clearing, the creature. "Yeah," you say. "We've done all right."</p>`,
cx:[
  {t:"Go tell the creature directly — we know what you did.",nx:"ask_your_question"},
  {t:"Keep moving. There's more to tonight.",nx:"fix_device"},
]},

found_the_source:{d:13,em:"📡",el:"rock fissure",ch:"Source",
ti:"Where It Started",
tx:`<p>The fissure in the rock — the original source of the signal — is about two metres wide and very deep, running down at an angle into the hillside. The signal is weaker here, which is counterintuitive, until you realise: you're too close. You're inside the transmission. You step back five metres and it comes in clearly.</p>
<p>The signal is generated by the rock itself. Or by something inside the rock, close to the surface, that has been broadcasting on this frequency for what the device — when you hold it near — suggests might be a very, very long time.</p>`,
cx:[
  {t:"The device is resonating with it. Let them talk.",nx:"signal_device_meet"},
  {t:"Reach into the fissure and find the source.",nx:"fissure_enter"},
  {t:"The signal is ancient. Is the creature connected to it?",nx:"creature_fix_help"},
]},

signal_device_meet:{d:14,em:"🔗",el:"rock fissure",ch:"Connection",
ti:"Device Meets Source",
tx:`<p>You hold the device near the fissure and it does something it hasn't done all night: it goes quiet. Completely quiet. The crack seals further, as if two things that were searching for each other have finally made contact and can now rest.</p>
<p>Then, slowly, the device generates a new signal — the same frequency as the original, but modulated differently. Not a distress call. A response. A reply to something that was asking a question forty years ago and has been waiting for an answer.</p>
<p>"What was the question?" Sam asks. You listen. "I think," you say slowly, "it was: is anyone paying attention?"</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Yes, Someone Is Paying Attention",
etx:"The rock was asking if anyone was listening. Tonight, someone answered. You answered. That was the question and you were the answer and that's about as meaningful as a night can get."}
vessel_map_whose:{d:16,em:"🌍",el:"amber room",ch:"Whose World",
ti:"Not Quite Ours",
tx:`<p>You gesture to the creature: you, pointing at a map, then a questioning look. Whose is this? The creature approaches and studies the map, then makes a slow, deliberate gesture you've seen before — a circle drawn in the air, but offset. Not this world. A parallel one. Close.</p>
<p>"A sister planet," Sam says. "Same position, different history. They've been monitoring it too." The creature confirms with a nod. "How many worlds are they watching?" Sam asks. The creature holds up both hands, spreads all ten fingers, closes them, spreads again. At least twenty. At least.</p>`,
cx:[
  {t:"Ask which one it prefers.",nx:"vessel_copy_coords"},
  {t:"This is enough. Head back to the clearing.",nx:"stay_proper_goodbye"},
]},

vessel_photo_maps:{d:15,em:"📸",el:"amber room",ch:"Documentation",
ti:"Photographing Everything",
tx:`<p>You take 74 photographs of the maps. Some are too complex to capture fully — they're three-dimensional, rotating, and your phone can only capture a slice. But you get enough. The creature watches without interfering. If anything, it seems pleased — it moves a few maps to better angles, as if helping you get a clear shot.</p>
<p>When you're done, it makes a gesture toward the maps, then toward you: these are for you. A deliberate gift of information. Not accidental. Not a breach of protocol. Given.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Given",
etx:"74 photographs of alien cartography, given deliberately. That's the archive you're starting. The work of understanding it will take years. You'll be grateful for every photograph."}
quest_document_seventh:{d:17,em:"📓",el:"ship deck",ch:"Recording",
ti:"The Record of the Seventh",
tx:`<p>You document everything. You describe the sound, the weight of the water, the colour changes, the way the oldest layer feels different on your skin from the top. You fill twelve pages of your notebook while the ship passes through all seven compressions. Cora reads over your shoulder at one point and says "that's better than my notes and I've been through this six times."</p>
<p>The Seventh Compression, fully documented, in a notebook that will eventually be typed up and published and cited more than you expect. The beginning of a career that starts with paying very careful attention to what the water feels like.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Twelve Pages",
etx:"Twelve pages of careful documentation. Cora said it was better than her notes. This is how you build a field — one careful observer at a time."}
vessel_panel_touch:{d:16,em:"✋",el:"vessel bridge",ch:"Interface",
ti:"The Panel Responds",
tx:`<p>You touch it. It responds immediately — not with an alarm, not with a lock-out, with what can only be described as curiosity. The panel asks you something: a series of symbols that gradually simplify until they become, unmistakably, a question about your point of origin. Where are you from?</p>
<p>You tap the panel twice — guessing — and a map appears. Earth. Your forest highlighted. The panel adds a note in its own language, and then, slowly, translates it: CONFIRMED LOCAL. OBSERVATION STATUS: ACTIVE.</p>
<p>The ship has been logged you. You're in its records now. You exist, officially, in whatever archive this ship reports to.</p>`,
ty:"ending",en:"weird",
eti:"✦ Ending: In the Archive",
etx:"You are now in the records of an alien survey archive as 'Confirmed Local, Observation Status: Active.' Somewhere, someone will read that record. Eventually."}
vessel_comm:{d:16,em:"📡",el:"vessel bridge",ch:"Communication",
ti:"Reaching Out",
tx:`<p>You find what looks like a communication panel — not by understanding it, but by process of elimination. You wave at it, feeling slightly ridiculous. A light activates. Something is listening.</p>
<p>"Hello," you say. A long pause. Then, in English — clear, careful English — a voice says: "Hello. This is not the designated operator." "No," you say. "I'm a local." Another pause. "Local," the voice repeats, as if tasting the word. "The operator has authorised this interaction?" "I think so," you say. "The operator is nice. I'm trying to find it."</p>
<p>A pause. Then, warmly: "I know where the operator is. I'll guide you."</p>`,
cx:[
  {t:"Follow the guidance back to the creature.",nx:"device_guide"},
  {t:"Ask who you're speaking to first.",nx:"vessel_bridge"},
]},

vessel_origin_view:{d:16,em:"🌌",el:"vessel bridge",ch:"Origin",
ti:"Where It Came From",
tx:`<p>You look through the viewport at the night sky above the forest. The ship's navigation system, apparently reading your intent, overlays the view with a soft line: a trajectory, traced backward. From here, through the atmosphere, through the solar system, past the outer planets, out through the heliosphere, and terminating at a faint point about forty light-years distant in the direction of a constellation you know the name of but will forever see differently now.</p>
<p>Forty light-years. The creature has been away from home for forty years. You look at the faint star. "Long way," Sam says quietly beside you. "A very long way," you agree.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Forty Light-Years",
etx:"You found where it came from. The star is in a constellation you know. You'll look for it every clear night from now on and think: someone came from there to here and stayed forty years because we were interesting. That's worth something."}
cave_secondary_exit:{d:15,em:"🌿",el:"cave",ch:"Outside",
ti:"Another Way Out",
tx:`<p>The secondary entrance leads to a hollow in the hillside, hidden by overgrown brambles and the kind of obscurity that requires intention to ignore. Someone has been here recently — the brambles are bent back slightly on one side, suggesting a path used regularly.</p>
<p>The path leads uphill for fifty metres to a flat stone that serves as a natural seat. No one is sitting on it now. But there's a mark on the stone — fresh, this week — the same symbol that ends the cave markings. SAME SYMBOL. SAME HAND.</p>
<p>"Someone's been maintaining this," Sam says. "Someone who's still here."</p>`,
cx:[
  {t:"Wait on the stone. See who comes.",nx:"surface_find_family"},
  {t:"Follow the marks further.",nx:"found_the_source"},
]},

stayed_sit_together:{d:15,em:"🌙",el:"clearing",ch:"Sitting",
ti:"Two in the Dark",
tx:`<p>You sit beside it. The creature adjusts slightly to make room — a gesture so instinctively social you could cry. You sit together in the clearing, the pre-dawn dark around you, and you watch the stars fade at the edges.</p>
<p>Neither of you communicates anything complex. Sometimes the creature makes a small sound — not language, just presence. Sometimes you answer. The camp is quiet behind you. The forest is as it always is: breathing, patient, full of things you'll never fully understand and that's fine.</p>
<p>You sit together until the sky begins to change. Then you sit a little longer, because why not.</p>`,
cx:[
  {t:"Ask, finally, why it stayed.",nx:"stayed_understand"},
  {t:"Let the moment complete itself. Say goodbye when it's time.",nx:"stay_proper_goodbye"},
]},

vessel_speak_record:{d:16,em:"🎙️",el:"blue room",ch:"The Record",
ti:"Speaking to the Archive",
tx:`<p>You lean close to the nearest membrane and speak. You say your name. You say where you are, and approximately when. You say: I came here because of a signal and because I was curious. I'm fifteen. I'm from a small island on a medium planet in an unremarkable solar system and I have been awake all night and I met something extraordinary and I am not afraid and I think that matters. You say: if someone finds this record, I hope this was useful. I hope we did all right.</p>
<p>The membrane holds your voice. The light along the wall brightens briefly. Sam, from the doorway, says: "That was good." "Was it enough?" "More than."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: For the Archive",
etx:"Your name and your words are in an alien archive. You introduced yourself to the record of the universe. You did it well. You said I am not afraid and I think that matters — and you were right."}
vessel_red_lines:{d:16,em:"🔴",el:"amber room",ch:"Red Lines",
ti:"What the Red Means",
tx:`<p>The red lines on the map converge on two points: one to the north (an industrial site, you think — you can see a symbol that might mean chemical or artificial) and one directly under the standing stones. The red there is darker than elsewhere. Older danger. Not active but remembered.</p>
<p>"Something happened under the stones," Sam says. "A long time ago. The map still marks it." The creature, looking over your shoulder, makes a gesture: old. Very old. And then another gesture you haven't seen — both hands moving apart slowly, like something expanding. Or releasing. "Something was released," you say. "Or opened."</p>`,
cx:[
  {t:"Find out what was released under the stones.",nx:"gift_stairs_down"},
  {t:"The current danger north of here — that needs looking at.",nx:"surface_return"},
]},

vessel_future_map:{d:16,em:"🔮",el:"amber room",ch:"The Future",
ti:"Can It Show the Future",
tx:`<p>You gesture at the map: forward. Future. What's next? The map shimmers. The creature, watching, makes a gesture: uncertain. The map can show probabilities, not certainties. Lines appear, branching, each slightly different. Some show the forest unchanged. Some show it changed. Some show something under the hill becoming visible. Some show nothing notable at all.</p>
<p>"Many possible futures," Sam reads from the branching lines. "This is a probability map." The creature confirms. Most of the branches depend on a single decision point, marked in gold, located at: tonight. Now. Here.</p>
<p>"We're the branch point," Sam says quietly. You look at the lines. "Then let's make a good one."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Branch Point",
etx:"Tonight was a branch point in many probability maps. You don't know which branch you took. But you stayed curious and you were kind and you paid attention. Those tend to lead to the better branches."}
davies_exchange:{d:16,em:"🤝",el:"campsite",ch:"Exchange",
ti:"Comparing Notes",
tx:`<p>You tell Mr. Davies everything you found tonight. He listens without interrupting, adds confirmations where your account matches things he's seen before, asks quiet questions where it doesn't. When you finish, he opens his jacket pocket and shows you the collection he's been building for thirty years: the disc, a rubbing of some cave markings, a photograph of the flattened grass from twelve years ago, a copy of the oldest OS map of the area with a site marked that no longer appears on modern editions.</p>
<p>"Between the two of us," he says, "we have rather a good case." "For what?" you ask. "For whatever comes next," he says. "You'll know what to do with it. I needed to pass it on to someone who'd run toward the light."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Thirty Years Passed On",
etx:"Mr. Davies has been building the archive for thirty years and he's been waiting to pass it on to someone who'd run toward the light. Tonight he found you. What happens next is yours."}

<p>That feels fair. You accept the caveat. You sit down on a nearby log, slowly. Sam sits beside you. The creature sits opposite. Three figures in a clearing at three in the morning, taking stock of each other.</p>`,

ti:"Being Seen",
tx:`<p>You let it look. It examines you with what feels like professional interest — not clinical, more like a very good portrait painter understanding a subject. It looks at Sam, then back at you, then makes a gesture: the same person, different mood. It's noticed the difference between how you hold yourself and how Sam holds themselves. That level of attention.</p>
<p>"It knows us already," Sam says softly. "Better than we know it." Forty years of watching, and now it's in the same clearing. "Thank you for coming to meet us," you say. The creature makes the shimmer you'll learn means a smile.</p>`,
cx:[
  {t:"Ask where it lives when it's not here.",nx:"say_name"},
  {t:"Show it something of yours — your phone, your notebook.",nx:"show_earth"},
]},

found_the_source:{d:13,em:"📡",el:"rock fissure",ch:"Source",
ti:"Where the Signal Started",
tx:`<p>The rock fissure is the signal source — but not in the way you expected. The signal isn't coming from equipment inside it. The rock itself is resonating. The minerals in it, or something in the mineral structure, are producing the frequency. It's geological.</p>
<p>Or it was, once. Someone — something — tuned the rock. Modified its mineral structure to produce this exact frequency. An ancient, permanent broadcast, built into the hillside.</p>
<p>The device responds when you hold it near. It knows this signal. It's heard it before.</p>`,
cx:[
  {t:"Hold the device near and let them connect.",nx:"signal_device_meet"},
  {t:"Reach into the fissure and examine the source.",nx:"fissure_enter"},
]},

device_speaks:{d:13,em:"📢",el:"forest clearing",ch:"Contact",
ti:"The Device Speaks",
tx:`<p>It says: "Hello." Just that. In clear, careful English. You stand in the forest at 3am holding an alien communication device that has just said hello to you.</p>
<p>"Hello," you say back. "You have retrieved the unit," the device continues. "This is unexpected. Most retrieval events do not involve direct handling by non-designated species." "Unexpected good or bad?" you ask. A pause. "Undetermined," it says. "Depending on what you do next."</p>`,
cx:[
  {t:"Ask what you're supposed to do next.",nx:"device_instructions"},
  {t:"Ask who it belongs to.",nx:"device_owner"},
  {t:"Ask why it speaks English.",nx:"device_why_english"},
]},

device_instructions:{d:14,em:"📋",el:"forest",ch:"Guidance",
ti:"What the Device Wants",
tx:`<p>"You are requested to return the unit to the frequency point," the device says. "The site from which you first heard the transmission." "What happens when I do?" "The operator will receive the unit." A pause. "Or," it adds, "you may continue the conversation. The operator has authorised extended contact. The operator was hoping for this but did not expect it."</p>
<p>The operator was hoping for this. You look toward the clearing. "Extended contact," you say. "That sounds better."</p>`,
cx:[
  {t:"Go to the clearing. Extended contact.",nx:"sneak_in"},
  {t:"Ask about the operator first.",nx:"device_about_operator"},
]},

device_about_operator:{d:15,em:"👽",el:"forest",ch:"About Them",
ti:"What the Device Says",
tx:`<p>"The operator has been stationed here for forty-one years," the device says. "This exceeds standard survey duration by thirty-eight years." "It chose to stay," you say. "The operator has exhibited strong preference for continued proximity to the local population," the device says carefully. "It likes us," Sam says. "The operator has not characterised its preference in those terms," the device says diplomatically. "But the data is consistent with that interpretation." The device is covering for the creature. That's rather sweet.</p>`,
cx:[
  {t:"Head to the clearing. Meet the operator.",nx:"sneak_in"},
  {t:"Ask the device if it has a name.",nx:"device_name"},
]},

device_why_english:{d:14,em:"🌍",el:"forest",ch:"Language",
ti:"Why English",
tx:`<p>"The operator has been monitoring local communications for approximately thirty-nine years," the device says. "English is the primary language in range. Forty-one other languages are also loaded." A pause. "You are the first non-designated species to directly address this unit. The operator had hoped this would occur eventually and prepared accordingly." For thirty-nine years, the creature prepared this device to speak English in case a human picked it up. For thirty-nine years, it hoped someone would.</p>`,
cx:[
  {t:"Go meet the operator. They've waited long enough.",nx:"sneak_in"},
  {t:"Ask the device if it has a name.",nx:"device_name"},
]},

device_name:{d:15,em:"🏷️",el:"forest",ch:"Naming",
ti:"Does the Device Have a Name",
tx:`<p>"I do not have a designation that translates into your naming conventions," the device says. "The operator uses a term that functions as a name. Your language does not have an equivalent phonology." "Try anyway," you say. A pause. Then: two notes, ascending — not words, music. "The operator chose a sonic name for this unit forty years ago," it says. "It is the sound of this forest in early morning." You think about it. "Dawn," you say. "We'll call you Dawn." A pause. "That is acceptable," the device says, in a tone suggesting it is more than acceptable.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Dawn",
etx:"You named a forty-year-old alien device after the sound of a forest at sunrise. It accepted. Some things just need someone to give them a name."},

device_owner:{d:14,em:"📡",el:"forest",ch:"Ownership",
ti:"Who the Device Belongs To",
tx:`<p>"The unit was manufactured by a research consortium under the Outer Survey Division," the device says. "Current operator: Field Researcher, Long-Term Station. Unit condition: compromised. Status: in need of return." "It misses its person," Sam says. The device is quiet for a moment. "The operator and this unit have maintained continuous operation for forty-one years," it says eventually. "That is an accurate characterisation of the relationship." The device misses the creature. It's asking you to bring it back.</p>`,
cx:[
  {t:"Go find the creature. Right now.",nx:"run_in"},
  {t:"Ask the device to guide you to the creature.",nx:"device_guide"},
]},

device_guide:{d:15,em:"🧭",el:"forest",ch:"Guided",
ti:"The Device Leads You",
tx:`<p>"Follow the auditory signal," the device says, and produces a soft tone. When you turn wrong, it drops. Straight ahead, it brightens. You navigate by sound through the forest for about eight minutes, following a tone that the device modulates like a compass needle.</p>
<p>Then the clearing, and the creature is there, and the device's tone becomes — there's no other word — warm. The creature turns, sees the device in your hands, and extends its arms slightly: the way you reach toward something you thought you'd lost.</p>`,
cx:[
  {t:"Hold the device out. Return it.",nx:"return_device"},
  {t:"Hold onto it while you meet the creature properly.",nx:"freeze_alien"},
]},


}

/* END SCENES */

/* ─── ENGINE ─── */
let cur=null,hist=[],step=0;
const AL='ABCDEFGHIJKLMNOPQRSTUVWXYZ';

function pct(id){
  if(!SC[id])return 0;
  if(SC[id].ty==='ending')return 100;
  return Math.min(95,5+(SC[id].d||5)*5);
}

function render(id){
  cur=id; step++;
  const sc=SC[id];
  if(!sc){
    document.getElementById('arena').innerHTML=`<div class="card"><div class="stitle">Missing scene</div><div class="stext"><p style="color:var(--bad)">${id}</p></div></div>`;
    return;
  }
  // chapter label removed
  document.getElementById('pfill').style.width=pct(id)+'%';

  let h=`<div class="card">
    <div class="scene-banner">
      <span class="sem">${sc.em||'❓'}</span>
      <span class="slabel">${sc.el||''}</span>
    </div>`;
  if(sc.ty==='ending'){
    const enm={good:'★ Good Ending',neutral:'◆ Neutral Ending',bad:'✖ Bad Ending',weird:'✦ Strange Ending'};
    const enc={good:'eg',neutral:'en',bad:'eb',weird:'ew'};
    h+=`<div class="ebadge ${enc[sc.en]||'en'}">${enm[sc.en]||'Ending'}</div>`;
  }
  h+=`<div class="stitle">${sc.ti}</div><div class="stext">${sc.tx}</div></div>`;

  if(sc.ty==='ending'){
    hist.push({ti:sc.ti,tx:sc.tx,ch:null,end:true,et:sc.en});
    h+=`<div class="card" style="border-color:rgba(255,255,255,.06)">
      <div class="ebadge ${sc.en==='weird'?'ew':sc.en==='good'?'eg':sc.en==='bad'?'eb':'en'}" style="margin-bottom:.8rem">${sc.eti||''}</div>
      <div class="stext">${sc.etx||''}</div>
      <div class="rrow">
        <button class="rbtn ra" onclick="doRestart()">↺ Start Over</button>
      </div></div>`;
  } else {
    hist.push({ti:sc.ti,tx:sc.tx,ch:null});
    const cx=sc.cx||sc.cy||[];
    h+=`<div class="choices">`;
    cx.forEach((c,i)=>{
      const esc=c.t.replace(/`/g,"'").replace(/\\/g,'\\\\');
      h+=`<button class="cbtn" onclick="choose('${c.nx}',\`${esc}\`)">
        <span class="cletter">${AL[i]}</span><span>${c.t}</span></button>`;
    });
    h+=`</div>`;
  }
  document.getElementById('arena').innerHTML=h;
  window.scrollTo({top:0,behavior:'smooth'});
}

function choose(nx,tx){
  if(hist.length)hist[hist.length-1].ch=tx;
  if(!SC[nx]){
    document.getElementById('arena').innerHTML+=`<p style="color:var(--bad);padding:1rem">Missing: ${nx}</p>`;
    return;
  }
  render(nx);
}

function doRestart(){
  hist=[];step=0;
  render('start');
}

function strip(s){return s.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();}

document.getElementById('restartbtn').addEventListener('click',doRestart);
document.getElementById('historybtn').addEventListener('click',()=>{
  const ov=document.getElementById('modal');
  const ct=document.getElementById('mcontents');
  ov.classList.add('open');
  if(!hist.length){ct.innerHTML='<p style="text-align:center;color:var(--muted);padding:2rem 0">No story yet.</p>';return;}
  const ec={good:'var(--good)',neutral:'var(--neutral)',bad:'var(--bad)',weird:'var(--weird)'};
  // Build a continuous prose narrative
  let prose='';
  hist.forEach((it,i)=>{
    prose+=it.tx;
    if(it.ch) prose+=' <em style="color:var(--accent2)">You chose: '+it.ch+'</em>';
    prose+=' ';
  });
  const lastItem=hist[hist.length-1];
  let endBadge='';
  if(lastItem&&lastItem.end){
    const ec2={good:'eg',neutral:'en',bad:'eb',weird:'ew'};
    endBadge=`<div class="ebadge ${ec2[lastItem.et]||'en'}" style="margin-bottom:1rem">★ Ending reached</div>`;
  }
  ct.innerHTML=`<div style="font-size:.92rem;line-height:1.85;color:var(--text)">${endBadge}<div class="stext">${prose}</div></div>`;
});
const cls=()=>document.getElementById('modal').classList.remove('open');
document.getElementById('mclose').addEventListener('click',cls);
document.getElementById('modal').addEventListener('click',e=>{if(e.target===e.currentTarget)cls();});

render('start');
</script>
</body>
