tx:`<p>"I don't want to know." Sam stares. "What?" "If future me wanted me to know something, future me should have considered what that does to my ability to act freely. If I know what I'm supposed to do, I either do it — puppet of my own future — or try not to, in conflict with myself. Neither is good." "So you're refusing information from the future on philosophical grounds." "Yes." "At 2am in a forest next to an alien." "Yes." A pause. "Fair enough," Sam says.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: The Free Agent",
etx:"You refused a message from your future self on the grounds of philosophical self-determination. That is either very wise or very stubborn. Possibly both. You made your own choices."},

bree_returns:{d:14,em:"👽",el:"it came back",ch:"Night Two",
ti:"It Came Back",
tx:`<p>Second night. You're asleep — then not, because the signal is back, faster, more urgent. Outside: the creature itself, sitting at the clearing edge, as if waiting for you to notice. In twenty-four hours it has been practising. It speaks now — not English, but close enough to your shared vocabulary to be clear. "A-lex," it says carefully. "Sam." Two words. Your names. Then: "Problem."</p>`,
cx:[
  {t:"Ask: what problem?",nx:"br_what_problem"},
  {t:"Invite it into camp. You're not meeting in the forest this time.",nx:"br_into_camp"},
  {t:"Ask how long it's been for it since last night.",nx:"br_time_passed"},
]},

br_what_problem:{d:15,em:"❓",el:"urgent news",ch:"The Problem",
ti:"What Problem?",
tx:`<p>In careful, rehearsed words: "Frequency war. Not finished. Red signal moved — underground. Jammer below. Harder to find." It looks at you. "Need — inside knowledge. Below. Underchart." It knows you've been there. "The jammer is in the Underchart," Sam says from the tent doorway. "And it needs us to go get it."</p>`,
cx:[
  {t:"Go below. Find the underground jammer.",nx:"fw_find_source"},
  {t:"Tell the Underchart crew — they'll know where it is.",nx:"join_crew"},
  {t:"Ask: why can't you go below?",nx:"br_why_not_below"},
]},

br_into_camp:{d:15,em:"🏕️",el:"alien at camp table",ch:"Hospitality",
ti:"Come In",
tx:`<p>You gesture at the camp, the folding table. The creature looks at it, sits down — very carefully — and places its hands flat on the surface, a deliberate echo of how humans sit. Sam makes three mugs of camp tea. One in front of the creature. It looks at the mug. Looks at you drinking. Very cautiously picks it up with three fingers and tries a careful sip. Its expression says: hot. Unexpected. Then: fine, actually.</p>`,
cx:[
  {t:"Tell it about your day. It deserves to hear.",nx:"br_catch_up"},
  {t:"Ask what brought it back.",nx:"br_what_problem"},
]},

br_catch_up:{d:16,em:"☕",el:"camp table at night",ch:"Update",
ti:"Yesterday, Today, and Whatever This Is",
tx:`<p>You and Sam take turns telling the creature what happened since it left. The parallel world. The Cartographer. The agent. The mine creature. It listens with complete attention, occasionally asking for a word repeated or explained. By the end it has learned approximately forty new words and made an expression you read as: <em>this planet is extraordinary.</em> "You keep coming back," Sam says. "You don't have to." The creature looks at Sam. Then at its tea. Then says carefully: "Want to."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Second Night",
etx:"It came back because it wanted to. Not for a problem — because you were interesting and the tea was hot and it wanted to sit at a camp table under the stars. That's contact.",
cx:[
  {t:"You finished the catch-up. Now what?",nx:"stayed_talk"}
]},

br_time_passed:{d:15,em:"⏰",el:"time difference",ch:"How Long",
ti:"For You, How Long?",
tx:`<p>"For you—" pointing at the creature, time gesture "—since last night, how long?" It thinks. Palms together, then separating. "For you — one day." One finger. Then many on both hands. "For me — much more." "Weeks?" Nod. "Months?" Slower nod. "You've been gone months and you came back." You say. It nods. "Why?" "Wanted," it says simply, "to see if you — still here." "We live here," you say. "We're always here." The creature makes its resonating sound. "Good," it says. "Good."</p>`,
cx:[
  {t:"Invite it to stay for the rest of the camping trip.",nx:"br_into_camp"},
  {t:"Ask what it's been doing for months.",nx:"br_what_problem"},
]},

br_why_not_below:{d:15,em:"🚫",el:"the limit",ch:"Why Not",
ti:"It Can't Go Below",
tx:`<p>Its kind can access fold-exits but not the Underchart itself. Entry is — it searches — not forbidden, but not safe for their biology in the lower layers. Like very deep ocean for you. Pressure — time-pressure here. "So you need us because we can go where you can't." "Yes," it says. A pause. "And—" searching "—trust." It looks at you. "Trust you."</p>`,
cx:[
  {t:"That's enough. Go below.",nx:"fw_find_source"},
  {t:"Ask the Permanent Exception's crew to help.",nx:"join_crew"},
]},

bioluminescent_field:{d:13,em:"🌱",el:"glowing grass path",ch:"The Path",
ti:"The Ground Is Glowing",
tx:`<p>Between camp and the stone circle: glowing grass. Not all of it — a thin trail, dim enough to miss in any other light, unmistakeable in this darkness. A path made of light, leading north-east in a direction you've never walked. Sam sees it too. "Where does it go?" "One way to find out," you say.</p>`,
cx:[
  {t:"Follow the glowing path.",nx:"biof_follow"},
  {t:"Photograph it first. Thoroughly.",nx:"biof_photo"},
  {t:"Work out what's making the grass glow.",nx:"biof_examine"},
]},

biof_follow:{d:14,em:"✨",el:"following light",ch:"The Path",
ti:"Following",
tx:`<p>The path leads through the forest — not along any trail, through undergrowth, always finding a gap. Eight minutes. The bioluminescence grows stronger until you reach a forest pool, every plant around it glowing, the water reflecting it back — a sphere of soft light 20 metres across. In the centre: a stone just above the waterline. On the stone: an object that definitely was not manufactured by humans.</p>`,
cx:[
  {t:"Wade in and get the object.",nx:"biof_get_object"},
  {t:"Study the pool from the edge first.",nx:"biof_study"},
  {t:"Call out — if something left this, maybe it's still nearby.",nx:"call_out"},
]},

biof_get_object:{d:15,em:"🌀",el:"object in the pool",ch:"Retrieved",
ti:"Getting It",
tx:`<p>Sharply cold water, shallow. The object: a sphere the size of a tennis ball, smooth, dark, surface that absorbs light rather than reflects it. Warm. Far warmer than makes sense. And it fits your hand — not approximately — exactly, as if made for your hand's specific dimensions. "What is it?" Sam calls. "No idea," you call back. "But it knows my hand."</p>`,
cx:[
  {t:"Bring it back to camp and look at it properly.",nx:"alien_gift"},
  {t:"Put it back. Something that knows your hand is too specific.",nx:"biof_put_back"},
  {t:"The sphere is changing.",nx:"biof_changes"},
]},

biof_changes:{d:16,em:"🌍",el:"sphere showing the world",ch:"The Show",
ti:"What It Shows",
tx:`<p>The surface becomes a window. Through it: images. Your house. Your street. Your school. The camp. This clearing — from above. Further above. Country. Continent. Planet. Solar system. Back in: this spot. You, holding the sphere, standing in a glowing pool. A signal. You are a signal. The sphere is showing you that you are what was being looked for. Not your name. The kind of person who follows signals into forests at 2am.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: The Signal Was You",
etx:"You followed a signal and found out the signal was looking for you. The sphere found its carrier. You are the message."},

biof_study:{d:15,em:"🔬",el:"pool edge",ch:"Analysis",
ti:"Looking Carefully",
tx:`<p>Bioluminescence strongest at the waterline — something in the water, not the plants. The plants reflect it. The organism is directing its light, making a path. "That requires intention," Sam says. "Something put that object there," you say. "Something that uses living light to make paths. And knows your hand size." You both look at the object.</p>`,
cx:[
  {t:"Get it.",nx:"biof_get_object"},
  {t:"This connects to the Underchart deep water.",nx:"mine_underchart"},
]},

biof_photo:{d:14,em:"📸",el:"photographing light",ch:"Documentation",
ti:"Photograph Everything",
tx:`<p>You photograph the path, the grass close-up, the direction, compass bearing. When you show a biologist — Sam's aunt, mycology — she looks for a long time and says: "This is mycelium. But it shouldn't coordinate light across this distance directionally. Unless something is signalling it." She keeps the photos. Three years later she publishes a paper about fungi as communication infrastructure. In acknowledgements: "A.C. and S.R., who showed me the path."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Mycelium Paper",
etx:"You photographed glowing grass at 2am, showed it to a mycologist, and ended up in the acknowledgements of a scientific paper. Science happens in strange places."},

biof_put_back:{d:15,em:"🔄",el:"returning it",ch:"Left in Place",
ti:"Back It Goes",
tx:`<p>You put it back on the stone. The pool continues to glow. You wade out and sit on the bank. Nothing else happens. After twenty minutes the bioluminescence dims and the pool returns to normal dark water. The object is still visible by starlight. It will be there in the morning. You will come back in daylight, sit beside it without picking it up, and that will feel right. Some things are for looking at, not for taking.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Right Call",
etx:"You found something made for your hand and left it where it was. Not passivity — a choice. The pool and the stone will be there. You can come back. Some things are worth leaving in place."},

biof_examine:{d:14,em:"🍄",el:"mycelium network",ch:"The Source",
ti:"What Makes It Glow?",
tx:`<p>Sam moves surface material: white threads below, dense, weblike, covering the entire soil surface. Mycelium. Bioluminescent. Everywhere. "This is under the whole area," Sam says. "This whole section is connected by this network." You look at the path of brighter light. "Something activated this specific section." "Directed it," Sam says. "Like a signal." You look at each other. "The forest is a network. And something is using it to make signals." "The same way something was using the radio beacon. Different medium. Same intent."</p>`,
cx:[
  {t:"Follow the signal the network is making.",nx:"biof_follow"},
  {t:"This connects to the Cartographer somehow.",nx:"cart_find_stones"},
]},

signal_investigation:{d:13,em:"🔍",el:"triangulating",ch:"Origins",
ti:"Where Did the Signal Start?",
tx:`<p>The device is not the source — it's a relay, receiving from somewhere. You follow the upstream signal with compass and phone. 600 metres north-east. The forest thins. A rocky escarpment rises from the ground — old, lichen-covered. At its base: a fissure in the rock, shoulder-width. The signal is coming from inside.</p>`,
cx:[
  {t:"Go in.",nx:"fissure_enter"},
  {t:"Listen at the entrance first.",nx:"fissure_listen"},
  {t:"Too narrow. Find another way.",nx:"fissure_above"},
]},

fissure_enter:{d:14,em:"🪨",el:"narrow rock channel",ch:"Inside",
ti:"Through the Rock",
tx:`<p>Sideways, scraping tight, six metres, then it opens. A chamber, natural, domed. In the centre: carved into bedrock, a circle of symbols. Each with a small LED-equivalent embedded, all glowing, all broadcasting the signal. Not recent — very old. And the symbols are the same as the alien device.</p>`,
cx:[
  {t:"Touch one of the symbols.",nx:"cart_touch_stone"},
  {t:"Photograph everything before touching anything.",nx:"fissure_photo"},
  {t:"This is a relay station. Ask the device.",nx:"gs_device_scan"},
]},

fissure_listen:{d:14,em:"👂",el:"listening",ch:"Layered",
ti:"What Do You Hear?",
tx:`<p>You press your ear to the fissure. The signal is louder — and layered. Multiple frequencies stacked, like a chord. You count them: seven distinct layers. Seven signals from seven different sources, all arriving here and combining into the one signal you heard from camp. This fissure is a mixing point. A convergence.</p>`,
cx:[
  {t:"Go in. Understand it.",nx:"fissure_enter"},
  {t:"Try to identify where each of the seven comes from.",nx:"why_seven"},
]},

fissure_above:{d:14,em:"🧗",el:"top of escarpment",ch:"Above",
ti:"The View",
tx:`<p>You climb eight metres of rough rock. From the top: camp, stone circle, mine entrance, pool. And from this height, something invisible below: a geometric pattern in the tree growth. The very old trees arranged in concentric rings, centred on the fissure below you. Something planted those trees centuries ago. With intent.</p>`,
cx:[
  {t:"This pattern means something. The Cartographer would know.",nx:"cart_find_stones"},
  {t:"Descend to the fissure from above.",nx:"fissure_enter"},
]},

fissure_photo:{d:15,em:"📸",el:"photographing chamber",ch:"Documentation",
ti:"Photographing the Chamber",
tx:`<p>Every symbol. Every light. The arrangement. The spacing. Your hand next to a symbol for scale. Sam's expression of awe. Twelve minutes of photography. Then the device — which you've been ignoring — vibrates steadily. It recognises this place. More than recognises. On its surface appears a symbol that wasn't there before — not on the device, not on the walls around you. Between the two. Something new, made from both.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: The New Symbol",
etx:"The device generated a symbol that didn't exist before — combining its own language with the ancient language in the rock. Something new was created here tonight. You were there when it happened."},

everything_connects:{d:17,em:"🌐",el:"the whole picture",ch:"The Map of Everything",
ti:"It All Connects",
tx:`<p>You stand in the clearing and see it all at once: the signal from the rock fissure, relayed to the device, received by the creature. The Cartographer below the standing stones, 4,000 years of watching. The Underchart beneath, ancient and alive. The mine creature, older still. The bioluminescent mycelium threading everything above ground. The ghost signal from 1908 — the Keeper who stayed. The parallel worlds, thin at fold-exits. The frequency war. And at the centre: this forest. This specific patch of rock and tree and ancient earth that has been, for reasons it would take centuries to explain, a meeting point. Where different kinds of being have been finding each other for as long as there have been different kinds of being.</p><p>You followed a signal at 2am. And the signal led you to the centre of everything.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: The Centre",
etx:"You weren't just at a campsite. You were at the intersection of everything. This forest has been waiting for someone curious enough to look. You looked. That's the whole story.",
cx:[
  {t:"You see it. The whole shape of tonight.",nx:"connects_seen"}
]},

call_out:{d:13,em:"🗣️",el:"calling at the pool",ch:"Is Anyone There",
ti:"Calling Out",
tx:`<p>You cup your hands and call out to the pool, to the forest around it, to whoever or whatever arranged a glowing path and left an object sized exactly for your hand. "Hello? We followed the path. We're not here to take anything. We're just — curious." The forest is quiet. Then: the bioluminescence pulses. Once. Twice. Brighter, then dimmer, in a pattern that is not random. "It's answering," Sam says. "Something is answering." "In light," you say. "Yes." "Okay," you say to the forest. "What are you trying to show us?"</p>`,
cx:[
  {t:"Wade in and get the object.",nx:"biof_get_object"},
  {t:"Follow the pulse pattern — it might be leading you somewhere.",nx:"biof_follow"},
  {t:"The creature would know what this is.",nx:"creature_fix_help"},
]},

cart_creature_knows:{d:15,em:"👽",el:"creature at standing stones",ch:"What It Knows",
ti:"What the Creature Knows",
tx:`<p>The creature looks at the stones for a long time. Then makes a gesture you haven't seen before — hands pressed together, then slowly opened outward, like a book. Old. A record. It knows what these are. Not from memory — from history. Transmitted knowledge. Its kind have a record of this location. Of the stones. Of what's below. But the record is incomplete — damaged in the archive loss 800 years ago. What it knows is: something was placed here, something very old, something that watches. It does not know if it is still active.</p>`,
cx:[
  {t:"It's still active. Touch the worn stone and show it.",nx:"cart_touch_stone"},
  {t:"Ask what the record says about what's down there.",nx:"cart_what_are_you"},
  {t:"The device might interface with it. Place it in the circle.",nx:"cart_device_centre"},
]},

morning_after_all:{d:15,em:"🌅",el:"dawn",ch:"Morning",
ti:"Dawn",
tx:`<p>It's dawn. You and Sam sit outside your tent with cold camp tea, watching the sky go black to blue to pink. You have been awake all night. Between you: alien first contact, a frequency war, an ancient AI, a parallel world, a mine creature who harmonises, a ghost signal from 1908, a future transmission, a glowing mycelium path, and a 400-year-old oak at the centre of everything. Eleven minutes before Mr. Davies's alarm. "Should we sleep?" Sam asks. "No time," you say. Sam nods. "Good. I don't want to miss any of it."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: No Time to Sleep",
etx:"You did all of that in one night and you're staying up to see the sunrise because you don't want to miss a single more minute of it. That's the right call."}
aboard_vessel_wander:{d:14,em:"🛸",el:"inside the vessel",ch:"Vessel Interior",
ti:"Exploring Inside",
tx:`<p>The corridor bends left. You follow it, running one hand along the wall — smooth except for shallow grooves that form patterns you can almost read. Like text, maybe. Or maps.</p>
<p>The vessel is bigger inside than outside. That should bother you more than it does. You pass three doorways, each one sealed with a panel that glows a different colour: amber, blue, a deep violet. Different rooms. Different purposes.</p>
<p>Sam stays close. Neither of you speaks. Whatever this is, it deserves quiet.</p>`,
cx:[
  {t:"Try the amber door — it's the warmest colour.",nx:"vessel_amber"},
  {t:"Try the blue door — you've been making good decisions all night.",nx:"vessel_blue"},
  {t:"Don't open any of them. Find whoever — or whatever — pilots this.",nx:"vessel_bridge"},
]},

vessel_amber:{d:15,em:"🟡",el:"amber room",ch:"The Amber Room",
ti:"Maps of Somewhere",
tx:`<p>The amber room is a library. Not books — surfaces, floor to ceiling, covered in what can only be maps. Some are flat projections. Some are three-dimensional, hovering at eye height. All of them show the same planet from different angles, different times.</p>
<p>Earth. Unambiguously, recognisably Earth. But different. Continents slightly displaced. Ice where there shouldn't be. Cities you don't recognise where cities should be.</p>
<p>"That's not quite our Earth," Sam says. You look more carefully. You think Sam is right.</p>`,
cx:[
  {t:"Find the map that shows tonight. Right now, this forest.",nx:"vessel_map_now"},
  {t:"Ask the creature — via gestures — what world this maps.",nx:"vessel_map_whose"},
  {t:"Take a photo of everything. Document all of this.",nx:"vessel_photo_maps"},
]},

vessel_blue:{d:15,em:"🔵",el:"blue room",ch:"The Blue Room",
ti:"The Listening Room",
tx:`<p>The blue room hums. Not mechanically — tonally. Like a choir held on one note just below what you can hear but above what you can ignore. The walls are covered in audio equipment, or something equivalent: discs, membranes, crystalline structures that vibrate when you move past them.</p>
<p>They're recording something. A readout on the far wall scrolls constantly. Sam reads aloud: "...birdsong, wind, rainfall, heartbeat, speech, laughter, sleep-breathing, alarm, grief..."</p>
<p>It's cataloguing the sounds of a human night.</p>`,
cx:[
  {t:"Ask (via the panel) why they're recording all this.",nx:"vessel_why_record"},
  {t:"Say something into the nearest membrane. Speak directly to the record.",nx:"vessel_speak_record"},
  {t:"The grief entry is flashing. It's recent. Tonight.",nx:"vessel_grief_signal"},
]},

vessel_bridge:{d:16,em:"🎛️",el:"vessel bridge",ch:"The Bridge",
ti:"No One's Flying This",
tx:`<p>The bridge is empty. No pilot, no seats, no wheel or joystick — just a curved console covered in touch-sensitive surfaces, all currently active, all doing things without anyone's input. The ship is navigating itself.</p>
<p>Through the front viewport — a curved expanse of something clearer than glass — you see your campsite from above. Tiny tents. The dying fire. The whole trip, seen from height, looking very small and very normal.</p>
<p>There's one panel that isn't active. It's waiting. For input.</p>`,
cx:[
  {t:"Touch the waiting panel. See what it does.",nx:"vessel_panel_touch"},
  {t:"Look for a communication system. Try to reach the creature.",nx:"vessel_comm"},
  {t:"The viewport — can you see where the ship came from?",nx:"vessel_origin_view"},
]},

vessel_map_now:{d:16,em:"📍",el:"amber room",ch:"Here and Now",
ti:"You Are Here",
tx:`<p>You find it: this forest, this night, this exact moment. The map shows a blue dot marking your position with unsettling accuracy. Around it, lines radiate — some red, some green, one gold. Each one is labelled in a script you can't read.</p>
<p>But you can guess. Red: danger. Green: safe. The gold line goes straight up.</p>
<p>Sam traces the gold line with a finger. It goes up through the atmosphere, past the orbital layer, into deep space, and terminates at a point the map labels with a single symbol — the same symbol that's on the device.</p>
<p>"Home," Sam says. "That's where they came from."</p>`,
cx:[
  {t:"Copy the coordinates somehow. You want to remember where that is.",nx:"vessel_copy_coords"},
  {t:"The red lines — find out what danger they're marking.",nx:"vessel_red_lines"},
  {t:"Ask the map to show you the future, if it can.",nx:"vessel_future_map"},
]},

vessel_copy_coords:{d:17,em:"📸",el:"amber room",ch:"Remembering",
ti:"A Record of the Stars",
tx:`<p>You photograph the map. Then you sketch it, badly, in the margin of your homework notebook — the one you brought camping in case you got bored, which seems like a decision from another lifetime. You write down every symbol you can copy. Then you take one more photo for good measure.</p>
<p>The creature appears in the doorway and watches you. It doesn't stop you. If anything, it looks pleased — the gesture it makes is the same one it uses when you do something that works.</p>
<p>You've made a record. Of an address. In deep space. In a language you can't read but might, someday, learn.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: You Wrote It Down",
etx:"The coordinates are in your notebook and your camera roll. You have no idea what you'll do with them. Something, probably. That feels like enough."}
vessel_why_record:{d:16,em:"🎙️",el:"blue room",ch:"The Archive",
ti:"Why Record Us",
tx:`<p>You point at the recording equipment, then at yourself, then spread your hands in the universal "why" gesture. The creature walks to the readout panel and adjusts something. Text appears — or rather, symbols appear, and then the ship translates them into something like text: a slow scroll of imperfect English that nonetheless communicates.</p>
<p>RECORD: BECAUSE ALL THINGS END. RECORD: BECAUSE OTHERS MAY NEED TO KNOW. RECORD: BECAUSE YOU MAKE SOUNDS THAT ARE WORTH KEEPING.</p>
<p>You stand in the listening room of an alien vessel and read that your sounds are worth keeping. Sam grabs your arm. You're both crying a little bit. It's fine.</p>`,
ty:"ending",en:"weird",
eti:"✦ Ending: Worth Keeping",
etx:"An alien archive somewhere in deep space will, apparently, contain a recording of two fifteen-year-olds breathing in a forest at night. You decide to consider this an honour."}
vessel_grief_signal:{d:16,em:"💔",el:"blue room",ch:"Recent Grief",
ti:"Someone Is Grieving Tonight",
tx:`<p>You look at the flashing entry. The readout gives you a location: your campsite. A name — not a name exactly, but a pattern that resolves when you focus on it: the signal they've been tracking. The source of the grief signal is your campfire.</p>
<p>Not you. You look at Sam. Not Sam. Then you understand: it's Priya, the girl in the third tent, who got some news yesterday and hasn't spoken since. The ship has been listening. It registered her.</p>
<p>The creature is watching you figure this out. It makes a gesture: a hand to the chest, then outward. Empathy. It noticed too.</p>`,
cx:[
  {t:"Ask the creature if it can help. Even a little.",nx:"vessel_help_priya"},
  {t:"Go back to camp. Check on Priya. Be a decent human.",nx:"vessel_back_for_priya"},
]},

vessel_help_priya:{d:17,em:"🌿",el:"blue room",ch:"Kindness",
ti:"What It Can Do",
tx:`<p>The creature considers. Then it goes to a panel and produces something — small, flat, warm to the touch, and when you hold it you feel something that isn't quite calm but is adjacent to it. Like a hand on your shoulder from someone who means it.</p>
<p>"For her?" you ask. It nods. "She doesn't have to know where it's from?" Another nod. You pocket the object.</p>
<p>You go back to camp. You leave it just outside Priya's tent. You don't know if it will help. But in the morning, she's sitting by the fire with a mug of tea and she says the forest is beautiful and she means it, and you think: yes. That helped.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Not All Contact Is Cosmic",
etx:"You came out here for a signal. The most important thing you did was leave something small outside a tent. Both things can be true."}
vessel_back_for_priya:{d:17,em:"🏃",el:"returning to camp",ch:"Going Back",
ti:"Back to the Fire",
tx:`<p>You leave the vessel and walk back to camp quickly. Sam follows without question — you've been finishing each other's sentences all night and Sam doesn't need an explanation.</p>
<p>Priya is awake, sitting outside her tent in the dark. You sit with her. You don't explain the ship or the creature or any of it. You just sit. After a while she talks. You listen.</p>
<p>When dawn comes the vessel is gone. You never got to see the bridge. You think about that sometimes, but not as much as you think about the conversation by the fire.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Right Place at the Right Time",
etx:"Some nights what the universe needs from you is not exploration. Just presence."}
alien_gift_use:{d:15,em:"✨",el:"forest clearing",ch:"The Object",
ti:"What It Does",
tx:`<p>The object pulses again when you focus on it. And then — not sound, not light, but something else — you get an impression. A direction. Not north or south or east. A direction that doesn't have a human name. Like being pulled very gently toward something interesting that exists just outside your available dimensions.</p>
<p>"Sam," you say. "I think it's a compass. But for something we don't have maps of yet."</p>
<p>Sam looks at the object. "Does it have an off switch?"</p>
<p>You look. It does not appear to have an off switch. The impression continues, gentle and persistent, like a song you like that's now stuck in your head forever.</p>`,
cx:[
  {t:"Follow the direction it's pointing. Into the unknown.",nx:"gift_follow"},
  {t:"Try to figure out what it's pointing toward before committing.",nx:"gift_understand"},
  {t:"It's going in your bag. For later. When you're ready.",nx:"gift_keep_for_later"},
]},

gift_follow:{d:16,em:"🧭",el:"forest",ch:"The Direction",
ti:"Following Something Nameless",
tx:`<p>You follow the pull. Through the forest, over the ridge, down toward the part of the valley where the old mine workings are. The pull gets stronger near the standing stones at the edge of the field. Then it goes underground.</p>
<p>You stop at the stones. The object is pointing straight down. Sam shines the torch: there's a gap between two of the larger stones — barely wide enough to squeeze through — and below it, a space. Steps. Cut stone.</p>
<p>"The compass led you to something," Sam says. "The question is whether you follow it further."</p>`,
cx:[
  {t:"Go down. That's what compasses are for.",nx:"gift_stairs_down"},
  {t:"Document this first. Mark it. Come back with better equipment.",nx:"gift_mark_return"},
]},

gift_stairs_down:{d:17,em:"🪨",el:"underground",ch:"Below the Stones",
ti:"What Was Here First",
tx:`<p>The steps go down for longer than makes sense given the hillside above. The walls become older as you descend — dressed stone gives way to rougher work, gives way to something that looks natural but isn't, gives way to a chamber that predates the stones above it by what might be a very long time.</p>
<p>In the centre of the chamber: a hollow in the rock, sized exactly for the object in your hand. The object stops pulling. It knows it's home.</p>
<p>This was always where it was going. The creature gave you the map to bring it back.</p>`,
ty:"ending",en:"weird",
eti:"✦ Ending: The Long Way Home",
etx:"You were a delivery service for something older than your civilisation. You don't mind. You feel, somehow, trusted."}
gift_mark_return:{d:17,em:"📝",el:"standing stones",ch:"Evidence",
ti:"Marking the Spot",
tx:`<p>You photograph everything. The stones, the gap, the steps below. You note the compass bearing from the main campsite. You write it all in your notebook with a date and a time.</p>
<p>You take the object home at the end of the camping trip. You spend the next three months researching the site. You find old records — very old records — that mention the stones and what's below them. You write a careful, documented report.</p>
<p>You send it to two archaeologists and one person at a university who studies unexplained objects. One of them writes back. That's where it starts.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: This Is How It Begins",
etx:"Every field has an origin story. Yours starts in a forest with a compass that points sideways and an alien who trusted you with it."}
gift_understand:{d:16,em:"🔍",el:"forest clearing",ch:"Comprehension",
ti:"Learning to Read It",
tx:`<p>You sit with the object for a long time. Sam sits beside you. You stop trying to understand it and just let the impression be there — the direction, the pull, the sense of something just outside normal space — and slowly you start to get more detail.</p>
<p>Not a single point. A path. Several points in sequence, like waypoints. The first is close — less than a kilometre. The last is very far. You can't tell how far. The distance the impression suggests doesn't fit inside any map you've ever seen.</p>
<p>You understand: this is an itinerary. The creature gave you an itinerary.</p>`,
cx:[
  {t:"Follow the first waypoint. Just that.",nx:"gift_first_waypoint"},
  {t:"This is too much responsibility right now. Pocket it.",nx:"gift_keep_for_later"},
]},

gift_first_waypoint:{d:17,em:"📍",el:"forest",ch:"First Stop",
ti:"The First Place",
tx:`<p>The first waypoint leads you to the base of the oldest tree in the forest — a oak so large that four people couldn't link arms around it. At its base, half-covered by roots, is a flat stone with a hollow carved into it.</p>
<p>You kneel down. The hollow is filled with water, perfectly still despite the wind. When you look in, you see the reflection of a sky that isn't tonight's sky — more stars, different arrangement. Another sky, from somewhere, showing through a mirror of water at the base of a tree.</p>
<p>You sit beside it for a very long time. You and Sam and the oldest tree and a window into somewhere else.</p>`,
ty:"ending",en:"weird",
eti:"✦ Ending: Not All Doors Are Doors",
etx:"You found a window. You looked through it. You didn't climb in. Some things are enough just to witness."}
gift_keep_for_later:{d:16,em:"🎒",el:"campsite",ch:"Patient",
ti:"Keeping It Safe",
tx:`<p>You put the object in the inner pocket of your jacket. It rests against your chest and pulses gently, about once a minute. Not urgently. Patiently. Like it's been waiting a long time already and a bit longer is fine.</p>
<p>You go back to the campsite. You eat breakfast. You pack up. You go home. The object comes with you, through the tent, through the minibus, through three weeks of normal life.</p>
<p>Three weeks later you wake up at 2am and you know, with absolute certainty, that it's time to follow the first waypoint. So you get up and you go.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: When You're Ready",
etx:"The best adventures start when you're prepared. You learned that from an alien compass. Now you're going to see what the first waypoint holds."}
ask_to_stay_response:{d:15,em:"👽",el:"forest clearing",ch:"The Answer",
ti:"The Creature's Answer",
tx:`<p>The creature is still for a long time. Then it makes a gesture you haven't seen: both hands pressed together, then the left hand stays while the right moves outward and backward, as if marking something that was here and has now moved away.</p>
<p>"It's saying it can't," Sam says quietly. "Or... it's saying it's already gone, in some sense. Like part of it is already on the ship."</p>
<p>You think about this. An entity whose presence has distributed itself in preparation for departure. Already going, even while still physically here.</p>`,
cx:[
  {t:"Ask what it means to be 'already gone'.",nx:"stay_already_gone"},
  {t:"Ask if it will come back.",nx:"stay_come_back"},
  {t:"Say: then we'll say goodbye properly.",nx:"stay_proper_goodbye"},
]},

stay_already_gone:{d:16,em:"🌊",el:"forest clearing",ch:"Presence",
ti:"Here and Gone",
tx:`<p>The creature tries to explain. It takes a while — the gestures become more elaborate, and at one point it borrows your phone and draws something in the notes app: a circle, and then the same circle but with an arrow leading away from it before the circle is complete.</p>
<p>"You leave before you leave," Sam translates slowly. "You prepare for departure by... already beginning to be somewhere else. So the departure itself is less painful."</p>
<p>You look at the drawing. It makes a terrible kind of sense. You think about every time you've ever started saying goodbye in your head before the actual goodbye happens.</p>
<p>"We do that too," you say softly.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Something in Common",
etx:"You found something in common with a being from 40 light-years away. It was something small and sad and very true. That seems right."}
stay_come_back:{d:16,em:"🔄",el:"forest clearing",ch:"Return",
ti:"Will You Come Back",
tx:`<p>The creature considers your question with the seriousness it deserves. Then it holds up one hand — flat, palm toward you — and with the other taps a rhythm against it: five beats, a pause, three beats, a pause, two beats.</p>
<p>"Is that an answer?" you ask. The creature taps it again. Five-three-two. Then points at the sky. Then at you.</p>
<p>"I think," Sam says carefully, "that's a signal. So you'll know it's them."</p>
<p>You memorise the rhythm. Five-three-two. If you ever hear it again — from anywhere, from any device — you'll know.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Five-Three-Two",
etx:"You don't know if it'll come back. But you have a signal now. You find yourself tapping it sometimes, absentmindedly, on desks and steering wheels and windowsills. Waiting."}
stay_proper_goodbye:{d:16,em:"👋",el:"forest clearing",ch:"Goodbye",
ti:"Doing It Right",
tx:`<p>You think about every bad goodbye you've ever witnessed — the rushed ones, the distracted ones, the ones where someone turns away too fast. You've always believed goodbyes deserve care. This one more than most.</p>
<p>You face the creature. You make the gesture it taught you for "friend." You point at it, then at yourself, then at the stars. You hold up the thing it gave you, if you have it, or just your empty hands if not — an open gesture: I received what you gave.</p>
<p>The creature bows its head very slightly. It holds the bow for a count of three. Then it walks into the trees.</p>
<p>You don't follow. Some exits should be completed.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: A Good Goodbye",
etx:"It matters how you say goodbye. You did it right. You'll remember that, after everything else fades."}
cave_markings:{d:14,em:"🪨",el:"cave",ch:"Old Writing",
ti:"Reading the Walls",
tx:`<p>You trace the markings with your torch. They run in horizontal rows, covering every surface. Not chaotic — organised. Grammar. This is language, or something that functions like it.</p>
<p>Some of the markings are recent. Weeks old, maybe. The same hand — or whatever makes marks like this — has been here recently. You photograph everything, methodically, working left to right, floor to ceiling.</p>
<p>Then you find a section where the markings change. A different system. And beside that, a section in what might be — is that Latin? No. Older. Something just before Latin.</p>
<p>"There are three languages here," Sam says. "At least."</p>`,
cx:[
  {t:"Find where the most recent markings are and read forward from there.",nx:"cave_recent_marks"},
  {t:"The three-language section might be a translation key.",nx:"cave_rosetta"},
  {t:"Keep going deeper into the cave.",nx:"cave_deeper"},
]},

cave_recent_marks:{d:15,em:"✍️",el:"cave",ch:"Recent History",
ti:"Newest Entry",
tx:`<p>The most recent marks are near the cave's secondary entrance — a crack in the back wall, barely wide enough to pass through, leading to the outside via a different route than the one you came in.</p>
<p>The marks here are simpler. Shorter. You can't read them, but you can see that the last entry — the very last marks, made most recently — end with a single symbol drawn three times, growing larger each time.</p>
<p>"Is that emphasis?" Sam asks. "Like: this, THIS, THIS?"</p>
<p>You look at the symbol. It's the same one that was on the device.</p>`,
cx:[
  {t:"Take that symbol home. Research it.",nx:"cave_symbol_research"},
  {t:"Use the secondary entrance — maybe the recent author is still nearby.",nx:"cave_secondary_exit"},
]},

cave_symbol_research:{d:16,em:"📚",el:"home, months later",ch:"The Search",
ti:"Three Years Later",
tx:`<p>You spend three years researching the symbol. You find it in eleven separate contexts: a Celtic manuscript, a geological survey from 1834, a photograph of cave markings in Scandinavia, two separate First Nations records from opposite sides of a continent, and the background of a painting in the British Museum.</p>
<p>The translations — where translations exist — all say variations of the same thing: HERE IT BEGAN. Or: THE ORIGIN OF THE LISTENING. Or, most simply: THE PLACE THAT CALLED.</p>
<p>Your forest. This specific hill. Whatever is under it has been calling, for a very long time, to anyone who knows how to hear.</p>
<p>You write the paper. It's rejected four times and then published in a journal that three hundred people read. Those three hundred people change fields.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Long Slow Discovery",
etx:"You found something that will take decades to understand. You started the work anyway. That's exactly the right thing to have done."}
cave_rosetta:{d:15,em:"🔑",el:"cave",ch:"Translation",
ti:"Three Systems, One Message",
tx:`<p>You photograph the three-language section and spend an hour comparing the systems. With Sam's help — and Sam turns out to be unexpectedly good at pattern recognition — you establish that the same message appears in all three languages.</p>
<p>You can't read any of them fully. But you can make out: this place, some form of verb that might mean "connects" or "opens" or "remembers," and a marker of time that might mean "always" or "has always" or "will always."</p>
<p>"This place always opens," Sam reads slowly. "Or: this place has always connected. Or: this place will always remember."</p>
<p>You look around the cave. "All three," you decide. "All three at once."</p>`,
ty:"ending",en:"weird",
eti:"✦ Ending: This Place Always",
etx:"Some places are junctions. This cave has been one for longer than anyone living has known. Now you know. That changes what it means."}
cave_deeper:{d:15,em:"🌀",el:"cave depths",ch:"Going Further",
ti:"The Cave Goes Further",
tx:`<p>The cave narrows and then opens again into a second chamber twice the size of the first. The markings here are denser. And here, on the far wall, something else: a section of wall that has been deliberately smoothed, and on the smooth section, something drawn not carved — a map.</p>
<p>The map shows your forest from above. But also from below — you can see the cave system marked in white lines. You can see the fissure where you first heard the signal. You can see the location of the standing stones. And at the centre of the map, circled three times, is exactly where you're standing.</p>
<p>The cave knows where it is.</p>`,
cx:[
  {t:"This is an intelligence that's been here for centuries. Speak to it.",nx:"cave_speak_to_cave"},
  {t:"Mark your own position on the map. Add to it.",nx:"cave_add_to_map"},
]},

cave_speak_to_cave:{d:16,em:"🗣️",el:"cave depths",ch:"Speaking Up",
ti:"Hello, Cave",
tx:`<p>"Hello," you say. Your voice sounds strange — not echoed, exactly, but present in a way voices don't usually feel. Like the cave is paying attention to the sound.</p>
<p>Nothing answers. Nothing dramatic happens. But the bioluminescence in the walls — you hadn't noticed it until now, a faint blue-green lining the cracks — brightens slightly. And holds.</p>
<p>You get the strong impression that you've been heard. Not by a person. Not by an intelligence like yours. But by something that accumulates attention the way a lake accumulates rain, and has been doing it for a very long time.</p>`,
ty:"ending",en:"weird",
eti:"✦ Ending: Heard",
etx:"You said hello to something very old and it listened. You don't know what it is. You're not sure it knows what it is either. But it listened. You'll come back."}
cave_add_to_map:{d:16,em:"✏️",el:"cave depths",ch:"Contributing",
ti:"Adding Your Mark",
tx:`<p>You find a stone on the cave floor, harder than the wall. You add to the map: your name, small and careful, at the location where you're standing, with tonight's date. Then the symbol you learned from the creature — the one that means "friend." Then a small arrow pointing up, where the sky is, with a dot at the end of it: a star.</p>
<p>You step back. Your mark beside the marks of everyone who was here before you. Centuries of visitors, all adding to the same record, all understanding in their different ways that this place mattered.</p>
<p>You belong to that list now. That feels correct.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Register",
etx:"Every site like this has a register of people who understood it. You added your name. You're part of the record now, alongside everyone who came before."}
mundane_morning:{d:10,em:"⛺",el:"campsite",ch:"Normal Morning",
ti:"In the Morning",
tx:`<p>You sleep. You dream about nothing strange. In the morning the camp is all noise and bacon sandwiches and someone's tent zip is broken and someone else lost a boot.</p>
<p>Normal. Entirely normal. You help look for the boot. You eat your sandwich. The forest looks exactly like a forest.</p>
<p>But. On the walk back to the bus, you pass the clearing. The grass is flattened in a perfect circle. The smell of rain on hot stone is still faintly there. Proof. It happened.</p>`,
cx:[
  {t:"Tell Sam what you're thinking.",nx:"mundane_tell_sam"},
  {t:"Take a sample of the soil. Just in case.",nx:"mundane_soil_sample"},
  {t:"Walk past. Leave it alone. That was your choice.",nx:"mundane_walk_on"},
]},

mundane_tell_sam:{d:11,em:"💬",el:"forest path",ch:"Telling Sam",
ti:"You Saw It Too",
tx:`<p>"Did you sleep?" you ask. Sam shakes their head. "Me neither." You walk in silence for a moment. "So we both..." Sam nods. "And we're both going to..." You look at the flattened grass circle as you pass. "Pretend it was nothing?" Sam asks. You consider this seriously. "No," you say. "But maybe file it for later." "For when?" "For when we know what to do with it."</p>
<p>Sam considers this. "Fair," Sam says. "Filed." You walk on together.</p>`,
ty:"ending",en:"neutral",
eti:"◆ Ending: Filed for Later",
etx:"Not every extraordinary thing needs an immediate response. You filed it. Someday — maybe years from now — you'll open that file."},

mundane_soil_sample:{d:11,em:"🧪",el:"clearing edge",ch:"Evidence",
ti:"Taking Something",
tx:`<p>You have a small zip-lock bag in your jacket pocket — the remains of a snack. You use a stick to scrape some soil from the edge of the flattened grass into the bag. You don't know why exactly. Instinct.</p>
<p>Three years later you get the sample analysed by a lab. It contains trace elements that shouldn't be in woodland soil: iridium concentrations three times the normal background level, and one compound that comes back as "no match found in database."</p>
<p>The lab emails you about that. You don't reply for a week because you're not sure what you're starting.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Sample",
etx:"You took evidence. Most people don't think to take evidence. That habit — that instinct — is going to matter a lot in the next few years."}
mundane_walk_on:{d:11,em:"🚶",el:"forest path",ch:"Chosen",
ti:"Walking Away",
tx:`<p>You walk past. You chose to go back, and you're going to honour that choice. The clearing passes on your right. The smell, briefly. Then just pine and damp earth.</p>
<p>You get on the bus. You come home. Life resumes. The camping trip becomes a story you tell in a way that leaves out the part that matters.</p>
<p>But you're different. You made a choice under pressure and you kept it. That's a kind of character. Not the one that involves aliens or underground seas — but a real one, made in the dark, that turned out to be solid.</p>`,
ty:"ending",en:"neutral",
eti:"◆ Ending: A Different Kind of Strength",
etx:"You chose the ordinary life and you chose it deliberately, under full knowledge of the alternative. That's not weakness. That's a kind of integrity that doesn't get celebrated enough."}
stayed_talk:{d:14,em:"👽",el:"clearing",ch:"Still Here",
ti:"It Didn't Leave",
tx:`<p>"You're still here," you say, somewhat unnecessarily. The creature looks at you with what you've come to think of as dry patience. It taps one finger against the device in its lap: a patient rhythm. Still here. Obviously.</p>
<p>"Why?" you ask. It makes a gesture you haven't seen — one hand pointing up, the other pointing at you, then both hands close together. It's waiting for something to align. You're part of that alignment.</p>
<p>The vessel is somewhere above the clouds. The creature isn't ready to go. And it wants your help with whatever that means.</p>`,
cx:[
  {t:"Ask what it's waiting for.",nx:"stayed_what_waiting"},
  {t:"Sit down beside it. You'll wait together.",nx:"stayed_sit_together"},
  {t:"The morning is coming — if it doesn't leave it might be seen.",nx:"stayed_morning_risk"},
]},

stayed_what_waiting:{d:15,em:"⏳",el:"clearing",ch:"Waiting For",
ti:"The Right Moment",
tx:`<p>The creature looks at the sky for a long time. Then at its own hands. Then at you. It makes a series of gestures that you work through carefully: the symbol for complete, the symbol for understand, and then something you haven't seen — it touches its chest, then yours, then opens both hands upward.</p>
<p>"It wants something to be finished between you," Sam says slowly. "Some understanding. Before it goes."</p>
<p>You look at the creature. At this being that has watched your world for forty years from the edge of a forest. What could be unfinished between you? You've only known it for a night. But a night is a lot, when it's this night.</p>`,
cx:[
  {t:"Ask: what do you need me to understand?",nx:"stayed_understand"},
  {t:"Tell it: I understand more than I can say.",nx:"stayed_tell_it"},
]},

stayed_understand:{d:16,em:"💡",el:"clearing",ch:"Understanding",
ti:"What It Needs You to Know",
tx:`<p>The creature thinks for a long time. Then it begins — gestures you've learned plus new ones, slowly, building a message piece by piece. This place. Many years. Watching. Not taking, watching. Your kind. Young and loud and breakable and surprising. Every survey that recommended no contact: overridden by the fact of you. Not you personally — though also you personally. Your kind. The way you run toward strange lights.</p>
<p>It needed you to understand that it came for research and stayed for curiosity and that those are different things and the second one is more honest.</p>
<p>"You liked us," Sam says to the creature. "That's what you're saying."</p>
<p>The creature makes the sign for yes three times.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Liked",
etx:"An alien stayed an extra forty years beyond its survey mission because it liked watching you. Not studying — watching. There's a difference, and it matters."}
stayed_tell_it:{d:16,em:"🌟",el:"clearing",ch:"Reciprocal",
ti:"What You Know",
tx:`<p>"I know," you say, "that you've been here a long time and that means you made a choice to stay. And I know that you didn't take anything or hurt anyone. And I know that tonight you let us see you, which was a risk, and you did it anyway." The creature is very still. "I think that means you wanted to be known. By someone. Before you left." The creature's eyes close briefly — something that might be relief. "We know you now," you say. "We'll remember."</p>
<p>The creature stands, slowly. Makes the gesture for friend. Turns. Walks into the trees for the last time. Above the forest, something rises silently through the cloud cover and is gone.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Witnessed",
etx:"Some beings just want to be known before they go. You gave that. You'll remember it. So, somewhere out there, will they."}
stayed_morning_risk:{d:15,em:"🌅",el:"clearing",ch:"Time Running Out",
ti:"The Sun Is Coming",
tx:`<p>The sky is changing. Not light yet but the quality of darkness is different — the deep black thinning at the edges. Twenty minutes, maybe thirty, before the camp starts waking. Before early risers with phones start walking.</p>
<p>"You have to go," you tell the creature. It looks at the sky, then at you, with something that might be reluctance. "I know," you say. "I know. But if you're seen by the wrong people it goes badly for both of us. You know that."</p>
<p>It stands slowly. Makes the gesture for friend. Then looks at the sky one more time.</p>`,
cx:[
  {t:"Help it get back to the vessel without being seen.",nx:"stayed_escort"},
  {t:"Let it choose its own time. Stay with it until it goes.",nx:"stayed_trust_its_timing"},
]},

stayed_escort:{d:16,em:"🌲",el:"forest edge",ch:"Escort",
ti:"Safe Passage",
tx:`<p>You know the camp's layout. You know where Mr. Davies's tent is, which side he sleeps on, when he gets up. You lead the creature on a route that curves wide around the sleeping tents, through the copse of birch by the stream, along the edge of the field.</p>
<p>At the far treeline — far enough away that anyone watching from the camp would just see darkness — the creature pauses. Above you, through the canopy, something descends. Not landing, just close enough.</p>
<p>The creature goes up. Not dramatically — just upward, steadily, into the dark. And then there's only forest.</p>
<p>You walk back to camp in time to start the camp stove and have tea ready for when people wake up.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Good Cover",
etx:"You got an alien home safely before breakfast. Mr. Davies thought you were just an early riser. That's fine. Some secrets keep best in plain sight."}
stayed_trust_its_timing:{d:16,em:"⭐",el:"clearing",ch:"Trust",
ti:"On Its Own Terms",
tx:`<p>You sit down. "Your call," you say. The creature sits back down beside you. You watch the stars fade together — the ones you know and the ones you don't. The sky lightens. The birds start, tentatively, then all at once. Something stirs in the camp, but distantly.</p>
<p>The creature stands when it's ready. Not before. It goes when the first actual light breaks over the hill, in the full knowledge of the risk, because it chose to stay to the end of the night rather than leave before it was time.</p>
<p>You watch it go. The camp wakes behind you. You were here for all of it.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: To the End of the Night",
etx:"It stayed until it was ready to go. You stayed with it. Some things just need bearing witness to — beginning to end, without hurrying."}
clearing_examine:{d:14,em:"🔍",el:"clearing",ch:"Evidence",
ti:"What Remains",
tx:`<p>You crouch and examine the clearing properly. The grass is flattened but not burned — it was pressed down, not scorched. In the depression at the centre, where the device rested, the soil has a different texture: smoother, almost glazed. Like it was changed at a molecular level.</p>
<p>You find something else: at the edge of the clearing, half-hidden by a root, a small flat disc. Not mechanical — biological, almost. A grown thing. Still faintly warm.</p>
<p>"That's not from here," Sam says, crouching beside you. "That grew somewhere else."</p>`,
cx:[
  {t:"Pocket it. Bring it home. Have it analysed.",nx:"clearing_disc_home"},
  {t:"Leave it exactly where it is. It was left there deliberately.",nx:"clearing_disc_leave"},
  {t:"Hold it and see if it does anything.",nx:"clearing_disc_hold"},
]},

clearing_disc_home:{d:15,em:"🧬",el:"home",ch:"Analysis",
ti:"What the Lab Finds",
tx:`<p>You take it to a biology teacher first, who looks fascinated and says she'll run it through the school's basic lab equipment and then hands it back and says the school's basic lab equipment is completely inadequate and you should try a university.</p>
<p>You email three universities. The second one replies. They analyse it. They ring you — actually ring you — and the person on the phone sounds like they're trying to keep their voice steady. It's organic. It grew. Its DNA is largely similar to Earth-based organisms but "largely similar" is doing a lot of work in that sentence, and the gaps are significant.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: 'Largely Similar'",
etx:"That phone call was the beginning of a career. You didn't know that yet. But 'largely similar' turned out to be the most important words you'd ever hear."}
clearing_disc_leave:{d:15,em:"🌿",el:"clearing",ch:"Respect",
ti:"Some Things Stay Where They're Left",
tx:`<p>You stand up and back away. "It's a marker," you tell Sam. "Like a plaque. It's supposed to be there." Sam nods slowly. "So something will know this was a contact site." "Or something will know it was cared for." "Both," Sam says. "Both is good."</p>
<p>You photograph the disc from a distance, enough to remember where it is. Then you leave. You come back once a year for six years to check on it. It's always there. It never decays. Once, on the fourth visit, you find a second one beside it.</p>`,
ty:"ending",en:"weird",
eti:"✦ Ending: The Second One",
etx:"On the fourth visit: a second disc. It means something is still coming here. Still leaving markers. You're not checking on a site. You're maintaining a correspondence."}
clearing_disc_hold:{d:15,em:"💫",el:"clearing",ch:"Holding It",
ti:"When You Hold It",
tx:`<p>You close your hand around the disc. Nothing dramatic happens. No visions, no download, no alien message uploading into your brain. But there is something: a warmth that spreads up your arm and into your chest and settles there. A feeling of — completion? Recognition? As if some part of you that was always slightly restless has been told: yes, you're in the right place. You're what you're supposed to be.</p>
<p>The feeling fades after about thirty seconds. You open your hand. The disc is a little lighter than before.</p>
<p>"Huh," Sam says. "How do you feel?" "Oddly okay," you say. And you are.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Permission",
etx:"You were told — by something that had watched for forty years — that you're what you're supposed to be. You can't explain how you know that's what it meant. But you know."}
davies_tea:{d:15,em:"☕",el:"campsite",ch:"Pre-Dawn Tea",
ti:"Mr. Davies Already Knew",
tx:`<p>"You've seen it before," you say. It's not a question. Mr. Davies takes a long sip of his tea. "Seen things," he says carefully. "In this general vicinity. Over the years. Organised this trip partly because the timing seemed... right." He pauses. "I should probably apologise for that." You think about whether you want an apology. "No," you say. "This was the best night of my life." He smiles. "Good," he says. "I was rather hoping."</p>
<p>You drink your tea. The sky begins to lighten. Mr. Davies has known about whatever is under this hill for a very long time, and he brought you here on purpose, and you find you're grateful.</p>`,
cx:[
  {t:"Ask how he knows. What's his history with this place?",nx:"davies_history"},
  {t:"Ask why he brought you specifically.",nx:"davies_why_you"},
  {t:"Sit in comfortable silence. Some things don't need explaining.",nx:"davies_silence"},
]},

davies_history:{d:16,em:"📖",el:"campsite",ch:"Mr. Davies's Story",
ti:"Thirty Years Ago",
tx:`<p>Mr. Davies's history with this place started thirty years ago, on a school trip not unlike this one, when he was sixteen and heard a signal in the trees. He went alone, which was stupid. He found the clearing, which was extraordinary. He saw nothing conclusive, which was frustrating. He came back every summer for six years before he found anything.</p>
<p>"What did you find?" you ask. He reaches into the pocket of his jacket and produces a flat disc, worn smooth with handling. The same kind you might have found in the clearing tonight — if you went to look.</p>
<p>"Evidence," he says. "Enough to keep coming back."</p>`,
cx:[
  {t:"Ask what happened on the seventh summer.",nx:"davies_seventh"},
  {t:"Tell him what you found tonight.",nx:"davies_exchange"},
]},

davies_seventh:{d:17,em:"✨",el:"campsite",ch:"The Seventh Year",
ti:"Contact",
tx:`<p>"The seventh summer," Mr. Davies says, "I heard the signal again and this time I had better equipment and worse nerves. I recorded it. I tracked it. I ended up in the cave system that runs under the hill, which I do not recommend entering alone in the dark, and I found the markings on the walls."</p>
<p>He looks at his disc. "I don't know what it is," he says. "I've never known what it is. But I know this place is a junction of some kind. And I know it responds to people who are paying attention." He looks at you. "You were paying attention tonight." "Yes," you say. "I was."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Thirty Years of Questions",
etx:"Mr. Davies spent thirty years working up to bringing the right student here. You were the right student. You're going to spend the next thirty years finding out why."}
davies_why_you:{d:16,em:"🎯",el:"campsite",ch:"Why You",
ti:"Why You Specifically",
tx:`<p>"You notice things," Mr. Davies says, as if it's obvious. "Most people don't. You do. You ask the second question after most people stop at the first. You sit with uncertainty without needing to resolve it immediately." He pauses. "And you ran toward the signal. I was watching. Some people would have gone for a responsible adult. You ran toward it." You remember the sprint through the trees with the torch, branches catching at your arms. "That could have been reckless," you say. He shrugs. "Everything important looks reckless from the outside."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Right Qualities",
etx:"Mr. Davies brought you here because you run toward strange lights. Hold onto that. It will take you a long way."}
davies_silence:{d:16,em:"🌄",el:"campsite",ch:"Dawn",
ti:"Comfortable Silence",
tx:`<p>You sit with him in the pre-dawn dark and drink your tea and don't say anything. The forest gradually becomes visible around you — black giving way to grey giving way to colour. Birds. The smell of dew. A fox crossing the far edge of the field with complete indifference to human drama.</p>
<p>This is enough. Mr. Davies knows things and you know things and you're both sitting with what you know in the same pre-dawn clearing and that's a form of communication that doesn't require any words. Some things don't need explaining. This is one of them.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Same Clearing",
etx:"You and Mr. Davies sat in the same clearing with the same knowledge and let the morning come. That's it. That was exactly right."}
magnet_works:{d:15,em:"🧲",el:"clearing",ch:"It Works",
ti:"The Magnet Does Something",
tx:`<p>Mr. Davies presses the rare-earth magnet against the cracked casing. The device stops its distress cycling. The crack seals — not physically, but the energy leak stops, like a wound closing over. The signal stabilises: steady, clear, broadcasting.</p>
<p>"It's working," Sam says. The creature turns toward the sky. Above the treeline, something answers — a light, steady and purposeful, beginning to descend.</p>
<p>"What did you just do?" you ask Mr. Davies. He turns the magnet over in his fingers. "Interrupted the resonance frequency," he says. "Apparently." He sounds like someone who has been waiting to use that sentence for thirty years.</p>`,
cx:[
  {t:"Ask Mr. Davies how he knew that would work.",nx:"magnet_how_knew"},
  {t:"Watch the vessel descend — be present for this.",nx:"magnet_vessel_comes"},
]},

magnet_how_knew:{d:16,em:"❓",el:"clearing",ch:"Expertise",
ti:"How Did You Know",
tx:`<p>"I didn't," Mr. Davies says. "I knew that neodymium magnets interrupt most resonance-based systems. I guessed this counted. It was an educated guess." He pauses. "With considerable downside risk if wrong." You stare at him. "You guessed." "Educators make educated guesses. It's in the name." You look at the now-stable device, the descending light, the creature making a gesture that might be relief. "It worked," Sam says. "It worked," Mr. Davies agrees. "We'll do the debriefing later."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Educated Guess",
etx:"Mr. Davies carried a magnet for thirty years on the basis that it might someday be useful. Tonight it was. Always carry the thing that might someday be useful."},

magnet_vessel_comes:{d:16,em:"🛸",el:"clearing",ch:"Arrival",
ti:"It Comes Down",
tx:`<p>The four of you — you, Sam, Mr. Davies, and the creature — stand in the clearing and watch the vessel descend. It's larger than you expected, and quieter, and it lands with a precision that suggests technology so far beyond yours that the comparison isn't useful.</p>
<p>A door opens. Not mechanical — it simply stops being there. The creature walks toward it. At the threshold it turns and looks at all three of you: the teacher and the two students who stayed up all night. It makes the gesture for friend three times. Then it goes in. The door resumes being a wall. The vessel rises.</p>
<p>The three of you watch until there's nothing to watch.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: All Three of You",
etx:"You, Sam, and Mr. Davies watched a vessel leave. That's three witnesses to the same thing. That matters — not just as evidence, but as something shared. You'll tell different parts of this story for the rest of your lives."}
maths_result:{d:16,em:"🧮",el:"clearing",ch:"Conclusion",
ti:"What the Maths Showed",
tx:`<p>At the end of forty minutes of equations — working through Mr. Davies's printed paper and the creature's responsive glyphs — they reach a conclusion. You can tell because both of them stop moving simultaneously and look at the sky.</p>
<p>Mr. Davies translates slowly. "There's a window," he says. "Temporal. In the signal. If you transmit at the right frequency at the right moment, the signal propagates backward. Not far — days, not years — but backward." He pauses. "And forward." He looks at you. "The signal tonight was sent from three nights from now."</p>
<p>"What was in it?" you ask. "Instructions," he says. "For us. For tonight."</p>`,
cx:[
  {t:"Ask what the instructions said.",nx:"maths_instructions"},
  {t:"Ask who sent them from three nights from now.",nx:"maths_who_sent"},
]},

maths_instructions:{d:17,em:"📋",el:"clearing",ch:"The Instructions",
ti:"What You Were Told to Do",
tx:`<p>The instructions — as Mr. Davies translates them from glyph-form — were surprisingly practical: stand in the clearing, do not run, respond to the signal with a sustained tone, leave the device alone until asked. Simple things. Things you more or less did. Things that created the conditions for the creature to trust contact.</p>
<p>"Who knew to send those instructions?" Sam asks. The creature and Mr. Davies exchange a look. "Someone who was here tonight," Mr. Davies says carefully, "and decided three nights from now to send back a message to make tonight go better."</p>
<p>You look at the creature. "Was it you?" The creature makes the sign for no. Then points at you.</p>`,
ty:"ending",en:"weird",
eti:"✦ Ending: You Sent It",
etx:"You will send those instructions three nights from now. You don't know what to say yet, but you know you'll find the words. You already found them, apparently."}
maths_who_sent:{d:17,em:"👤",el:"clearing",ch:"The Sender",
ti:"From Three Nights From Now",
tx:`<p>"Who would be in a position to send that signal three nights from now?" you ask. The creature gestures at the sky, then at Mr. Davies, then at you. "All of us," Mr. Davies translates. "A collaborative transmission." He tilts his head. "It appears that in three nights, the vessel will have sent us the equipment necessary to transmit. And we will have the understanding necessary to aim it correctly." He looks quietly delighted. "Time loop," he says. "Of the benign variety."</p>
<p>You look at the night sky. Somewhere up there, a vessel is already carrying the equipment for the message you haven't sent yet. "Well," you say. "I'd better be here in three nights."</p>`,
ty:"ending",en:"weird",
eti:"✦ Ending: Three Nights From Now",
etx:"You're going back in three nights. You already did. The loop is closed and everything you needed happened because you showed up twice — once as a student, once as the sender. Be there."}
quest_continues:{d:15,em:"⚓",el:"underground sea",ch:"The Voyage",
ti:"The Permanent Exception Sails",
tx:`<p>The Underchart is never the same twice. Cora says you get used to it — you learn to read not the map but the map's mood. Today it's showing a southern route through the luminous shallows. Yesterday it was the ridge passage. The day before the chart was blank for six hours, which everyone pretended not to find alarming.</p>
<p>You navigate. Sam has learned the navigation ring faster than you and is now quietly better at it, which is character-building. The crew — seven people, three species, one function you still don't understand — treat you like you belong here. You think you might.</p>`,
cx:[
  {t:"Ask Cora what happens at the Seventh Compression.",nx:"quest_seventh"},
  {t:"The unidentified crew member — you need to know what they are.",nx:"quest_third_species"},
  {t:"The Underchart just went blank. That's alarming.",nx:"quest_blank_chart"},
]},

quest_seventh:{d:16,em:"🌀",el:"underground sea",ch:"The Compression",
ti:"The Seventh",
tx:`<p>"The Seventh Compression," Cora says, "is a place where the underground sea folds through itself seven times. The water there is from seven different time periods simultaneously. You can sail through it, but each layer feels like a different weight. The oldest layer is the heaviest." She pauses. "The ship makes a sound when you pass through. Specific to the ship. Like the ship knows where it is."</p>
<p>Three hours later you're there. The Permanent Exception does make a sound — low, resonant, like a bell heard underwater. In the oldest layer, the heaviest water, you can see shadows of the surface above. Another world's sky, very far up.</p>`,
tx:`<p>"The Seventh Compression," Cora says, "is a place where the underground sea folds through itself seven times. The water there is from seven different time periods simultaneously." She describes the heaviest layer, the oldest water, the ship's specific sound when it passes through. "Like the ship knows where it is."</p>
<p>Three hours later: the Permanent Exception's bell-tone through the heavy water. In the oldest layer you can see shadows of the surface above — another world's sky, very far up.</p>`,
cx:[
  {t:"Dive in. Swim through the oldest water.",nx:"quest_oldest_water"},
  {t:"Stay on deck and document everything.",nx:"quest_document_seventh"},
]},

quest_oldest_water:{d:17,em:"🏊",el:"the deep",ch:"The Oldest",
ti:"400-Million-Year Water",
tx:`<p>You go in. The oldest layer is cold and heavy and tastes of nothing — a water so old it predates anything that could give it a taste. You can't see the bottom. You can't see the top. You're suspended in water that existed before the first fish.</p>
<p>You don't panic. You're surprised by this. You float in the oldest water in the world and you're not afraid, and that tells you something about who you've become since you ran toward a light in the trees at the beginning of this very long night.</p>`,
ty:"ending",en:"weird",
eti:"✦ Ending: Pre-Fish",
etx:"You swam in water older than animals. You weren't afraid. The night that changed you started when you heard a signal; it's ending with you suspended in 400-million-year-old water, not afraid of anything."},

quest_third_species:{d:16,em:"❓",el:"ship deck",ch:"The Unknown Crew",
ti:"The Third One",
tx:`<p>The third crew member — you've been calling them "the other one" in your head — is about your height, mostly translucent, and communicates entirely in patterns of light that move across their skin. They're the ship's cartographer. They make the Underchart.</p>
<p>"They grow the chart," Cora explains. "The chart is part of them. When the sea changes, they feel it and update the chart. The blank periods are when they're sleeping."</p>
<p>You look at the creature-who-is-also-a-chart. They notice you looking. A pattern runs across their skin: a map of you, recognisably, made of light. They made a chart of you. You're in the Underchart now.</p>`,
ty:"ending",en:"weird",
eti:"✦ Ending: In the Chart",
etx:"You're in the Underchart. Somewhere, a map made of a living being includes you — a brief dot of light in a vast sea. You find this unexpectedly comforting."}
quest_blank_chart:{d:16,em:"📋",el:"ship deck",ch:"Navigation Crisis",
ti:"Flying Blind",
tx:`<p>The Underchart being blank means the cartographer is asleep and the sea ahead is unknown. Cora takes the wheel — actual wheel, this ship is older than she looks — and navigates by instinct and memory and the sound of the hull against different pressures.</p>
<p>You help. You stand at the prow and describe what you see: current patterns, the colour of the water (it changes), the behaviour of the things that live in it. It takes four hours. The chart wakes when the cartographer wakes. By then you've done enough navigating by feel and observation that you understand, for the first time, what it actually means to pay attention.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Navigation by Attention",
etx:"Four hours of navigating unknown water by observation alone. You learned to read something you'd never been taught. That turns out to be the most transferable skill you'll ever have."}
reply_sent:{d:16,em:"📡",el:"forest clearing",ch:"The Transmission",
ti:"Sending Backward",
tx:`<p>The creature configures the device — with your help and the creature's surprisingly patient instruction — to transmit backwards along the temporal current of the signal. You write your message first in your notebook, then read it aloud into the configured device: a brief factual account of the contact, the creature's condition, the current status of the device, and — because you're fifteen and feel it's important — the date, the weather, and the fact that the camping trip was otherwise going well.</p>
<p>The transmission takes thirty-seven seconds. When it ends, the device goes quiet for the first time tonight.</p>`,
cx:[
  {t:"Ask the creature if the transmission arrived.",nx:"reply_confirmed"},
  {t:"Ask who, in 1978, would have received this.",nx:"reply_recipient"},
]},

reply_confirmed:{d:17,em:"✅",el:"forest clearing",ch:"Confirmed",
ti:"It Arrived",
tx:`<p>The creature does something to the device — pulls a readout, reads something you can't interpret — then makes a single, decisive gesture: yes. It arrived. Your voice, reading your careful account of tonight, is now in 1978. In a forest. Being received by a recording device that has been waiting forty-six years to be the subject of a research paper.</p>
<p>"Someone in 1978 just heard your voice," Sam says. You think about that. "Do you think they were scared?" "Depends on the person," Sam says. "I think you'd have been curious." You think about fifteen-year-old you in 1978 — a different you, an impossible you — hearing an unknown voice from the future with useful information. "Yeah," you say. "I'd have been curious."</p>`,
ty:"ending",en:"weird",
eti:"✦ Ending: Hello, 1978",
etx:"Your voice is in 1978. Someone heard it. Somewhere in the archival record, there is a recording of you — before you existed — describing what was happening in a forest. That recording will surface, eventually. It always does."}
reply_recipient:{d:17,em:"👤",el:"forest clearing",ch:"The Listener",
ti:"Who Was Listening in 1978",
tx:`<p>The creature indicates — carefully, with the patience of something that finds linear time slightly quaint — that the 1978 receiver was a researcher stationed at a facility twenty kilometres from this forest. That researcher spent thirty-seven years trying to decode the transmission they received on an otherwise quiet Tuesday in April. They wrote four papers, none published. They retired in 2009.</p>
<p>Their granddaughter — the creature makes a gesture you now understand as "lineage" — is currently completing a PhD on unexplained radio anomalies. She has her grandmother's notes. She has been coming to this forest for three years, at intervals, looking for the source.</p>
<p>"What's her name?" you ask. The creature spells it in the gesture-alphabet it taught you. You write it down.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Find Her",
etx:"Her name is in your notebook. She's been looking for the same thing you found tonight. Find her. You have something she needs — and you're going to need what she knows."}
stop_response:{d:12,em:"🌳",el:"forest edge",ch:"Standing Still",
ti:"The Signal Responds",
tx:`<p>You stop. Sam stops. The signal continues its heartbeat pattern for thirty seconds — then slows. Then stops. The forest is completely silent. Then: a single pulse. Different frequency, slightly lower. Not the signal — an answer to your stopping.</p>
<p>"It noticed," Sam whispers. "It's different because you stopped." You stand very still. Another pulse. Closer. Something is moving toward you through the trees, not fast, using the same careful pace as something that doesn't want to startle.</p>`,
cx:[
  {t:"Hold your ground. Let it come to you.",nx:"stop_hold_ground"},
  {t:"Respond with your own sound — hum the signal back.",nx:"stop_hum_back"},
]},

stop_hold_ground:{d:13,em:"🕯️",el:"forest clearing",ch:"Meeting",
ti:"It Comes to You",
tx:`<p>The creature comes to you. Not the alien — something else. Smaller. Animal, or close to animal. Covered in the same bioluminescence as the cave walls. It stops four metres away and looks at you with eyes that catch your torch like a cat's eyes but more so — more depth, more colour.</p>
<p>It makes a sound: two notes, ascending. Then waits. You understand instinctively that this is a greeting. That you're supposed to respond.</p>`,
cx:[
  {t:"Make the two ascending notes back. Best you can.",nx:"stop_greet_back"},
  {t:"Hold very still and let it approach further.",nx:"stop_animal_close"},
]},

stop_greet_back:{d:14,em:"🎵",el:"forest",ch:"Exchange",
ti:"A Brief Conversation",
tx:`<p>You try the two notes. You're not a singer — the second note is flat — but the animal seems to accept the attempt. It responds with three notes, then pauses. You try three notes. Four notes. You try four. For about five minutes, in the dark forest, you have a limited but genuine conversation with a creature that glows.</p>
<p>Then it turns and walks into the trees. The bioluminescence fades with distance. Sam is very quiet beside you. "Did that just happen?" Sam asks. "I think so," you say. "Write it down," Sam says. You already are.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Five-Minute Conversation",
etx:"You don't know what you said. You know you were understood. That might be enough to build a whole field of study on. It's certainly enough for tonight."}
stop_animal_close:{d:14,em:"🌟",el:"forest",ch:"Proximity",
ti:"Very Close Now",
tx:`<p>It comes within a metre. You can see the bioluminescence properly now — it runs in lines along its body, like circuitry, and pulses in rhythm with its breathing. Up close it smells like moss and copper and something you don't have a word for. It sniffs at your hand without touching it. Then makes a sound — one note, sustained — that you feel more than hear.</p>
<p>The feeling it produces in your chest is something between calm and recognition. Like being told: you belong to the same world as me. Even if we don't have the same words for it.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Same World",
etx:"It told you, in the only language it had, that you belong to the same world. You do. You've always known that, in the way you always know the important things. Tonight you were reminded."}
stop_hum_back:{d:13,em:"🎼",el:"forest",ch:"Music",
ti:"The Hum",
tx:`<p>You hum the signal back — the original pattern, as accurately as you can recall it. The forest goes quiet. Then: the bioluminescence that runs through the moss on the ground around you brightens. It's responding not to you specifically but to the signal, like a plant to sunlight. The signal is a trigger. And you just pulled it.</p>
<p>Paths light up. Three directions. Each one leads somewhere different, and the brightness of each suggests distance: one close, one far, one in between.</p>`,
cx:[
  {t:"Follow the close path.",nx:"biof_follow"},
  {t:"Follow the medium path.",nx:"signal_investigation"},
  {t:"Follow the far path — you've come this far.",nx:"gift_follow"},
]},

surface_return:{d:15,em:"📁",el:"surface",ch:"Above Ground",
ti:"What You Do With the Documents",
tx:`<p>You surface with the waterproof folder. The documents inside are dense: surveys, charts, correspondences in three languages spanning four centuries, and what looks like a legal agreement — a treaty, maybe — between a group of people you've never heard of and something you can now more easily identify as extraterrestrial representatives.</p>
<p>You sit at the edge of the forest and read for two hours. When the camp wakes you've got a plan. It's not a complete plan but it has a direction.</p>`,
cx:[
  {t:"Approach Mr. Davies. He needs to see this.",nx:"surface_to_davies"},
  {t:"Photograph everything first. Originals are too valuable to carry.",nx:"surface_photograph"},
  {t:"There's a name in the treaty — a local family. Find them.",nx:"surface_find_family"},
]},

surface_to_davies:{d:16,em:"👨‍🏫",el:"campsite",ch:"Briefing",
ti:"Mr. Davies Reads the Treaty",
