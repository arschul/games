etx:"You used what you learned below to fix something above. Four hundred years of Underchart records vs. one corporate facility. The records won. Well done."},

final_destination:{d:16,em:"🏝️",el:"the seventh compression",ch:"The Island",
ti:"The Island That Won't Last",
tx:`<p>The Seventh Compression is visible from miles away — a column of light rising from the underground sea to the non-sky above. It's an island that folds into existence every few years and contains, in the captain's words, "records of everything the Underchart has observed." This means four hundred years of records of the surface world, seen from below. Every ship. Every earthquake. Every tunnel and mine and bore-hole. And one other thing: a record of every person who has ever climbed down.</p>
<p>Including two entries that are clearly yours — dated tonight, from a signal in a forest.</p>
<p>"Why does it have our records already?" Sam asks. The captain smiles for the first time. "It always knows," she says. "That's what the centre does."</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: Already Written",
etx:"The Underchart knew you were coming before you arrived. You don't know what to do with that. Neither does anyone else. But you're in the record now, permanent, alongside four centuries of impossible history."},

/* ── ENCOUNTER-RESOLUTION SHARED NODES ── */
knock_ship:{d:11,em:"🤛",el:"enormous metal shape",ch:"The Vessel",
ti:"Knock Knock",
tx:`<p>You walk up to the metallic shape and knock on it. It makes a sound like knocking on a mountain. Nothing happens. You knock again. Mr. Davies says quietly: "I don't think that's how—" A seam appears in the metal, glowing orange. A door opens. Warm light spills out. A figure steps out — roughly human-shaped, but not human, moving with a precision that suggests it's been engineered rather than born. It looks at all three of you. Looks at its own hand. Looks back. "Oh," it says. "Organics."</p>`,
cx:[
  {t:"Say: yes, organics. Hello.",nx:"say_name"},
  {t:"Ask what it means by organics in that tone.",nx:"what_tone"},
  {t:"Mr. Davies steps forward. Let him handle this.",nx:"davies_leads"},
]},

call_help_early:{d:9,em:"📡",el:"satellite phone",ch:"Adult Response",
ti:"Getting Help",
tx:`<p>You suggest going back and calling for help. Mr. Davies pulls out his satellite phone. He calls the non-emergency ranger line and describes what he can see. The ranger says: "Sir, we've had three other calls tonight about lights in that forest." A pause. "We're recommending people stay indoors." Another pause. "Or in tents." Mr. Davies looks at you both. "Apparently this is a known thing," he says slowly. "And the official advice is to observe from a safe distance and not approach." He puts the phone away. "We are not going to follow that advice entirely."</p>`,
cx:[
  {t:"Good. Circle the ship and find a door.",nx:"circle_ship"},
  {t:"Actually, official advice seems right. Wait here.",nx:"wait_and_see"},
  {t:"The ship door opens on its own.",nx:"ship_opens"},
]},

circle_ship:{d:10,em:"🔦",el:"circling metal shape",ch:"Recon",
ti:"Going Around",
tx:`<p>You circle the shape. It's a perfect disc — no seams on the top surface, no markings. Around the equator, a faint patterning that might be script. Sam photographs it. Mr. Davies examines the trees around it: bent outward, as if from a single pulse of pressure. "It landed recently," he says. "Hours ago." On the far side, you find what you were looking for: a door. Closed. No handle. But when you stand in front of it, it lights up around the edges.</p>`,
cx:[
  {t:"Touch the lit edges.",nx:"ship_opens"},
  {t:"Step back from it. Let it decide.",nx:"ship_opens"},
  {t:"Knock.",nx:"knock_ship"},
]},

ship_opens:{d:12,em:"🛸",el:"open ship door",ch:"The Vessel",
ti:"The Door Opens",
tx:`<p>The door opens. Warm amber light from inside. No sound. A ramp descends — slowly, deliberately, clearly designed to communicate: I am not a threat. I am making room for you.</p>
<p>Inside: clean, curved, lit in ways that have no visible source. Furniture that is clearly designed for sitting-in, though the proportions are slightly off. And at the centre of the room: a screen showing your campsite. Your tents. Your exact location. It's been watching you.</p>
<p>Mr. Davies makes a sound that combines twelve emotions into two syllables. Sam sits down in one of the slightly-wrong chairs because they've simply decided to be practical about it.</p>`,
cx:[
  {t:"Look at the screen. What else has it been watching?",nx:"check_screen"},
  {t:"Call into the ship: hello? Is anyone home?",nx:"call_in_ship"},
  {t:"Sam's chair does something unexpected.",nx:"chair_thing"},
]},

check_screen:{d:13,em:"📺",el:"alien screen",ch:"Surveillance",
ti:"The Screen",
tx:`<p>The screen shows your campsite, yes — but also other things. Other locations, elsewhere in the world. A market in somewhere hot. A street in a dense city. A beach. A mountain. All live. All running simultaneously. The camera — or whatever it is — is watching humans going about their lives with what you can only describe as academic interest. Not malicious. Not threatening. Just — curious. Like a nature documentary.</p>
<p>Mr. Davies stands very still beside you. "We're the documentary," he says quietly.</p>`,
cx:[
  {t:"Speak to the camera. If it's watching, speak directly to it.",nx:"speak_to_screen"},
  {t:"Try to find controls. Can you change what's on the screen?",nx:"ship_controls"},
  {t:"Sam has found something in the next room.",nx:"next_room"},
]},

call_in_ship:{d:12,em:"🗣️",el:"inside the ship",ch:"Contact",
ti:"Hello?",
tx:`<p>"Hello?" you call. Your voice sounds strange in the interior — absorbed quickly, no echo. Mr. Davies tries in French, then in halting Latin, which surprises you. Nothing responds directly. But the lights warm slightly, and a panel in the far wall becomes translucent, showing another room beyond.</p>
<p>In that room, resting in something like a chair, is a creature — the operator, presumably. It is awake and looking at you. It makes a gesture that is clearly: <em>please wait.</em></p>`,
cx:[
  {t:"Wait.",nx:"patient_wait"},
  {t:"Go to the translucent panel. Approach it.",nx:"approach_panel"},
  {t:"Gesture back: take your time.",nx:"patient_wait"},
]},

davies_leads:{d:13,em:"🧑‍🏫",el:"teacher in negotiation",ch:"Diplomacy",
ti:"Mr. Davies Takes Over",
tx:`<p>Mr. Davies steps forward. He's completely calm — the way very experienced people are calm in the middle of extraordinary things. "Good evening," he says clearly. "We live nearby. We heard your signal. Can we help?" The figure — the creature, the constructed being, whatever it is — looks at him for a long moment. Then it makes a sound. The sound translates, somehow, directly into meaning: <em>your presence is noted and not unwelcome.</em></p>
<p>"That's a start," Mr. Davies says. He looks back at you. "Alex. Tell it what you heard. How the signal sounded. The exact pattern."</p>`,
cx:[
  {t:"Describe the signal pattern exactly as you heard it.",nx:"signal_pattern"},
  {t:"Ask Mr. Davies how he's this calm.",nx:"davies_calm"},
  {t:"This is all going well. Something is about to go wrong.",nx:"something_behind"},
]},

signal_pattern:{d:13,em:"📡",el:"signal patterns",ch:"Communication",
ti:"The Pattern",
tx:`<p>You describe it: the repeating sequence, the rhythm, what changed when the light blinked, the exact interval. As you speak, the creature's expression — which is not a face but functions as one — shifts into something like recognition. It looks at a panel. The signal your camp heard appears on it in visual form. Then another pattern appears beside it — similar, but different. It points between the two.</p>
<p>"They're asking if we can hear the difference," Mr. Davies says. You listen. You can. The second one has a different pulse every seventh beat. "Yes," you say. "The seventh beat." The creature makes the resonating sound of approval. It holds up seven fingers — it has seven on each hand — and then points at you.</p>`,
cx:[
  {t:"Seven. What's significant about seven?",nx:"why_seven"},
  {t:"This is communication. Keep going. Ask your own question.",nx:"ask_your_question"},
]},

something_behind:{d:12,em:"👀",el:"something in the trees",ch:"Complication",
ti:"Not Alone",
tx:`<p>Something is moving in the trees behind the creature — or the ship, or the hole. Multiple somethings. You can see them by the way the underbrush moves: systematic, deliberate, getting closer. Whatever they are, they're not animals. Animals don't move in coordinated grid patterns.</p>
<p>The creature sees your expression and turns. It makes a sharp, urgent sound that you don't need to understand to understand: danger. It grabs the device — or the doorframe, or your arm — and pulls.</p>`,
cx:[
  {t:"Run with the creature.",nx:"run_together"},
  {t:"Stand your ground. You want to see what's coming.",nx:"face_new_arrival"},
  {t:"Get Mr. Davies between you and whatever that is.",nx:"davies_shield"},
]},

run_together:{d:15,em:"🏃",el:"running through forest",ch:"Together",
ti:"Running Side by Side",
tx:`<p>You run. The creature runs beside you — and it is fast, startlingly fast, but it doesn't leave you behind. Sam sprints. Mr. Davies, impressively, keeps up. You crash through the forest and reach — you're not sure how — a place the creature clearly knows: a small cave mouth in a rocky outcrop that the creature pushes you all inside before doubling back to watch the treeline.</p>
<p>You catch your breath. Whatever was coming seems to have stopped at the clearing. The creature watches. After five minutes it turns back to you. Makes the sound for: all clear.</p>
<p>You're in a cave with an alien, having just survived something, together.</p>`,
cx:[
  {t:"Ask — in gestures — what that was.",nx:"what_was_that"},
  {t:"You're all okay. Fix the device now while you have time.",nx:"fix_device"},
  {t:"This cave is not just a cave.",nx:"cave_discovery"},
]},

face_new_arrival:{d:13,em:"🔦",el:"torch in dark forest",ch:"Standoff",
ti:"Facing It",
tx:`<p>You turn on your torch and point it at the treeline. The movement stops. Nothing shows itself. For thirty seconds, complete stillness. Then a figure steps out — a person. A human person. Dressed in black, wearing equipment you'd associate with military or surveillance. They have a device of their own pointed at the creature beside you.</p>
<p>"Step away from it," the figure says.</p>`,
cx:[
  {t:"Don't step away. Stand between the figure and the creature.",nx:"protect_creature"},
  {t:"Ask who they are.",nx:"who_are_agents"},
  {t:"The creature puts a hand on your shoulder gently. It's telling you something.",nx:"creature_message"},
]},

protect_creature:{d:15,em:"🛡️",el:"standing guard",ch:"Taking a Side",
ti:"Not Moving",
tx:`<p>"No," you say. You step in front of the creature. Sam steps beside you, which you'll think about later — they didn't hesitate for even a second. Mr. Davies steps on the other side. The figure with the equipment stops. They're clearly not expecting three camping trip attendees to form a protective line in front of a first-contact situation.</p>
<p>"Step aside," they say again. "That entity is a security concern." "This entity," you say, "fixed its device and is trying to leave. You can wait two minutes." A pause. "Who are you?" they ask. "We're on a school trip," Mr. Davies says pleasantly. "And you're trespassing on a national park."</p>`,
cx:[
  {t:"Keep talking. Give the creature time to get back to its vessel.",nx:"stall_for_time"},
  {t:"The creature taps your shoulder. It's ready.",nx:"vessel_arrives"},
  {t:"More figures emerge from the trees.",nx:"more_agents"},
]},

vessel_arrives:{d:16,em:"🛸",el:"ship arrival",ch:"Departure",
ti:"It's Here",
tx:`<p>The sky above the clearing clears — not the clouds, but the feeling of it, the weight of it — and something descends without sound. Not enormous, not threatening. The same diameter as the clearing, hovering three metres off the ground. A door in its underside opens. A beam of amber light — warm, like late afternoon — connects it to the ground.</p>
<p>The creature walks to the beam. Stops. Turns to you one last time. Does something complicated with its hands and face that takes about four seconds. Then it steps into the light and rises.</p>
<p>The vessel closes. Accelerates upward. Gone.</p>
<p>You stand in a normal forest clearing. Agents around the perimeter. Mr. Davies beside you. Sam holding your arm.</p>
<p>"Right," Mr. Davies says. "Who wants to tell me everything from the beginning?"</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Witness",
etx:"You protected something that needed protecting, you helped something broken get fixed, and you stood your ground when it mattered. The agents got nothing useful. The creature made it home. That is a very good ending."},

cave_discovery:{d:15,em:"🗿",el:"cave with ancient markings",ch:"Below the Below",
ti:"The Cave",
tx:`<p>You look around the cave properly for the first time. The walls are covered in markings — carved, not painted, into the stone. Geometric shapes, repeating patterns, handprints. Very old. But interspersed with them are marks that match the alien device exactly: the same symbols, the same geometry. Millennia before tonight, something from the same place was here. Was here, and left a record, and the record includes something that looks — incredibly, impossibly — like a map of the solar system.</p>
<p>The creature looks at the markings and makes a long, low sound. Not new information. Old. Very old.</p>
<p><em>They've been here before.</em></p>`,
ty:"ending",en:"weird",
eti:"★ Ending: They Were Always Here",
etx:"First contact happened tonight. But it wasn't actually first. They've been visiting for a very long time — and they left records in your cave, in your forest, in your stone. The world just became much older than you knew."},

stall_for_time:{d:15,em:"🗣️",el:"standoff in forest",ch:"Talking",
ti:"Keep Talking",
tx:`<p>You talk. About the camping trip, the weather, the trees, your school, the signal, what you heard — anything, in detail, at length. The agent keeps trying to get past you. Mr. Davies discusses the legal framework for private property and national park access with the detailed authority of someone who teaches civic education. Sam explains the history of the area's ecological zoning. It is spectacularly, deliberately boring.</p>
<p>Behind you, unheard over your talking, the vessel collects its operator and departs. By the time the agent gets to where it was, there's nothing there but a patch of flattened grass.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Talking for Your Life",
etx:"You kept going, kept talking, kept standing in the way until there was nothing left to protect. The creature made it home. You did it with words — which is underrated as a superpower."},

more_agents:{d:14,em:"👥",el:"agents surrounding",ch:"Surrounded",
ti:"More",
tx:`<p>Eight figures at the tree line now. They have equipment — not weapons, but devices that are clearly meant to contain or measure something. The creature behind you is still. Mr. Davies surveys the situation with the calm of someone who has managed school trips for twenty years and has dealt with worse logistics.</p>
<p>"Here's what I think," he says conversationally to you. "If they wanted to grab it, they would have. They're waiting for something." He nods at the sky. "They're waiting for the vessel. They want the vessel." A pause. "Don't let them have the vessel."</p>`,
cx:[
  {t:"Give the creature the fixed device. It needs to signal the vessel now.",nx:"vessel_arrives"},
  {t:"Create a distraction. What have you got?",nx:"distraction"},
  {t:"Talk to the lead agent. Negotiate.",nx:"negotiate"},
]},

negotiate:{d:14,em:"🤝",el:"negotiation",ch:"Deal-Making",
ti:"What Do You Want?",
tx:`<p>"What do you actually want?" you ask the lead agent directly. A pause. "The entity," they say. "And the device." "Why?" Another pause — this one longer, suggesting internal debate. "It's the first confirmed contact. We've been looking for confirmation for forty years." "And you want to detain it," Sam says flatly. "We want to study the situation," the agent says carefully. "Study," you repeat. "Not detain. Not contain." "That's not — " the agent begins. "Because," you say, "it's a person. And you don't get to detain a person because they're interesting."</p>`,
cx:[
  {t:"This is going nowhere. Cause a distraction and get the creature to the vessel.",nx:"distraction"},
  {t:"Offer a compromise: we facilitate communication, you let it go.",nx:"vessel_arrives"},
]},

distraction:{d:14,em:"💥",el:"distraction in clearing",ch:"Chaos",
ti:"Make Some Noise",
tx:`<p>Sam pulls out an emergency whistle — always carries one, always has rope, always prepared — and blows it at full volume. The sound is enormous in the quiet forest. Every agent flinches or covers their ears. Mr. Davies immediately starts walking in the opposite direction from the creature, talking loudly, drawing attention. You gesture to the creature: go, go now. It goes. It is fast. By the time the agents have their bearings, it's at the vessel beam and rising.</p>
<p>Gone.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Good Timing",
etx:"Three people, a whistle, and perfect timing. Sometimes that's all it takes. Well done."},

what_was_that:{d:13,em:"👀",el:"watching the treeline",ch:"Explanation",
ti:"What Was That?",
tx:`<p>You gesture at the treeline: what was that? The creature's expression shifts into something complicated. It holds up its device. Points at it. Then mimes something wearing a device — a bigger one, different shape — and moving. Searching. The device is not just a navigation beacon. It's also a tracker. And something has been tracking it. Not following the creature — following the specific frequency of the device.</p>
<p>Whatever was in the trees was hunting the device.</p>
<p>The fixed device changes the signal, the creature indicates. Now it's quiet. Whatever was tracking it has lost the frequency. For now.</p>`,
cx:[
  {t:"For now sounds temporary. Get the creature back to its vessel fast.",nx:"vessel_arrives"},
  {t:"Ask what happens if it finds the new frequency.",nx:"what_if_found"},
  {t:"Ask if it's the same as the lights in the sky.",nx:"are_they_yours"},
]},

what_if_found:{d:14,em:"❓",el:"night forest",ch:"Stakes",
ti:"What If It Finds It?",
tx:`<p>You gesture: what if it finds the new frequency? The creature thinks for a moment. Then does something extraordinary: it mimes three stages. First: confusion (it wanders). Second: refocus (it locks onto something new). Third: it points at you. At Sam. At where Mr. Davies would be.</p>
<p>"It switches targets," Sam says quietly. "If it loses the device, it targets the witnesses." A pause. "That's us." "Yes," you say. "That's us."</p>
<p>The creature makes a new sound. Urgent, decisive. It gestures: follow me. To the vessel. Now. It can take you with it to the vessel and bring you back once the threat leaves the area. It's offering to take you aboard its ship.</p>`,
cx:[
  {t:"Yes. Let's go.",nx:"aboard_vessel"},
  {t:"No — get the creature out of here and we'll handle the threat ourselves.",nx:"protect_creature"},
]},

aboard_vessel:{d:17,em:"🛸",el:"inside alien vessel",ch:"Aboard",
ti:"Inside",
tx:`<p>The vessel is warm inside and smells of nothing — not sterile, just clean in a way that suggests the air was made for this specific purpose. The interior is larger than the outside suggests. There are three others of the creature's kind inside — they look at you and Sam with varying expressions of surprise, curiosity, and one that might be mild alarm.</p>
<p>Through a viewport — which is not glass but something that shows you the forest below shrinking away — you watch the thing that was hunting the device emerge into the clearing. It's mechanical. A probe, clearly. It searches the clearing for four minutes, finds nothing, and retreats into the trees.</p>
<p>The vessel descends and returns you to the edge of camp as dawn breaks. Quietly. Gently. Like setting down something it doesn't want to break.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Brief Passenger",
etx:"You went aboard an alien vessel, watched a hunting probe from orbit, and were returned safely at dawn. Nobody will believe you. You have no evidence. But you know, and Sam knows, and that is more than enough."},

patient_wait:{d:13,em:"⏳",el:"waiting inside ship",ch:"Patience",
ti:"Waiting",
tx:`<p>You wait. The creature in the next room moves — you can hear it through the translucent panel — methodically, purposefully. After five minutes it touches the panel from the other side and it becomes transparent. It holds up what is clearly the device — damaged. Then it holds up the device and a question mark — or the gesture equivalent of one. Then it points at you.</p>
<p>It wants to know if you can fix it.</p>`,
cx:[
  {t:"Try. Absolutely try.",nx:"fix_device"},
  {t:"Signal: bring it out here and we'll look together.",nx:"creature_fix_help"},
]},

approach_panel:{d:12,em:"🔆",el:"translucent panel",ch:"The Divide",
ti:"At the Panel",
tx:`<p>You walk up to the translucent panel. The creature on the other side watches you come. You stop about a metre from it. You look at each other through the panel — which isn't glass but seems to transmit heat slightly, like being near a warm window.</p>
<p>You press your palm to the panel. Just to see. The creature looks at your hand. Looks at its own. Very slowly, with the precise care of something being very deliberate, it raises its hand and presses it to the panel from the other side.</p>
<p>The panel disappears.</p>`,
cx:[
  {t:"Don't move. Let it make the next move.",nx:"patient_wait"},
  {t:"Say hello.",nx:"say_name"},
]},

speak_to_screen:{d:14,em:"📺",el:"speaking to camera",ch:"Broadcast",
ti:"Direct to Camera",
tx:`<p>"Hi," you say to the screen. "I know you can see me. We heard your signal. We came to see if something needed help. We're not dangerous." You pause. "We're teenagers on a school trip, honestly. This is — " you gesture around "— a lot more than we expected." A pause. "But we're not scared. Not really. Are you okay?"</p>
<p>The screen changes. The footage of your campsite disappears. Instead there is a face — not a human face, but a face — looking at you from the screen. It makes a sound that the ship helpfully, somehow, translates into English after a two-second delay.</p>
<p><strong>"You are the first of your kind to ask that."</strong></p>`,
cx:[
  {t:"Ask: are you okay?",nx:"ask_are_you_ok"},
  {t:"Ask: how long have you been watching?",nx:"how_long_watching"},
]},

ask_are_you_ok:{d:15,em:"💬",el:"alien face on screen",ch:"Conversation",
ti:"Well? Are You?",
tx:`<p><strong>"We have been in your orbital range for forty-one of your years,"</strong> it says. <strong>"We have experienced eleven equipment failures, four internal disagreements, and one extended period of navigational uncertainty. We have observed your kind for four decades. You are inconsistent, occasionally violent, frequently kind, and regularly surprising. We find you—"</strong> a pause as the translation catches up <strong>"—difficult to stop watching."</strong></p>
<p>Sam sits down. "That's either the nicest thing or the creepiest thing anyone's ever said about us," Sam says. You think about it. "Both," you decide.</p>`,
cx:[
  {t:"Ask: why didn't you make contact before?",nx:"why_no_contact"},
  {t:"Say: we'd like you to stay. But not secretly.",nx:"ask_to_stay"},
  {t:"Ask: the device outside — that's yours, isn't it.",nx:"device_outside"},
]},

how_long_watching:{d:15,em:"⏱️",el:"timeline of observation",ch:"Forty Years",
ti:"Forty-One Years",
tx:`<p>Forty-one years. The screen shifts — you see footage from decades past, the same forest in different seasons, different years. The same campsite clearing, empty. Filling. Changing. Families, hikers, school trips. Always from above, always distant, always just watching. And through it all: the signal, pulsing patiently, waiting for someone to follow it.</p>
<p>"You've been waiting," Sam says. "All this time." <strong>"We have been waiting,"</strong> it confirms, <strong>"for someone who came close enough and curious enough and unafraid enough."</strong> It looks at you both. <strong>"Tonight was the night, apparently."</strong></p>`,
ty:"ending",en:"good",
eti:"★ Ending: Worth the Wait",
etx:"Forty-one years of watching, waiting for exactly the right people. You were the ones. You followed the signal, you asked the right questions, and you treated it like a person. That mattered enormously."},

why_no_contact:{d:15,em:"🌍",el:"earth from above",ch:"The Reason",
ti:"Why Not Before?",
tx:`<p><strong>"Contact requires consent of the contacted,"</strong> it says. <strong>"Your world has not collectively consented. Many individuals have not. We cannot impose presence on an entire civilisation."</strong> A pause. <strong>"But individuals can consent for themselves."</strong> It looks at you. At Sam. <strong>"You followed the signal voluntarily. You came in. You asked questions. That constitutes consent."</strong></p>
<p><strong>"What does consent get us?"</strong> you ask. </p>
<p>It takes its time answering. <strong>"A conversation,"</strong> it says finally. <strong>"And possibly, eventually, considerably more."</strong></p>`,
ty:"ending",en:"weird",
eti:"★ Ending: First Conversation",
etx:"Forty-one years of watching, waiting for someone who consented. You were the ones. This is the beginning of something much larger — but that's for later. Tonight, you had a conversation. That's enough."},

what_tone:{d:11,em:"🤔",el:"alien engineer",ch:"Tone",
ti:"What's Wrong With Organics?",
tx:`<p>"What exactly is your tone with organics?" Sam asks. The constructed figure looks at Sam with what might be respect. "No tone," it says. "Organics is accurate terminology. You are carbon-based self-replicating organisms with limited durability and remarkable adaptability." A pause. "You are extremely good at surviving things that should not be survivable." "Thanks," you say. "I think." "It is a compliment," it says. "We have been watching your species for a long time. We find your stubbornness — " another pause, as if searching for the word " — inspiring is perhaps too strong. Instructive."</p>`,
cx:[
  {t:"Ask what it is, if not organic.",nx:"what_is_it"},
  {t:"Ask how long they've been watching.",nx:"how_long_watching"},
  {t:"Ask if it needs something. It's clearly here for a reason.",nx:"device_outside"},
]},

what_is_it:{d:13,em:"🤖",el:"constructed being",ch:"What Are You?",
ti:"What Are You?",
tx:`<p>"What are you?" you ask. It considers the question seriously. "I am a constructed mind. My body is engineering. My — " a pause " — what you might call personality is emergent. Unplanned." It looks at its hands. "My makers did not anticipate that I would become curious. They built me to navigate and maintain systems. The curiosity arrived later." It looks at you. "You also did not plan to be curious tonight. And here you are."</p>`,
cx:[
  {t:"Ask what it's curious about.",nx:"what_curious"},
  {t:"Ask what its makers wanted it to do.",nx:"davies_leads"},
]},

what_curious:{d:14,em:"🔬",el:"curious gaze",ch:"What It Wants",
ti:"What Are You Curious About?",
tx:`<p>"About you," it says simply. "About what you do when you encounter something outside your experience. Most of your kind — when the signal has reached others — retreated. Called authorities. Refused. You followed it." It tilts its head. "Why?" You think about it. "Because not knowing seemed worse," you say. Sam nods. The constructed mind looks at you both for a very long moment. "That," it says, "is exactly the answer we were hoping for."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Right Answer",
etx:"You were curious when others weren't, brave when the signal asked for bravery, and honest about why. The constructed mind got what it came for — a genuine answer from a genuine person. That's a good ending."},

device_outside:{d:14,em:"📟",el:"device in question",ch:"The Beacon",
ti:"The Beacon",
tx:`<p>"The device outside," you say. "The one on the ground with the signal. That's yours?" The figure — or the face on the screen, or the constructed mind, depending on which branch got you here — indicates yes. "It's damaged," you say. "I know," it says. "Can you tell me where it is exactly?" You describe it. "I cannot retrieve it while stationary," it says. "Retrieving it would require my operator to leave the vessel, which is currently inadvisable, given — " it pauses " — recent developments." "What recent developments?" you ask. And outside, in the forest, something moves.</p>`,
cx:[
  {t:"Go outside and get the device. Bring it here.",nx:"get_device_for_ship"},
  {t:"Ask what the recent developments are first.",nx:"something_behind"},
]},

get_device_for_ship:{d:15,em:"🤲",el:"returning device to ship",ch:"Retrieval",
ti:"Getting It",
tx:`<p>You go out and find the device — not hard, it's still pulsing. You pick it up carefully. It buzzes in your hands, recognising the ship nearby. You bring it back. The face on the screen changes: something like relief, if you've read it right. "Thank you," it says. Simple. Genuine.</p>
<p>The device seals itself the moment it's inside the ship. The signal stops. The ship begins to hum differently — readying, powering up. "We will leave now," it says. "What you experienced tonight—" it pauses "—we will ensure it remains your memory. We do not clear memories without consent. And you have not consented to forgetting."</p>
<p>"No," you say. "I haven't."</p>
<p>"Good," it says. "Remember."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Keep It",
etx:"You helped them leave, and they let you keep the memory. All of it. In a world that would prefer you to be quiet about this, you know what you saw. That is the most extraordinary thing you will ever own."},

how_stop:{d:12,em:"🛑",el:"urgent moment",ch:"Solution",
ti:"How Do We Stop This?",
tx:`<p>In gestures, in their two-word vocabulary, in mime and expression and pointing: the creature explains. The device sends a specific frequency that tells the retrieval vessel: <em>do not retrieve, operator present and functional.</em> Without it, the retrieval vessel follows its programming: collect everything. But if the device is repaired and signals before the vessel arrives, it will abort.</p>
<p>Simple. Urgent.</p>`,
cx:[
  {t:"Fix the device. Now.",nx:"fix_device"},
  {t:"You can't fix it. But you can create a decoy signal.",nx:"decoy_signal"},
]},

decoy_signal:{d:13,em:"📻",el:"phone and device",ch:"Improvisation",
ti:"Fake It",
tx:`<p>"What if," Sam says slowly, "we don't fix it — we fake the signal? If the retrieval vessel is looking for a specific frequency, could we broadcast something close enough to fool it?" You look at the device. "I don't know the exact frequency." Sam holds up a phone. "The phone can analyse audio. If we hold it to the device for ten seconds—" The creature watches this exchange with what seems to be intense, hopeful focus. It seems to understand what you're trying to do even if not the specifics.</p>`,
cx:[
  {t:"Try it. Hold the phone to the device and analyse the signal.",nx:"phone_fix"},
  {t:"This is too risky. Fix the device properly instead.",nx:"fix_device"},
]},

other_humans:{d:11,em:"🔦",el:"forest at night",ch:"Possibility",
ti:"What If It's Us?",
tx:`<p>"What if what's coming," you say slowly, "is more like us? Humans. Government people. Agents." The creature looks at you. The expression shifts — complicated. It makes a gesture: possible. Then it makes a different gesture: worse. Not better. Worse. "Oh," Sam says. "It prefers the other ships to whatever humans would send." "Yes," you say. "I think the alien retrieval protocol involves cataloguing. What our lot would do is—" "Worse," Sam finishes. You both look at the creature. "Okay," you say. "Priority one: get this device fixed and get you home before either of them arrive."</p>`,
cx:[
  {t:"Fix the device. Fast.",nx:"fix_device"},
  {t:"Get the creature to a hiding spot first, then fix the device.",nx:"run_together"},
]},

why_seven:{d:13,em:"7️⃣",el:"seven-beat signal",ch:"The Number",
ti:"Seven",
tx:`<p>Mr. Davies makes a sound of understanding. "Seven," he says. "Prime number. Universal mathematical constant. You're telling us you use base-seven mathematics." The creature makes its resonating sound. Points at Mr. Davies with what seems like genuine approval. "Do they all know mathematics?" it asks — in sound, which somehow you're starting to understand. "Most of us," Mr. Davies says. "To varying degrees." "Can you—" it gestures at a panel, which lights up with shapes " — read these?"</p>
<p>They're equations. Not human equations. But mathematics.</p>`,
cx:[
  {t:"Mr. Davies can. He leans in and starts working.",nx:"davies_maths"},
  {t:"You can follow most of it. Pitch in.",nx:"signal_pattern"},
]},

davies_maths:{d:15,em:"📐",el:"alien mathematics",ch:"Maths",
ti:"Mr. Davies Does Maths With An Alien",
tx:`<p>For the next forty minutes, Mr. Davies and the creature work through equations on the panel. You and Sam watch. The equations are about the device — its frequency, its power requirements, the specific harmonic needed to seal the casing properly. Mr. Davies has a camping notebook and he fills six pages. The creature fills three panels. At the end of it, Mr. Davies turns to you and says: "Alex, you have the compass. I need the magnet from it." You give it to him without a word. He presses it to the device at a precise angle for thirty-three seconds. The device seals.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Maths Works",
etx:"A geography teacher and an alien worked out the physics of faster-than-light communication using a camping notebook and a compass magnet. The device was fixed, the vessel departed, and Mr. Davies filled a notebook with equations he will spend the rest of his life thinking about."},

ask_your_question:{d:13,em:"❓",el:"face to face communication",ch:"Your Turn",
ti:"Your Question",
tx:`<p>The creature has been asking questions in its way. Now you ask yours. You point up at the sky. Point at the creature. Then spread your hands wide — the universal gesture of how many, how far. The creature tilts its head. Considers. Then begins to indicate with its fingers — small numbers, then larger, then gestures that suggest something much larger than fingers can represent. Then it does something that takes your breath away: it draws — in the air, with one glowing fingertip — a rough map. Stars. Positions. Distances. And dozens of points, distributed across it. Not alone. Not close. But there.</p>
<p>A lot of them.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: You're Not Alone",
etx:"You asked the question humanity has been asking for centuries. You got the answer in a forest at 2am on a school camping trip. The universe is full. You know it now. What you do with that knowledge is entirely up to you."},

teach_words:{d:13,em:"📚",el:"impromptu language lesson",ch:"Language",
ti:"Lesson",
tx:`<p>You teach it. Help — and you mime helping, lifting, supporting. Danger — and you mime running, fear, looking around. Friend — and you put your hand on your chest, then gesture between yourself and Sam, then gesture towards the creature.</p>
<p>Bree — you've decided to call it Bree — picks up each word with stunning speed. By the fourth word it's anticipating the mime before you finish it. By the seventh it's offering words back: sounds for things you can't immediately mime, things it's trying to explain that don't have human equivalents. You are building something new between you, word by word, in the dark.</p>
<p>By midnight you can hold a basic conversation. By 2am the device is fixed. By 3am Bree has to leave.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: First Words",
etx:"You built a language with a stranger. Not much of one — but the first. Every language that has ever existed started the same way: two beings trying to be understood. You started one tonight. That's not nothing. That's everything."},

show_earth:{d:13,em:"🌍",el:"phone screen in moonlight",ch:"A Photo of Home",
ti:"Here. Look.",
tx:`<p>You find a photo on your phone: Earth from space. The one everyone knows — the blue marble, taken from the Apollo missions. You hold it up to the creature. It leans forward. Its eyes — wide, dark — reflect the screen. It reaches out and, very carefully, touches the edge of the phone. Tilts it slightly. Looks at the image from different angles. Then looks at you. Then at the sky. Then at you again. It makes a sound that you will spend years trying to describe and never quite manage. Something between recognition and awe and sorrow and a question all at once.</p>`,
cx:[
  {t:"Show it more photos. The world. People. Cities. Animals.",nx:"more_photos"},
  {t:"Ask — in gestures — if it has an equivalent. A home-image.",nx:"its_home"},
]},

more_photos:{d:15,em:"📸",el:"photo gallery",ch:"The World",
ti:"The Gallery",
tx:`<p>You scroll through your camera roll. Cities. Animals. Your family. The sea. Mountains. Food. Other people. Crowds. Quiet rooms. Sports. Concerts. The creature looks at every single one with the same precise, unhurried attention. It is building a picture, you realise — not of you specifically, but of the world you come from. The full impossible variety of it. Halfway through your camera roll it stops you. Points at a photo of a crowd at a football match — hundreds of people moving together, bright colours, joy.</p>
<p>It makes a sound. Points at itself. Makes the sound again. Points at you. Points at the photo.</p>
<p>"Yes," Sam says quietly. "They have that too."</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Same",
etx:"Across every difference of biology and origin and language and light-years — the same impulse: gather together, cheer for something, be loud about being alive. You showed it your world and it saw itself in the crowd. That's contact."},

its_home:{d:14,em:"🌌",el:"alien home world",ch:"Reciprocal",
ti:"Show Me Yours",
tx:`<p>The creature understands the gesture immediately. It produces the device — not the broken beacon, another object — and projects from it a light that forms into an image. Not a photo. A memory-recording of some kind. Three suns. A planet with a surface that seems to shift between solid and liquid, iridescent. Something that might be a city, built vertically rather than horizontally. And full — teeming with creatures like this one, going about lives that are utterly alien and recognisably busy.</p>
<p>You look at someone's home. They showed you their home.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: Three Suns",
etx:"They showed you where they're from. You showed them where you're from. In the middle of the night, in a forest, on a school trip — two kinds of people showed each other home. There's nothing bigger than that."},

handshake_alien:{d:13,em:"🤝",el:"two hands extended",ch:"Contact",
ti:"A Handshake",
tx:`<p>You reach out your hand, palm forward, fingers up. The classic offer: shake? The creature looks at your hand. Its hand has three very long fingers. It extends its arm — slowly, deliberately — and wraps those fingers around yours, loosely, without squeezing. A held handshake rather than a shaken one. It's warm. Warmer than you expected. It holds for about five seconds. Then releases.</p>
<p>Sam exhales slowly beside you. "Did you just—" "Yes," you say. "I think I did." The creature makes a soft sound. It doesn't need to be translated. You both know.</p>`,
cx:[
  {t:"Introduce yourself properly now.",nx:"say_name"},
  {t:"Sit back down. The important thing already happened.",nx:"sit_with_alien"},
]},

offer_help:{d:12,em:"🙋",el:"offering help",ch:"Volunteering",
ti:"I'll Help",
tx:`<p>You point at the device. Point at the crack. Point at yourself. The creature hesitates — one beat of consideration — then gently holds the device out to you. You take it carefully. It buzzes in your hands. The crack is visible: a magnetic seal that's lost cohesion. "Compass magnet," Sam says immediately, already opening the toolkit. You nod. Together you extract the neodymium magnet and press it to the crack at the angle that feels right. The seal closes. The device sings. The creature makes its bright resonating sound. Above the trees, something changes direction.</p>`,
cx:[
  {t:"What just changed up there?",nx:"sky_clearing"},
  {t:"The creature is moving — it needs to go. Now.",nx:"creature_leaves"},
]},

point_at_sky:{d:12,em:"☝️",el:"pointing upward",ch:"Origin",
ti:"From There?",
tx:`<p>You point at the sky. The creature follows your finger up. Then nods. Makes a gesture: far. Very far. Then makes a sound and pauses. Then makes another sound — three syllables — and touches the device. Touches itself. Looks at you. "The device is from where it's from," Sam says quietly. "Not just a tool — it's home. It's from home." The creature picks up on something in Sam's tone and looks at Sam carefully. It makes a sound — a question. "Do you miss it?" Sam asks. Quietly. And the creature's expression — which is not a face but functions as one — shifts into something that doesn't need translation at all.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Homesick",
etx:"You found out where it's from. You understood, without words, that it misses home. It fixed its device, it left, it went back. And you stood in the forest and felt that too — that feeling of missing somewhere you belong. Some things are universal."},

sam_navigates:{d:14,em:"🧭",el:"sam at the navigation ring",ch:"Sam's Talent",
ti:"Sam's Got This",
tx:`<p>Sam picks up the navigation ring and turns it over in their hands. Then turns it again. Then again, in a different axis. The girl with the telescope — whose name is Cora, you learn — watches Sam with growing respect. "You've done this before," Cora says. "Not this specifically," Sam says. "But I do puzzles. And I sail a dinghy." "A dinghy," Cora repeats. "Yes," Sam says. "The geometry's similar but smaller." Cora looks at you. "Your friend is going to be exceptional at this." You already knew that.</p>`,
cx:[
  {t:"Join Sam. You're doing this together.",nx:"join_crew"},
  {t:"Ask Cora about herself while Sam practices.",nx:"why_she_stays"},
]},

join_navigation:{d:14,em:"📐",el:"navigation rings",ch:"Navigator",
ti:"Learning the Rings",
tx:`<p>You learn the navigation rings over the next hour. It's the most complicated thing you've ever done. The rings create a geometric orientation relative to the Underchart's moving geometry — you have to feel the fold-direction, keep the rings perpendicular to it, adjust as the chart shifts. After thirty minutes your arms ache. After an hour you've stopped thinking about it consciously. It's become something else: instinct. Cora watches from across the deck. "You're a natural," she says simply. Not a compliment — an assessment.</p>`,
cx:[
  {t:"Ask Cora what happens when you get to where you're going.",nx:"ship_destination"},
  {t:"Something surfaces in the underground sea beside the ship.",nx:"creature_in_water"},
]},

why_she_stays:{d:14,em:"⚓",el:"cora at the rail",ch:"Reasons",
ti:"Why Stay?",
tx:`<p>"Why do you stay?" you ask Cora. She looks out at the underground sea for a moment. "I went down originally by accident," she says. "Three years ago, surface time. About a month for me." She pauses. "When I got back to the surface everything was — the same. My family, my room, my school. Exactly the same. And I—" she stops. "Wasn't the same anymore. The Underchart does that. Adjusts you." She looks at you. "I went back down after two weeks. I think I live here now." She says it without sadness. Just as a fact. "Do you miss it?" Sam asks. "Sometimes," she says. "But I belong here more."</p>`,
cx:[
  {t:"Ask if she'll ever go back permanently.",nx:"join_crew"},
  {t:"Ask what the adjustment feels like.",nx:"what_adjustment"},
]},

what_adjustment:{d:14,em:"🌊",el:"underground sea",ch:"Changed",
ti:"What Does It Feel Like?",
tx:`<p>"Like something got bigger," she says. "Not your body. The part that's aware. Like before I had a window and now I have — " she looks for the word " — more window." She pauses. "It sounds vague. But you'll know it when it happens to you." "Is it happening to us?" Sam asks. She looks at Sam thoughtfully. "You came down. You're asking the right questions. You picked up the navigation ring." A pause. "Yes," she says. "It's already starting."</p>`,
cx:[
  {t:"Go along with this. See what the adjustment is.",nx:"join_crew"},
  {t:"Ask how to get back to the surface before it goes too far.",nx:"can_go_back"},
]},

nav_ring:{d:14,em:"⭕",el:"navigation ring",ch:"Explanation",
ti:"What's a Navigation Ring?",
tx:`<p>"A navigation ring," the captain explains, "holds the ship in correct orientation relative to the Underchart's geometry. The chart moves — not quickly, but continuously — and without constant correction the ship loses its path and enters a fold-loop. Fold-loops are — " a brief pause " — inadvisable." She holds up the ring. "Two rings, held by two people in calibrated positions. The rings triangulate the correct bearing. Simple in theory." She looks at you. "Less simple in practice. But most people manage within a day." "We only have a few hours," Sam says. "Then you'll manage within a few hours," she says.  </p>`,
cx:[
  {t:"Do it. Both of you.",nx:"join_crew"},
  {t:"You'll do it. Tell Sam to look around the ship.",nx:"join_navigation"},
]},

can_go_back:{d:13,em:"🪜",el:"ladder to surface",ch:"Return",
ti:"Can You Go Back?",
tx:`<p>"Of course," the captain says. "The Underchart doesn't trap people. Not intentionally." A pause that suggests sometimes it does accidentally. "We haven't been able to go back because the fold-exit above this location closed before we could align the ship. But it has opened again — that is why you were able to come down." She looks at you. "If you went back now, you could go. Your lives above would be intact." Another pause. "Or you sail with us to the Seventh Compression and come back with more time below you." She waits. "Your choice. We do not pressure. Pressure is against the charter."</p>`,
cx:[
  {t:"Sail with them. The Seventh Compression sounds worth it.",nx:"join_quest"},
  {t:"Go back now. You have a camping trip and a whole life.",nx:"choose_mundane"},
  {t:"Ask what more time below actually means for you.",nx:"what_adjustment"},
]},

what_looking_for:{d:13,em:"🔮",el:"deep water",ch:"The Goal",
ti:"What Are You Looking For?",
tx:`<p>"Records," the captain says. "And something else." She pauses. "In the Underchart, every significant choice made by any thinking being above leaves an echo. Not a physical thing — more like a pattern in the geometry. We've been trying to read those patterns for four hundred years." She looks at you steadily. "You two chose to come down. That created a pattern. I'd like to show you what it looks like." She gestures at a panel. The image on it is complex, geometric, beautiful — and somewhere in it, a new shape, fresh and bright, that wasn't there an hour ago. "That's you," she says. "And it's — remarkable."</p>`,
cx:[
  {t:"Ask what makes it remarkable.",nx:"join_quest"},
  {t:"You want to see more of it. Stay and sail.",nx:"join_crew"},
]},

join_quest:{d:16,em:"⛵",el:"sailing the underchart",ch:"The Quest",
ti:"All Right. Let's Go.",
tx:`<p>The Permanent Exception sails. You navigate — or you try to, and Sam covers for your mistakes, and Cora covers for Sam's, and somehow the ship holds its course. The underground ocean is extraordinary: bioluminescent currents, sounds from impossibly deep below, occasional vast shapes that surface briefly and dive again. You don't sleep. You don't want to. Every hour is different from the last.</p>
<p>You reach the Seventh Compression at what would be dawn on the surface. The island rises from the sea as you watch — real-time geology, compressed time, the Underchart showing off. And on its shore, waiting, is what you came for: the records. Four hundred years of below-surface truth, written in a language you are somehow, slowly, beginning to read.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Long Way Round",
etx:"You took the long route, the strange route, the one that required a navigation ring and a leap of faith and an underground sea. The records are real, the discovery is real, and you will come back to the surface changed — but more yourself than you've ever been."},

captain_name:{d:13,em:"👤",el:"white-haired captain",ch:"Names",
ti:"Who Are You?",
tx:`<p>"What's your name?" you ask. She looks at you for a moment. "Captain Elara Voss," she says. "Originally from Amsterdam. 1683." She says it with no drama, like saying you're from Birmingham. "You've been here since 1683?" Sam asks slowly. She nods. "Time folds," she says simply. "I am thirty-four years old and four hundred years old simultaneously. It becomes easier to understand the longer you are below." She looks at you. "You have already been here long enough for it to start. Can you feel it?" And you realise, with a start, that you can. Something — bigger. More window.</p>`,
cx:[
  {t:"Sail with her. You want to know what more of this feels like.",nx:"join_crew"},
  {t:"Ask what 1683 Amsterdam was like. You've always wondered.",nx:"join_quest"},
]},

other_way_out:{d:12,em:"🚪",el:"finding another exit",ch:"Alternatives",
ti:"Another Way",
tx:`<p>"There are three exits from this level," the woman on the barrel says. "The ladder — which you used. A sinkhole about a kilometre north that opens unpredictably. And the moon-pool." She nods toward the ship. "The Permanent Exception can surface through a moon-pool exit if the geometry is right. Which it is, tonight, apparently." She looks at you carefully. "You're already thinking about leaving." "I'm always thinking about exits," you say. She smiles. "Good," she says. "That's how you survive the Underchart. Know your exits. Don't panic. And never, ever swim in the deep water."</p>`,
cx:[
  {t:"Ask about the moon-pool. How does the ship surface?",nx:"ship_resolution"},
  {t:"Ask about the deep water. Why not swim?",nx:"deep_water"},
]},

deep_water:{d:13,em:"🌊",el:"very deep dark water",ch:"Below the Below",
ti:"Don't Swim",
tx:`<p>"The Underchart has layers," she says. "The upper layer is navigable, strange, manageable. The lower layer—" She pauses. "The lower layer has been there much longer. Before us. Before anything surface-adjacent. It's not hostile. It's just — other. Very other. Things that go into the deep water come back different, if they come back." She pauses again. "One of our crew went in once. She came back. But she knew things she hadn't known before, and didn't know some things she had known before. She's fine. She's just—" A final pause. "adjusted."</p>`,
cx:[
  {t:"Ask what she knew after.",nx:"what_adjustment"},
  {t:"Ask if you can see the deep water from the ship.",nx:"creature_in_water"},
]},

creature_in_water:{d:14,em:"🌊",el:"something surfacing",ch:"Below",
ti:"Something Surfaces",
tx:`<p>Twenty metres off the bow, something breaks the surface. It's large — the size of a house — and slow, and utterly unconcerned by the ship. It turns one vast eye towards the deck, observes you for about five seconds, and then descends without sound. The water closes over it and leaves barely a ripple.</p>
<p>Cora watches it go. "Old one," she says. "They surface sometimes. Never hostile — just passing through." She looks at you. "The deep water is full of them. They're older than anything on the surface. They're what the Underchart was, before anyone else came along." She pauses. "I think they find us amusing."</p>`,
cx:[
  {t:"Ask if you can talk to one.",nx:"join_quest"},
  {t:"You're content just to have seen it. Keep sailing.",nx:"final_destination"},
]},

ships_library:{d:14,em:"📚",el:"ship's library",ch:"The Archive",
ti:"Sam Found Something",
tx:`<p>Sam calls you below deck. The ship has a library — which is absurd and perfect. Shelf after shelf of books, maps, journals, written in perhaps thirty different languages, spanning four hundred years of below-surface exploration. Sam has found something specific: a slim volume, handwritten, in English, titled <em>A Practical Guide to Surface Re-Entry for the Undercharted.</em> By someone named E. Voss. 1791. "Voss," Sam says. "The captain's name is Voss." "Yes," you say. "And the captain has been here since 1683." Sam looks at the book. "So this was written by—" "A later Voss," you say. "Or an earlier one. Time folds."</p>`,
cy:[
  {t:"Read the guide. How do you get back?",nx:"can_go_back"},
  {t:"Bring the book to the captain.",nx:"final_destination"},
]},

find_sam_ship:{d:13,em:"👫",el:"deck of ship",ch:"Together",
ti:"Finding Sam",
tx:`<p>You find Sam at the bow, leaning on the rail, looking out at the underground sea. Sam turns when you arrive. "Are we okay?" Sam asks. "Probably," you say. "Are we going along with this?" "Apparently," you say. Sam looks back at the sea. "I'm glad it's you," Sam says. "Here, I mean. For this." "Same," you say. You lean on the rail together. Below you the bioluminescent currents shift and pulse, lighting the darkness from underneath, turning the black water blue and green and gold. Something vast and slow passes under the hull. You watch it go.</p>`,
cx:[
  {t:"This is enough. Ask how to get back to the surface.",nx:"can_go_back"},
  {t:"No. Let's see where the ship is going.",nx:"ship_destination"},
]},

down_corridor:{d:13,em:"⛵",el:"corridor leading down",ch:"Below",
ti:"Down",
tx:`<p>The corridor spirals down, cut into stone, lit by something that is not torches but resembles them. You can hear the sea getting louder with every turn. After five minutes the corridor opens onto a stone dock. And at the dock — the ship. The Permanent Exception, enormous and impossible, her geometric hull-carvings glowing in the dark.</p>
<p>On the dock beside her, a man in a coat is arguing with a woman holding a telescope about the best approach to the Seventh Compression. Neither of them notices you immediately.</p>`,
cx:[
  {t:"Interrupt the argument. You have questions.",nx:"running_low"},
  {t:"Don't interrupt. Walk to the ship and look at the hull.",nx:"see_the_ship"},
  {t:"The telescope woman notices you first.",nx:"look_at_map"},
]},

hear_voices:{d:12,em:"👂",el:"voices below",ch:"Listening",
ti:"Listening",
tx:`<p>You hear two voices — one arguing about geometry, one arguing about time. "—can't use dead reckoning in a space that doesn't have consistent directionality—" "—that's exactly what dead reckoning was designed for—" "—no it wasn't—" The argument is technical and completely incomprehensible and somehow reassuring. People arguing about navigation are not immediately threatening. "Let's go in," Sam says. "Agreed," you say.</p>`,
cx:[
  {t:"Go down the corridor.",nx:"down_corridor"},
  {t:"Call down: hello?",nx:"whos_there"},
]},

fin_knowledge:{d:12,em:"📖",el:"finn talking fast",ch:"Information",
ti:"What Finn Knows",
tx:`<p>Finn knows: the ship's schedule (it sails at six-hour intervals), the three surface exit points (one here, one in the North Sea, one somewhere in Siberia), the captain's preferred route to the Seventh Compression, and the name and function of every crew member. He also knows that the Underchart has been getting narrower for the last eighteen months — something is compressing it from above. He doesn't know what. "That's why I'm trying to get back," he says. "Someone on the surface needs to know. But I can't get back alone." He looks at you. "Two people can open the exit from above. One can't."</p>`,
cx:[
  {t:"Help him. Open the exit.",nx:"reopen_hole"},
  {t:"Go down and see this for yourself first.",nx:"climb_down"},
]},

reopen_hole:{d:14,em:"🕳️",el:"reopening the passage",ch:"The Exit",
ti:"Open It",
tx:`<p>Finn explains: the exit is a geometric fold in the boundary between below and above. Two people standing at exactly the right angle to each other, holding the boundary open between them — it's structural, not mechanical. Like holding a door open with your body rather than your hand. You and Sam position yourselves as Finn directs: two metres apart, arms out, parallel to the fold-line. It takes three attempts. On the third, something shifts — a feeling like pressure equalising — and the hole appears. Bigger this time. Stable.</p>
<p>Finn comes through. Below, you hear a ship's bell ringing. The crew knows the exit is open.</p>`,
cy:[
  {t:"Wait and see how many people come through.",nx:"ship_resolution"},
  {t:"Go down yourself while the exit is open.",nx:"climb_down"},
]},

ship_controls:{d:13,em:"🎛️",el:"alien control panel",ch:"Controls",
ti:"Can You Work It?",
tx:`<p>You find a panel with what are clearly controls — but not labelled in any language, designed for hands with different proportions, with feedback systems you don't understand. You try anyway. One control does nothing visible. Another dims the lights, which you reverse immediately. A third causes the screen to cycle through dozens of locations — all on Earth, all live, all different angles.</p>
<p>You land on your campsite. Your tents. Mr. Davies's torch moving between them. He's noticed you're missing.</p>`,
cx:[
  {t:"This is your signal to go back. Right now.",nx:"get_device_for_ship"},
  {t:"Try to use the panel to show Mr. Davies you're okay.",nx:"signal_davies"},
]},

signal_davies:{d:14,em:"💡",el:"signal to camp",ch:"Communication",
ti:"Sending a Signal",
tx:`<p>You point the camera function at your campsite and then — this is a long shot — tap yourself on the screen and wave. The camera seems to understand: a light comes on at the campsite. Focused. Just on one tent. Mr. Davies stops. Looks at it. The light blinks: three times. A pause. Three times. He watches for a moment, then does something extraordinary: he blinks his torch back. Three times.</p>
<p>"He knows we're okay," Sam says. You feel something unclench in your chest. "He trusts us," you say. "Yeah," Sam says. "He does." The face on the main screen makes a sound that might be approval.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Trusted",
etx:"You found a way to tell someone you were okay, and he trusted you enough to let you be. You had an adventure beyond all imagining and came back to find that the most extraordinary thing was that someone was waiting, and confident you'd return."},

chair_thing:{d:12,em:"🪑",el:"sam in a chair",ch:"Equipment",
ti:"The Chair",
tx:`<p>Sam's chair begins to move. Not dangerously — it rotates slowly until Sam is facing a panel that has lit up. The panel shows a kind of diagram: the ship, the forest, a route between them. Sam looks at it. "Is this—" Sam begins. "A map," you finish. Sam turns the chair — it moves with them, responsive — and the map rotates to match. Sam reaches out and touches a point on the map. The ship vibrates very slightly. "Sorry," Sam says, to no one in particular. From the other room, the translated voice says: <strong>"That was helpful. Thank you."</strong></p>`,
cx:[
  {t:"Ask what Sam just did.",nx:"signal_pattern"},
  {t:"Sam is apparently flying the ship now. This seems fine.",nx:"aboard_vessel"},
]},

next_room:{d:13,em:"🚪",el:"room beyond panel",ch:"Exploration",
ti:"The Other Room",
tx:`<p>You find the panel-door and step through. The next room is different: warm, dimly lit, full of objects that are clearly personal — not equipment, but things kept because they matter. Rocks from somewhere. Images, non-photographic, that seem to be memory-recordings. And in the centre, the creature itself, sitting, working on something. It looks up. You look at each other. It picks up one of the memory-recordings and — hesitantly, like offering something fragile — holds it out to you.</p>`,
cx:[
  {t:"Take it and look.",nx:"its_home"},
  {t:"Sit down nearby. You're not going to take anything. But you'd like to stay.",nx:"sit_with_alien"},
]},

how_hold_open:{d:12,em:"🕳️",el:"geometric fold",ch:"Mechanics",
ti:"What Does That Mean?",
tx:`<p>"The fold between above and below is a geometric boundary," Finn explains, speaking fast. "It holds itself closed by default. To open it you need to create a counter-geometry — two people positioned correctly create a standing wave that holds the fold open long enough for others to pass." He draws it in the dirt. "You stand here and here — exactly two metres apart, arms out to your sides. You'll feel it. When you do, don't move." He looks at you. "It only works with two people. One person can't generate the wave alone. That's why I've been stuck."</p>`,
cx:[
  {t:"Do it. You and Sam stand two metres apart.",nx:"reopen_hole"},
  {t:"How long can you hold it open?",nx:"help_finn"},
]},

do_they_want_back:{d:13,em:"⚓",el:"crew on deck",ch:"The Question",
ti:"Do They Want to Return?",
tx:`<p>You ask Finn: do they actually want to go back? He pauses. "I think — most of them. The captain, I'm not sure. She's been here four hundred years. Up there is nothing she recognises. Her language has barely surviving descendants. Everyone she knew is dead six times over." He pauses. "But the others — yes. They want to see the sky. Real sky." He looks at you. "Even if they don't stay. Even if they come back down after a week. They just want to see it once more." A pause. "That's enough reason, isn't it?"</p>`,
cx:[
  {t:"Yes. Let's open the exit.",nx:"reopen_hole"},
  {t:"Ask the captain first. She should decide.",nx:"captain_name"},
]},

wait_and_see:{d:12,em:"⏳",el:"watching from distance",ch:"Observation",
ti:"Official Advice",
tx:`<p>You watch from the camp edge. The ship — or whatever it is — sits in the forest for about twenty minutes. Nothing happens. Then it simply isn't there anymore. Not a dramatic departure — just: was, then wasn't. The trees around where it sat remain bent. The ground will be flattened for weeks. You go and look in the morning. The grass is indented in a perfect circle. You put your hand in the indent. It's still warm.</p>`,
cx:[
  {t:"Come back every night for a week. See if it returns.",nx:"wait_for_dawn"},
  {t:"Tell someone. This needs to be on record.",nx:"tell_everyone"},
]},

tell_everyone:{d:10,em:"📢",el:"telling the story",ch:"After",
ti:"Going Public",
tx:`<p>You tell everyone. Sam backs up every detail. Mr. Davies gives a factual account to the ranger station, who file it under a category whose name you are not told. A journalist finds out — it was going to happen — and the story runs. It is dismissed, then mocked, then quietly investigated by people who don't give their names. The flattened grass is analysed. The bent trees are studied. Nothing conclusive is found.</p>
<p>But you know what you saw. And Sam knows. And Mr. Davies knows, and never says it directly, but never denies it either. And three years later, a researcher sends you an email containing a single attachment: a frequency analysis of the signal, matched against forty-three other recordings from thirty-nine countries over sixty years. All the same signal. All the same source.</p>
<p>You were not the first. You were just the first to get close enough.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: On Record",
etx:"You told the truth about what you saw and stuck to it. The world didn't believe you right away — it never does. But you got closer to first contact than almost anyone, and now it's on record. Permanently. That matters."},

secret_ending:{d:10,em:"🌙",el:"quiet night",ch:"The Secret",
ti:"Just You Two",
tx:`<p>You tell no one. It's not fear — it's something more like respect. Whatever that was, it came quietly and left quietly, and it seemed to want to be left that way. You and Sam have a private vocabulary now: words for things that don't have human names. You use them sometimes, in class, in passing. Teachers never know. It becomes a kind of code. A reminder that you carry something real and strange between you, and the world around you is much larger than it appears.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Private Universe",
etx:"Some things are just for you. Not every truth needs to be public. You and Sam have something that belongs to you alone — a real, verified, private universe. That's not nothing. That's extraordinary."},

davies_knows:{d:11,em:"🧑‍🏫",el:"teacher with tea",ch:"Mr. Davies",
ti:"He Already Knows",
tx:`<p>You find Mr. Davies sitting outside his tent in the pre-dawn dark, holding two mugs of camp tea. He hands you one without speaking. Sam takes the other. You sit down. After a minute: "I was awake," he says. "I saw some of it. The lights. The — departure." He wraps both hands around his mug. "I've been sitting here trying to decide how I feel about it." A pause. "I think I feel lucky," he says. "I think the correct feeling is lucky." He looks at the sky. "Are you both all right?" "Yes," you say. "Yes," Sam says. "Good," he says. "Good." And that's all. You watch the dawn come in together.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Three of Us",
etx:"He knew. He saw enough to know. And he made tea and asked if you were all right and that is, it turns out, exactly what you needed. Some adults are extraordinary. You found one."},

creature_stayed:{d:13,em:"👽",el:"creature waiting",ch:"Still Here",
ti:"It Didn't Leave",
tx:`<p>The creature is sitting at the edge of the clearing, cross-legged again, the device in its lap. It looks at you. It doesn't look like it's about to go anywhere. You walk over and sit down too. Sam sits on your other side. The sky above is clear and full of stars.</p>
<p>The creature looks up at the stars. You look up at the stars. After a while it makes a sound — the quiet comfortable kind of sound that means nothing specific but means: this is good. This is okay. The three of you sit under the stars for another hour. Then the creature stands, inclines its head — once, deliberately — and walks into the trees. This time it doesn't come back. But for an hour, it sat with you under the same sky, and that was enough.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: An Hour Together",
etx:"It chose to stay for a while. So did you. No agenda, no urgency, just two kinds of people under the same stars. You'll spend a long time thinking about that hour. It'll be worth it."},

follow_creature:{d:13,em:"🌲",el:"following into trees",ch:"Following",
ti:"Into the Trees",
tx:`<p>You follow. The creature moves steadily through the trees, not looking back but adjusting its pace so you can keep up. It leads you for about two hundred metres to a small clearing you've never seen — off any marked path, unfindable without a guide. In the centre of the clearing: a ring of stones, arranged in a precise geometric pattern, very old, covered in the same symbols as the alien device. Long, long before tonight, something was here before.</p>
<p>The creature stands in the centre of the ring. Makes its resonating sound. Looks at you. Points down at the symbols. Points at itself. Points at the sky. Points at you.</p>
<p>It's telling you something about a shared history. Yours and its kind. Much longer than a night.</p>`,
ty:"ending",en:"weird",
eti:"★ Ending: Older Than Tonight",
etx:"They were here before. Long before. The stone ring, the symbols, the geometry — all of it predates everything you know. This wasn't first contact. This was a reunion. The universe just got a lot older and a lot stranger and a lot more yours."},

clearing_remains:{d:13,em:"✨",el:"empty clearing",ch:"After",
ti:"What's Left",
tx:`<p>The clearing where you found the creature is quiet. The device is gone, obviously. The flattened grass from whatever the vessel did on landing. But there's something else — in the exact centre of the clearing, pressed into the earth as if by precise, deliberate pressure: a symbol. The same one from the device. Not scratched in — pressed, somehow, a centimetre deep in the soil without disturbing the surrounding grass. Perfect. Permanent. Like a signature.</p>
<p>Sam photographs it. You look at it for a long time. In the morning you'll show Mr. Davies. Researchers will eventually find it, study it, fail to explain it. You'll see it in journals and papers for years. It'll always be described as "origin unknown." But you know the origin. You were there when it was made.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Signature",
etx:"It left its mark. On purpose. Deliberately. As a record that it was here, that you were here together, that something happened tonight. That's not nothing. That's a permanent record in the earth. You're in it."},

davies_calm:{d:13,em:"🤔",el:"mr davies being unreasonably calm",ch:"Backstory",
ti:"How Is He This Calm?",
tx:`<p>"How are you this calm?" you ask. Mr. Davies considers this for a moment. "I'm not, particularly," he says. "But panic doesn't help." A pause. "Also—" he stops. "Also?" you prompt. "When I was about your age," he says, "I saw something. In a field near my grandmother's house. I could never explain it." He doesn't elaborate. "You never told anyone?" "Who would I have told?" he says. He looks at the creature. "I've been waiting, I think, for this to make sense." Another pause. "It doesn't, completely. But it makes more sense than nothing."</p>`,
cx:[
  {t:"Ask what he saw in the field.",nx:"davies_leads"},
  {t:"This seems like enough for now. Let him handle the negotiation.",nx:"davies_leads"},
]},

creature_message:{d:14,em:"👽",el:"alien gesture",ch:"Message",
ti:"It's Saying Something",
tx:`<p>The creature's hand on your shoulder is warm and steady. It turns you — gently, but definitely — so you're facing away from the agents. It puts something in your hand: the device. Repaired now, fully sealed, signal clean. Then it makes a gesture you understand completely: <em>give this to them, and they'll leave. It's what they want. A sample. An artefact. Give them something to study and they'll leave, and you'll all be safe, and I can still get home.</em></p>
<p>"You want us to give them the device," Sam says slowly. The creature nods. Sam looks at you. "It's giving up the device. To protect us." "And itself," you say. "The vessel is still coming." "Can it still get home without it?" you ask the creature. It considers. Nods: yes, but barely. Harder. Longer. But possible.</p>`,
cx:[
  {t:"Give the device to the agents. Let the creature get home the hard way.",nx:"stall_for_time"},
  {t:"Don't. Protect the creature and find another way.",nx:"protect_creature"},
]},

who_are_agents:{d:12,em:"🕵️",el:"agents in black",ch:"Who?",
ti:"Who Are You?",
tx:`<p>"Who are you?" you ask directly. The figure pauses. Then: "We work for a government scientific body. We've been monitoring anomalous signals in this forest for eleven months." They look past you at the creature. "This is the first confirmed visual contact." They are very careful about their language, you notice. Confirmed visual contact. Not alien, not creature. Just: confirmation. "Are you going to detain it?" you ask. Another pause. "We're going to assess it." "That's not an answer," Sam says. The figure looks at Sam with what might be respect. "No," they say. "It's not."</p>`,
cx:[
  {t:"Stand between them and the creature. You need a better answer than that.",nx:"protect_creature"},
  {t:"Ask: what happens to us?",nx:"more_agents"},
]},

accept_device:{d:12,em:"🤲",el:"taking the device",ch:"Accepted",
ti:"Taking It",
tx:`<p>You reach out and take the device from the creature's three-fingered hands. It's warm and heavier than it looks, and the moment you close your hand around it something shifts — a faint vibration that travels up your arm like a held note. The creature watches your face carefully. It seems satisfied with what it sees there.</p>
<p>The device pulses. Once. Twice. Then settles into a new rhythm — slower, calmer, as if it recognises that it's in safe hands. The light inside it shifts from blue to a warm amber. Above the trees something changes direction.</p>`,
cx:[
  {t:"Ask the creature what the device is for.",nx:"point_device"},
  {t:"The vessel is coming. Hold the device up so the signal reaches.",nx:"vessel_arrives"},
]},

ask_to_stay:{d:14,em:"🌍",el:"request",ch:"Invitation",
ti:"Stay. But Openly.",
tx:`<p>"We'd like you to stay," you say carefully. "But not secretly. If you've been watching for forty years, you should just — be here. Openly. Some of us would be fine with that." A very long pause from the face on the screen. <strong>"The concern,"</strong> it says eventually, <strong>"is that 'some of you' is not 'all of you.' And the ones who are not fine tend to respond in ways that make things worse."</strong> "True," you say. "But hiding hasn't fixed that either." Another very long pause. <strong>"No,"</strong> it says. <strong>"It has not."</strong></p>
<p>It does not say yes. But it doesn't say no. It asks you a question instead: <strong>"If we were to make contact — properly, openly — what would you suggest?"</strong> And that, you realise, is the most important question anyone has ever asked you.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: The Conversation Starts Here",
etx:"They've been watching for forty years waiting to be asked that question. You asked it. You didn't have the answer yet — but being asked to think about it is the beginning of something extraordinary."},

ask_where:{d:11,em:"🌌",el:"sourceless light",ch:"Where?",
ti:"Where Are We?",
tx:`<p>"Where is this?" you ask. The girl with the tea looks up. She seems about your age — maybe a year older — with the expression of someone who has answered this question before and doesn't mind answering it again. "Between," she says. "Not the forest and not anywhere else. A fold in the geometry. Think of it as — a crease in a map. The map goes from A to B, but in the crease there's a space that's neither A nor B." She pours tea. "Milk?" she asks. "I — yes?" Sam says. She pours. "You came through the hole," she says. It isn't a question. "Yes," you say. "Good," she says. "It only lets through people it likes." "The hole has opinions?" Sam asks. "Everything here has opinions," she says pleasantly.</p>`,
cx:[
  {t:"Sit down. Ask her name.",nx:"sit_table"},
  {t:"Ask about the animals in the trees first.",nx:"not_normal_animals"},
]},

brief_davies:{d:10,em:"🗣️",el:"talking fast",ch:"The Briefing",
ti:"Everything, Fast",
tx:`<p>"There's a creature in the forest — not human, arrived tonight — we've been communicating with it — it has a device that's damaged — the device is a navigation beacon — without it a retrieval vessel will come and collect everything in a two-kilometre radius including us — we have about twelve minutes." You stop. Mr. Davies looks at you. "Right," he says. "Where's the creature?" "In the trees." "Can it understand gestures?" "Yes." "Is it hostile?" "No." He's already moving. "Lead the way."</p>`,
cx:[
  {t:"Lead him to the creature.",nx:"back_get_davies"},
  {t:"The forest shield idea — run for the trees first.",nx:"forest_shield"},
]},

camp_witness:{d:11,em:"😱",el:"camp waking to light",ch:"Everyone Sees",
ti:"The Whole Camp Wakes",
tx:`<p>You emerge from your tent to find every other student and Mr. Davies already outside, staring at the sky. The light from above is steady and sourceless, illuminating the clearing the way daylight would but at 2am. Nobody speaks for a moment. Then someone says: "Is that — " and nobody finishes the sentence because the answer is obviously yes.</p>
<p>You're holding the device. It buzzes urgently. It is, you realise, asking you to do something.</p>`,
cx:[
  {t:"Return it to the forest. Right now.",nx:"return_device"},
  {t:"Hold it up. Let the vessel lock onto it and land.",nx:"vessel_arrives"},
  {t:"Give it to Mr. Davies. He should handle this.",nx:"brief_davies"},
]},

davies_magnet:{d:13,em:"🧲",el:"rare earth magnet",ch:"The Right Tool",
ti:"Mr. Davies Has a Magnet",
tx:`<p>Mr. Davies pulls a small cylindrical object from the inner pocket of his jacket. "Rare-earth magnet," he says. "I use it to demonstrate magnetic field principles. Never leave home without one." Sam stares at him. "You carry a magnet everywhere?" "A geography teacher who teaches landscape and geology," he says patiently, "carries a magnet everywhere. Now—" He examines the crack in the device. Positions the magnet. Presses it to the seam at a precise angle for about twenty seconds. The crack closes. The device sings. The creature makes its resonating yes-yes-yes sound.</p>`,
ty:"ending",en:"good",
eti:"★ Ending: Mr. Davies Saves the World",
etx:"A geography teacher's professional habit — carrying a rare-earth magnet — saved an alien navigation beacon, prevented an interstellar retrieval event, and allowed a non-human being to return home. Lesson: always respect geography teachers."},

davies_shield:{d:11,em:"🛡️",el:"mr davies stepping forward",ch:"Adult",
ti:"Mr. Davies Gets In Front",
tx:`<p>Mr. Davies steps between you and the agents without a word. He's not physically imposing — he's a geography teacher in waterproofs — but he has the absolute calm authority of someone who has managed thirty fifteen-year-olds on a moor in November and will not be moved. "These are my students," he says pleasantly. "And this is a national park. May I see your identification?" The agents pause. The pause is long enough.</p>`,
cx:[
  {t:"Use the pause. Get the creature to the vessel.",nx:"vessel_arrives"},
  {t:"Back up Mr. Davies. Ask for ID too.",nx:"who_are_agents"},
]},

davies_ultimatum:{d:10,em:"🧑‍🏫",el:"teacher holding alien device",ch:"Adult Supervision",
ti:"Mr. Davies and the Ultimatum",
tx:`<p>You run to Mr. Davies's tent and shove the device under his nose while talking at top speed. He sits up, takes the device, listens to it speak, and is silent for approximately four seconds. Then: "Right. Where is the creature?" "In the forest." "Still there?" "Last I checked." He gets up. "We return this now. Immediately. Move." He is already out of the tent in his boots. "Sir—" you start. "Alex," he says, very calmly, "there will be time for questions later. Right now we have eleven minutes."</p>`,
cx:[
  {t:"Keep up. Run.",nx:"return_device"},
]},

device_activates:{d:12,em:"🔴",el:"device going hot",ch:"Activation",
ti:"The Device Goes Hot",
tx:`<p>The device in your bag pulses so hard it tears through the fabric. It floats — actually floats, hovering at knee height — and the light inside it goes from blue to an intense red. Everyone in the camp can see it. It's broadcasting. Something has locked onto the signal.</p>
<p>The sky above is wrong. You look up. Through the clouds, a shape the size of a city moves.</p>`,
cx:[
  {t:"Grab the device. Return it to the forest now.",nx:"return_device"},
  {t:"Run into the trees with it — the forest might break the signal.",nx:"forest_shield"},
  {t:"Stand your ground. Let whatever's coming, come.",nx:"face_mothership"},
]},

device_panic:{d:10,em:"📟",el:"vibrating device",ch:"Panic",
ti:"Turn It Off",
tx:`<p>You grab the device. There's no obvious off switch — it's seamless, rounded, no buttons. You press everything, squeeze it, shake it. The buzzing intensifies. Outside the tent someone shouts. The sky through the tent fabric is getting brighter. You have maybe a minute. You have the device. You have a bag. You have a pair of shoes and a sleeping bag and a camping trip's worth of gear. None of it is useful except — the compass. With the magnet inside it.</p>`,
cx:[
  {t:"Use the compass magnet against the device.",nx:"magnet_fix"},
  {t:"Run outside with it. Get it away from the camp.",nx:"run_device"},
]},

do_they_know:{d:12,em:"👁️",el:"scanning sky",ch:"Awareness",
ti:"Do They Know We're Here?",
