<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman</title>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e0e;
            --surface: #161616;
            --surface2: #1e1e1e;
            --border: #2e2e2e;
            --ink: #e8e0d0;
            --ink-dim: #7a7060;
            --accent: #e8c84a;
            --accent2: #e05c3a;
            --green: #5ec45e;
            --red: #e05c3a;
            --noose: #8b6914;
            --body-color: #c8c0b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier Prime', monospace;
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 20px 60px;
            background-image: 
                radial-gradient(ellipse at 20% 10%, rgba(232,200,74,0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 90%, rgba(224,92,58,0.04) 0%, transparent 50%);
        }

        .game-container {
            width: 100%;
            max-width: 820px;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            padding: 30px 0 24px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 28px;
            position: relative;
        }

        .header::before {
            content: '✦ ✦ ✦';
            display: block;
            font-size: 0.7rem;
            letter-spacing: 6px;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .title {
            font-family: 'Special Elite', cursive;
            font-size: 3.2rem;
            color: var(--ink);
            letter-spacing: 4px;
            line-height: 1;
        }

        .title span {
            color: var(--accent);
        }

        .subtitle {
            margin-top: 6px;
            font-size: 0.75rem;
            letter-spacing: 3px;
            color: var(--ink-dim);
            text-transform: uppercase;
        }

        /* ── Setup panel ── */
        .setup-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 24px;
            margin-bottom: 28px;
        }

        .setup-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .setup-label {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: var(--ink-dim);
            text-transform: uppercase;
            white-space: nowrap;
        }

        .word-input {
            flex: 1;
            min-width: 180px;
            padding: 10px 14px;
            font-family: 'Special Elite', cursive;
            font-size: 1.1rem;
            letter-spacing: 3px;
            background: var(--bg);
            color: var(--ink);
            border: 1px solid var(--border);
            border-radius: 2px;
            outline: none;
            transition: border-color 0.2s;
        }

        .word-input:focus {
            border-color: var(--accent);
        }

        .word-input::placeholder {
            color: var(--ink-dim);
            letter-spacing: 1px;
            font-family: 'Courier Prime', monospace;
            font-size: 0.85rem;
        }

        .diff-group {
            display: flex;
            gap: 8px;
        }

        .diff-btn {
            padding: 9px 16px;
            font-family: 'Courier Prime', monospace;
            font-size: 0.72rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: transparent;
            color: var(--ink-dim);
            border: 1px solid var(--border);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .diff-btn:hover { color: var(--ink); border-color: #555; }

        .diff-btn.active-easy  { background: rgba(94,196,94,0.15);  color: var(--green); border-color: var(--green); }
        .diff-btn.active-medium { background: rgba(232,200,74,0.15); color: var(--accent); border-color: var(--accent); }
        .diff-btn.active-hard  { background: rgba(224,92,58,0.15);  color: var(--red);   border-color: var(--red); }

        .start-btn {
            padding: 10px 22px;
            font-family: 'Special Elite', cursive;
            font-size: 1rem;
            letter-spacing: 2px;
            background: var(--accent);
            color: #0e0e0e;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .start-btn:hover { background: #f0d45a; transform: translateY(-1px); }
        .start-btn:active { transform: translateY(0); }

        /* ── Main game layout ── */
        .game-body {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 28px;
            margin-bottom: 28px;
            align-items: start;
        }

        /* ── Gallows ── */
        .gallows-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .gallows-label {
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--ink-dim);
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        #gallowsSvg {
            display: block;
        }

        .gallows-line {
            stroke-dasharray: 300;
            stroke-dashoffset: 300;
            animation: drawLine 0.4s ease forwards;
        }

        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }

        /* ── Info panel ── */
        .info-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Word display */
        .word-display-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 20px 16px;
            overflow: hidden;
        }

        .word-tiles {
            display: flex;
            flex-wrap: nowrap;
            gap: var(--tile-gap, 8px);
            justify-content: center;
            min-height: 56px;
            align-items: center;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .tile {
            flex-shrink: 0;
            width: var(--tile-size, 44px);
            height: calc(var(--tile-size, 44px) * 1.2);
            border-bottom: 3px solid var(--ink-dim);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 4px;
            font-family: 'Special Elite', cursive;
            font-size: calc(var(--tile-size, 44px) * 0.7);
            color: var(--ink);
            transition: border-color 0.3s;
            position: relative;
        }

        .tile.revealed {
            border-color: var(--accent);
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .tile.empty-placeholder {
            color: var(--bg); /* hidden */
        }

        @keyframes popIn {
            0%   { transform: scale(0.5) translateY(6px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .word-hint {
            text-align: center;
            margin-top: 14px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: var(--ink-dim);
            text-transform: uppercase;
        }

        /* Status */
        .status-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .status-msg {
            font-family: 'Special Elite', cursive;
            font-size: 1rem;
            color: var(--ink-dim);
            transition: color 0.3s;
        }
        .status-msg.won  { color: var(--green); }
        .status-msg.lost { color: var(--red); }
        .status-msg.play { color: var(--ink); }

        .lives-display {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .lives-label {
            font-size: 0.65rem;
            letter-spacing: 2px;
            color: var(--ink-dim);
            text-transform: uppercase;
        }

        .lives-pips {
            display: flex;
            gap: 4px;
        }

        .pip {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green);
            transition: background 0.3s, transform 0.2s;
        }

        .pip.lost {
            background: var(--red);
            transform: scale(0.7);
        }

        /* ── Alphabet ── */
        .keyboard-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 20px;
        }

        .keyboard-label {
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: var(--ink-dim);
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .keyboard {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .key-row {
            display: flex;
            gap: 6px;
        }

        .key-btn {
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Special Elite', cursive;
            font-size: 1.05rem;
            background: var(--surface2);
            color: var(--ink);
            border: 1px solid var(--border);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
            top: 0;
        }

        .key-btn:hover:not(:disabled) {
            background: var(--border);
            border-color: #555;
            top: -2px;
            box-shadow: 0 3px 0 #000;
        }

        .key-btn:active:not(:disabled) {
            top: 0;
            box-shadow: none;
        }

        .key-btn:disabled {
            cursor: not-allowed;
        }

        .key-btn.correct {
            background: rgba(94,196,94,0.18);
            color: var(--green);
            border-color: var(--green);
        }

        .key-btn.incorrect {
            background: rgba(224,92,58,0.12);
            color: #555;
            border-color: #333;
            text-decoration: line-through;
        }

        /* ── Controls ── */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 8px;
        }

        .ctrl-btn {
            padding: 10px 24px;
            font-family: 'Courier Prime', monospace;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: transparent;
            color: var(--ink-dim);
            border: 1px solid var(--border);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ctrl-btn:hover { color: var(--ink); border-color: #555; }
        .ctrl-btn.primary { background: var(--surface2); color: var(--ink); border-color: #444; }
        .ctrl-btn.primary:hover { border-color: var(--accent); color: var(--accent); }

        /* ── Overlay ── */
        .end-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .end-overlay.show { display: flex; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .end-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 2px;
            padding: 40px 50px;
            text-align: center;
            max-width: 400px;
            animation: slideUp 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(30px) scale(0.95); opacity: 0; }
            to   { transform: translateY(0) scale(1); opacity: 1; }
        }

        .end-icon { font-size: 3rem; margin-bottom: 16px; }

        .end-title {
            font-family: 'Special Elite', cursive;
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .end-title.won  { color: var(--green); }
        .end-title.lost { color: var(--red); }

        .end-word {
            font-family: 'Special Elite', cursive;
            font-size: 1.4rem;
            color: var(--accent);
            letter-spacing: 4px;
            margin-bottom: 24px;
        }

        .end-sub {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: var(--ink-dim);
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .end-btns { display: flex; gap: 12px; justify-content: center; }

        .end-btn-play {
            padding: 12px 28px;
            font-family: 'Special Elite', cursive;
            font-size: 1rem;
            background: var(--accent);
            color: #0e0e0e;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .end-btn-play:hover { background: #f0d45a; }

        .end-btn-new {
            padding: 12px 24px;
            font-family: 'Courier Prime', monospace;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: transparent;
            color: var(--ink-dim);
            border: 1px solid var(--border);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .end-btn-new:hover { color: var(--ink); border-color: #555; }

        /* ── Responsive ── */
        @media (max-width: 680px) {
            .game-body {
                grid-template-columns: 1fr;
            }

            .title { font-size: 2.2rem; }

            .key-btn { width: 36px; height: 36px; font-size: 0.9rem; }

            .setup-row { flex-direction: column; align-items: stretch; }
            .diff-group { justify-content: center; }
            .start-btn { width: 100%; }

            .status-bar { flex-direction: column; align-items: flex-start; gap: 10px; }
            .lives-display { align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="game-container">

    <!-- Header -->
    <div class="header">
        <h1 class="title">HANG<span>MAN</span></h1>
        <p class="subtitle">A classic word guessing game</p>
    </div>

    <!-- Setup -->
    <div class="setup-panel">
        <div class="setup-row">
            <span class="setup-label">Word:</span>
            <input type="text" id="wordInput" class="word-input" placeholder="Type a secret word..." maxlength="20" autocomplete="off">
            <div class="diff-group">
                <button class="diff-btn active-easy" id="diff-easy" onclick="setDifficulty('easy')">Easy</button>
                <button class="diff-btn" id="diff-medium" onclick="setDifficulty('medium')">Med</button>
                <button class="diff-btn" id="diff-hard" onclick="setDifficulty('hard')">Hard</button>
            </div>
            <button class="start-btn" onclick="startGame()">Deal ›</button>
        </div>
    </div>

    <!-- Game body -->
    <div class="game-body">

        <!-- Gallows -->
        <div class="gallows-wrap">
            <div class="gallows-label">The Gallows</div>
            <svg id="gallowsSvg" width="220" height="260" viewBox="0 0 220 260"></svg>
        </div>

        <!-- Info -->
        <div class="info-panel">

            <!-- Word tiles -->
            <div class="word-display-wrap">
                <div class="word-tiles" id="wordTiles">
                    <span style="color:var(--ink-dim);font-size:0.8rem;letter-spacing:2px">ENTER A WORD ABOVE</span>
                </div>
                <div class="word-hint" id="wordHint">&nbsp;</div>
            </div>

            <!-- Status -->
            <div class="status-bar">
                <div class="status-msg play" id="statusMsg">Waiting for a word…</div>
                <div class="lives-display">
                    <span class="lives-label" id="livesLabel">Lives</span>
                    <div class="lives-pips" id="livesPips"></div>
                </div>
            </div>

            <!-- Keyboard -->
            <div class="keyboard-wrap">
                <div class="keyboard-label">Guess a letter</div>
                <div class="keyboard" id="keyboard"></div>
            </div>

        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="ctrl-btn primary" onclick="fullReset()">✕ New word</button>
    </div>

</div>

<!-- End overlay -->
<div class="end-overlay" id="endOverlay">
    <div class="end-card">
        <div class="end-icon" id="endIcon">🎉</div>
        <div class="end-title" id="endTitle">You Won!</div>
        <div class="end-word" id="endWord"></div>
        <div class="end-sub" id="endSub"></div>
        <div class="end-btns">
            <button class="end-btn-play" onclick="fullReset(); closeOverlay()">New Word</button>
        </div>
    </div>
</div>

<script>
/* ─────────────── State ─────────────── */
let word = '';
let guessed = new Set();
let wrong = 0;
let maxWrong = 10;
let active = false;
let currentDiff = 'easy';
let drawnParts = 0; // track how many gallows parts already drawn

const DIFF = {
    easy:   { max: 10, label: 'Easy'   },
    medium: { max: 7,  label: 'Medium' },
    hard:   { max: 5,  label: 'Hard'   },
};

const ROWS = ['QWERTYUIOP', 'ASDFGHJKL', 'ZXCVBNM'];

/* ─────────────── Audio ─────────────── */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
}

function playCorrect() {
    const ctx = getAudioCtx();
    const freqs = [523.25, 659.25, 783.99]; // C5 E5 G5
    freqs.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.08;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        osc.start(t); osc.stop(t + 0.36);
    });
}

function playWrong() {
    const ctx = getAudioCtx();
    // Low dull thud
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const dist = ctx.createWaveShaper();
    // mild distortion curve
    const curve = new Float32Array(256);
    for (let i = 0; i < 256; i++) { const x = (i * 2) / 256 - 1; curve[i] = (Math.PI + 200) * x / (Math.PI + 200 * Math.abs(x)); }
    dist.curve = curve;
    osc.connect(dist); dist.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(130, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
    osc.start(); osc.stop(ctx.currentTime + 0.36);
}

function playWin() {
    const ctx = getAudioCtx();
    const melody = [523.25, 659.25, 783.99, 1046.5];
    melody.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'triangle';
        osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.12;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.22, t + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        osc.start(t); osc.stop(t + 0.51);
    });
}

function playLose() {
    const ctx = getAudioCtx();
    const melody = [392, 349.23, 311.13, 261.63];
    melody.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.14;
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
        osc.start(t); osc.stop(t + 0.46);
    });
}

/* ─────────────── Init ─────────────── */
function init() {
    buildKeyboard();
    buildLives();
}

function buildKeyboard() {
    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';
    ROWS.forEach(row => {
        const rowEl = document.createElement('div');
        rowEl.className = 'key-row';
        [...row].forEach(ch => {
            const btn = document.createElement('button');
            btn.className = 'key-btn';
            btn.textContent = ch;
            btn.id = 'key-' + ch;
            btn.onclick = () => guess(ch);
            rowEl.appendChild(btn);
        });
        kb.appendChild(rowEl);
    });
}

function buildLives() {
    const pips = document.getElementById('livesPips');
    pips.innerHTML = '';
    for (let i = 0; i < maxWrong; i++) {
        const pip = document.createElement('div');
        pip.className = 'pip';
        pip.id = 'pip-' + i;
        pips.appendChild(pip);
    }
}

/* ─────────────── Difficulty ─────────────── */
function setDifficulty(level) {
    currentDiff = level;
    ['easy','medium','hard'].forEach(d => {
        const btn = document.getElementById('diff-' + d);
        btn.className = 'diff-btn' + (d === level ? ' active-' + d : '');
    });
}

/* ─────────────── Tile sizing ─────────────── */
function setTileSize(len) {
    // Available width ≈ info panel. Shrink tiles for long words.
    // Max tile 44px, min ~20px. Gap scales too.
    const size = Math.max(20, Math.min(44, Math.floor(480 / len) - 8));
    const gap  = Math.max(4, Math.min(10, Math.floor(size / 5)));
    document.documentElement.style.setProperty('--tile-size', size + 'px');
    document.documentElement.style.setProperty('--tile-gap',  gap  + 'px');
}

/* ─────────────── Start ─────────────── */
function startGame() {
    const input = document.getElementById('wordInput');
    const raw = input.value.trim().toUpperCase();

    if (!raw) { shake(input); return; }
    if (!/^[A-Z]+$/.test(raw)) { shake(input); setStatus('Letters only, please!', 'play'); return; }

    word = raw;
    guessed.clear();
    wrong = 0;
    drawnParts = 0;
    maxWrong = DIFF[currentDiff].max;
    active = true;

    input.value = '';
    setTileSize(word.length);
    buildLives();
    resetKeys();
    clearGallows();
    renderTiles();
    setStatus('Guess the word!', 'play');
    document.getElementById('wordHint').textContent = `${word.length} letter${word.length > 1 ? 's' : ''} · ${DIFF[currentDiff].label}`;
}

/* ─────────────── Guess ─────────────── */
function guess(ch) {
    if (!active || guessed.has(ch)) return;
    guessed.add(ch);

    const btn = document.getElementById('key-' + ch);
    btn.disabled = true;

    if (word.includes(ch)) {
        btn.classList.add('correct');
        playCorrect();
        renderTiles();
        if (checkWin()) endGame(true);
    } else {
        btn.classList.add('incorrect');
        playWrong();
        document.getElementById('pip-' + wrong).classList.add('lost');
        wrong++;
        appendNextGallowsPart(wrong, maxWrong);
        if (wrong >= maxWrong) endGame(false);
    }
}

/* ─────────────── Tiles ─────────────── */
function renderTiles() {
    const wrap = document.getElementById('wordTiles');
    wrap.innerHTML = '';
    [...word].forEach(ch => {
        const tile = document.createElement('div');
        tile.className = 'tile';
        if (guessed.has(ch)) {
            tile.textContent = ch;
            tile.classList.add('revealed');
        }
        wrap.appendChild(tile);
    });
}

/* ─────────────── Win / Lose ─────────────── */
function checkWin() {
    return [...word].every(ch => guessed.has(ch));
}

function endGame(won) {
    active = false;
    const overlay = document.getElementById('endOverlay');
    document.getElementById('endIcon').textContent = won ? '🎉' : '💀';
    document.getElementById('endTitle').textContent = won ? 'You Won!' : 'Game Over';
    document.getElementById('endTitle').className = 'end-title ' + (won ? 'won' : 'lost');
    document.getElementById('endWord').textContent = word;
    document.getElementById('endSub').textContent = won
        ? `Solved with ${wrong} wrong guess${wrong !== 1 ? 'es' : ''}`
        : `The word was revealed above`;

    if (won) playWin(); else playLose();

    if (!won) renderReveal();

    setTimeout(() => overlay.classList.add('show'), won ? 700 : 400);
}

function renderReveal() {
    const wrap = document.getElementById('wordTiles');
    wrap.innerHTML = '';
    [...word].forEach(ch => {
        const tile = document.createElement('div');
        tile.className = 'tile revealed';
        tile.textContent = ch;
        if (!guessed.has(ch)) tile.style.color = 'var(--red)';
        wrap.appendChild(tile);
    });
}

function closeOverlay() {
    document.getElementById('endOverlay').classList.remove('show');
}

function setStatus(msg, cls) {
    const el = document.getElementById('statusMsg');
    el.textContent = msg;
    el.className = 'status-msg ' + cls;
}

/* ─────────────── Gallows Drawing ─────────────── */
const PARTS = [
    () => line(20,240,110,240,'5','#6b5a3e'),   // 1 base
    () => line(50,240,50,20,'5','#6b5a3e'),      // 2 pole
    () => line(50,20,150,20,'5','#6b5a3e'),      // 3 top beam
    () => line(150,20,150,50,'3','#8b6914'),     // 4 noose
    () => circle(150,65,15,'3','#c8c0b0'),       // 5 head
    () => line(150,80,150,155,'3','#c8c0b0'),    // 6 body
    () => line(150,100,125,130,'3','#c8c0b0'),   // 7 left arm
    () => line(150,100,175,130,'3','#c8c0b0'),   // 8 right arm
    () => line(150,155,125,195,'3','#c8c0b0'),   // 9 left leg
    () => line(150,155,175,195,'3','#c8c0b0'),   // 10 right leg
];

function appendNextGallowsPart(wrongCount, maxCount) {
    const svg = document.getElementById('gallowsSvg');
    const total = PARTS.length;
    const targetParts = Math.round((wrongCount / maxCount) * total);
    // Only append parts we haven't drawn yet
    while (drawnParts < targetParts && drawnParts < total) {
        svg.appendChild(PARTS[drawnParts]());
        drawnParts++;
    }
}

function line(x1,y1,x2,y2,w,color) {
    const el = document.createElementNS('http://www.w3.org/2000/svg','line');
    el.setAttribute('x1',x1); el.setAttribute('y1',y1);
    el.setAttribute('x2',x2); el.setAttribute('y2',y2);
    el.setAttribute('stroke',color);
    el.setAttribute('stroke-width',w);
    el.setAttribute('stroke-linecap','round');
    const len = Math.hypot(x2-x1,y2-y1);
    el.setAttribute('stroke-dasharray', len);
    el.setAttribute('stroke-dashoffset', len);
    el.style.animation = 'drawLine 0.3s ease forwards';
    return el;
}

function circle(cx,cy,r,w,color) {
    const circ = Math.PI * 2 * r;
    const el = document.createElementNS('http://www.w3.org/2000/svg','circle');
    el.setAttribute('cx',cx); el.setAttribute('cy',cy); el.setAttribute('r',r);
    el.setAttribute('stroke',color); el.setAttribute('stroke-width',w);
    el.setAttribute('fill','none');
    el.setAttribute('stroke-dasharray', circ);
    el.setAttribute('stroke-dashoffset', circ);
    el.style.animation = 'drawLine 0.4s ease forwards';
    return el;
}

function clearGallows() {
    document.getElementById('gallowsSvg').innerHTML = '';
    drawnParts = 0;
}

/* ─────────────── Reset helpers ─────────────── */
function resetKeys() {
    [...document.querySelectorAll('.key-btn')].forEach(btn => {
        btn.disabled = false;
        btn.className = 'key-btn';
    });
}

function fullReset() {
    word = '';
    guessed.clear();
    wrong = 0;
    drawnParts = 0;
    active = false;
    resetKeys();
    clearGallows();
    document.getElementById('wordTiles').innerHTML = '<span style="color:var(--ink-dim);font-size:0.8rem;letter-spacing:2px">ENTER A WORD ABOVE</span>';
    document.getElementById('wordHint').textContent = '\u00a0';
    setStatus('Waiting for a word…', 'play');
    document.getElementById('livesPips').innerHTML = '';
    document.documentElement.style.setProperty('--tile-size', '44px');
    document.documentElement.style.setProperty('--tile-gap',  '8px');
}

/* ─────────────── Shake animation ─────────────── */
function shake(el) {
    el.style.borderColor = 'var(--red)';
    setTimeout(() => { el.style.borderColor = ''; }, 1000);
}

/* ─────────────── Keyboard input ─────────────── */
document.addEventListener('keydown', e => {
    if (!active) return;
    const ch = e.key.toUpperCase();
    if (/^[A-Z]$/.test(ch)) guess(ch);
});

/* ─────────────── Boot ─────────────── */
init();
</script>
</body>
</html>
