<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline — History of Inventions</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6e3;
    --parchment: #f4e8c1;
    --ink: #2c1810;
    --ink-light: #5c3d2e;
    --gold: #c8972a;
    --gold-light: #f0c040;
    --red: #c0392b;
    --green: #27ae60;
    --blue: #2980b9;
    --p1: #e74c3c;
    --p2: #8e44ad;
    --p3: #16a085;
    --p4: #e67e22;
    --shadow: 0 4px 20px rgba(44,24,16,0.15);
    --shadow-lg: 0 10px 40px rgba(44,24,16,0.25);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(200,151,42,0.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(200,151,42,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── WELCOME SCREEN ── */
  #welcomeScreen {
    position: fixed; inset: 0; z-index: 500;
    background: var(--ink);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }

  .welcome-box {
    background: var(--cream);
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 480px; width: 100%;
    text-align: center;
    box-shadow: var(--shadow-lg);
    border: 3px solid var(--gold);
    position: relative;
    overflow: hidden;
  }

  .welcome-box::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 10px,
      rgba(200,151,42,0.04) 10px,
      rgba(200,151,42,0.04) 20px
    );
  }

  .welcome-box > * { position: relative; }

  .welcome-logo {
    font-size: 4rem;
    display: block;
    margin-bottom: 8px;
    animation: floatLogo 3s ease-in-out infinite;
  }

  @keyframes floatLogo {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .welcome-box h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    color: var(--ink);
    letter-spacing: -1px;
    margin-bottom: 6px;
  }

  .welcome-box .tagline {
    color: var(--ink-light);
    font-size: 1.1rem;
    margin-bottom: 36px;
  }

  .welcome-box h3 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 16px;
  }

  .player-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .player-btn {
    padding: 16px 8px;
    border: none;
    border-radius: 12px;
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    color: white;
    box-shadow: 0 4px 0 rgba(0,0,0,0.25);
  }

  .player-btn:nth-child(1) { background: var(--p1); }
  .player-btn:nth-child(2) { background: var(--p2); }
  .player-btn:nth-child(3) { background: var(--p3); }
  .player-btn:nth-child(4) { background: var(--p4); }

  .player-btn:hover { transform: translateY(-3px); box-shadow: 0 7px 0 rgba(0,0,0,0.2); }
  .player-btn:active { transform: translateY(1px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }

  .player-btn span { display: block; font-size: 0.65rem; font-family: 'DM Sans',sans-serif; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; opacity: 0.9; }

  .rules-btn {
    background: transparent;
    border: 2px solid var(--ink);
    color: var(--ink);
    padding: 10px 24px;
    border-radius: 50px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .rules-btn:hover { background: var(--ink); color: var(--cream); }

  .welcome-section {
    margin-bottom: 24px;
    text-align: left;
  }

  .welcome-section h3 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 12px;
    text-align: center;
  }

  .timer-choice-grid {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .timer-choice-btn {
    flex: 1;
    padding: 12px 8px;
    border: 2px solid var(--parchment);
    border-radius: 10px;
    background: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.2s;
  }

  .timer-choice-btn:hover { border-color: var(--gold); color: var(--ink); }
  .timer-choice-btn.selected { border-color: var(--gold); background: var(--parchment); color: var(--ink); }

  .team-name-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .team-color-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .team-name-input {
    flex: 1;
    padding: 9px 14px;
    border: 2px solid var(--parchment);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--ink);
    background: white;
    transition: border-color 0.2s;
    outline: none;
  }

  .team-name-input:focus { border-color: var(--gold); }

  .start-game-btn {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--ink);
    color: var(--cream);
    border: none;
    border-radius: 12px;
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3);
  }

  .start-game-btn:hover { background: var(--ink-light); transform: translateY(-2px); box-shadow: 0 6px 0 rgba(0,0,0,0.25); }
  .start-game-btn:active { transform: translateY(1px); box-shadow: 0 2px 0 rgba(0,0,0,0.25); }

  /* ── HEADER ── */
  #gameApp { position: relative; z-index: 1; }

  .top-bar {
    background: var(--ink);
    color: var(--cream);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  .top-bar-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .top-stats {
    display: flex;
    gap: 20px;
    align-items: center;
    font-size: 0.9rem;
  }

  .stat-pill {
    background: rgba(255,255,255,0.1);
    padding: 5px 14px;
    border-radius: 50px;
    font-weight: 600;
    font-size: 0.85rem;
  }

  .stat-pill span { color: var(--gold-light); }

  .top-btns { display: flex; gap: 8px; }

  .icon-btn {
    background: rgba(255,255,255,0.1);
    border: none;
    color: var(--cream);
    width: 36px; height: 36px;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.2); }

  /* ── PLAYER TURN BANNER ── */
  .turn-banner {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: background 0.4s;
    font-size: 1.05rem;
    font-weight: 600;
  }

  .turn-banner.p1 { background: #fdecea; border-bottom: 3px solid var(--p1); }
  .turn-banner.p2 { background: #f3e8f8; border-bottom: 3px solid var(--p2); }
  .turn-banner.p3 { background: #e8f8f5; border-bottom: 3px solid var(--p3); }
  .turn-banner.p4 { background: #fef5e7; border-bottom: 3px solid var(--p4); }

  .player-badge {
    display: flex; align-items: center; gap: 10px;
  }

  .player-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-msg {
    font-size: 0.95rem;
    font-weight: 500;
    opacity: 0.85;
    flex: 1;
    text-align: center;
  }

  /* TIMER */
  .timer-display {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    min-width: 48px;
    text-align: center;
  }

  .timer-display.urgent { color: var(--red); animation: pulse 0.5s infinite; }
  .timer-display.flashing { color: var(--red); animation: flash 1s infinite; }
  @keyframes flash { 0%,100%{opacity:1} 50%{opacity:0.2} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  /* ── SCORES ── */
  .scores-bar {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--parchment);
    overflow-x: auto;
  }

  .score-tab {
    flex: 1;
    padding: 8px 16px;
    text-align: center;
    font-size: 0.85rem;
    font-weight: 600;
    border-right: 1px solid var(--parchment);
    background: white;
    transition: background 0.3s;
    min-width: 80px;
  }

  .score-tab:last-child { border-right: none; }
  .score-tab.active-tab { background: var(--parchment); }
  .score-tab .score-name { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.65; }
  .score-tab .score-num { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
  .score-tab.p1-tab .score-num { color: var(--p1); }
  .score-tab.p2-tab .score-num { color: var(--p2); }
  .score-tab.p3-tab .score-num { color: var(--p3); }
  .score-tab.p4-tab .score-num { color: var(--p4); }

  /* ── TIMELINE ── */
  .timeline-section {
    padding: 20px 24px 0;
  }

  .section-label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--parchment);
  }

  .timeline-scroll {
    display: flex;
    align-items: center;
    gap: 6px;
    overflow-x: auto;
    padding: 12px 4px 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--parchment) transparent;
  }

  .timeline-scroll::-webkit-scrollbar { height: 4px; }
  .timeline-scroll::-webkit-scrollbar-track { background: transparent; }
  .timeline-scroll::-webkit-scrollbar-thumb { background: var(--parchment); border-radius: 2px; }

  .t-card {
    flex-shrink: 0;
    width: 130px;
    background: white;
    border-radius: 12px;
    border: 2px solid var(--parchment);
    padding: 10px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(44,24,16,0.08);
    cursor: default;
  }

  .t-card .t-emoji { font-size: 1.8rem; display: block; margin-bottom: 4px; }
  .t-card .t-name { font-size: 0.72rem; font-weight: 600; color: var(--ink); line-height: 1.3; margin-bottom: 4px; }
  .t-card .t-year { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--gold); font-weight: 700; }

  .drop-zone {
    flex-shrink: 0;
    width: 38px; height: 80px;
    border: 2.5px dashed #ccc;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    color: #bbb;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
  }

  .drop-zone:hover,
  .drop-zone.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(200,151,42,0.08);
    transform: scaleY(1.1);
  }

  /* ── HAND ── */
  .hand-section {
    padding: 8px 24px 24px;
  }

  .hand-grid {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .hand-card {
    width: 160px;
    min-height: 210px;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px;
    cursor: pointer;
    transition: transform 0.25s, box-shadow 0.25s;
    position: relative;
    background: white;
    border: 3px solid transparent;
    box-shadow: 0 3px 12px rgba(0,0,0,0.1);
    text-align: center;
    user-select: none;
    color: white;
  }

  .hand-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.25);
  }

  .hand-card.selected {
    filter: brightness(1.12);
    transform: translateY(-12px);
    box-shadow: 0 16px 36px rgba(0,0,0,0.3);
    outline: 4px solid var(--gold);
    outline-offset: 2px;
  }

  .hand-card.selected::after {
    content: '✓ SELECTED';
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: white;
    font-size: 0.6rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 8px;
    border-radius: 50px;
  }

  .hand-card.p1 { background: linear-gradient(160deg, #ef6b5e 0%, var(--p1) 60%); border-color: var(--p1); }
  .hand-card.p2 { background: linear-gradient(160deg, #b06ec7 0%, var(--p2) 60%); border-color: var(--p2); }
  .hand-card.p3 { background: linear-gradient(160deg, #1dbb99 0%, var(--p3) 60%); border-color: var(--p3); }
  .hand-card.p4 { background: linear-gradient(160deg, #f5a347 0%, var(--p4) 60%); border-color: var(--p4); }

  .hc-emoji { font-size: 2.8rem; margin-bottom: 8px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
  .hc-name { font-size: 0.9rem; font-weight: 700; color: white; line-height: 1.3; margin-bottom: 8px; }
  .hc-desc { font-size: 0.72rem; color: rgba(255,255,255,0.85); line-height: 1.5; flex: 1; }

  /* ── FEEDBACK OVERLAY ── */
  .feedback-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .feedback-overlay.show {
    opacity: 1;
    pointer-events: all;
  }

  .feedback-box {
    background: white;
    border-radius: 20px;
    padding: 32px 28px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: var(--shadow-lg);
    transform: scale(0.85);
    transition: transform 0.3s;
  }

  .feedback-overlay.show .feedback-box { transform: scale(1); }

  .feedback-box .fb-icon { font-size: 3.5rem; margin-bottom: 8px; display: block; }
  .feedback-box .fb-verdict {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    margin-bottom: 6px;
  }

  .feedback-box.correct .fb-verdict { color: var(--green); }
  .feedback-box.wrong .fb-verdict { color: var(--red); }

  .feedback-box .fb-year {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--gold);
    margin-bottom: 12px;
    font-family: 'Playfair Display', serif;
  }

  .feedback-box .fb-desc {
    font-size: 0.95rem;
    color: var(--ink-light);
    line-height: 1.6;
    background: var(--cream);
    padding: 12px 16px;
    border-radius: 10px;
    border-left: 4px solid var(--gold);
    text-align: left;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 600;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.show { display: flex; }

  .modal-box {
    background: var(--cream);
    border-radius: 20px;
    padding: 36px 32px;
    max-width: 500px; width: 100%;
    box-shadow: var(--shadow-lg);
    border: 2px solid var(--parchment);
    max-height: 85vh;
    overflow-y: auto;
  }

  .modal-box h2 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    margin-bottom: 20px;
    color: var(--ink);
  }

  .modal-box p {
    color: var(--ink-light);
    line-height: 1.7;
    margin-bottom: 12px;
    font-size: 1rem;
  }

  .modal-box ol {
    padding-left: 20px;
    color: var(--ink-light);
    line-height: 2;
    font-size: 1rem;
    margin-bottom: 20px;
  }

  .modal-box .winner-emoji { font-size: 5rem; display: block; text-align: center; margin-bottom: 12px; }
  .modal-box .final-scores { margin: 20px 0; }
  .modal-box .final-score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    border-radius: 10px;
    margin-bottom: 8px;
    font-weight: 600;
    font-size: 1rem;
  }

  .final-score-row.p1 { background: #fdecea; }
  .final-score-row.p2 { background: #f3e8f8; }
  .final-score-row.p3 { background: #e8f8f5; }
  .final-score-row.p4 { background: #fef5e7; }

  .btn-primary {
    background: var(--ink);
    color: var(--cream);
    border: none;
    padding: 13px 28px;
    border-radius: 50px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-block;
    margin-top: 8px;
  }

  .btn-primary:hover { background: var(--ink-light); transform: translateY(-1px); }

  .btn-secondary {
    background: transparent;
    color: var(--ink);
    border: 2px solid var(--ink);
    padding: 11px 24px;
    border-radius: 50px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: 10px;
  }

  .btn-secondary:hover { background: var(--ink); color: var(--cream); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .top-stats { display: none; }
    .hand-card { width: 140px; min-height: 190px; }
    .hc-desc { display: none; }
    .status-msg { font-size: 0.82rem; }
  }
</style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div id="welcomeScreen">
  <div class="welcome-box">
    <span class="welcome-logo">🕰️</span>
    <h1>Timeline</h1>
    <p class="tagline">Place inventions in chronological order</p>

    <div class="welcome-section">
      <h3>Number of Teams</h3>
      <div class="player-grid">
        <button class="player-btn" onclick="setNumPlayers(1)" id="pbtn1">1<span>Solo</span></button>
        <button class="player-btn" onclick="setNumPlayers(2)" id="pbtn2">2<span>Duo</span></button>
        <button class="player-btn" onclick="setNumPlayers(3)" id="pbtn3">3<span>Trio</span></button>
        <button class="player-btn" onclick="setNumPlayers(4)" id="pbtn4">4<span>Squad</span></button>
      </div>
    </div>

    <div class="welcome-section" id="teamNamesSection">
      <h3>Team Names</h3>
      <div id="teamNameInputs"></div>
    </div>

    <div class="welcome-section">
      <h3>Time per Turn</h3>
      <div class="timer-choice-grid">
        <button class="timer-choice-btn" onclick="setTimer(60)" id="tbtn60">1 min</button>
        <button class="timer-choice-btn selected" onclick="setTimer(120)" id="tbtn120">2 min</button>
        <button class="timer-choice-btn" onclick="setTimer(180)" id="tbtn180">3 min</button>
      </div>
    </div>

    <button class="start-game-btn" onclick="startGameFromWelcome()">▶ Start Game</button>
    <button class="rules-btn" onclick="showRules()">📖 How to Play</button>
  </div>
</div>

<!-- GAME APP -->
<div id="gameApp">

  <div class="top-bar">
    <div class="top-bar-title">🕰️ Timeline</div>
    <div class="top-stats">
      <div class="stat-pill">Cards on Timeline: <span id="timelineCount">1</span></div>
      <div class="stat-pill">Round <span id="roundNum">1</span></div>
    </div>
    <div class="top-btns">
      <button class="icon-btn" onclick="showRules()" title="Rules">📖</button>
      <button class="icon-btn" onclick="confirmNewGame()" title="New Game">🔄</button>
    </div>
  </div>

  <div class="turn-banner" id="turnBanner">
    <div class="player-badge">
      <div class="player-dot" id="playerDot"></div>
      <span id="playerLabel">Player 1's Turn</span>
    </div>
    <div class="status-msg" id="statusMsg">Select a card from your hand!</div>

/* ── AUDIO ── */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playTone(freq, type, duration, vol=0.3) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

  playTone(523, 'sine', 0.12, 0.3);
  setTimeout(() => playTone(659, 'sine', 0.12, 0.3), 120);
  setTimeout(() => playTone(784, 'sine', 0.25, 0.35), 240);
  confettiBurst();
}

function soundWrong() {
  playTone(220, 'sawtooth', 0.15, 0.25);
  setTimeout(() => playTone(196, 'sawtooth', 0.25, 0.3), 150);
}

function soundTick() {
  playTone(880, 'square', 0.05, 0.08);
}

function soundUrgent() {
  playTone(1200, 'square', 0.08, 0.12);
}

function soundTimeout() {
  playTone(300, 'sawtooth', 0.08, 0.1);
  setTimeout(() => playTone(250, 'sawtooth', 0.08, 0.1), 120);
  setTimeout(() => playTone(200, 'sawtooth', 0.2, 0.3), 240);
}

/* ── TIMER ── */
function startTimer() {
  clearTimer();
  state.timeLeft = state.turnTime;
  updateTimerDisplay();
  state.timer = setInterval(() => {
    state.timeLeft--;
    updateTimerDisplay();
    if (state.timeLeft <= 5 && state.timeLeft > 0) soundUrgent();
    else if (state.timeLeft <= 20 && state.timeLeft > 0) soundTick();
    if (state.timeLeft <= 0) {
      clearTimer();
      soundTimeout();
      handleTimeout();
    }
  }, 1000);
}

function clearTimer() {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
}

function updateTimerDisplay() {
  const el = document.getElementById('timerDisplay');
  const mins = Math.floor(state.timeLeft / 60);
  const secs = state.timeLeft % 60;
  el.textContent = mins + ':' + String(secs).padStart(2, '0');
  if (state.timeLeft <= 5) {
    el.className = 'timer-display urgent';
  } else if (state.timeLeft <= 10) {
    el.className = 'timer-display flashing';
  } else {
    el.className = 'timer-display';
  }
}

function handleTimeout() {
  // Penalise: draw new card for the selected (or first) card
  const p = state.players[state.currentPlayer];
  const idx = state.selectedCard !== null ? state.selectedCard : 0;
  replaceCard(p, idx);
  state.selectedCard = null;
  showFeedback(false, null, null, null, true);
}

/* ── CONFETTI ── */
function confettiBurst() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:999;width:100%;height:100%';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const colors = ['#e74c3c','#f0c040','#27ae60','#2980b9','#8e44ad','#e67e22','#16a085'];
  const pieces = Array.from({length: 90}, () => ({
    x: Math.random() * canvas.width,
    y: -10,
    r: Math.random() * 8 + 4,
    d: Math.random() * 80 + 20,
    color: colors[Math.floor(Math.random() * colors.length)],
    tilt: Math.random() * 20 - 10,
    tiltSpeed: Math.random() * 0.3 + 0.1,
    vx: (Math.random() - 0.5) * 4,
    vy: Math.random() * 3 + 2,
    alpha: 1
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.tilt += p.tiltSpeed;
      p.vy += 0.1;
      if (frame > 60) p.alpha -= 0.02;
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, p.r, p.r * 0.5, p.tilt, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    });
    ctx.globalAlpha = 1;
    frame++;
    if (frame < 120) requestAnimationFrame(draw);
    else canvas.remove();
  }
  requestAnimationFrame(draw);
}

/* ── WELCOME SCREEN LOGIC ── */
function setNumPlayers(n) {
  chosenNumPlayers = n;
  [1,2,3,4].forEach(i => {
    document.getElementById(`pbtn${i}`).style.opacity = i === n ? '1' : '0.4';
  });
  renderTeamNameInputs(n);
}

function setTimer(secs) {
  chosenTimer = secs;
  [60,120,180].forEach(s => {
    document.getElementById(`tbtn${s}`).className = 'timer-choice-btn' + (s === secs ? ' selected' : '');
  });
}

function renderTeamNameInputs(n) {
  const container = document.getElementById('teamNameInputs');
  container.innerHTML = '';
  const colors = ['#e74c3c','#8e44ad','#16a085','#e67e22'];
  for (let i = 0; i < n; i++) {
    const row = document.createElement('div');
    row.className = 'team-name-row';
    row.innerHTML = `
      <div class="team-color-dot" style="background:${colors[i]}"></div>
      <input class="team-name-input" id="teamName${i}" type="text" maxlength="20"
        placeholder="Team ${i+1}" value="${state.teamNames[i] !== `Team ${i+1}` ? state.teamNames[i] : ''}">
    `;
    container.appendChild(row);
  }
}

function startGameFromWelcome() {
  const names = [];
  for (let i = 0; i < chosenNumPlayers; i++) {
    const input = document.getElementById(`teamName${i}`);
    names.push((input && input.value.trim()) ? input.value.trim() : `Team ${i+1}`);
  }
  startGame(chosenNumPlayers, names, chosenTimer);
}

/* ── GAME INIT ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function startGame(numPlayers, teamNames, turnTime) {
  clearTimer();
  const shuffled = shuffle(INVENTIONS);
  state.numPlayers = numPlayers;
  state.currentPlayer = 0;
  state.round = 1;
  state.gameOver = false;
  state.selectedCard = null;
  state.players = [];
  state.scores = [];
  state.teamNames = teamNames || ['Team 1','Team 2','Team 3','Team 4'];
  state.turnTime = turnTime || 120;
  state.timeLeft = state.turnTime;

  let idx = 1;
  for (let i = 0; i < numPlayers; i++) {
    state.players.push({ hand: shuffled.slice(idx, idx+5) });
    state.scores.push({ correct: 0, wrong: 0 });
    idx += 5;
  }
  state.timeline = [shuffled[0]];

  document.getElementById('welcomeScreen').style.display = 'none';
  renderScoresBar();
  renderAll();
  startTimer();
}

/* ── RENDER ── */
function renderAll() {
  renderTimeline();
  renderHand();
  renderTurnBanner();
  updateTopBar();
}

function renderTurnBanner() {
  const cp = state.currentPlayer;
  const name = state.teamNames[cp] || `Team ${cp+1}`;
  const banner = document.getElementById('turnBanner');
  banner.className = 'turn-banner ' + PLAYER_COLORS[cp];
  document.getElementById('playerLabel').textContent = `${name}'s Turn`;
  document.getElementById('playerDot').style.background = PLAYER_DOTS[cp];
  document.getElementById('handLabel').textContent = `${name}'s Hand`;
  setStatus('Select a card from your hand!');
}

function setStatus(msg) {
  document.getElementById('statusMsg').textContent = msg;
}

function updateTopBar() {
  document.getElementById('timelineCount').textContent = state.timeline.length;
  document.getElementById('roundNum').textContent = state.round;
}

function renderTimeline() {
  const el = document.getElementById('timelineScroll');
  el.innerHTML = '';
  const sorted = [...state.timeline].sort((a,b) => a.year - b.year);

  el.appendChild(dropZone(0));
  sorted.forEach((inv, i) => {
    el.appendChild(timelineCard(inv));
    el.appendChild(dropZone(i+1));
  });
}

function timelineCard(inv) {
  const d = document.createElement('div');
  d.className = 't-card';
  d.innerHTML = `<span class="t-emoji">${inv.emoji}</span><div class="t-name">${inv.name}</div><div class="t-year">${fmtYear(inv.year)}</div>`;
  return d;
}

function dropZone(pos) {
  const d = document.createElement('div');
  d.className = 'drop-zone';
  d.textContent = '+';
  d.onclick = () => placeCard(pos);
  d.onmouseenter = () => { if (state.selectedCard !== null) d.classList.add('active'); };
  d.onmouseleave = () => d.classList.remove('active');
  return d;
}

function renderHand() {
  const el = document.getElementById('handGrid');
  el.innerHTML = '';
  const p = state.players[state.currentPlayer];
  const color = PLAYER_COLORS[state.currentPlayer];

  p.hand.forEach((inv, i) => {
    const c = document.createElement('div');
    c.className = `hand-card ${color}`;
    if (state.selectedCard === i) c.classList.add('selected');
    c.innerHTML = `
      <div class="hc-emoji">${inv.emoji}</div>
      <div class="hc-name">${inv.name}</div>
      <div class="hc-desc">${inv.desc}</div>
    `;
    c.onclick = () => selectCard(i);
    el.appendChild(c);
  });
}

function renderScoresBar() {
  const el = document.getElementById('scoresBar');
  el.innerHTML = '';
  for (let i = 0; i < state.numPlayers; i++) {
    const name = state.teamNames[i] || `Team ${i+1}`;
    const tab = document.createElement('div');
    tab.className = `score-tab ${PLAYER_COLORS[i]}-tab`;
    tab.id = `scoreTab${i}`;
    tab.innerHTML = `<div class="score-name">${name}</div><div class="score-num" id="scoreNum${i}">0</div>`;
    el.appendChild(tab);
  }
}

function updateScoreTabs() {
  for (let i = 0; i < state.numPlayers; i++) {
    const tab = document.getElementById(`scoreTab${i}`);
    document.getElementById(`scoreNum${i}`).textContent = state.scores[i].correct;
    tab.className = `score-tab ${PLAYER_COLORS[i]}-tab` + (i === state.currentPlayer ? ' active-tab' : '');
  }
}

/* ── GAME LOGIC ── */
function selectCard(idx) {
  if (state.gameOver) return;
  state.selectedCard = state.selectedCard === idx ? null : idx;
  renderHand();
  setStatus(state.selectedCard !== null
    ? 'Now click a + on the timeline where you think it belongs!'
    : 'Select a card from your hand!');
}

function placeCard(pos) {
  if (state.selectedCard === null || state.gameOver) return;
  clearTimer();

  const p = state.players[state.currentPlayer];
  const inv = p.hand[state.selectedCard];
  const sorted = [...state.timeline].sort((a,b) => a.year - b.year);

  let correct = true;
  if (pos > 0 && inv.year < sorted[pos-1].year) correct = false;
  if (pos < sorted.length && inv.year > sorted[pos].year) correct = false;

  if (correct) {
    state.timeline.push(inv);
    p.hand.splice(state.selectedCard, 1);
    state.scores[state.currentPlayer].correct++;
    soundCorrect();
  } else {
    replaceCard(p, state.selectedCard);
    state.scores[state.currentPlayer].wrong++;
    soundWrong();
  }

  const cardIdx = state.selectedCard;
  state.selectedCard = null;

  if (correct && p.hand.length === 0) {
    state.gameOver = true;
    showFeedback(true, inv, true);
    return;
  }

  showFeedback(correct, inv, false);
}

function replaceCard(player, idx) {
  const used = new Set([
    ...state.timeline.map(x => x.name),
    ...state.players.flatMap(p => p.hand.map(x => x.name))
  ]);
  const remaining = INVENTIONS.filter(inv => !used.has(inv.name));
  if (remaining.length > 0) {
    player.hand[idx] = remaining[Math.floor(Math.random() * remaining.length)];
  }
}

function nextTurn() {
  state.currentPlayer = (state.currentPlayer + 1) % state.numPlayers;
  if (state.currentPlayer === 0) state.round++;
  renderAll();
  updateScoreTabs();
  startTimer();
}

/* ── FEEDBACK ── */
function showFeedback(correct, inv, isWin, _unused, timeout=false) {
  const overlay = document.getElementById('feedbackOverlay');
  const box = document.getElementById('feedbackBox');

  if (timeout) {
    document.getElementById('fbIcon').textContent = '⏰';
    document.getElementById('fbVerdict').textContent = 'Time\'s Up!';
    document.getElementById('fbYear').textContent = '';
    document.getElementById('fbDesc').textContent = 'You ran out of time. A new card has been added to your hand.';
    box.className = 'feedback-box wrong';
  } else {
    document.getElementById('fbIcon').textContent = inv ? inv.emoji : '';
    document.getElementById('fbVerdict').textContent = correct ? (isWin ? '🎉 Winner!' : 'Correct!') : 'Wrong!';
    document.getElementById('fbYear').textContent = inv ? `Invented: ${fmtYear(inv.year)}` : '';
    document.getElementById('fbDesc').textContent = inv ? inv.desc : '';
    box.className = 'feedback-box ' + (correct ? 'correct' : 'wrong');
  }

  overlay.classList.add('show');

  const delay = isWin ? 3500 : 2200;

  setTimeout(() => {
    overlay.classList.remove('show');
    if (isWin) {
      showWinModal();
    } else {
      nextTurn();
    }
  }, delay);
}

/* ── MODALS ── */
function showWinModal() {
  const cp = state.currentPlayer;
  const winnerName = state.teamNames[cp] || `Team ${cp+1}`;
  let html = `<span class="winner-emoji">🏆</span>
    <p style="font-size:1.4rem;font-weight:700;text-align:center;margin-bottom:8px;">${winnerName} wins!</p>
    <p style="text-align:center;margin-bottom:20px;color:#666;">All cards placed correctly!</p>
    <div class="final-scores">`;

  for (let i = 0; i < state.numPlayers; i++) {
    const name = state.teamNames[i] || `Team ${i+1}`;
    html += `<div class="final-score-row ${PLAYER_COLORS[i]}">
      <span>${name}</span>
      <span>✅ ${state.scores[i].correct} correct &nbsp; ❌ ${state.scores[i].wrong} wrong</span>
    </div>`;
  }

  html += `</div>
    <div style="text-align:center">
      <button class="btn-primary" onclick="closeModal(); showWelcome()">Play Again</button>
    </div>`;

  openModal('Game Over', html);
}

function showRules() {
  const html = `
    <ol>
      <li>Each player receives <strong>5 invention cards</strong>. One card is already on the timeline with its date visible.</li>
      <li>On your turn, <strong>select a card</strong> from your hand — you can read the description to get clues!</li>
      <li><strong>Click a + symbol</strong> on the timeline where you think the card belongs chronologically.</li>
      <li>If <strong>correct</strong>, the card is added to the timeline and you keep your remaining cards.</li>
      <li>If <strong>wrong</strong>, you draw a new card to replace it (still 5 cards in hand).</li>
      <li>You have <strong>30 seconds</strong> per turn — don't run out of time!</li>
      <li><strong>First player to empty their hand</strong> wins the game!</li>
    </ol>
    <div style="text-align:center;margin-top:20px">
      <button class="btn-primary" onclick="closeModal()">Got it!</button>
    </div>`;
  openModal('📖 How to Play', html);
}

function openModal(title, bodyHtml) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function showWelcome() {
  clearTimer();
  document.getElementById('welcomeScreen').style.display = 'flex';
  setNumPlayers(chosenNumPlayers);
  setTimer(chosenTimer);
}

function confirmNewGame() {
  const html = `
    <p style="font-size:1.1rem;margin-bottom:24px;color:#666;">Are you sure you want to abandon this game and start fresh?</p>
    <div style="text-align:center;display:flex;gap:12px;justify-content:center">
      <button class="btn-primary" onclick="closeModal(); showWelcome()">Yes, New Game</button>
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
    </div>`;
  openModal('🔄 New Game?', html);
}

/* ── UTILS ── */
function fmtYear(y) {
  return y < 0 ? `${Math.abs(y).toLocaleString()} BCE` : `${y} CE`;
}

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// Init welcome screen defaults
setNumPlayers(2);
setTimer(120);
</script>
