<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEOPARDY!</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #0a1fd4;
    --dark-blue: #060e8a;
    --gold: #ffcc00;
    --gold-dark: #c9a000;
    --white: #ffffff;
    --light-blue: #1a3fff;
    --correct: #00c851;
    --wrong: #ff4444;
    --bg: #04083a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Barlow Condensed', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* ─── SCREENS ─── */
  .screen { display: none; width: 100%; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ─── START SCREEN ─── */
  #startScreen {
    background: radial-gradient(ellipse at top, #0f1f9e 0%, #04083a 60%);
    padding: 24px 16px;
  }
  .logo {
    font-family: 'Anton', sans-serif;
    font-size: clamp(48px, 10vw, 96px);
    color: var(--gold);
    text-shadow: 4px 4px 0 var(--gold-dark), 0 0 40px #ffcc0088;
    letter-spacing: 4px;
    text-align: center;
    animation: logoPulse 3s ease-in-out infinite;
  }
  @keyframes logoPulse {
    0%,100%{text-shadow:4px 4px 0 var(--gold-dark),0 0 40px #ffcc0088;}
    50%{text-shadow:4px 4px 0 var(--gold-dark),0 0 80px #ffcc00cc;}
  }
  .subtitle {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(12px, 2.5vw, 18px);
    color: #aabfff;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .setup-panel {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 900px;
    backdrop-filter: blur(10px);
  }
  .section-title {
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
    border-bottom: 2px solid var(--gold-dark);
    padding-bottom: 8px;
  }
  /* Player setup */
  .players-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .player-card {
    flex: 1;
    min-width: 150px;
    background: rgba(10, 31, 212, 0.3);
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .player-card.active { border-color: var(--gold); background: rgba(10, 31, 212, 0.6); }
  .player-card label { font-size: 13px; color: #aabfff; display: block; margin-bottom: 6px; letter-spacing: 1px; }
  .player-card input {
    background: transparent;
    border: none;
    border-bottom: 2px solid #4466ff;
    color: white;
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    width: 100%;
    padding: 4px 0;
    outline: none;
  }
  .player-count-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .pcount-btn {
    background: rgba(255,255,255,0.08);
    border: 2px solid transparent;
    border-radius: 8px;
    color: white;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    padding: 8px 22px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .pcount-btn.active { border-color: var(--gold); background: rgba(255,204,0,0.15); color: var(--gold); }

  /* Category selection */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
    max-height: 360px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .cat-grid::-webkit-scrollbar { width: 6px; }
  .cat-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
  .cat-grid::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }
  .cat-item {
    background: rgba(10,31,212,0.25);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .cat-item.selected { border-color: var(--gold); background: rgba(255,204,0,0.12); }
  .cat-item .cat-name {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.2;
  }
  .diff-selector { display: flex; gap: 4px; }
  .diff-btn {
    flex: 1;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 4px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.2);
    background: transparent;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    transition: all 0.15s;
  }
  .diff-btn.easy.active { background: #00c851; border-color: #00c851; color: #000; font-weight: 700; }
  .diff-btn.medium.active { background: #ffbb00; border-color: #ffbb00; color: #000; font-weight: 700; }
  .diff-btn.hard.active { background: #ff4444; border-color: #ff4444; color: #fff; font-weight: 700; }
  .cat-count {
    font-size: 12px;
    color: #aabfff;
    margin: 10px 0 6px;
  }
  .cat-count span { color: var(--gold); font-weight: 700; }
  .start-btn {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
    border: none;
    border-radius: 12px;
    color: #000;
    font-family: 'Anton', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    padding: 16px 48px;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(255,204,0,0.4);
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,204,0,0.6); }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ─── GAME BOARD ─── */
  #boardScreen { background: var(--bg); padding: 0; justify-content: flex-start; }
  .scoreboard {
    display: flex;
    gap: 0;
    width: 100%;
    background: #000;
    border-bottom: 3px solid var(--gold);
  }
  .score-cell {
    flex: 1;
    text-align: center;
    padding: 10px 8px;
    border-right: 1px solid #1a1a3a;
    transition: background 0.3s;
  }
  .score-cell:last-child { border-right: none; }
  .score-cell.current-turn { background: rgba(255,204,0,0.15); }
  .score-cell .p-name {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(13px, 2.5vw, 18px);
    font-weight: 700;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .score-cell .p-score {
    font-family: 'Anton', sans-serif;
    font-size: clamp(20px, 4vw, 32px);
    color: white;
  }
  .score-cell .p-score.negative { color: #ff6666; }
  .board-wrap { width: 100%; flex: 1; padding: 4px; }
  .board {
    display: grid;
    gap: 4px;
    width: 100%;
  }
  .cat-header {
    background: linear-gradient(180deg, #0a1fd4 0%, #060e8a 100%);
    border: 2px solid #1a3fff;
    border-radius: 6px;
    padding: 8px 4px;
    text-align: center;
    font-family: 'Oswald', sans-serif;
    font-size: clamp(10px, 1.8vw, 15px);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: white;
    min-height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1.2;
  }
  .cell {
    background: linear-gradient(180deg, #0a1fd4 0%, #060e8a 100%);
    border: 2px solid #1a3fff;
    border-radius: 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 52px;
    padding: 4px;
  }
  .cell:hover:not(.used) { background: linear-gradient(180deg, #1a3fff 0%, #0a1fd4 100%); transform: scale(1.02); border-color: var(--gold); }
  .cell.used { background: #04083a; border-color: #1a1a4a; cursor: default; }
  .cell .val {
    font-family: 'Anton', sans-serif;
    font-size: clamp(16px, 3vw, 28px);
    color: var(--gold);
    text-shadow: 1px 1px 0 var(--gold-dark);
  }
  .cell.used .val { display: none; }

  /* ─── QUESTION MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: linear-gradient(160deg, #0a1fd4 0%, #060e8a 100%);
    border: 3px solid var(--gold);
    border-radius: 20px;
    width: 100%;
    max-width: 680px;
    padding: 32px 28px;
    box-shadow: 0 0 60px rgba(255,204,0,0.3);
    animation: modalIn 0.3s cubic-bezier(.175,.885,.32,1.275);
  }
  @keyframes modalIn { from{transform:scale(0.7);opacity:0;} to{transform:scale(1);opacity:1;} }
  .modal-cat {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #aabfff;
    margin-bottom: 8px;
  }
  .modal-value {
    font-family: 'Anton', sans-serif;
    font-size: 36px;
    color: var(--gold);
    margin-bottom: 20px;
  }
  .modal-clue {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(20px, 4vw, 30px);
    font-weight: 600;
    text-align: center;
    line-height: 1.4;
    color: white;
    margin-bottom: 28px;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .player-buzz-row {
    display: grid;
    gap: 8px;
    margin-bottom: 20px;
  }
  .buzz-card {
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .buzz-name {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    color: white;
    font-weight: 600;
  }
  .buzz-btns { display: flex; gap: 8px; }
  .buzz-btn {
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-family: 'Anton', sans-serif;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }
  .buzz-btn.correct { background: var(--correct); color: #000; }
  .buzz-btn.wrong { background: var(--wrong); color: #fff; }
  .buzz-btn:hover { filter: brightness(1.15); transform: scale(1.05); }
  .buzz-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; filter: none; }
  .reveal-btn {
    background: transparent;
    border: 2px solid var(--gold);
    border-radius: 10px;
    color: var(--gold);
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    padding: 10px 24px;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
    letter-spacing: 2px;
    transition: all 0.2s;
  }
  .reveal-btn:hover { background: rgba(255,204,0,0.1); }
  .answer-reveal {
    display: none;
    background: rgba(0,200,80,0.15);
    border: 2px solid var(--correct);
    border-radius: 10px;
    padding: 12px 20px;
    font-family: 'Oswald', sans-serif;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    color: #00ff66;
    margin-bottom: 10px;
  }
  .close-modal-btn {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    color: white;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    padding: 10px 24px;
    cursor: pointer;
    width: 100%;
    letter-spacing: 2px;
    transition: all 0.2s;
  }
  .close-modal-btn:hover { background: rgba(255,255,255,0.18); }

  /* ─── END SCREEN ─── */
  #endScreen {
    background: radial-gradient(ellipse at top, #1a1060 0%, #04083a 70%);
    justify-content: center;
    padding: 32px 16px;
  }
  .podium-wrap {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    margin: 32px 0;
    justify-content: center;
  }
  .podium-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .podium-name {
    font-family: 'Oswald', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: white;
    text-align: center;
  }
  .podium-score {
    font-family: 'Anton', sans-serif;
    font-size: 28px;
    color: var(--gold);
  }
  .podium-bar {
    background: linear-gradient(180deg, #0a1fd4, #060e8a);
    border: 3px solid #1a3fff;
    border-radius: 8px 8px 0 0;
    width: 110px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 8px;
    font-family: 'Anton', sans-serif;
    font-size: 28px;
  }
  .podium-bar.first { height: 160px; border-color: var(--gold); background: linear-gradient(180deg, #1a3fff, #0a1fd4); }
  .podium-bar.second { height: 120px; }
  .podium-bar.third { height: 90px; }
  .medal { font-size: 36px; }
  .play-again-btn {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
    border: none;
    border-radius: 12px;
    color: #000;
    font-family: 'Anton', sans-serif;
    font-size: 24px;
    letter-spacing: 4px;
    padding: 14px 40px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(255,204,0,0.4);
  }
  .play-again-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,204,0,0.6); }

  /* ─── FEEDBACK FLASH ─── */
  .feedback-flash {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%) scale(0);
    font-family: 'Anton', sans-serif;
    font-size: 64px;
    letter-spacing: 4px;
    z-index: 200;
    pointer-events: none;
    transition: all 0.15s;
  }
  .feedback-flash.show { transform: translate(-50%,-50%) scale(1); }
  .feedback-flash.correct-flash { color: var(--correct); text-shadow: 0 0 30px #00ff6688; }
  .feedback-flash.wrong-flash { color: var(--wrong); text-shadow: 0 0 30px #ff444488; }

  @media (max-width: 600px) {
    .cat-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); }
    .modal { padding: 20px 14px; }
    .podium-bar { width: 80px; }
    .podium-bar.first { height: 120px; }
    .podium-bar.second { height: 90px; }
    .podium-bar.third { height: 70px; }
  }
</style>
</head>
<body>

<!-- ─── START SCREEN ─── -->
<div id="startScreen" class="screen active">
  <div class="logo">JEOPARDY!</div>
  <div class="subtitle">The Ultimate Classroom Edition</div>
  <div class="setup-panel">
    <div class="section-title">👥 Players</div>
    <div class="player-count-row">
      <button class="pcount-btn active" onclick="setPlayerCount(1)">1</button>
      <button class="pcount-btn" onclick="setPlayerCount(2)">2</button>
      <button class="pcount-btn" onclick="setPlayerCount(3)">3</button>
    </div>
    <div class="players-row" id="playersRow">
      <div class="player-card active" id="pc1">
        <label>PLAYER 1</label>
        <input type="text" id="p1name" value="Player 1" maxlength="16">
      </div>
      <div class="player-card" id="pc2" style="display:none">
        <label>PLAYER 2</label>
        <input type="text" id="p2name" value="Player 2" maxlength="16">
      </div>
      <div class="player-card" id="pc3" style="display:none">
        <label>PLAYER 3</label>
        <input type="text" id="p3name" value="Player 3" maxlength="16">
      </div>
    </div>

    <div class="section-title">📋 Categories <span style="font-size:13px;color:#aabfff;font-family:'Barlow Condensed';letter-spacing:1px;">(choose exactly 6)</span></div>
    <div class="cat-count">Selected: <span id="catCountDisplay">0</span> / 6</div>
    <div class="cat-grid" id="catGrid"></div>
  </div>
  <button class="start-btn" id="startBtn" onclick="startGame()" disabled>LET'S PLAY!</button>
</div>

<!-- ─── BOARD SCREEN ─── -->
<div id="boardScreen" class="screen">
  <div class="scoreboard" id="scoreboard"></div>
  <div class="board-wrap">
    <div class="board" id="board"></div>
  </div>
</div>

<!-- ─── QUESTION MODAL ─── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-cat" id="modalCat"></div>
    <div class="modal-value" id="modalVal"></div>
    <div class="modal-clue" id="modalClue"></div>
    <div class="player-buzz-row" id="buzzRow"></div>
    <button class="reveal-btn" onclick="revealAnswer()">▶ REVEAL ANSWER</button>
    <div class="answer-reveal" id="answerReveal"></div>
    <button class="close-modal-btn" onclick="closeModal()">NEXT QUESTION</button>
  </div>
</div>

<!-- ─── END SCREEN ─── -->
<div id="endScreen" class="screen">
  <div class="logo" style="font-size:clamp(36px,8vw,72px)">GAME OVER!</div>
  <div class="podium-wrap" id="podium"></div>
  <button class="play-again-btn" onclick="goHome()">PLAY AGAIN</button>
</div>

<!-- Feedback flash -->
<div class="feedback-flash" id="feedbackFlash"></div>

<script>
// ═══════════════════════════════════════════════════════
//  QUESTION DATABASE
// ═══════════════════════════════════════════════════════
const CATEGORIES = {
  "World Capitals": {
    easy: [
      {q:"What is the capital of France?", a:"Paris"},
      {q:"What is the capital of the United States?", a:"Washington D.C."},
      {q:"What is the capital of Brazil?", a:"Brasília"},
      {q:"What is the capital of Japan?", a:"Tokyo"},
      {q:"What is the capital of Australia?", a:"Canberra"},
    ],
    medium: [
      {q:"What is the capital of Argentina?", a:"Buenos Aires"},
      {q:"What is the capital of Egypt?", a:"Cairo"},
      {q:"What is the capital of Canada?", a:"Ottawa"},
      {q:"What is the capital of South Korea?", a:"Seoul"},
      {q:"What is the capital of South Africa?", a:"Pretoria"},
    ],
    hard: [
      {q:"What is the capital of Hungary?", a:"Budapest"},
      {q:"What is the capital of Kazakhstan?", a:"Astana"},
      {q:"What is the capital of Kyrgyzstan?", a:"Bishkek"},
      {q:"What is the capital of Mozambique?", a:"Maputo"},
      {q:"What is the capital of Tajikistan?", a:"Dushanbe"},
    ]
  },
  "Stranger Things S1": {
    easy: [
      {q:"In which fictional town does Stranger Things take place?", a:"Hawkins"},
      {q:"What is the name of the girl with telekinetic powers?", a:"Eleven"},
      {q:"What game are the boys playing when Will disappears?", a:"Dungeons & Dragons"},
      {q:"What does Eleven call the dark parallel dimension?", a:"The Upside Down"},
      {q:"What is the name of the monster in Season 1?", a:"Demogorgon"},
    ],
    medium: [
      {q:"What year is Stranger Things Season 1 set in?", a:"1983"},
      {q:"What is the name of Will Byers' older brother?", a:"Jonathan"},
      {q:"Who is the police chief in Hawkins?", a:"Jim Hopper"},
      {q:"What song does Eleven hear on the radio that makes her cry?", a:"Should I Stay or Should I Go"},
      {q:"What does Joyce use to communicate with Will in the Upside Down?", a:"Christmas lights"},
    ],
    hard: [
      {q:"What is the number of the lab where Eleven was kept?", a:"Hawkins National Laboratory"},
      {q:"What is the name of the scientist who ran the experiments on Eleven?", a:"Dr. Martin Brenner"},
      {q:"What is Mike's sister's name?", a:"Nancy"},
      {q:"In what classroom do the boys first hide Eleven?", a:"Mike's basement"},
      {q:"Who first discovers the portal to the Upside Down?", a:"Eleven / Dr. Brenner's team"},
    ]
  },
  "Harry Potter": {
    easy: [
      {q:"What school does Harry Potter attend?", a:"Hogwarts"},
      {q:"What is Harry's owl's name?", a:"Hedwig"},
      {q:"What house is Harry sorted into?", a:"Gryffindor"},
      {q:"What is the name of Harry's best male friend?", a:"Ron Weasley"},
      {q:"What sport do wizards play on broomsticks?", a:"Quidditch"},
    ],
    medium: [
      {q:"What is the spell to make something levitate?", a:"Wingardium Leviosa"},
      {q:"What is Hermione Granger's middle name?", a:"Jean"},
      {q:"Who is the Defense Against the Dark Arts teacher in year 1?", a:"Professor Quirrell"},
      {q:"What magical creature guards Gringotts bank?", a:"Dragons"},
      {q:"What is the name of the Weasleys' home?", a:"The Burrow"},
    ],
    hard: [
      {q:"What is the incantation for the Killing Curse?", a:"Avada Kedavra"},
      {q:"What are the three Unforgivable Curses?", a:"Avada Kedavra, Crucio, Imperio"},
      {q:"What does the Mirror of Erised show?", a:"Your heart's deepest desire"},
      {q:"What platform do students take to Hogwarts?", a:"Platform 9¾"},
      {q:"Who is the Half-Blood Prince?", a:"Severus Snape"},
    ]
  },
  "Female Singers 2023-2025": {
    easy: [
      {q:"This singer released 'Anti-Hero' and the Eras Tour.", a:"Taylor Swift"},
      {q:"Beyoncé's country-inspired 2024 album is called…", a:"Cowboy Carter"},

// ═══════════════════════════════════════════════════════
//  SOUND ENGINE (Web Audio API)
// ═══════════════════════════════════════════════════════
const SFX = (() => {
  let ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }

  function play(fn) {
    try { fn(getCtx()); } catch(e) {}
  }

  // Board tile click - classic Jeopardy-style blip
  function tileClick() {
    play(ctx => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(880, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.08);
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.15);
    });
  }

  // Correct answer - ascending fanfare
  function correct() {
    play(ctx => {
      const notes = [523.25, 659.25, 783.99, 1046.50];
      notes.forEach((freq, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'triangle';
        const t = ctx.currentTime + i * 0.1;
        o.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(0.0, t);
        g.gain.linearRampToValueAtTime(0.35, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
        o.start(t);
        o.stop(t + 0.25);
      });
    });
  }

  // Wrong answer - descending buzz
  function wrong() {
    play(ctx => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(220, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.3);
      g.gain.setValueAtTime(0.25, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.35);
    });
  }

  // Question open - dramatic low thud + shimmer
  function questionOpen() {
    play(ctx => {
      // Low thud
      const o1 = ctx.createOscillator();
      const g1 = ctx.createGain();
      o1.connect(g1); g1.connect(ctx.destination);
      o1.type = 'sine';
      o1.frequency.setValueAtTime(120, ctx.currentTime);
      o1.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.25);
      g1.gain.setValueAtTime(0.4, ctx.currentTime);
      g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o1.start(ctx.currentTime);
      o1.stop(ctx.currentTime + 0.3);
      // Shimmer
      const o2 = ctx.createOscillator();
      const g2 = ctx.createGain();
      o2.connect(g2); g2.connect(ctx.destination);
      o2.type = 'sine';
      o2.frequency.setValueAtTime(1200, ctx.currentTime + 0.05);
      o2.frequency.exponentialRampToValueAtTime(800, ctx.currentTime + 0.2);
      g2.gain.setValueAtTime(0.15, ctx.currentTime + 0.05);
      g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      o2.start(ctx.currentTime + 0.05);
      o2.stop(ctx.currentTime + 0.3);
    });
  }

  // Answer reveal - soft chime
  function reveal() {
    play(ctx => {
      [1046.50, 1318.51].forEach((freq, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine';
        const t = ctx.currentTime + i * 0.12;
        o.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(0.2, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        o.start(t);
        o.stop(t + 0.5);
      });
    });
  }

  // Game over / victory fanfare
  function victory() {
    play(ctx => {
      const melody = [
        {f:523.25, t:0},    {f:523.25, t:0.15},
        {f:523.25, t:0.3},  {f:415.30, t:0.45},
        {f:523.25, t:0.6},  {f:415.30, t:0.75},
        {f:659.25, t:0.9},
      ];
      melody.forEach(({f, t}) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'square';
        o.frequency.setValueAtTime(f, ctx.currentTime + t);
        g.gain.setValueAtTime(0.18, ctx.currentTime + t);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.18);
        o.start(ctx.currentTime + t);
        o.stop(ctx.currentTime + t + 0.2);
      });
    });
  }

  // Game start - ascending sweep
  function gameStart() {
    play(ctx => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(220, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.4);
      g.gain.setValueAtTime(0.25, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.5);
    });
  }

  return { tileClick, correct, wrong, questionOpen, reveal, victory, gameStart };
})();

// ═══════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════
let state = {
  players: [],
  categories: [], // [{name, difficulty}]
  scores: [],
  currentQ: null,
  usedCells: {},
  currentTurn: 0,
};

// ═══════════════════════════════════════════════════════
//  START SCREEN LOGIC
// ═══════════════════════════════════════════════════════
let playerCount = 1;
let selectedCats = {}; // {catName: difficulty}

function setPlayerCount(n) {
  playerCount = n;
  document.querySelectorAll('.pcount-btn').forEach((b,i)=>{
    b.classList.toggle('active', i+1===n);
  });
  for(let i=1;i<=3;i++){
    const pc = document.getElementById('pc'+i);
    if(pc) pc.style.display = i<=n ? 'flex':'none';
  }
}

function buildCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  Object.keys(CATEGORIES).forEach(catName => {
    const item = document.createElement('div');
    item.className = 'cat-item';
    item.id = 'cat_'+catName.replace(/\s+/g,'_');
    item.innerHTML = `
      <div class="cat-name">${catName}</div>
      <div class="diff-selector">
        <button class="diff-btn easy" data-cat="${catName}" data-diff="easy" onclick="toggleDiff(this,'easy','${catName}')">Easy</button>
        <button class="diff-btn medium" data-cat="${catName}" data-diff="medium" onclick="toggleDiff(this,'medium','${catName}')">Med</button>
        <button class="diff-btn hard" data-cat="${catName}" data-diff="hard" onclick="toggleDiff(this,'hard','${catName}')">Hard</button>
      </div>
    `;
    grid.appendChild(item);
  });
}

function toggleDiff(btn, diff, catName) {
  const itemEl = document.getElementById('cat_'+catName.replace(/\s+/g,'_'));
  const isCurrentlySelected = selectedCats[catName] === diff;

  if (isCurrentlySelected) {
    // deselect
    delete selectedCats[catName];
    itemEl.classList.remove('selected');
    itemEl.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  } else {
    const count = Object.keys(selectedCats).length;
    if(!selectedCats[catName] && count >= 6) { alert('You can only select 6 categories!'); return; }
    selectedCats[catName] = diff;
    itemEl.classList.add('selected');
    itemEl.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  updateCatCount();
}

function updateCatCount() {
  const c = Object.keys(selectedCats).length;
  document.getElementById('catCountDisplay').textContent = c;
  document.getElementById('startBtn').disabled = c !== 6;
}

function startGame() {
  // Build players
  state.players = [];
  for(let i=1;i<=playerCount;i++){
    const name = document.getElementById('p'+i+'name').value.trim() || 'Player '+i;
    state.players.push(name);
  }
  state.scores = state.players.map(()=>0);
  state.categories = Object.entries(selectedCats).map(([name,diff])=>({name,diff}));
  state.usedCells = {};
  state.currentTurn = 0;
  SFX.gameStart();
  showScreen('boardScreen');
  buildBoard();
  renderScoreboard();
}

// ═══════════════════════════════════════════════════════
//  BOARD
// ═══════════════════════════════════════════════════════
const VALUES = [200, 400, 600, 800, 1000];

function buildBoard() {
  const board = document.getElementById('board');
  const numCats = state.categories.length; // always 6
  board.style.gridTemplateColumns = `repeat(${numCats}, 1fr)`;
  board.innerHTML = '';

  // Headers
  state.categories.forEach(cat => {
    const h = document.createElement('div');
    h.className = 'cat-header';
    h.textContent = cat.name.toUpperCase();
    board.appendChild(h);
  });

  // 5 rows of value cells
  for(let row=0;row<5;row++){
    state.categories.forEach((cat, colIdx) => {
      const cellKey = `${colIdx}_${row}`;
      const cell = document.createElement('div');
      cell.className = 'cell' + (state.usedCells[cellKey] ? ' used':'');
      cell.innerHTML = `<span class="val">$${VALUES[row]}</span>`;
      cell.onclick = ()=> { SFX.tileClick(); openQuestion(cat, colIdx, row); };
      board.appendChild(cell);
    });
  }
}

function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';
  state.players.forEach((name, i) => {
    const cell = document.createElement('div');
    cell.className = 'score-cell' + (i===state.currentTurn ? ' current-turn':'');
    cell.id = 'scell_'+i;
    cell.innerHTML = `<div class="p-name">${name}</div><div class="p-score ${state.scores[i]<0?'negative':''}">${state.scores[i]<0?'-':''}$${Math.abs(state.scores[i])}</div>`;
    sb.appendChild(cell);
  });
}

// ═══════════════════════════════════════════════════════
//  QUESTION MODAL
// ═══════════════════════════════════════════════════════
function openQuestion(cat, colIdx, row) {
  const cellKey = `${colIdx}_${row}`;
  if(state.usedCells[cellKey]) return;

  const questions = CATEGORIES[cat.name][cat.diff];
  const q = questions[row];
  const value = VALUES[row];

  state.currentQ = {cat, colIdx, row, cellKey, q, value};

  document.getElementById('modalCat').textContent = cat.name.toUpperCase() + ' — ' + cat.diff.toUpperCase();
  document.getElementById('modalVal').textContent = '$' + value;
  document.getElementById('modalClue').textContent = q.q;
  document.getElementById('answerReveal').style.display = 'none';
  document.getElementById('answerReveal').textContent = '';

  // Build buzz row
  const buzzRow = document.getElementById('buzzRow');
  buzzRow.innerHTML = '';
  state.players.forEach((name, i) => {
    const card = document.createElement('div');
    card.className = 'buzz-card';
    card.innerHTML = `
      <div class="buzz-name">${name}</div>
      <div class="buzz-btns">
        <button class="buzz-btn correct" onclick="scorePlayer(${i}, true)">✓</button>
        <button class="buzz-btn wrong" onclick="scorePlayer(${i}, false)">✗</button>
      </div>
    `;
    buzzRow.appendChild(card);
  });

  SFX.questionOpen();
  document.getElementById('modalOverlay').classList.add('open');
}

function scorePlayer(playerIdx, correct) {
  const val = state.currentQ.value;
  if(correct){
    state.scores[playerIdx] += val;
    SFX.correct();
    flashFeedback('CORRECT!', true);
    // Correct answer — lock everyone out
    document.querySelectorAll('.buzz-btn').forEach(b => b.disabled = true);
  } else {
    state.scores[playerIdx] -= val;
    SFX.wrong();
    flashFeedback('WRONG!', false);
    // Wrong answer — only disable this player's buttons
    const cards = document.querySelectorAll('.buzz-card');
    cards[playerIdx].querySelectorAll('.buzz-btn').forEach(b => b.disabled = true);
  }
  renderScoreboard();
}

function revealAnswer() {
  SFX.reveal();
  const ans = document.getElementById('answerReveal');
  ans.textContent = '✓ ' + state.currentQ.q.a;
  ans.style.display = 'block';
}

function closeModal() {
  const {cellKey, colIdx, row} = state.currentQ;
  state.usedCells[cellKey] = true;

  // Mark cell used on board
  const cells = document.querySelectorAll('.cell');
  const numCats = state.categories.length;
  const cellIndex = row * numCats + colIdx;
  if(cells[cellIndex]) cells[cellIndex].classList.add('used');

  // Advance turn
  state.currentTurn = (state.currentTurn + 1) % state.players.length;
  renderScoreboard();
  document.getElementById('modalOverlay').classList.remove('open');

  // Check if game is over
  if(Object.keys(state.usedCells).length >= 30) {
    setTimeout(showEndScreen, 400);
  }
}

function flashFeedback(msg, correct) {
  const el = document.getElementById('feedbackFlash');
  el.textContent = msg;
  el.className = 'feedback-flash ' + (correct ? 'correct-flash':'wrong-flash');
  setTimeout(()=>el.classList.add('show'),10);
  setTimeout(()=>el.classList.remove('show'),900);
}

// ═══════════════════════════════════════════════════════
//  END SCREEN
// ═══════════════════════════════════════════════════════
function showEndScreen() {
  SFX.victory();
  showScreen('endScreen');
  const sorted = state.players
    .map((name,i)=>({name, score: state.scores[i]}))
    .sort((a,b)=>b.score-a.score);

  const medals = ['🥇','🥈','🥉'];
  const podiumOrder = sorted.length === 3 ? [sorted[1], sorted[0], sorted[2]] : (sorted.length === 2 ? [sorted[1], sorted[0]] : [sorted[0]]);
  const podiumClasses = sorted.length === 3 ? ['second','first','third'] : (sorted.length === 2 ? ['second','first'] : ['first']);

  const podium = document.getElementById('podium');
  podium.innerHTML = '';
  podiumOrder.forEach((p, idx) => {
    const rank = sorted.indexOf(p);
    const block = document.createElement('div');
    block.className = 'podium-block';
    block.innerHTML = `
      <div class="medal">${medals[rank] || ''}</div>
      <div class="podium-name">${p.name}</div>
      <div class="podium-score">${p.score<0?'-':''}$${Math.abs(p.score)}</div>
      <div class="podium-bar ${podiumClasses[idx]}"></div>
    `;
    podium.appendChild(block);
  });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  selectedCats = {};
  setPlayerCount(1);
  updateCatCount();
  buildCatGrid();
  showScreen('startScreen');
}

// ─── INIT ───
buildCatGrid();
</script>
