<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Left to Right 🎲</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f1a;
            --surface: #14172a;
            --surface2: #1c2040;
            --border: #2a2f55;
            --neon-blue: #00c8ff;
            --neon-pink: #ff2d87;
            --neon-green: #00ff99;
            --neon-yellow: #ffe600;
            --neon-orange: #ff7b00;
            --text: #e8eaf6;
            --text-dim: #6b7280;
            --eliminated: #ff2d5a;
            --winner-glow: #00ff99;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
        }

        /* Scanline overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* Ambient glow circles */
        body::after {
            content: '';
            position: fixed;
            top: -30vh; left: -20vw;
            width: 80vw; height: 80vh;
            background: radial-gradient(ellipse, rgba(0,200,255,0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        .bg-glow-right {
            position: fixed;
            bottom: -20vh; right: -20vw;
            width: 70vw; height: 70vh;
            background: radial-gradient(ellipse, rgba(255,45,135,0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        /* ── HEADER ── */
        header {
            text-align: center;
            padding: 28px 20px 16px;
            position: relative;
        }

        header h1 {
            font-family: 'Black Ops One', sans-serif;
            font-size: clamp(2.2rem, 6vw, 4rem);
            letter-spacing: 4px;
            color: var(--neon-blue);
            text-shadow:
                0 0 20px rgba(0,200,255,0.8),
                0 0 60px rgba(0,200,255,0.3);
            line-height: 1;
        }

        header p {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-top: 6px;
        }

        /* ── SETUP ── */
        .setup-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .setup-bar label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .setup-bar select {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--surface2);
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            border-radius: 6px;
            padding: 8px 14px;
            outline: none;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0,200,255,0.2);
        }

        /* ── BUTTONS ── */
        .btn {
            font-family: 'Black Ops One', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            border: none;
            border-radius: 6px;
            padding: 10px 22px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.1);
            opacity: 0;
            transition: opacity 0.2s;
        }
        .btn:hover:not(:disabled)::after { opacity: 1; }
        .btn:active:not(:disabled) { transform: scale(0.97); }
        .btn:disabled { opacity: 0.35; cursor: not-allowed; }

        .btn-blue {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 16px rgba(0,200,255,0.4);
        }
        .btn-blue:hover:not(:disabled) {
            box-shadow: 0 0 28px rgba(0,200,255,0.7);
        }

        .btn-green {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 16px rgba(0,255,153,0.4);
        }
        .btn-green:hover:not(:disabled) {
            box-shadow: 0 0 28px rgba(0,255,153,0.7);
        }

        .btn-pink {
            background: var(--neon-pink);
            color: #fff;
            box-shadow: 0 0 16px rgba(255,45,135,0.4);
        }
        .btn-pink:hover:not(:disabled) {
            box-shadow: 0 0 28px rgba(255,45,135,0.7);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
        }
        .btn-outline:hover:not(:disabled) {
            border-color: var(--text-dim);
            color: var(--text);
        }

        /* ── MAIN LAYOUT ── */
        .main {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 0;
            min-height: calc(100vh - 130px);
        }

        @media (max-width: 900px) {
            .main {
                grid-template-columns: 1fr;
            }
        }

        /* ── PLAYERS AREA ── */
        .players-area {
            padding: 20px;
            border-right: 1px solid var(--border);
        }

        .players-grid {
            display: grid;
            gap: 14px;
        }

        /* ── PLAYER CARD ── */
        .player-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 18px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .player-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            transition: all 0.4s;
        }

        .player-card.eliminated {
            border-color: rgba(255,45,90,0.3);
            background: rgba(255,45,90,0.04);
        }

        .player-card.eliminated::before {
            background: var(--eliminated);
            box-shadow: 0 0 8px var(--eliminated);
            opacity: 0.5;
        }

        .player-card.winner {
            border-color: var(--neon-green);
            background: rgba(0,255,153,0.05);
            box-shadow: 0 0 24px rgba(0,255,153,0.2);
            animation: winnerPulse 2s ease-in-out infinite;
        }

        .player-card.winner::before {
            background: var(--neon-green);
            box-shadow: 0 0 16px var(--neon-green);
        }

        @keyframes winnerPulse {
            0%, 100% { box-shadow: 0 0 24px rgba(0,255,153,0.2); }
            50% { box-shadow: 0 0 40px rgba(0,255,153,0.5); }
        }

        .player-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .player-rank-badge {
            font-family: 'Black Ops One', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 1px;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(255,45,90,0.2);
            color: var(--eliminated);
            border: 1px solid rgba(255,45,90,0.3);
            white-space: nowrap;
        }

        .player-rank-badge.winner {
            background: rgba(0,255,153,0.2);
            color: var(--neon-green);
            border-color: rgba(0,255,153,0.3);
        }

        .player-name-display {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text);
            flex: 1;
        }

        .player-card.eliminated .player-name-display {
            color: var(--text-dim);
        }

        .player-card.winner .player-name-display {
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0,255,153,0.5);
        }

        .player-name-input {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 5px 10px;
            outline: none;
            transition: border-color 0.2s;
            flex: 1;
            min-width: 0;
        }

        .player-name-input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 8px rgba(0,200,255,0.2);
        }

        /* ── SQUARES ── */
        .squares-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .square {
            width: 52px;
            height: 52px;
            border: 2px solid var(--border);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Black Ops One', sans-serif;
            font-size: 1.4rem;
            background: var(--surface2);
            color: var(--text-dim);
            transition: all 0.25s;
            position: relative;
        }

        .square.has-value {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            background: rgba(0,200,255,0.07);
            box-shadow: inset 0 0 10px rgba(0,200,255,0.1);
            cursor: pointer;
        }
        .square.has-value:hover {
            border-color: var(--eliminated);
            color: var(--eliminated);
            background: rgba(255,45,90,0.1);
        }

        .square.active-leftmost {
            border-color: var(--neon-yellow);
            color: var(--neon-yellow);
            background: rgba(255,230,0,0.08);
            box-shadow: 0 0 12px rgba(255,230,0,0.25), inset 0 0 8px rgba(255,230,0,0.1);
        }

        .square.elim-state {
            border-color: rgba(255,45,90,0.4);
            background: rgba(255,45,90,0.08);
            color: rgba(255,45,90,0.5);
            text-decoration: line-through;
            text-decoration-color: var(--eliminated);
            text-decoration-thickness: 3px;
        }

        .square-arrow {
            color: var(--text-dim);
            font-size: 0.9rem;
            opacity: 0.5;
        }

        /* ── NUMBER PALETTE ── */
        .num-palette {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            justify-content: center;
        }

        .palette-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text-dim);
            font-family: 'Black Ops One', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.18s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .palette-btn:hover {
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            background: rgba(0,200,255,0.1);
            box-shadow: 0 0 10px rgba(0,200,255,0.3);
            transform: translateY(-2px);
        }

        .palette-btn:active {
            transform: scale(0.93);
        }

        /* ── SIDE PANEL ── */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* ── DICE SECTION ── */
        .dice-section {
            padding: 28px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .dice-face {
            width: 110px;
            height: 110px;
            border: 3px solid var(--neon-blue);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: 'Black Ops One', sans-serif;
            font-size: 3.5rem;
            color: var(--neon-blue);
            background: rgba(0,200,255,0.05);
            box-shadow: 0 0 30px rgba(0,200,255,0.25), inset 0 0 20px rgba(0,200,255,0.05);
            margin-bottom: 12px;
            transition: all 0.15s;
            position: relative;
            user-select: none;
        }
        .dice-face.clickable {
            cursor: pointer;
        }
        .dice-face.clickable:hover {
            transform: scale(1.06);
            box-shadow: 0 0 45px rgba(0,200,255,0.6), inset 0 0 20px rgba(0,200,255,0.1);
        }
        .dice-face.clickable:active { transform: scale(0.97); }
        .dice-label {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.72rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .dice-face.rolling {
            animation: diceRoll 0.5s ease-in-out;
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            box-shadow: 0 0 30px rgba(255,45,135,0.4), inset 0 0 20px rgba(255,45,135,0.1);
        }

        @keyframes diceRoll {
            0% { transform: rotate(0deg) scale(1); }
            20% { transform: rotate(-15deg) scale(1.1); }
            40% { transform: rotate(15deg) scale(0.95); }
            60% { transform: rotate(-10deg) scale(1.05); }
            80% { transform: rotate(5deg) scale(0.98); }
            100% { transform: rotate(0deg) scale(1); }
        }

        .dice-face.result-flash {
            animation: resultFlash 0.3s ease forwards;
        }

        @keyframes resultFlash {
            0% { transform: scale(1.25); box-shadow: 0 0 60px rgba(0,200,255,0.8); }
            100% { transform: scale(1); }
        }

        /* ── STATUS BADGE ── */
        .status-msg {
            padding: 16px 20px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-msg.highlight {
            color: var(--neon-yellow);
        }

        .status-msg.winner-msg {
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0,255,153,0.5);
            font-size: 1.1rem;
        }

        /* ── ROLL LOG ── */
        .roll-log {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .roll-log h3 {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .log-entry {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            background: var(--surface2);
            border-radius: 6px;
            border-left: 3px solid transparent;
            animation: logSlide 0.3s ease;
        }

        @keyframes logSlide {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .log-entry.had-effect { border-left-color: var(--neon-pink); }
        .log-entry.no-effect { border-left-color: var(--text-dim); }
        .log-entry.win-entry { border-left-color: var(--neon-green); }

        .log-dice {
            font-family: 'Black Ops One', sans-serif;
            font-size: 1.1rem;
            color: var(--neon-blue);
            min-width: 24px;
            text-align: center;
        }

        .log-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            flex: 1;
        }

        .log-entry.had-effect .log-text { color: var(--text); }
        .log-entry.win-entry .log-text { color: var(--neon-green); }

        /* ── GAME CONTROLS BAR ── */
        .controls-bar {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ── HIDDEN ── */
        .hidden { display: none !important; }

        /* ── WINNER OVERLAY ── */
        .winner-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: overlayIn 0.4s ease;
        }

        @keyframes overlayIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .winner-card {
            background: var(--surface);
            border: 2px solid var(--neon-green);
            border-radius: 20px;
            padding: 50px 60px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0,255,153,0.3);
            animation: winCardIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
            max-width: 90vw;
        }

        @keyframes winCardIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .winner-card .trophy { font-size: 5rem; margin-bottom: 16px; display: block; }

        .winner-card h2 {
            font-family: 'Black Ops One', sans-serif;
            font-size: clamp(1.5rem, 5vw, 3rem);
            color: var(--neon-green);
            text-shadow: 0 0 30px rgba(0,255,153,0.6);
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .winner-card p {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            color: var(--text-dim);
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* ── CONFETTI ── */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -20px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
            z-index: 2000;
            pointer-events: none;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 600px) {
            .square { width: 42px; height: 42px; font-size: 1.1rem; }
            .square input { font-size: 1.1rem; }
            .player-card { padding: 10px 12px; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
    </style>
</head>
<body>
    <div class="bg-glow-right"></div>

    <header>
        <h1>🎲 LEFT TO RIGHT</h1>
        <p>Eliminate your squares — last one standing wins</p>
    </header>

    <div class="setup-bar">
        <label for="playerCount">Players</label>
        <select id="playerCount">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5" selected>5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
            <option value="13">13</option>
            <option value="14">14</option>
            <option value="15">15</option>
            <option value="16">16</option>
        </select>
        <button class="btn btn-blue" onclick="setupGame()">Setup Game</button>
        <div id="startBtnWrap">
            <button id="startGameBtn" class="btn btn-green" onclick="startGame()" disabled>▶ Start Game</button>
        </div>
        <button id="newGameBtn" class="btn btn-outline hidden" onclick="newGame()">↺ New Game</button>
    </div>

    <div id="mainArea" class="main hidden">
        <!-- Left: players -->
        <div class="players-area">
            <div id="playersGrid" class="players-grid"></div>
        </div>

        <!-- Right: controls + log -->
        <div class="side-panel">
            <div class="dice-section">
                <div class="dice-face" id="diceFace">?</div>
                <div class="dice-label" id="diceLabel">—</div>
            </div>

            <div id="statusMsg" class="status-msg">Set up the game to begin.</div>

            <div class="roll-log" id="rollLog">
                <h3>Roll History</h3>
            </div>
        </div>
    </div>

    <!-- Winner Overlay -->
    <div class="winner-overlay hidden" id="winnerOverlay">
        <div class="winner-card">
            <span class="trophy">🏆</span>
            <h2 id="winnerName">—</h2>
            <p>Wins the game!</p>
            <button class="btn btn-green" onclick="closeOverlay()">Continue</button>
        </div>
    </div>

    <script>
        let state = {
            players: [],
            gameStarted: false,
            gameEnded: false,
            rollCount: 0,
            eliminationOrder: [],
            rolling: false,
            pendingRoll: null   // roll result waiting to be "used"
        };

        /* ────── AUDIO ────── */
        function getCtx() {
            if (!window._audioCtx) window._audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return window._audioCtx;
        }
        function tone(freq, type, duration, gain, startDelay = 0) {
            const ctx = getCtx();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.connect(g); g.connect(ctx.destination);
            osc.frequency.value = freq; osc.type = type;
            const t = ctx.currentTime + startDelay;
            g.gain.setValueAtTime(gain, t);
            g.gain.exponentialRampToValueAtTime(0.001, t + duration);
            osc.start(t); osc.stop(t + duration);
        }
        function playClick()      { tone(600, 'sine', 0.06, 0.18); }
        function playRemove()     { tone(280, 'sine', 0.1, 0.15); }
        function playRoll()       { tone(300, 'sawtooth', 0.08, 0.15); }
        function playSingleElim() { tone(440,'square',0.12,0.2); tone(330,'square',0.15,0.15,0.1); }
        function playChainElim()  { [520,460,400,330].forEach((f,i)=>tone(f,'square',0.12,0.25,i*0.08)); }
        function playPlayerOut()  { [200,150,100].forEach((f,i)=>tone(f,'sawtooth',0.25,0.3,i*0.1)); }
        function playNoEffect()   { tone(180,'sine',0.18,0.12); }
        function playWin()        { [[523,0],[659,0.18],[784,0.36],[523,0.54],[784,0.72],[1047,0.9]].forEach(([f,t])=>tone(f,'sine',0.3,0.4,t)); }

        /* ────── SETUP ────── */
        function setupGame() {
            const count = parseInt(document.getElementById('playerCount').value);
            state.players = Array.from({ length: count }, (_, i) => ({
                id: i,
                name: `Player ${i + 1}`,
                squares: [null,null,null,null,null,null],
                eliminated: false,
                eliminationRank: null
            }));
            state.gameStarted = false;
            state.gameEnded = false;
            state.rollCount = 0;
            state.eliminationOrder = [];
            state.rolling = false;
            state.pendingRoll = null;

            document.getElementById('mainArea').classList.remove('hidden');
            document.getElementById('newGameBtn').classList.add('hidden');
            document.getElementById('startBtnWrap').classList.remove('hidden');
            document.getElementById('startGameBtn').disabled = true;
            setDiceIdle();
            clearLog();
            setStatus('Click a number on each player\'s palette to fill their squares.', '');
            setGrid();
        }

        function setGrid() {
            const n = state.players.length;
            const g = document.getElementById('playersGrid');
            g.style.gridTemplateColumns = n <= 2 ? '1fr' : n <= 6 ? 'repeat(2, 1fr)' : 'repeat(3, 1fr)';
            renderPlayers();
        }

        /* ────── RENDER ────── */
        function renderPlayers() {
            const g = document.getElementById('playersGrid');
            g.innerHTML = '';
            state.players.forEach(player => {
                const card = document.createElement('div');
                card.className = `player-card${player.eliminated ? ' eliminated' : ''}${isWinner(player) ? ' winner' : ''}`;
                card.id = `player-card-${player.id}`;

                const nameHtml = state.gameStarted
                    ? `<div class="player-name-display">${player.name}</div>`
                    : `<input class="player-name-input" type="text" value="${player.name}"
                         oninput="updateName(${player.id}, this.value)"
                         placeholder="Player ${player.id + 1}">`;

                let badgeHtml = '';
                if (isWinner(player)) {
                    badgeHtml = `<span class="player-rank-badge winner">🏆 Winner</span>`;
                } else if (player.eliminationRank !== null) {
                    badgeHtml = `<span class="player-rank-badge">OUT ${ordinal(player.eliminationRank)}</span>`;
                }

                // Leftmost active square index
                let leftmost = -1;
                if (state.gameStarted && !player.eliminated) {
                    for (let i = 0; i < player.squares.length; i++) {
                        const s = player.squares[i];
                        if (!(s && typeof s === 'object' && s.eliminated)) { leftmost = i; break; }
                    }
                }

                // Squares
                const squaresHtml = player.squares.map((sq, i) => {
                    if (!state.gameStarted) {
                        const v = (sq !== null && typeof sq === 'number') ? sq : '';
                        const cls = v ? 'has-value' : '';
                        const clickHandler = v ? `onclick="removeSquare(${player.id}, ${i})"` : '';
                        const label = v || '·';
                        return `<div class="square ${cls}" ${clickHandler} title="${v ? 'Click to remove' : ''}">${label}</div>`
                             + (i < 5 ? `<span class="square-arrow">›</span>` : '');
                    } else {
                        if (sq && typeof sq === 'object' && sq.eliminated) {
                            return `<div class="square elim-state">${sq.v}</div>` + (i < 5 ? `<span class="square-arrow">›</span>` : '');
                        } else if (sq !== null) {
                            const isLeft = i === leftmost;
                            return `<div class="square ${isLeft ? 'active-leftmost' : 'has-value'}">${sq}</div>` + (i < 5 ? `<span class="square-arrow">›</span>` : '');
                        } else {
                            return `<div class="square"></div>` + (i < 5 ? `<span class="square-arrow">›</span>` : '');
                        }
                    }
                }).join('');

                // Number palette (setup only, not eliminated)
                let paletteHtml = '';
                if (!state.gameStarted) {
                    const nextEmpty = player.squares.indexOf(null);
                    const full = nextEmpty === -1;
                    paletteHtml = `<div class="num-palette">` +
                        [1,2,3,4,5,6].map(n =>
                            `<button class="palette-btn" onclick="addSquare(${player.id}, ${n})"
                              ${full ? 'disabled style="opacity:0.25;cursor:not-allowed"' : ''}>${n}</button>`
                        ).join('') +
                        `</div>`;
                }

                card.innerHTML = `
                    <div class="player-top">${nameHtml}${badgeHtml}</div>
                    <div class="squares-row">${squaresHtml}</div>
                    ${paletteHtml}
                `;
                g.appendChild(card);
            });
            checkStartable();
        }

        /* ────── PALETTE INTERACTIONS ────── */
        function addSquare(pid, num) {
            const player = state.players[pid];
            const idx = player.squares.indexOf(null);
            if (idx === -1) return; // already full
            player.squares[idx] = num;
            playClick();
            renderPlayers();
        }

        function removeSquare(pid, idx) {
            if (state.gameStarted) return;
            state.players[pid].squares[idx] = null;
            playRemove();
            renderPlayers();
        }

        function updateName(pid, val) {
            state.players[pid].name = val.trim() || `Player ${pid + 1}`;
        }

        function checkStartable() {
            const ok = !state.gameStarted && state.players.every(p => p.squares.every(s => s !== null && typeof s === 'number'));
            document.getElementById('startGameBtn').disabled = !ok;
        }

        /* ────── GAME FLOW ────── */
        function startGame() {
            state.gameStarted = true;
            document.getElementById('startBtnWrap').classList.add('hidden');
            setStatus('Click the die to roll!', 'highlight');
            setDiceReady();
            renderPlayers();
        }

        function setDiceIdle() {
            const face = document.getElementById('diceFace');
            const label = document.getElementById('diceLabel');
            face.textContent = '?';
            face.className = 'dice-face';
            face.onclick = null;
            label.textContent = '—';
        }

        function setDiceReady() {
            const face = document.getElementById('diceFace');
            const label = document.getElementById('diceLabel');
            face.className = 'dice-face clickable';
            face.onclick = rollDice;
            label.textContent = 'Click to roll';
        }

        function rollDice() {
            if (state.gameEnded || state.rolling) return;
            state.rolling = true;

            const face = document.getElementById('diceFace');
            const label = document.getElementById('diceLabel');
            face.className = 'dice-face rolling';
            face.onclick = null;
            label.textContent = 'Rolling…';
            playRoll();

            let ticks = 0;
            const iv = setInterval(() => {
                face.textContent = Math.ceil(Math.random() * 6);
                ticks++;
                if (ticks >= 12) {
                    clearInterval(iv);
                    const result = Math.ceil(Math.random() * 6);
                    face.textContent = result;
                    face.className = 'dice-face result-flash';
                    setTimeout(() => { face.className = 'dice-face'; }, 350);
                    state.rolling = false;
                    processRoll(result);
                }
            }, 55);
        }

        function processRoll(val) {
            state.rollCount++;
            let totalEliminated = 0;
            let maxChain = 0;
            let newlyOut = [];

            state.players.forEach(player => {
                if (player.eliminated) return;
                let chain = 0;
                let keep = true;
                while (keep) {
                    keep = false;
                    for (let i = 0; i < player.squares.length; i++) {
                        const sq = player.squares[i];
                        if (sq && typeof sq === 'object' && sq.eliminated) continue;
                        if (sq === val) {
                            player.squares[i] = { v: val, eliminated: true };
                            chain++; totalEliminated++; keep = true;
                        }
                        break;
                    }
                }
                if (chain > maxChain) maxChain = chain;
                if (player.squares.every(s => s && typeof s === 'object' && s.eliminated) && !player.eliminated) {
                    player.eliminated = true;
                    state.eliminationOrder.push(player.id);
                    player.eliminationRank = state.eliminationOrder.length;
                    newlyOut.push(player.name);
                }
            });

            let logText, logClass;
            if (totalEliminated === 0) {
                logText = 'No matches — rerolling';
                logClass = 'no-effect';
                addLog(val, logText, logClass);
                playNoEffect();
                setStatus(`Rolled ${val} — no matches! Rerolling…`, '');
                renderPlayers();
                setTimeout(() => { if (!state.gameEnded) rollDice(); }, 900);
                return;
            } else if (maxChain >= 2) {
                logText = `${totalEliminated} eliminated (chain!)`;
                logClass = 'had-effect';
                playChainElim();
            } else {
                logText = `${totalEliminated} square${totalEliminated !== 1 ? 's' : ''} eliminated`;
                logClass = 'had-effect';
                playSingleElim();
            }

            if (newlyOut.length) {
                setTimeout(playPlayerOut, 350);
                logText += ` · ${newlyOut.join(', ')} out!`;
            }

            addLog(val, logText, logClass);
            renderPlayers();
            setStatus(`Rolled ${val} — ${logText}`, 'highlight');
            checkWin();
            if (!state.gameEnded) setDiceReady();
        }

        function checkWin() {
            const active = state.players.filter(p => !p.eliminated);
            if (active.length <= 1) {
                state.gameEnded = true;
                setDiceIdle();
                document.getElementById('newGameBtn').classList.remove('hidden');
                if (active.length === 1) {
                    const w = active[0];
                    setStatus(`🏆 ${w.name} wins!`, 'winner-msg');
                    addLog('🏆', `${w.name} wins!`, 'win-entry');
                    renderPlayers();
                    setTimeout(() => { playWin(); showWinnerOverlay(w.name); launchConfetti(); }, 400);
                } else {
                    setStatus("It's a tie — everyone's out!", '');
                    renderPlayers();
                }
            }
        }

        function isWinner(player) {
            if (!state.gameEnded) return false;
            return !player.eliminated;
        }

        /* ────── UI HELPERS ────── */
        function setStatus(msg, cls) {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.className = `status-msg${cls ? ' ' + cls : ''}`;
        }

        function addLog(dice, text, cls) {
            const log = document.getElementById('rollLog');
            const entry = document.createElement('div');
            entry.className = `log-entry ${cls}`;
            entry.innerHTML = `<span class="log-dice">${dice}</span><span class="log-text">${text}</span>`;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function clearLog() {
            document.getElementById('rollLog').innerHTML = '<h3>Roll History</h3>';
        }

        function ordinal(n) {
            const s = ['th','st','nd','rd'], v = n % 100;
            return n + (s[(v-20)%10] || s[v] || s[0]);
        }

        /* ────── WINNER OVERLAY ────── */
        function showWinnerOverlay(name) {
            document.getElementById('winnerName').textContent = name;
            document.getElementById('winnerOverlay').classList.remove('hidden');
        }
        function closeOverlay() {
            document.getElementById('winnerOverlay').classList.add('hidden');
        }

        function launchConfetti() {
            const colors = ['#00c8ff','#ff2d87','#00ff99','#ffe600','#ff7b00','#c77dff'];
            for (let i = 0; i < 80; i++) {
                const el = document.createElement('div');
                el.className = 'confetti-piece';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.background = colors[Math.floor(Math.random() * colors.length)];
                el.style.width  = (Math.random() * 10 + 6) + 'px';
                el.style.height = (Math.random() * 6 + 4) + 'px';
                el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                const dur = (Math.random() * 2 + 2).toFixed(2);
                el.style.animationDuration = dur + 's';
                el.style.animationDelay = (Math.random() * 1).toFixed(2) + 's';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), (parseFloat(dur) + 1.5) * 1000);
            }
        }

        /* ────── NEW GAME ────── */
        function newGame() {
            closeOverlay();
            state.players.forEach(p => {
                p.squares = [null,null,null,null,null,null];
                p.eliminated = false;
                p.eliminationRank = null;
            });
            state.gameStarted = false;
            state.gameEnded = false;
            state.rollCount = 0;
            state.eliminationOrder = [];
            state.rolling = false;
            document.getElementById('newGameBtn').classList.add('hidden');
            document.getElementById('startBtnWrap').classList.remove('hidden');
            document.getElementById('startGameBtn').disabled = true;
            setDiceIdle();
            clearLog();
            setStatus('Click a number on each player\'s palette to fill their squares.', '');
            renderPlayers();
        }

        /* ────── INIT ────── */
        setupGame();
    </script>
</body>
</html>
