<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mastermind</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{font-family:'Open Sans',sans-serif;min-height:100vh;overflow-x:hidden;background:#07051a;color:#fff}
  h1,h2,h3,.heading{font-family:'Montserrat',sans-serif;font-weight:900}
  #bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
  .layer{position:relative;z-index:1}

  /* Pegs */
  .peg,.pslot{width:38px;height:38px;border-radius:50%;flex-shrink:0;position:relative;transition:transform .12s,box-shadow .12s}
  .peg::after{content:'';position:absolute;width:36%;height:36%;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.75) 0%,transparent 80%);top:14%;left:14%}
  .peg:hover{transform:scale(1.12)}
  .pslot{border:2px dashed rgba(255,255,255,.22);background:rgba(0,0,0,.3)}
  .pslot.filled{border:none}

  /* Feedback pegs */
  .fb-grid{display:grid;gap:3px;align-content:center;justify-content:center}
  .fb-peg{width:13px;height:13px;border-radius:50%}
  .fb-b{background:#111;box-shadow:0 0 5px rgba(255,255,255,.4)}
  .fb-w{background:#f5f5f5;box-shadow:0 0 4px rgba(255,255,255,.5)}
  .fb-e{background:rgba(255,255,255,.1)}

  /* Team board */
  .t-board{background:rgba(255,255,255,.06);backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,.12);border-radius:18px;transition:border-color .3s,box-shadow .3s;display:flex;flex-direction:column;overflow:hidden}
  .t-board.active{box-shadow:0 0 0 2px var(--tc),0 0 28px color-mix(in srgb,var(--tc) 45%,transparent),0 0 60px color-mix(in srgb,var(--tc) 20%,transparent)}
  .t-board.solved .board-inner{opacity:.65}
  .t-header{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,.1)}
  .t-badge{width:14px;height:14px;border-radius:50%;background:var(--tc);flex-shrink:0;box-shadow:0 0 8px var(--tc)}
  .board-inner{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:3px;min-height:0}
  .board-inner::-webkit-scrollbar{width:3px}
  .board-inner::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}

  /* Guess row */
  .g-row{display:flex;align-items:center;gap:5px;padding:3px 5px;border-radius:8px;animation:rowIn .2s ease}
  .g-row.active-row{background:rgba(255,255,255,.09)}
  @keyframes rowIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* Palette peg */
  .pal-peg{width:46px;height:46px;border-radius:50%;cursor:pointer;position:relative;transition:transform .15s,box-shadow .15s;border:3px solid transparent;flex-shrink:0}
  .pal-peg::after{content:'';position:absolute;width:34%;height:34%;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.75) 0%,transparent 80%);top:13%;left:13%}
  .pal-peg:hover{transform:scale(1.14)}
  .pal-peg.sel{border-color:#fff;box-shadow:0 0 14px rgba(255,255,255,.7)}

  /* Guess input slots */
  .g-slot{width:46px;height:46px;border-radius:50%;flex-shrink:0;position:relative;transition:.15s}
  .g-slot.empty{border:2px dashed rgba(255,255,255,.3);background:rgba(0,0,0,.3);cursor:default}
  .g-slot.set{border:none;cursor:pointer}
  .g-slot.set::after{content:'×';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:rgba(255,255,255,0);transition:.15s}
  .g-slot.set:hover::after{color:rgba(255,255,255,.8)}
  .g-slot::before{content:'';position:absolute;width:34%;height:34%;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.7) 0%,transparent 80%);top:13%;left:13%;pointer-events:none}
  .g-slot.empty::before{display:none}

  /* Buttons */
  .btn{padding:10px 22px;border-radius:12px;font-weight:700;cursor:pointer;transition:.18s;border:none;font-family:'Open Sans',sans-serif;font-size:15px}
  .btn-primary{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;box-shadow:0 4px 18px rgba(124,58,237,.4)}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(124,58,237,.55)}
  .btn-secondary{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2)}
  .btn-secondary:hover{background:rgba(255,255,255,.2)}
  .btn-danger{background:rgba(239,68,68,.2);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
  .btn-danger:hover{background:rgba(239,68,68,.35)}
  .btn-submit{background:linear-gradient(135deg,#059669,#10b981);color:#fff;padding:12px 30px;font-size:16px;box-shadow:0 4px 18px rgba(5,150,105,.4)}
  .btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(5,150,105,.55)}
  .btn-submit:disabled{opacity:.35;pointer-events:none}

  /* Glass card */
  .glass{background:rgba(255,255,255,.07);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.14);border-radius:18px}

  /* Modal */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}

  /* Range */
  input[type=range]{accent-color:#7c3aed;width:100%}
  input[type=text]{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:10px 14px;color:#fff;font-size:16px;width:100%;outline:none;font-family:'Open Sans',sans-serif}
  input[type=text]:focus{border-color:#7c3aed;box-shadow:0 0 0 2px rgba(124,58,237,.3)}

  /* Solved banner */
  .solved-banner{background:linear-gradient(135deg,rgba(5,150,105,.3),rgba(16,185,129,.2));border:1px solid rgba(16,185,129,.4);border-radius:10px;padding:6px 12px;font-size:13px;font-weight:700;color:#34d399;display:flex;align-items:center;gap:6px}
  .failed-banner{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:6px 12px;font-size:13px;font-weight:700;color:#f87171;display:flex;align-items:center;gap:6px}

  /* Turn arrow */
  .turn-arrow{display:inline-block;animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.95)}}

  /* Secret reveal */
  .secret-peg{width:28px;height:28px;border-radius:50%;flex-shrink:0;position:relative}
  .secret-peg::after{content:'';position:absolute;width:34%;height:34%;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.7) 0%,transparent 80%);top:13%;left:13%}

  /* Responsive boards */
  #boards-grid.teams-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  #boards-grid.teams-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  #boards-grid.teams-4{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  @media(max-width:700px){
    #boards-grid.teams-2,#boards-grid.teams-3,#boards-grid.teams-4{grid-template-columns:1fr}
    .peg,.pslot{width:30px;height:30px}
    .pal-peg,.g-slot{width:38px;height:38px}
  }

  .back-link{position:fixed;top:14px;left:14px;z-index:50;background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.18);border-radius:20px;padding:6px 14px;color:#fff;text-decoration:none;font-size:13px;font-weight:600;transition:.18s}
  .back-link:hover{background:rgba(255,255,255,.2)}

  #setup-screen,#naming-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  #game-screen{min-height:100vh;display:flex;flex-direction:column;padding:0}
  .hidden{display:none!important}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<a class="back-link layer" href="../">← Game Hub</a>

<!-- ═══════════════ SETUP SCREEN ═══════════════ -->
<div id="setup-screen" class="layer">
  <div class="glass" style="width:100%;max-width:480px;padding:36px 32px">
    <h1 class="text-3xl text-center mb-2" style="letter-spacing:-1px">🎯 Mastermind</h1>
    <p class="text-center text-sm mb-8" style="color:rgba(255,255,255,.5)">Crack the secret colour code</p>

    <div style="display:flex;flex-direction:column;gap:22px">

      <div>
        <label class="text-sm font-semibold mb-1 block" style="color:rgba(255,255,255,.7)">Teams</label>
        <div style="display:flex;gap:8px">
          <button class="team-opt btn btn-primary" data-v="2">2</button>
          <button class="team-opt btn btn-secondary" data-v="3">3</button>
          <button class="team-opt btn btn-secondary" data-v="4">4</button>
        </div>
      </div>

      <div>
        <label class="text-sm font-semibold mb-1 block" style="color:rgba(255,255,255,.7)">Code Length: <span id="lbl-len">4</span></label>
        <input type="range" id="rng-len" min="3" max="6" value="4">
      </div>

      <div>
        <label class="text-sm font-semibold mb-1 block" style="color:rgba(255,255,255,.7)">Colours Available: <span id="lbl-clr">6</span></label>
        <input type="range" id="rng-clr" min="4" max="8" value="6">
      </div>

      <div>
        <label class="text-sm font-semibold mb-1 block" style="color:rgba(255,255,255,.7)">Max Guesses: <span id="lbl-mg">10</span></label>
        <input type="range" id="rng-mg" min="6" max="14" value="10">
      </div>

      <div style="display:flex;align-items:center;gap:12px">
        <label class="text-sm font-semibold" style="color:rgba(255,255,255,.7)">Allow Duplicate Colours</label>
        <div id="dup-toggle" onclick="toggleDup()" style="width:44px;height:24px;border-radius:12px;background:#7c3aed;cursor:pointer;position:relative;transition:.2s;flex-shrink:0">
          <div style="width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;right:3px;transition:.2s"></div>
        </div>
        <span id="dup-label" class="text-xs" style="color:rgba(255,255,255,.5)">On</span>
      </div>

      <button class="btn btn-primary" style="font-size:17px;padding:13px" onclick="goToNaming()">Next: Name Your Teams →</button>
    </div>
  </div>
</div>

<!-- ═══════════════ NAMING SCREEN ═══════════════ -->
<div id="naming-screen" class="hidden layer">
  <div class="glass" style="width:100%;max-width:440px;padding:36px 32px">
    <h2 class="text-2xl text-center mb-6">Team Names</h2>
    <div id="name-inputs" style="display:flex;flex-direction:column;gap:14px;margin-bottom:24px"></div>
    <button class="btn btn-primary" style="width:100%;font-size:16px;padding:13px" onclick="goToSetting()">Next: Set Secret Codes →</button>
    <button class="btn btn-secondary" style="width:100%;font-size:14px;padding:10px;margin-top:10px" onclick="show('setup-screen');show_hide('naming-screen',false)">← Back</button>
  </div>
</div>

<!-- ═══════════════ CODE SETTING MODAL ═══════════════ -->
<div id="setting-modal" class="modal hidden">
  <div class="glass" style="width:100%;max-width:480px;padding:32px;text-align:center">
    <p class="text-sm mb-1" style="color:rgba(255,255,255,.5)">SECRET CODE ENTRY</p>
    <h2 id="setter-title" class="text-xl mb-2 heading"></h2>
    <p id="setter-sub" class="text-sm mb-8" style="color:rgba(255,255,255,.55)"></p>
    <div id="modal-slots" style="display:flex;gap:10px;justify-content:center;margin-bottom:24px;flex-wrap:wrap"></div>
    <div id="modal-palette" style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px"></div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-danger" onclick="clearModal()">✕ Clear</button>
      <button id="modal-confirm" class="btn btn-submit" onclick="confirmCode()" disabled>✓ Lock In Code</button>
    </div>
  </div>
</div>

<!-- ═══════════════ GAME SCREEN ═══════════════ -->
<div id="game-screen" class="hidden layer" style="flex-direction:column;min-height:100vh">

  <!-- Top bar -->
  <div style="padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid rgba(255,255,255,.08)">
    <h1 class="heading text-xl" style="letter-spacing:-.5px">🎯 Mastermind</h1>
    <div id="turn-indicator" style="font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px"></div>
    <button class="btn btn-secondary" style="font-size:12px;padding:6px 14px" onclick="confirmReset()">↺ New Game</button>
  </div>

  <!-- Boards -->
  <div id="boards-grid" class="teams-2" style="flex:1;padding:12px;align-items:start;overflow:auto"></div>

  <!-- Action Bar -->
  <div id="action-bar" style="padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.3);backdrop-filter:blur(10px)">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center">
      <!-- Current guess display -->
      <div id="cur-guess-slots" style="display:flex;gap:6px;align-items:center"></div>
      <div style="width:1px;height:40px;background:rgba(255,255,255,.15);flex-shrink:0"></div>
      <!-- Palette -->
      <div id="palette" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center"></div>
      <div style="width:1px;height:40px;background:rgba(255,255,255,.15);flex-shrink:0"></div>
      <!-- Buttons -->
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-danger" style="padding:8px 14px;font-size:13px" onclick="clearGuess()">✕ Clear</button>
        <button id="btn-submit" class="btn btn-submit" onclick="submitGuess()" disabled>Submit ↵</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════ RESULTS SCREEN ═══════════════ -->
<div id="results-screen" class="hidden layer" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px">
  <div class="glass" style="width:100%;max-width:520px;padding:36px 32px;text-align:center">
    <div id="results-title" style="font-size:48px;margin-bottom:8px"></div>
    <h2 id="results-heading" class="text-2xl heading mb-6"></h2>
    <div id="results-list" style="display:flex;flex-direction:column;gap:10px;margin-bottom:28px"></div>
    <button class="btn btn-primary" style="font-size:16px;padding:13px 36px" onclick="fullReset()">Play Again</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   BACKGROUND CANVAS
═══════════════════════════════════════════════════ */
(function(){
  const c=document.getElementById('bg-canvas');
  const ctx=c.getContext('2d');
  const orbs=[];
  function resize(){c.width=innerWidth;c.height=innerHeight}
  resize();addEventListener('resize',resize);

  const PAL=['#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#a855f7','#ec4899','#14b8a6'];
  for(let i=0;i<22;i++){
    orbs.push({
      x:Math.random()*innerWidth,y:Math.random()*innerHeight,
      r:30+Math.random()*90,
      col:PAL[i%PAL.length],
      dx:(Math.random()-.5)*.22,dy:(Math.random()-.5)*.22,
      alpha:.06+Math.random()*.1
    });
  }

  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    const grad=ctx.createLinearGradient(0,0,c.width,c.height);
    grad.addColorStop(0,'#07051a');
    grad.addColorStop(.5,'#0d0926');
    grad.addColorStop(1,'#070518');
    ctx.fillStyle=grad;ctx.fillRect(0,0,c.width,c.height);

    for(const o of orbs){
      const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0,o.col+'cc');
      g.addColorStop(1,o.col+'00');
      ctx.globalAlpha=o.alpha;
      ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);
      ctx.fillStyle=g;ctx.fill();
      o.x+=o.dx;o.y+=o.dy;
      if(o.x<-o.r)o.x=c.width+o.r;
      if(o.x>c.width+o.r)o.x=-o.r;
      if(o.y<-o.r)o.y=c.height+o.r;
      if(o.y>c.height+o.r)o.y=-o.r;
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ═══════════════════════════════════════════════════
   AUDIO
═══════════════════════════════════════════════════ */
const AC=new(window.AudioContext||window.webkitAudioContext)();
function beep(freq,dur,type='sine',vol=.18,decay=.9){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+dur);
  o.start(AC.currentTime);o.stop(AC.currentTime+dur);
}
function sndClick(){beep(880,.07,'sine',.12)}
function sndPlace(){beep(660,.08,'sine',.14)}
function sndClear(){beep(300,.1,'sine',.1)}
function sndWrong(){beep(200,.25,'sawtooth',.12)}
function sndWin(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.25,'sine',.22),i*90));
}
function sndSolve(){
  [784,988,1175,1568].forEach((f,i)=>setTimeout(()=>beep(f,.2,'sine',.18),i*70));
}
function sndGameOver(){
  [400,350,300,250].forEach((f,i)=>setTimeout(()=>beep(f,.28,'sawtooth',.15),i*100));
}
function sndFeedback(b,w){
  for(let i=0;i<b;i++)setTimeout(()=>beep(880,.06,'sine',.16),i*55);
  for(let i=0;i<w;i++)setTimeout(()=>beep(550,.06,'sine',.10),b*55+i*50);
}

/* ═══════════════════════════════════════════════════
   CONSTANTS & STATE
═══════════════════════════════════════════════════ */
const COLORS=[
  {h:'#ef4444',n:'Red'},{h:'#f97316',n:'Orange'},{h:'#eab308',n:'Yellow'},{h:'#22c55e',n:'Green'},
  {h:'#3b82f6',n:'Blue'},{h:'#a855f7',n:'Purple'},{h:'#ec4899',n:'Pink'},{h:'#14b8a6',n:'Teal'}
];
const TEAM_COLS=['#f43f5e','#38bdf8','#4ade80','#fb923c'];

let CFG={numTeams:2,codeLen:4,numColors:6,allowDups:true,maxGuesses:10};
let allowDups=true;

let GAME={
  teams:[],          // [{name,secret,guesses:[{g,b,w}],solved,failed}]
  active:0,          // index of team currently guessing
  settingQ:[],       // indices of teams yet to set their code
  curGuess:[],       // slots for current guess
  phase:'setup'      // setup|naming|setting|game|done
};

/* ═══════════════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════════════ */
function show(id){document.getElementById(id).classList.remove('hidden')}
function hide(id){document.getElementById(id).classList.add('hidden')}
function show_hide(id,v){v?show(id):hide(id)}
function $id(id){return document.getElementById(id)}

function evaluate(guess,secret){
  let black=0,white=0;
  const gr=[],sr=[];
  for(let i=0;i<guess.length;i++){
    if(guess[i]===secret[i])black++;
    else{gr.push(guess[i]);sr.push(secret[i]);}
  }
  for(const c of gr){const i=sr.indexOf(c);if(i!==-1){white++;sr.splice(i,1);}}
  return{black,white};
}

/* ═══════════════════════════════════════════════════
   SETUP SCREEN
═══════════════════════════════════════════════════ */
document.querySelectorAll('.team-opt').forEach(b=>{
  b.addEventListener('click',function(){
    document.querySelectorAll('.team-opt').forEach(x=>{x.className='team-opt btn btn-secondary'});
    this.className='team-opt btn btn-primary';
    CFG.numTeams=parseInt(this.dataset.v);
  });
});
$id('rng-len').addEventListener('input',function(){$id('lbl-len').textContent=this.value;CFG.codeLen=+this.value});
$id('rng-clr').addEventListener('input',function(){$id('lbl-clr').textContent=this.value;CFG.numColors=+this.value});
$id('rng-mg').addEventListener('input',function(){$id('lbl-mg').textContent=this.value;CFG.maxGuesses=+this.value});

function toggleDup(){
  allowDups=!allowDups;
  const t=$id('dup-toggle');
  const dot=t.querySelector('div');
  t.style.background=allowDups?'#7c3aed':'rgba(255,255,255,.15)';
  dot.style.right=allowDups?'3px':'calc(100% - 21px)';
  $id('dup-label').textContent=allowDups?'On':'Off';
}

function goToNaming(){
  CFG.allowDups=allowDups;
  hide('setup-screen');
  const ni=$id('name-inputs');
  ni.innerHTML='';
  for(let i=0;i<CFG.numTeams;i++){
    const wrapper=document.createElement('div');
    wrapper.style.display='flex';wrapper.style.alignItems='center';wrapper.style.gap='10px';
    const dot=document.createElement('div');
    dot.style.cssText=`width:14px;height:14px;border-radius:50%;background:${TEAM_COLS[i]};box-shadow:0 0 8px ${TEAM_COLS[i]};flex-shrink:0`;
    const inp=document.createElement('input');
    inp.type='text';inp.placeholder=`Team ${String.fromCharCode(65+i)} name`;
    inp.id=`tname-${i}`;inp.value=`Team ${String.fromCharCode(65+i)}`;
    wrapper.append(dot,inp);ni.append(wrapper);
  }
  show('naming-screen');
}

/* ═══════════════════════════════════════════════════
   CODE SETTING PHASE
═══════════════════════════════════════════════════ */
let modalGuess=[];

function goToSetting(){
  // Collect names
  GAME.teams=[];
  for(let i=0;i<CFG.numTeams;i++){
    const name=$id(`tname-${i}`).value.trim()||`Team ${String.fromCharCode(65+i)}`;
    GAME.teams.push({name,color:TEAM_COLS[i],secret:null,guesses:[],solved:false,failed:false});
  }
  // Setting order: team[i] sets code FOR team[(i-1+n)%n]
  // So team[i] receives code from team[(i+1)%n]
  // Setting queue: [0,1,2,...] where setter i sets secret for target (i-1+n)%n
  GAME.settingQ=[...Array(CFG.numTeams).keys()];
  GAME.phase='setting';
  hide('naming-screen');
  show('game-screen');
  renderBoards();
  nextSetter();
}

function nextSetter(){
  if(GAME.settingQ.length===0){startGame();return;}
  const setterIdx=GAME.settingQ[0];
  const targetIdx=(setterIdx-1+CFG.numTeams)%CFG.numTeams;
  const setter=GAME.teams[setterIdx];
  const target=GAME.teams[targetIdx];
  modalGuess=[];
  $id('setter-title').textContent=`${setter.name} — Enter a Secret Code`;
  $id('setter-sub').textContent=`Set a code for ${target.name} to crack! (Don't let them see!)`;
  renderModalSlots();
  renderModalPalette();
  $id('modal-confirm').disabled=true;
  show('setting-modal');
}

function renderModalSlots(){
  const c=$id('modal-slots');c.innerHTML='';
  for(let i=0;i<CFG.codeLen;i++){
    const s=document.createElement('div');
    s.className='g-slot';
    if(modalGuess[i]!==undefined){
      s.classList.add('set');
      s.style.background=COLORS[modalGuess[i]].h;
      s.style.boxShadow=`0 0 12px ${COLORS[modalGuess[i]].h}99`;
      s.addEventListener('click',()=>{modalGuess.splice(i,1,undefined);modalGuess=modalGuess.filter((_,j)=>j<i);renderModalSlots();checkModalReady()});
    } else {
      s.classList.add('empty');
    }
    c.append(s);
  }
}

function renderModalPalette(){
  const c=$id('modal-palette');c.innerHTML='';
  for(let i=0;i<CFG.numColors;i++){
    const p=document.createElement('div');
    p.className='pal-peg';
    p.style.background=COLORS[i].h;
    p.style.boxShadow=`0 4px 12px ${COLORS[i].h}66`;
    p.addEventListener('click',()=>placeModalPeg(i));
    c.append(p);
  }
}

function placeModalPeg(cIdx){
  if(modalGuess.filter(x=>x!==undefined).length>=CFG.codeLen)return;
  if(!CFG.allowDups&&modalGuess.includes(cIdx))return;
  modalGuess.push(cIdx);
  sndPlace();
  renderModalSlots();
  checkModalReady();
}

function clearModal(){
  modalGuess=[];sndClear();
  renderModalSlots();$id('modal-confirm').disabled=true;
}

function checkModalReady(){
  $id('modal-confirm').disabled=modalGuess.filter(x=>x!==undefined).length<CFG.codeLen;
}

function confirmCode(){
  const setterIdx=GAME.settingQ.shift();
  const targetIdx=(setterIdx-1+CFG.numTeams)%CFG.numTeams;
  GAME.teams[targetIdx].secret=[...modalGuess];
  hide('setting-modal');
  sndClick();
  renderBoards();
  setTimeout(nextSetter,300);
}

/* ═══════════════════════════════════════════════════
   GAME START
═══════════════════════════════════════════════════ */
function startGame(){
  GAME.phase='game';
  GAME.active=0;
  GAME.curGuess=Array(CFG.codeLen).fill(null);
  renderBoards();
  renderPalette();
  renderCurGuess();
  updateTurnIndicator();
}

/* ═══════════════════════════════════════════════════
   BOARD RENDERING
═══════════════════════════════════════════════════ */
function renderBoards(){
  const grid=$id('boards-grid');
  grid.className=`teams-${CFG.numTeams}`;
  grid.innerHTML='';
  for(let ti=0;ti<GAME.teams.length;ti++){
    grid.append(buildBoard(ti));
  }
}

function buildBoard(ti){
  const t=GAME.teams[ti];
  const board=document.createElement('div');
  board.className='t-board';
  board.id=`board-${ti}`;
  board.style.setProperty('--tc',t.color);
  if(GAME.phase==='game'&&ti===GAME.active)board.classList.add('active');
  if(t.solved)board.classList.add('solved');

  // Header
  const hdr=document.createElement('div');
  hdr.className='t-header';
  const badge=document.createElement('div');badge.className='t-badge';
  const name=document.createElement('span');name.className='heading';name.style.fontSize='15px';name.textContent=t.name;
  const status=document.createElement('div');status.style.marginLeft='auto';

  if(t.solved){
    status.innerHTML=`<div class="solved-banner">✓ Solved in ${t.guesses.length}!</div>`;
  } else if(t.failed){
    status.innerHTML=`<div class="failed-banner">✗ Out of guesses</div>`;
  } else if(GAME.phase==='game'){
    const left=CFG.maxGuesses-t.guesses.length;
    status.innerHTML=`<span style="font-size:12px;color:rgba(255,255,255,.45)">${left} guess${left!==1?'es':''} left</span>`;
  } else if(GAME.phase==='setting'){
    const targetIdx=(ti-1+CFG.numTeams)%CFG.numTeams;
    if(t.secret){
      status.innerHTML=`<span style="font-size:11px;color:#4ade80">Code set ✓</span>`;
    } else {
      status.innerHTML=`<span style="font-size:11px;color:rgba(255,255,255,.35)">Waiting...</span>`;
    }
  }

  hdr.append(badge,name,status);

  // Board scroll area
  const inner=document.createElement('div');
  inner.className='board-inner';
  inner.style.maxHeight='320px';

  // Past guesses
  for(let gi=0;gi<t.guesses.length;gi++){
    inner.append(buildGuessRow(t.guesses[gi],ti,gi));
  }

  // Current active row (empty slots)
  if(GAME.phase==='game'&&!t.solved&&!t.failed){
    const row=document.createElement('div');
    row.className='g-row active-row';
    row.id=`active-row-${ti}`;
    for(let s=0;s<CFG.codeLen;s++){
      const slot=document.createElement('div');
      if(ti===GAME.active&&GAME.curGuess[s]!==null){
        slot.className='peg';
        slot.style.background=COLORS[GAME.curGuess[s]].h;
        slot.style.boxShadow=`0 2px 10px ${COLORS[GAME.curGuess[s]].h}88`;
      } else {
        slot.className='pslot';
      }
      row.append(slot);
    }
    // Spacer for feedback column
    const fbspace=document.createElement('div');
    fbspace.style.width='38px';fbspace.style.flexShrink='0';
    row.append(fbspace);
    inner.append(row);
  }

  // Solved reveal
  if(t.solved||t.failed){
    const rev=document.createElement('div');
    rev.style.cssText='padding:6px 5px 2px;display:flex;align-items:center;gap:6px;flex-wrap:wrap';
    const label=document.createElement('span');
    label.style.cssText='font-size:11px;color:rgba(255,255,255,.4)';
    label.textContent=t.failed?'The code was:':'';
    rev.append(label);
    for(const ci of t.secret){
      const sp=document.createElement('div');
      sp.className='secret-peg';
      sp.style.background=COLORS[ci].h;
      sp.style.boxShadow=`0 0 6px ${COLORS[ci].h}88`;
      rev.append(sp);
    }
    inner.append(rev);
  }

  inner.scrollTop=inner.scrollHeight;
  board.append(hdr,inner);
  return board;
}

function buildGuessRow(entry,ti,gi){
  const row=document.createElement('div');
  row.className='g-row';
  const codeLen=entry.g.length;

  for(const ci of entry.g){
    const p=document.createElement('div');
    p.className='peg';
    p.style.cssText=`background:${COLORS[ci].h};box-shadow:0 2px 8px ${COLORS[ci].h}77;width:30px;height:30px`;
    row.append(p);
  }

  // Feedback grid
  const cols=Math.ceil(Math.sqrt(codeLen));
  const rows=Math.ceil(codeLen/cols);
  const fbg=document.createElement('div');
  fbg.className='fb-grid';
  fbg.style.gridTemplateColumns=`repeat(${cols},14px)`;
  fbg.style.width=`${cols*14+(cols-1)*3}px`;
  fbg.style.marginLeft='6px';

  const pegs=[];
  for(let i=0;i<entry.b;i++)pegs.push('b');
  for(let i=0;i<entry.w;i++)pegs.push('w');
  while(pegs.length<codeLen)pegs.push('e');

  for(const p of pegs){
    const fp=document.createElement('div');
    fp.className=`fb-peg fb-${p}`;
    fbg.append(fp);
  }
  row.append(fbg);
  return row;
}

function updateBoardHeader(ti){
  const old=$id(`board-${ti}`);
  if(!old)return;
  const fresh=buildBoard(ti);
  old.replaceWith(fresh);
  // scroll to bottom
  const inner=fresh.querySelector('.board-inner');
  if(inner)inner.scrollTop=inner.scrollHeight;
}

/* ═══════════════════════════════════════════════════
   PALETTE & CURRENT GUESS
═══════════════════════════════════════════════════ */
function renderPalette(){
  const pal=$id('palette');pal.innerHTML='';
  for(let i=0;i<CFG.numColors;i++){
    const p=document.createElement('div');
    p.className='pal-peg';
    p.style.background=COLORS[i].h;
    p.style.boxShadow=`0 4px 14px ${COLORS[i].h}66`;
    p.title=COLORS[i].n;
    p.addEventListener('click',()=>placeColor(i));
    pal.append(p);
  }
}

function renderCurGuess(){
  const c=$id('cur-guess-slots');c.innerHTML='';
  for(let i=0;i<CFG.codeLen;i++){
    const s=document.createElement('div');
    s.className='g-slot';
    if(GAME.curGuess[i]!==null){
      s.classList.add('set');
      s.style.background=COLORS[GAME.curGuess[i]].h;
      s.style.boxShadow=`0 0 12px ${COLORS[GAME.curGuess[i]].h}88`;
      s.addEventListener('click',(()=>{
        const idx=i;
        return ()=>{GAME.curGuess[idx]=null;trimGuess();sndClear();renderCurGuess();syncActiveRow();checkSubmit()};
      })());
    } else {
      s.classList.add('empty');
    }
    c.append(s);
  }
}

function trimGuess(){
  // Compact: remove trailing nulls but keep internal structure for removal
  // Actually keep positions as-is for slot-based removal
}

function placeColor(cIdx){
  const filled=GAME.curGuess.filter(x=>x!==null).length;
  if(filled>=CFG.codeLen)return;
  if(!CFG.allowDups&&GAME.curGuess.includes(cIdx))return;
  // Find first null slot
  const slot=GAME.curGuess.indexOf(null);
  if(slot===-1)return;
  GAME.curGuess[slot]=cIdx;
  sndPlace();
  renderCurGuess();
  syncActiveRow();
  checkSubmit();
}

function clearGuess(){
  GAME.curGuess=Array(CFG.codeLen).fill(null);
  sndClear();
  renderCurGuess();
  syncActiveRow();
  checkSubmit();
}

function checkSubmit(){
  const full=GAME.curGuess.every(x=>x!==null);
  $id('btn-submit').disabled=!full;
}

function syncActiveRow(){
  // Update the active row preview on the current team's board
  const ti=GAME.active;
  const row=$id(`active-row-${ti}`);
  if(!row)return;
  const slots=row.querySelectorAll('.peg,.pslot');
  for(let s=0;s<CFG.codeLen;s++){
    const slot=slots[s];
    if(!slot)continue;
    if(GAME.curGuess[s]!==null){
      slot.className='peg';
      slot.style.cssText=`background:${COLORS[GAME.curGuess[s]].h};box-shadow:0 2px 10px ${COLORS[GAME.curGuess[s]].h}88;width:38px;height:38px;flex-shrink:0`;
    } else {
      slot.className='pslot';
      slot.style.cssText='width:38px;height:38px';
    }
  }
}

/* ═══════════════════════════════════════════════════
   SUBMIT GUESS
═══════════════════════════════════════════════════ */
function submitGuess(){
  AC.resume();
  const ti=GAME.active;
  const t=GAME.teams[ti];
  const guess=[...GAME.curGuess];
  const{black,white}=evaluate(guess,t.secret);
  t.guesses.push({g:guess,b:black,w:white});

  sndFeedback(black,white);

  if(black===CFG.codeLen){
    t.solved=true;sndSolve();
  } else if(t.guesses.length>=CFG.maxGuesses){
    t.failed=true;sndWrong();
  }

  GAME.curGuess=Array(CFG.codeLen).fill(null);
  renderCurGuess();
  checkSubmit();

  // Rebuild this board
  updateBoardHeader(ti);

  // Check if all teams done
  const allDone=GAME.teams.every(x=>x.solved||x.failed);
  if(allDone){setTimeout(showResults,600);return;}

  // Advance to next active team
  nextTeam();
}

function nextTeam(){
  const n=GAME.teams.length;
  let next=(GAME.active+1)%n;
  let loops=0;
  while((GAME.teams[next].solved||GAME.teams[next].failed)&&loops<n){
    next=(next+1)%n;loops++;
  }
  GAME.active=next;
  updateTurnIndicator();
  // Highlight active board
  document.querySelectorAll('.t-board').forEach((b,i)=>{
    b.classList.toggle('active',i===GAME.active);
  });
  renderCurGuess();
  checkSubmit();
}

function updateTurnIndicator(){
  const t=GAME.teams[GAME.active];
  const ind=$id('turn-indicator');
  if(GAME.phase!=='game'){ind.innerHTML='';return;}
  ind.innerHTML=`<span class="turn-arrow" style="color:${t.color}">▶</span> <span style="color:${t.color};font-family:Montserrat,sans-serif">${t.name}</span><span style="color:rgba(255,255,255,.45);font-weight:400">'s turn</span>`;
}

/* ═══════════════════════════════════════════════════
   RESULTS
═══════════════════════════════════════════════════ */
function showResults(){
  GAME.phase='done';
  hide('game-screen');
  show('results-screen');

  // Rank: solved by guesses count asc, then failed
  const ranked=[...GAME.teams].sort((a,b)=>{
    if(a.solved&&b.solved)return a.guesses.length-b.guesses.length;
    if(a.solved)return -1;
    if(b.solved)return 1;
    return 0;
  });

  const winner=ranked[0];
  if(winner.solved){
    $id('results-title').textContent='🏆';
    $id('results-heading').textContent=`${winner.name} wins!`;
    sndWin();
  } else {
    $id('results-title').textContent='💀';
    $id('results-heading').textContent='Nobody cracked the code!';
    sndGameOver();
  }

  const list=$id('results-list');list.innerHTML='';
  ranked.forEach((t,i)=>{
    const row=document.createElement('div');
    row.style.cssText=`display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)`;
    const medal=['🥇','🥈','🥉','4️⃣'][i]||`${i+1}.`;
    const dot=document.createElement('div');
    dot.style.cssText=`width:14px;height:14px;border-radius:50%;background:${t.color};flex-shrink:0;box-shadow:0 0 8px ${t.color}`;
    const info=document.createElement('div');
    info.style.flex='1';
    info.innerHTML=`<div style="font-weight:700;font-size:15px">${medal} ${t.name}</div><div style="font-size:12px;color:rgba(255,255,255,.5)">${t.solved?`Solved in ${t.guesses.length} guess${t.guesses.length!==1?'es':''}`:'Did not solve'}</div>`;
    // Secret peg reveal
    const secret=document.createElement('div');
    secret.style.cssText='display:flex;gap:4px;align-items:center';
    for(const ci of t.secret){
      const sp=document.createElement('div');
      sp.className='secret-peg';
      sp.style.cssText=`background:${COLORS[ci].h};box-shadow:0 0 5px ${COLORS[ci].h}88;width:22px;height:22px`;
      secret.append(sp);
    }
    row.append(dot,info,secret);
    list.append(row);
  });
}

/* ═══════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════ */
function confirmReset(){
  if(confirm('Start a new game?'))fullReset();
}

function fullReset(){
  hide('game-screen');hide('results-screen');hide('setting-modal');
  GAME={teams:[],active:0,settingQ:[],curGuess:[],phase:'setup'};
  show('setup-screen');
}

/* ═══════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(GAME.phase!=='game')return;
  if(e.key==='Enter'&&!$id('btn-submit').disabled){submitGuess();}
  if(e.key==='Escape'){clearGuess();}
  const n=parseInt(e.key);
  if(!isNaN(n)&&n>=1&&n<=CFG.numColors){placeColor(n-1);}
});
</script>
