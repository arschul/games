<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mistake Hunters — EFL Grammar Game</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #161a23;
  --surface2: #1e2333;
  --border: #2a3045;
  --text: #e8ecf4;
  --muted: #6b7592;
  --accent: #f0c040;

  --spelling:    #f05a5a;
  --word-form:   #5aabf0;
  --verb-tense:  #a05af0;
  --word-order:  #40d490;

  --spelling-bg:   rgba(240,90,90,0.13);
  --word-form-bg:  rgba(90,171,240,0.13);
  --verb-tense-bg: rgba(160,90,240,0.13);
  --word-order-bg: rgba(64,212,144,0.13);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1, h2, h3 { font-family: 'Bebas Neue', sans-serif; letter-spacing: 0.05em; }

/* ── SCREENS ── */
.screen { display: none; width: 100%; max-width: 860px; padding: 32px 20px; }
.screen.active { display: block; }

/* Correct checkbox */
.correct-check-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  cursor: pointer;
  user-select: none;
  width: fit-content;
}
.correct-check-wrap input { display: none; }
.correct-check-box {
  width: 26px; height: 26px;
  border-radius: 7px;
  border: 2px solid var(--border);
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  transition: all .2s;
}
.correct-check-wrap input:checked ~ .correct-check-box {
  background: rgba(64,212,144,0.2);
  border-color: var(--word-order);
  color: var(--word-order);
}
.correct-check-wrap input:checked ~ .correct-check-box::after { content: '✓'; }
.correct-check-label {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  transition: color .2s;
  letter-spacing: 0.02em;
}
.correct-check-wrap input:checked ~ .correct-check-label { color: var(--word-order); }
.correct-check-wrap.disabled { opacity: .4; pointer-events: none; }


.start-hero {
  text-align: center;
  padding: 40px 0 32px;
}
.start-hero h1 { font-size: clamp(52px, 10vw, 96px); color: var(--accent); line-height: 1; }
.start-hero p { color: var(--muted); margin-top: 8px; font-size: 15px; letter-spacing: 0.05em; text-transform: uppercase; }

.config-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 28px;
}
@media(max-width:600px){ .config-grid { grid-template-columns: 1fr; } }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
}
.card h3 { font-size: 18px; color: var(--muted); margin-bottom: 14px; }

.pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
.pill {
  padding: 7px 16px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  cursor: pointer;
  transition: all .2s;
}
.pill:hover { border-color: var(--accent); color: var(--accent); }
.pill.selected { border-color: var(--accent); background: rgba(240,192,64,0.12); color: var(--accent); }

.teams-section { grid-column: 1/-1; }
.team-inputs { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-top: 12px; }
.team-input-wrap { display: flex; flex-direction: column; gap: 5px; }
.team-input-wrap label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
.team-input-wrap input {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  padding: 8px 12px;
  outline: none;
  transition: border-color .2s;
}
.team-input-wrap input:focus { border-color: var(--accent); }

.num-row { display: flex; align-items: center; gap: 12px; }
.num-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .2s;
}
.num-btn:hover { border-color: var(--accent); }
.num-display { font-family: 'Bebas Neue'; font-size: 28px; color: var(--accent); min-width: 32px; text-align: center; }

.start-btn {
  display: block;
  width: 100%;
  margin-top: 28px;
  padding: 18px;
  background: var(--accent);
  color: #0d0f14;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 0.1em;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
}
.start-btn:hover { opacity: .9; transform: translateY(-1px); }
.start-btn:active { transform: translateY(0); }

/* ── GAME SCREEN ── */
.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.round-badge {
  font-family: 'Bebas Neue';
  font-size: 22px;
  color: var(--muted);
}
.round-badge span { color: var(--accent); }
.level-badge {
  padding: 4px 14px;
  border-radius: 999px;
  border: 1.5px solid var(--border);
  font-family: 'DM Mono';
  font-size: 12px;
  color: var(--muted);
}

/* Scoreboard */
.scoreboard {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.score-card {
  flex: 1;
  min-width: 100px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  transition: border-color .3s, box-shadow .3s;
}
.score-card.active-team {
  border-color: var(--accent);
  box-shadow: 0 0 16px rgba(240,192,64,0.18);
}
.score-card .tname {
  font-size: 11px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 4px;
}
.score-card .tscore {
  font-family: 'Bebas Neue';
  font-size: 30px;
  color: var(--text);
}

/* Current team banner */
.turn-banner {
  text-align: center;
  padding: 12px;
  background: var(--surface2);
  border-radius: 10px;
  margin-bottom: 20px;
  font-size: 14px;
  color: var(--muted);
}
.turn-banner strong { color: var(--accent); font-size: 16px; }

/* Labels */
.labels-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 22px;
}
.label-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 18px;
  border-radius: 10px;
  border: 2px solid;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s;
  position: relative;
}
.label-btn .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.label-btn.spelling { border-color: var(--spelling); color: var(--spelling); }
.label-btn.word-form { border-color: var(--word-form); color: var(--word-form); }
.label-btn.verb-tense { border-color: var(--verb-tense); color: var(--verb-tense); }
.label-btn.word-order { border-color: var(--word-order); color: var(--word-order); }
.label-btn.spelling .dot { background: var(--spelling); }
.label-btn.word-form .dot { background: var(--word-form); }
.label-btn.verb-tense .dot { background: var(--verb-tense); }
.label-btn.word-order .dot { background: var(--word-order); }
.label-btn.selected { color: #0d0f14 !important; }
.label-btn.spelling.selected { background: var(--spelling); }
.label-btn.word-form.selected { background: var(--word-form); }
.label-btn.verb-tense.selected { background: var(--verb-tense); }
.label-btn.word-order.selected { background: var(--word-order); }
.word-order-hint { font-size: 11px; opacity: .7; margin-left: 4px; }

/* Sentence */
.sentence-box {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 28px 24px;
  margin-bottom: 22px;
  min-height: 100px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px 4px;
  align-items: center;
  font-size: clamp(18px, 3.5vw, 26px);
  line-height: 1.6;
}
.word {
  display: inline-flex;
  align-items: center;
  padding: 3px 7px;
  border-radius: 7px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all .15s;
  user-select: none;
  font-weight: 500;
  position: relative;
}
.word:hover { background: var(--surface2); border-color: var(--border); }
.word.tagged-spelling   { background: var(--spelling-bg);    border-color: var(--spelling);    color: var(--spelling); }
.word.tagged-word-form  { background: var(--word-form-bg);   border-color: var(--word-form);   color: var(--word-form); }
.word.tagged-verb-tense { background: var(--verb-tense-bg);  border-color: var(--verb-tense);  color: var(--verb-tense); }
.word.tagged-word-order { background: var(--word-order-bg);  border-color: var(--word-order);  color: var(--word-order); }
.word.wo-first  { border-style: solid; }
.word.wo-second { border-style: dashed; }

/* Punctuation attached to word */
.word .punct { color: var(--muted); font-weight: 400; }

/* Feedback overlay on word after submit */
.word.correct-tag::after {
  content: '✓';
  position: absolute;
  top: -10px; right: -8px;
  font-size: 11px;
  color: #40d490;
  font-weight: 700;
}
.word.wrong-tag::after {
  content: '✗';
  position: absolute;
  top: -10px; right: -8px;
  font-size: 11px;
  color: #f05a5a;
  font-weight: 700;
}

/* Submit / Next */
.action-row {
  display: flex;
  gap: 12px;
  margin-top: 4px;
}
.submit-btn, .next-btn {
  flex: 1;
  padding: 15px;
  border-radius: 12px;
  border: none;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
}
.submit-btn { background: var(--accent); color: #0d0f14; }
.next-btn   { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); display: none; }
.submit-btn:hover, .next-btn:hover { opacity: .88; transform: translateY(-1px); }
.submit-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

/* Feedback panel */
.feedback-panel {
  display: none;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 20px 22px;
  margin-top: 18px;
}
.feedback-panel.visible { display: block; }
.feedback-panel h3 { font-size: 20px; margin-bottom: 12px; color: var(--accent); }
.corrected-sentence {
  font-size: 18px;
  line-height: 1.7;
  margin-bottom: 14px;
  color: var(--text);
}
.corrected-sentence .fix { font-weight: 700; }
.corrected-sentence .fix.spelling    { color: var(--spelling); }
.corrected-sentence .fix.word-form   { color: var(--word-form); }
.corrected-sentence .fix.verb-tense  { color: var(--verb-tense); }
.corrected-sentence .fix.word-order  { color: var(--word-order); }

.points-awarded {
  font-family: 'Bebas Neue';
  font-size: 36px;
  color: var(--accent);
  margin-bottom: 6px;
}
.points-breakdown { font-size: 13px; color: var(--muted); }

/* Legend */
.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 18px;
  margin-bottom: 18px;
  font-size: 12px;
  color: var(--muted);
}
.legend span { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; }

/* ── RESULTS SCREEN ── */
.results-screen { text-align: center; }
.results-screen h1 { font-size: 64px; color: var(--accent); margin-bottom: 8px; }
.results-screen p { color: var(--muted); margin-bottom: 28px; }

.podium {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 12px;
  margin: 32px 0;
}
.podium-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.podium-bar {
  width: 90px;
  border-radius: 10px 10px 0 0;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding-bottom: 10px;
  transition: height .6s ease;
}
.podium-bar.rank-1 { background: rgba(240,192,64,0.18); border-color: var(--accent); }
.podium-bar .rank-num { font-family: 'Bebas Neue'; font-size: 32px; color: var(--muted); }
.podium-bar.rank-1 .rank-num { color: var(--accent); }
.podium-name { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
.podium-score { font-family: 'Bebas Neue'; font-size: 26px; color: var(--text); }

.play-again-btn {
  display: inline-block;
  margin-top: 20px;
  padding: 16px 48px;
  background: var(--accent);
  color: #0d0f14;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 0.1em;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  transition: opacity .2s;
}
.play-again-btn:hover { opacity: .88; }

/* all-teams table */
.all-teams-table {
  width: 100%;
  border-collapse: collapse;
  margin: 20px 0;
  text-align: left;
}
.all-teams-table th {
  font-family: 'DM Mono'; font-size: 12px; color: var(--muted);
  text-transform: uppercase; letter-spacing: .07em;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border);
}
.all-teams-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 15px;
}
.all-teams-table tr:first-child td { color: var(--accent); font-weight: 700; }

</style>
</head>
<body>

<!-- ═══════════════════════════════════════
     START SCREEN
════════════════════════════════════════ -->
<div class="screen active" id="screen-start">
  <div class="start-hero">
    <h1>Mistake Hunters</h1>
    <p>Find the grammar mistakes — EFL Competition Game</p>
  </div>

  <div class="config-grid">
    <!-- CEFR Level -->
    <div class="card">
      <h3>CEFR Level</h3>
      <div class="pill-group" id="level-pills">
        <button class="pill selected" data-level="A1">A1</button>
        <button class="pill" data-level="A2">A2</button>
        <button class="pill" data-level="B1">B1</button>
        <button class="pill" data-level="B2">B2</button>
      </div>
    </div>

    <!-- Rounds -->
    <div class="card">
      <h3>Rounds per Team</h3>
      <div class="num-row">
        <button class="num-btn" id="rounds-down">−</button>
        <div class="num-display" id="rounds-display">5</div>
        <button class="num-btn" id="rounds-up">+</button>
      </div>
    </div>

    <!-- Number of teams -->
    <div class="card">
      <h3>Number of Teams</h3>
      <div class="num-row">
        <button class="num-btn" id="teams-down">−</button>
        <div class="num-display" id="teams-display">2</div>
        <button class="num-btn" id="teams-up">+</button>
      </div>
    </div>

    <!-- Placeholder for alignment -->
    <div class="card" style="background:transparent;border-color:transparent;"></div>

    <!-- Team names -->
    <div class="card teams-section">
      <h3>Team Names</h3>
      <div class="team-inputs" id="team-inputs"></div>
    </div>
  </div>

  <button class="start-btn" id="start-btn">START GAME</button>
</div>

<!-- ═══════════════════════════════════════
     GAME SCREEN
════════════════════════════════════════ -->
<div class="screen" id="screen-game">
  <div class="game-header">
    <div class="round-badge">Round <span id="round-num">1</span> / <span id="round-total">5</span></div>
    <div class="level-badge" id="level-display">A1</div>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard" id="scoreboard"></div>

  <!-- Turn banner -->
  <div class="turn-banner">It's <strong id="current-team-name">Team 1</strong>'s turn</div>

  <!-- Legend -->
  <div class="legend">
    <span><span class="legend-dot" style="background:var(--spelling)"></span> Spelling</span>
    <span><span class="legend-dot" style="background:var(--word-form)"></span> Wrong Word Form</span>
    <span><span class="legend-dot" style="background:var(--verb-tense)"></span> Wrong Verb Tense</span>
    <span><span class="legend-dot" style="background:var(--word-order)"></span> Wrong Word Order</span>
  </div>

  <!-- Error type labels -->
  <div class="labels-row">
    <button class="label-btn spelling" data-type="spelling">
      <span class="dot"></span> Spelling
    </button>
    <button class="label-btn word-form" data-type="word-form">
      <span class="dot"></span> Wrong Word Form
    </button>
    <button class="label-btn verb-tense" data-type="verb-tense">
      <span class="dot"></span> Wrong Verb Tense <span class="word-order-hint">(click all words in the verb)</span>
    </button>
    <button class="label-btn word-order" data-type="word-order">
      <span class="dot"></span> Wrong Word Order <span class="word-order-hint">(click 2 words)</span>
    </button>
  </div>

  <!-- CORRECT checkbox -->
  <label class="correct-check-wrap" id="correct-check-wrap">
    <input type="checkbox" id="correct-checkbox">
    <span class="correct-check-box"></span>
    <span class="correct-check-label">✓ This sentence is CORRECT — no mistakes</span>
  </label>

  <!-- Sentence -->
  <div class="sentence-box" id="sentence-box"></div>

  <!-- Actions -->
  <div class="action-row">
    <button class="submit-btn" id="submit-btn">SUBMIT ANSWER</button>
    <button class="next-btn"   id="next-btn">NEXT →</button>
  </div>

  <!-- Feedback -->
  <div class="feedback-panel" id="feedback-panel">
    <h3>Result</h3>
    <div class="points-awarded" id="points-awarded"></div>
    <div class="points-breakdown" id="points-breakdown"></div>
    <div style="margin-top:14px;font-size:13px;color:var(--muted);margin-bottom:6px;">CORRECTED SENTENCE:</div>
    <div class="corrected-sentence" id="corrected-sentence"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     RESULTS SCREEN
════════════════════════════════════════ -->
<div class="screen" id="screen-results">
  <div class="results-screen">
    <h1>GAME OVER</h1>
    <p>Final Scores</p>

    <div class="podium" id="podium"></div>
    <table class="all-teams-table" id="all-teams-table">
      <thead><tr><th>Place</th><th>Team</th><th>Points</th></tr></thead>
      <tbody id="results-tbody"></tbody>
    </table>

    <button class="play-again-btn" onclick="location.reload()">PLAY AGAIN</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// SENTENCE DATA
// Each entry: { sentence, errors: [ {wordIndex, type, correct} ], corrected }
// type: 'spelling' | 'word-form' | 'verb-tense' | 'word-order'
// For word-order: two wordIndex values and corrected shows swapped
// wordIndex is 0-based index into words array (punctuation stripped)
// ═══════════════════════════════════════════════════════════════

// Errors use {w:'errorword', t:'type'} for single-word errors
// and {w:'word1', w2:'word2', t:'word-order'} for word-order errors.
// Indices are resolved at runtime by resolveIndices().
const SENTENCES_RAW = {

A1: [
  // ── originals ──
  {s:"I have a bleu pen.",            errors:[{w:'bleu',t:'spelling'}],                        fix:"I have a blue pen.",            expl:"blue"},
  {s:"She is my frend.",              errors:[{w:'frend',t:'spelling'}],                        fix:"She is my friend.",             expl:"friend"},
  {s:"He has a buk.",                 errors:[{w:'buk',t:'spelling'}],                          fix:"He has a book.",                expl:"book"},
  {s:"The cat is whyte.",             errors:[{w:'whyte',t:'spelling'}],                        fix:"The cat is white.",             expl:"white"},
  {s:"I like appels.",                errors:[{w:'appels',t:'spelling'}],                       fix:"I like apples.",                expl:"apples"},
  {s:"We go to scool.",               errors:[{w:'scool',t:'spelling'}],                        fix:"We go to school.",              expl:"school"},
  {s:"The dog is bigg.",              errors:[{w:'bigg',t:'spelling'}],                         fix:"The dog is big.",               expl:"big"},
  {s:"She has a nise dress.",         errors:[{w:'nise',t:'spelling'}],                         fix:"She has a nice dress.",         expl:"nice"},
  {s:"I see a hous.",                 errors:[{w:'hous',t:'spelling'}],                         fix:"I see a house.",                expl:"house"},
  {s:"He is a techer.",               errors:[{w:'techer',t:'spelling'}],                       fix:"He is a teacher.",              expl:"teacher"},
  {s:"She is very beauty.",           errors:[{w:'beauty',t:'word-form'}],                      fix:"She is very beautiful.",        expl:"beautiful (adjective, not noun)"},

function resolveIndices(raw) {
  const result = {};
  for (const level in raw) {
    result[level] = raw[level].map(entry => {
      const tokens = tokenize(entry.s);
      const words = tokens.map(t => t.word.toLowerCase().replace(/['"",]/g,''));

      const errors = entry.errors.map(err => {
        if (err.t === 'word-order') {
          const w1 = err.w.toLowerCase().replace(/['"",]/g,'');
          const w2 = err.w2.toLowerCase().replace(/['"",]/g,'');
          let i1 = words.indexOf(w1);
          let i2 = words.indexOf(w2);
          if (i1 === -1) i1 = words.findIndex(w => w.startsWith(w1.substring(0,4)));
          if (i2 === -1) i2 = words.findIndex(w => w.startsWith(w2.substring(0,4)));
          return { i: i1, i2: i2, t: 'word-order' };
        } else {
          const w = err.w.toLowerCase().replace(/['"",]/g,'');
          let idx = words.indexOf(w);
          if (idx === -1) idx = words.findIndex(word => word.startsWith(w.substring(0,4)));
          if (err.w2 !== undefined) {
            const w2 = err.w2.toLowerCase().replace(/['"",]/g,'');
            let idx2 = words.indexOf(w2);
            if (idx2 === -1) idx2 = words.findIndex(word => word.startsWith(w2.substring(0,4)));
            return { i: idx, i2: idx2, t: err.t };
          }
          return { i: idx, t: err.t };
        }
      });
      return { s: entry.s, errors, fix: entry.fix, expl: entry.expl, correct: false };
    });
  }
  return result;
}

function buildPool(level) {
  const errorSents = SENTENCES[level];
  const correctSents = (CORRECT_SENTENCES[level] || []).map(s => ({
    s, errors: [], fix: s, expl: "This sentence has no mistakes!", correct: true
  }));
  return [...errorSents, ...correctSents];
}

// Build a shuffled queue of n sentences guaranteeing 40–100% are error sentences.
function buildQueue(level, n) {
  const pool = buildPool(level);
  const errorPool   = pool.filter(s => !s.correct);
  const correctPool = pool.filter(s => s.correct);

  // Clamp: at least 40% errors, at most 100%
  const minErrors = Math.ceil(n * 0.4);
  const maxErrors = n;
  // Pick a random count between min and max, but never ALL correct
  const numErrors  = minErrors + Math.floor(Math.random() * (maxErrors - minErrors + 1));
  const numCorrect = n - numErrors;

  // Shuffle helpers
  const shuffle = arr => {
    const a = [...arr]; 
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  };

  // Pick without repetition, cycling if needed
  const pick = (src, count) => {
    const shuffled = shuffle(src);
    const result = [];
    while (result.length < count) {
      result.push(...shuffled.slice(0, count - result.length));
    }
    return result.slice(0, count);
  };

  const chosen = [
    ...pick(errorPool, numErrors),
    ...pick(correctPool, numCorrect),
  ];
  return shuffle(chosen);
}

let cfgLevel = 'A1';

document.querySelectorAll('#level-pills .pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('#level-pills .pill').forEach(x => x.classList.remove('selected'));

    cfgLevel = p.dataset.level;
  });
});

function updateRoundsDisplay() { document.getElementById('rounds-display').textContent = cfgRounds; }
document.getElementById('rounds-down').addEventListener('click', () => { if (cfgRounds > 1) { cfgRounds--; updateRoundsDisplay(); } });
document.getElementById('rounds-up').addEventListener('click', () => { if (cfgRounds < 20) { cfgRounds++; updateRoundsDisplay(); } });

function updateTeamsDisplay() {
  document.getElementById('teams-display').textContent = cfgNumTeams;
  renderTeamInputs();
}
document.getElementById('teams-down').addEventListener('click', () => { if (cfgNumTeams > 1) { cfgNumTeams--; updateTeamsDisplay(); } });
document.getElementById('teams-up').addEventListener('click', () => { if (cfgNumTeams < 4) { cfgNumTeams++; updateTeamsDisplay(); } });

function renderTeamInputs() {
  const container = document.getElementById('team-inputs');
  const existing = [...container.querySelectorAll('input')].map(i => i.value);
  container.innerHTML = '';
  for (let i = 0; i < cfgNumTeams; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'team-input-wrap';
    wrap.innerHTML = `<label>Team ${i+1}</label><input type="text" placeholder="Team ${i+1}" value="${existing[i] || ''}">`;
    container.appendChild(wrap);
  }
}
renderTeamInputs();

document.getElementById('start-btn').addEventListener('click', () => {
  const inputs = document.querySelectorAll('#team-inputs input');
  const names = [...inputs].map((inp, i) => inp.value.trim() || `Team ${i+1}`);

  state.level = cfgLevel;
  state.roundsPerTeam = cfgRounds;
  state.numTeams = cfgNumTeams;
  state.teams = names;
  state.scores = new Array(cfgNumTeams).fill(0);
  state.currentTeamIdx = 0;
  state.currentRound = 1;
  state.totalRounds = cfgRounds * cfgNumTeams;
  state.turnsPlayed = 0;
  state.usedSentences = [];
  state.sentenceQueue = buildQueue(cfgLevel, state.totalRounds);

  document.getElementById('round-total').textContent = cfgRounds;
  document.getElementById('level-display').textContent = cfgLevel;

  showScreen('game');
  buildScoreboard();
  nextTurn();
});

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

}

function buildScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = state.teams.map((name, i) => `
    <div class="score-card ${i === state.currentTeamIdx ? 'active-team' : ''}" id="sc-${i}">
      <div class="tname">${name}</div>
      <div class="tscore" id="score-${i}">${state.scores[i]}</div>

}

  state.teams.forEach((_, i) => {

    document.getElementById(`sc-${i}`).classList.toggle('active-team', i === state.currentTeamIdx);
  });
}

// ─── Next turn ───────────────────────────────────────────────

function nextTurn() {
  // Check game over
  if (state.turnsPlayed >= state.totalRounds) {
    showResults();
    return;
  }

  // Pick round number for display (how many times this team has played)
  const teamTurnsPlayed = Math.floor(state.turnsPlayed / state.numTeams) + 1;
  const globalCycle = Math.floor(state.turnsPlayed / state.numTeams) + 1;
  document.getElementById('round-num').textContent = globalCycle;

  // Reset UI
  state.selectedLabel = null;
  state.taggedWords = {};
  state.woFirstWord = null;
  state.submitted = false;
  state.correctChecked = false;
  const correctCb = document.getElementById('correct-checkbox');
  if (correctCb) { correctCb.checked = false; correctCb.disabled = false; }
  document.getElementById('correct-check-wrap').classList.remove('disabled');

  document.querySelectorAll('.label-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('feedback-panel').classList.remove('visible');
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('submit-btn').style.display = '';
  document.getElementById('submit-btn').disabled = false;

  // Current team
  document.getElementById('current-team-name').textContent = state.teams[state.currentTeamIdx];
  refreshScoreboard();

  // Pick sentence from pre-planned queue
  state.currentSentence = state.sentenceQueue[state.turnsPlayed] || buildQueue(state.level, 1)[0];

  renderSentence();
}

// ─── Render sentence ─────────────────────────────────────────

function tokenize(sentence) {
  // Split preserving punctuation attached to words
  const raw = sentence.split(/\s+/);
  return raw.map(tok => {
    const match = tok.match(/^(.*?)([.,!?;:'""]*)$/);
    return { word: match[1], punct: match[2] };
  });
}

function renderSentence() {
  const box = document.getElementById('sentence-box');
  box.innerHTML = '';
  const tokens = tokenize(state.currentSentence.s);
  tokens.forEach((tok, i) => {
    const span = document.createElement('span');
    span.className = 'word';
    span.dataset.idx = i;
    span.innerHTML = tok.word + (tok.punct ? `<span class="punct">${tok.punct}</span>` : '');
    span.addEventListener('click', () => onWordClick(i, span));
    box.appendChild(span);
  });
}

// ─── Label selection ─────────────────────────────────────────

document.querySelectorAll('.label-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (state.submitted) return;
    const t = btn.dataset.type;
    if (state.selectedLabel === t) {
      state.selectedLabel = null;
      btn.classList.remove('selected');
    } else {
      document.querySelectorAll('.label-btn').forEach(b => b.classList.remove('selected'));
      state.selectedLabel = t;
      btn.classList.add('selected');
      state.woFirstWord = null; // reset word-order first pick if label changes
    }
  });
});

// ─── Correct checkbox ─────────────────────────────────────────

document.getElementById('correct-checkbox').addEventListener('change', function() {
  if (state.submitted) return;
  state.correctChecked = this.checked;
  if (this.checked) {
    // Clear all word tags and deselect labels
    Object.keys(state.taggedWords).forEach(k => untagWord(parseInt(k)));
    state.taggedWords = {};
    state.woFirstWord = null;
    document.querySelectorAll('.label-btn').forEach(b => b.classList.remove('selected'));
    state.selectedLabel = null;
  }
});

function onWordClick(idx, span) {
  if (state.submitted) return;
  if (!state.selectedLabel) return;

  // Tagging a word means "there IS a mistake" — uncheck CORRECT
  if (state.correctChecked) {
    state.correctChecked = false;
    document.getElementById('correct-checkbox').checked = false;
  }

  const type = state.selectedLabel;

  if (type === 'word-order') {
    if (state.woFirstWord === null) {
      // If already tagged as word-order, untag
      if (state.taggedWords[idx] && state.taggedWords[idx].type === 'word-order') {
        untagWord(idx);
        return;
      }
      state.woFirstWord = idx;
      tagWord(idx, 'word-order', 'wo-first');
    } else {
      if (state.woFirstWord === idx) {
        untagWord(idx);
        state.woFirstWord = null;
        return;
      }
      // Second word
      tagWord(idx, 'word-order', 'wo-second');
      state.taggedWords[idx] = { type: 'word-order', pair: state.woFirstWord };
      state.taggedWords[state.woFirstWord] = { type: 'word-order', pair: idx };
      state.woFirstWord = null;
    }
    return;
  }

  // Toggle: if already tagged with same type, remove
  if (state.taggedWords[idx] && state.taggedWords[idx].type === type) {
    untagWord(idx);
    return;
  }

  // Tag with current type (overwrite)
  tagWord(idx, type);
}

function tagWord(idx, type, extraClass) {
  const span = document.querySelector(`.word[data-idx="${idx}"]`);
  if (!span) return;
  span.className = 'word tagged-' + type + (extraClass ? ' ' + extraClass : '');
  state.taggedWords[idx] = { type };
}

function untagWord(idx) {
  const span = document.querySelector(`.word[data-idx="${idx}"]`);
  if (!span) return;
  span.className = 'word';
  delete state.taggedWords[idx];
}

// ─── Submit ───────────────────────────────────────────────────

document.getElementById('submit-btn').addEventListener('click', () => {
  if (state.submitted) return;
  state.submitted = true;

  const sentence = state.currentSentence;
  const errors = sentence.errors;
  const numErrors = errors.length;
  const isCorrectSentence = sentence.correct === true;

  let pointsEarned = 0;
  let breakdown = [];

  // ── CORRECT SENTENCE BRANCH ──────────────────────────────────
  if (isCorrectSentence) {
    if (state.correctChecked && Object.keys(state.taggedWords).length === 0) {
      // Team correctly identified no mistakes
      pointsEarned = 100;
      breakdown.push('✓ Correctly identified as error-free: +100');
      // Flash the whole sentence green
      document.querySelectorAll('.word').forEach(w => w.classList.add('correct-tag'));
    } else if (!state.correctChecked && Object.keys(state.taggedWords).length === 0) {
      // Team submitted nothing — neither checkbox nor tags
      pointsEarned = 0;
      breakdown.push('✗ No answer given: +0');
      document.querySelectorAll('.word').forEach(w => {
        w.className = 'word tagged-spelling wrong-tag';
      });
    } else {
      // Team tagged words on a correct sentence — all wrong
      pointsEarned = 0;
      const numWrong = Object.keys(state.taggedWords).length;
      breakdown.push(`✗ Marked ${numWrong} word(s) as errors on a correct sentence: +0`);
      Object.keys(state.taggedWords).forEach(k => {
        const sp = document.querySelector(`.word[data-idx="${k}"]`);
        if (sp) sp.classList.add('wrong-tag');
      });
    }

  // ── ERROR SENTENCE BRANCH ────────────────────────────────────
  } else {
    if (state.correctChecked) {
      // Team said "correct" but sentence has errors — 0 pts, reveal mistakes
      pointsEarned = 0;
      breakdown.push('✗ Marked as correct but sentence has mistakes: +0');
    } else {
      const playerTags = {};
      Object.entries(state.taggedWords).forEach(([k, v]) => { playerTags[parseInt(k)] = v.type; });

      errors.forEach(err => {
        const maxPerError = numErrors === 1 ? 100 : 50;

        if (err.t === 'word-order') {
          const firstTagged = playerTags[err.i] === 'word-order';
          const secondTagged = playerTags[err.i2] === 'word-order';
          if (firstTagged && secondTagged) {
            pointsEarned += maxPerError;
            breakdown.push(`✓ Word order (${getWordText(err.i)} / ${getWordText(err.i2)}): +${maxPerError}`);
          } else if (firstTagged || secondTagged) {
            const partial = Math.round(maxPerError * 0.5);
            pointsEarned += partial;
            breakdown.push(`~ Word order partially identified: +${partial}`);
          } else {
            breakdown.push(`✗ Missed word order mistake: +0`);
          }
        } else if (err.i2 !== undefined) {
          const tag1 = playerTags[err.i];
          const tag2 = playerTags[err.i2];
          const correct1 = tag1 === err.t;
          const correct2 = tag2 === err.t;
          const wrong1 = tag1 && tag1 !== err.t;
          const wrong2 = tag2 && tag2 !== err.t;
          const tagged1 = !!tag1;
          const tagged2 = !!tag2;
          if (correct1 && correct2) {
            pointsEarned += maxPerError;
            breakdown.push(`✓ ${labelName(err.t)} on "${getWordText(err.i)} + ${getWordText(err.i2)}": +${maxPerError}`);
          } else if (correct1 || correct2) {
            const partial = Math.round(maxPerError * 0.6);
            pointsEarned += partial;
            const which = correct1 ? getWordText(err.i) : getWordText(err.i2);
            breakdown.push(`~ ${labelName(err.t)}: only "${which}" tagged (verb phrase needs both words): +${partial}`);
          } else if ((wrong1 && tagged2) || (tagged1 && wrong2)) {
            const partial = Math.round(maxPerError * 0.3);
            pointsEarned += partial;
            breakdown.push(`~ Right words, wrong label: +${partial}`);
          } else if (wrong1 || wrong2) {
            const partial = Math.round(maxPerError * 0.2);
            pointsEarned += partial;
            breakdown.push(`~ One word found, wrong label: +${partial}`);
          } else {
            breakdown.push(`✗ Missed ${labelName(err.t)} on "${getWordText(err.i)} ${getWordText(err.i2)}": +0`);
          }
        } else {
          const pTag = playerTags[err.i];
          if (pTag === err.t) {
            pointsEarned += maxPerError;
            breakdown.push(`✓ ${labelName(err.t)} on "${getWordText(err.i)}": +${maxPerError}`);
          } else if (pTag && pTag !== err.t) {
            const partial = Math.round(maxPerError * 0.5);
            pointsEarned += partial;
            breakdown.push(`~ Right word, wrong label ("${getWordText(err.i)}" tagged as ${labelName(pTag)}): +${partial}`);
          } else {
            breakdown.push(`✗ Missed ${labelName(err.t)} on "${getWordText(err.i)}": +0`);
          }
        }
      });

      // Penalty for false positives
      const correctWordIdxs = new Set();
      errors.forEach(e => { correctWordIdxs.add(e.i); if (e.i2 !== undefined) correctWordIdxs.add(e.i2); });
      let wrongTags = 0;
      Object.keys(playerTags).forEach(k => {
        if (!correctWordIdxs.has(parseInt(k))) wrongTags++;
      });
      if (wrongTags > 0) {
        const penalty = wrongTags * 10;
        pointsEarned = Math.max(0, pointsEarned - penalty);
        breakdown.push(`✗ ${wrongTags} incorrect word(s) tagged: -${penalty}`);
      }
    }

    // Show word-level feedback for error sentences
    const playerTags2 = {};
    Object.entries(state.taggedWords).forEach(([k, v]) => { playerTags2[parseInt(k)] = v.type; });
    showWordFeedback(errors, playerTags2);
  }

  pointsEarned = Math.max(0, pointsEarned);
  state.scores[state.currentTeamIdx] += pointsEarned;

  // Feedback panel
  document.getElementById('points-awarded').textContent = `+${pointsEarned} pts`;
  document.getElementById('points-breakdown').textContent = breakdown.join('  |  ');
  document.getElementById('corrected-sentence').innerHTML = isCorrectSentence
    ? `<span style="color:var(--word-order)">✓ ${sentence.s}</span>`
    : buildCorrectedHTML(sentence);

  document.getElementById('feedback-panel').classList.add('visible');
  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('next-btn').style.display = 'block';

  // Disable checkbox after submit
  document.getElementById('correct-checkbox').disabled = true;
  document.getElementById('correct-check-wrap').classList.add('disabled');

  refreshScoreboard();
  state.turnsPlayed++;
});

function getWordText(idx) {
  const span = document.querySelector(`.word[data-idx="${idx}"]`);
  if (!span) return '';
  return span.childNodes[0].textContent.trim();
}

function labelName(t) {
  return {spelling:'Spelling','word-form':'Word Form','verb-tense':'Verb Tense','word-order':'Word Order'}[t] || t;
}

function showWordFeedback(errors, playerTags) {
  const correctIdxs = new Set();
  errors.forEach(e => { correctIdxs.add(e.i); if (e.i2 !== undefined) correctIdxs.add(e.i2); });

  // Mark each error word
  errors.forEach(err => {
    if (err.t === 'word-order') {
      [err.i, err.i2].forEach(idx => {
        const span = document.querySelector(`.word[data-idx="${idx}"]`);
        if (!span) return;
        const isTagged = playerTags[idx] === 'word-order';
        if (isTagged) span.classList.add('correct-tag');
        else { span.className = 'word tagged-word-order'; span.classList.add('wrong-tag'); }
      });
    } else if (err.i2 !== undefined) {
      // Multi-word verb phrase error — handle each word individually
      [err.i, err.i2].forEach(idx => {
        const span = document.querySelector(`.word[data-idx="${idx}"]`);
        if (!span) return;
        if (playerTags[idx] === err.t) {
          span.classList.add('correct-tag');
        } else if (playerTags[idx]) {
          span.classList.add('wrong-tag');
        } else {
          span.className = `word tagged-${err.t} wrong-tag`;
        }
      });
    } else {
      const span = document.querySelector(`.word[data-idx="${err.i}"]`);
      if (!span) return;
      if (playerTags[err.i] === err.t) {
        span.classList.add('correct-tag');
      } else if (playerTags[err.i]) {
        span.classList.add('wrong-tag');
      } else {
        // Show where the missed mistake was
        span.className = `word tagged-${err.t} wrong-tag`;
      }
    }
  });

  // Mark incorrectly tagged words (false positives)
  Object.keys(playerTags).forEach(k => {
    const idx = parseInt(k);
    if (!correctIdxs.has(idx)) {
      const span = document.querySelector(`.word[data-idx="${idx}"]`);
      if (span) span.classList.add('wrong-tag');
    }
  });
}

function buildCorrectedHTML(sentence) {
  const tokens = tokenize(sentence.fix);
  const errTokens = tokenize(sentence.s);
  // Find which indices changed
  const changedIdxs = new Set();
  sentence.errors.forEach(e => {
    changedIdxs.add(e.i);
    if (e.i2 !== undefined) changedIdxs.add(e.i2);
  });

  return tokens.map((tok, i) => {
    const changed = changedIdxs.has(i) || (errTokens[i] && errTokens[i].word !== tok.word);
    const errType = sentence.errors.find(e => e.i === i || e.i2 === i);
    const cls = errType ? errType.t : '';
    if (changed) {
      return `<span class="fix ${cls}">${tok.word}</span>${tok.punct}`;
    }
    return tok.word + tok.punct;
  }).join(' ');
}

// ─── Next button ─────────────────────────────────────────────

document.getElementById('next-btn').addEventListener('click', () => {
  // Move to next team
  state.currentTeamIdx = (state.currentTeamIdx + 1) % state.numTeams;
  nextTurn();
});

// ─── Results screen ───────────────────────────────────────────

function showResults() {
  showScreen('results');

  const ranked = state.teams.map((name, i) => ({ name, score: state.scores[i] }))
    .sort((a, b) => b.score - a.score);

  // Podium (top 3)
  const podium = document.getElementById('podium');
  podium.innerHTML = '';
  const maxScore = ranked[0].score || 1;
  const order = ranked.length >= 3 ? [1, 0, 2] : (ranked.length === 2 ? [1, 0] : [0]);
  order.forEach(rank => {
    if (!ranked[rank]) return;
    const { name, score } = ranked[rank];
    const heightPct = [100, 75, 55][rank] || 55;
    const barH = Math.max(60, Math.round((score / maxScore) * 140));
    const item = document.createElement('div');
    item.className = 'podium-item';
    item.innerHTML = `
      <div class="podium-name">${name}</div>
      <div class="podium-score">${score}</div>
      <div class="podium-bar rank-${rank + 1}" style="height:${barH}px">
        <div class="rank-num">${rank + 1}</div>
      </div>`;
    podium.appendChild(item);
  });

  // Table
  const tbody = document.getElementById('results-tbody');
  tbody.innerHTML = ranked.map((r, i) => `
    <tr><td>${i + 1}</td><td>${r.name}</td><td>${r.score}</td></tr>
  `).join('');
}
</script>
