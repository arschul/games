<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --text: #e8e8f0;
    --muted: #7878a0;
    --accent: #f0c040;
    --accent2: #60c4a0;
    --accent3: #c078f0;
    --danger: #f07060;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 48px 40px 32px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #16161f 0%, var(--bg) 100%);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: flex-end;
    gap: 32px;
    flex-wrap: wrap;
  }

  .title-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1;
    color: #fff;
  }

  .title-block h1 span {
    color: var(--accent);
  }

  .title-block p {
    margin-top: 6px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.5px;
  }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-left: auto;
    align-items: center;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 9px 14px 9px 36px;
    outline: none;
    width: 220px;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }

  .search-icon {
    position: absolute;
    left: 11px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 15px;
    pointer-events: none;
  }

  .cat-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .cat-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    padding: 6px 12px;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #111; }

  /* COUNT BAR */
  .count-bar {
    max-width: 1200px;
    margin: 20px auto 0;
    padding: 0 40px;
    color: var(--muted);
    font-size: 13px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
    max-width: 1200px;
    margin: 24px auto;
    padding: 0 40px 60px;
  }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 20px;
    position: relative;
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--card-accent, var(--accent));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s;
  }

  .card:hover {
    border-color: var(--card-accent, var(--accent));
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transform: translateY(-3px);
  }

  .card:hover::before { transform: scaleX(1); }

  .card-icon {
    font-size: 28px;
    line-height: 1;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
  }

  .card-subtitle {
    color: var(--muted);
    font-size: 12px;
    font-weight: 300;
    line-height: 1.4;
  }

  .card-footer {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: auto;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .tag {
    border-radius: 4px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.4px;
    padding: 3px 7px;
    text-transform: uppercase;
  }

  .tag-cat {
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .tag-beg { background: rgba(96,196,160,0.15); color: var(--accent2); border: 1px solid rgba(96,196,160,0.3); }
  .tag-int { background: rgba(240,192,64,0.15); color: var(--accent); border: 1px solid rgba(240,192,64,0.3); }
  .tag-adv { background: rgba(192,120,240,0.15); color: var(--accent3); border: 1px solid rgba(192,120,240,0.3); }

  /* MODAL */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 720px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    position: relative;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }

  .overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 2;
    border-radius: 16px 16px 0 0;
  }

  .modal-icon { font-size: 36px; margin-bottom: 10px; }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 900;
    color: #fff;
    margin-bottom: 4px;
  }

  .modal-tagline {
    color: var(--muted);
    font-size: 13px;
  }

  .modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    height: 34px;
    width: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .modal-close:hover { background: var(--danger); border-color: var(--danger); color: #fff; }

  .modal-body { padding: 24px 28px 32px; }

  /* LEVEL TABS */
  .level-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
  }

  .level-tab {
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px;
    transition: all 0.15s;
    border: 1px solid transparent;
  }

  .level-tab.beg { background: rgba(96,196,160,0.1); color: var(--accent2); border-color: rgba(96,196,160,0.25); }
  .level-tab.int { background: rgba(240,192,64,0.1); color: var(--accent); border-color: rgba(240,192,64,0.25); }
  .level-tab.adv { background: rgba(192,120,240,0.1); color: var(--accent3); border-color: rgba(192,120,240,0.25); }

  .level-tab.beg.active { background: var(--accent2); color: #111; border-color: var(--accent2); }
  .level-tab.int.active { background: var(--accent); color: #111; border-color: var(--accent); }
  .level-tab.adv.active { background: var(--accent3); color: #111; border-color: var(--accent3); }

  .level-panel { display: none; }
  .level-panel.active { display: block; }

  .level-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
    opacity: 0.6;
  }

  /* STEPS */
  .steps {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 20px;
  }

  .step {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    gap: 14px;
    padding: 14px 16px;
    align-items: flex-start;
  }

  .step-num {
    background: var(--step-color, var(--accent));
    border-radius: 50%;
    color: #111;
    font-size: 12px;
    font-weight: 700;
    height: 24px;
    min-width: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-top: 1px;
  }

  .step-content strong {
    display: block;
    font-size: 14px;
    color: #fff;
    margin-bottom: 3px;
  }

  .step-content p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    font-weight: 300;
  }

  .tips-box {
    background: rgba(240,192,64,0.06);
    border: 1px solid rgba(240,192,64,0.2);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--accent);
    line-height: 1.5;
  }

  .tips-box strong {
    display: block;
    margin-bottom: 4px;
    font-size: 11px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  /* NO RESULTS */
  .no-results {
    grid-column: 1/-1;
    text-align: center;
    color: var(--muted);
    padding: 60px 0;
    font-size: 15px;
  }

  @media (max-width: 600px) {
    header { padding: 28px 20px 20px; }
    .grid { padding: 0 16px 40px; }
    .count-bar { padding: 0 16px; }
    .header-inner { flex-direction: column; align-items: flex-start; gap: 16px; }
    .controls { margin-left: 0; }
    .modal-body { padding: 18px 18px 28px; }
    .modal-header { padding: 20px 18px 16px; }
    .level-tabs { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="title-block">
      <h1>Presentation <span>Hub</span></h1>
      <p>EFL Speaking &amp; Presentation Ideas · Phil Young's English School</p>
    </div>
    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search" placeholder="Search activities…" oninput="filterCards()">
      </div>
      <div class="cat-filters" id="catFilters"></div>
    </div>
  </div>
</header>

<div class="count-bar" id="countBar"></div>
<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header" id="modalHeader">
      <div class="modal-icon" id="modalIcon"></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-tagline" id="modalTagline"></div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body">
      <div class="level-tabs">
        <button class="level-tab beg active" onclick="switchTab('beg')">🌱 Beginner</button>
        <button class="level-tab int" onclick="switchTab('int')">📗 Pre-Int</button>
        <button class="level-tab adv" onclick="switchTab('adv')">🚀 Upper-Int</button>
      </div>
      <div class="level-panel active" id="panel-beg"></div>
      <div class="level-panel" id="panel-int"></div>
      <div class="level-panel" id="panel-adv"></div>
    </div>
  </div>
</div>

<script>
const CATEGORIES = {
  'World & Culture': { icon: '🌍', color: '#60c4a0', items: ['New Country','Festivals Around the World','Historical Era','Myths and Legends','Culinary Journey','Food Fusion Revolution','Global Garden','Educational Time Travel'] },
  'Creative & Design': { icon: '🎨', color: '#f0c040', items: ['Unseen Artwork','Futuristic Fashion','Design a Robot','Design a Theme Park','Eco-Friendly City','Alien Planet','Digital Art Gallery','Sustainable Fashion Show','Virtual Reality Museum'] },
  'Science & Future': { icon: '🔬', color: '#c078f0', items: ['Future Predictions','Innovative Technology','Space Colony','Alternate Universe','Digital Democracy','Future of Education','Futuristic City','Climate Change Solutions'] },
  'Survival & Adventure': { icon: '🏕️', color: '#f07060', items: ['Deserted Island','Pandemic Survival Plan','Underwater Adventure','Time Travel Trip','Alien Encounter','Prison System'] },
  'Entertainment': { icon: '🎬', color: '#60a0f0', items: ['Famous Figure','Book','Movie','Virtual Concert','Celebrity Interview','Dream Concert','Virtual Reality','Olympic Games','Plan a Music Festival','Escape Room Challenge','Create a Board Game'] },
  'Personal & Social': { icon: '👤', color: '#f08040', items: ['Who Am I?','Roommates','Bucket List','Lottery Winners','Money Countdown','What\'s on the news?','Perfect School','Wildlife Conservation'] },
  'Innovation & Business': { icon: '💡', color: '#a0e040', items: ['Invention','Entrepreneurial Venture','Invent a Language','Global News Network','Digital Time Capsule','Story World'] },
  'Fantasy & Sci-Fi': { icon: '🚀', color: '#e040a0', items: ['Superheroes and Villains','A new place in town','Travel Credits'] },
};

const DATA = [
  {
    title: 'New Country',
    icon: '🌍',
    tagline: 'Combine the best of six real countries into one imaginary nation.',
    steps: ['Name six random countries','Choose one aspect per country: Geography, Language, Culture, Government, Weather, Food','Describe how these aspects combine in your new country','Name your new country','Share the results'],
    beg: {
      steps: [
        { title: 'Pick 6 countries', desc: 'Each student or pair names one country they know. Write them on the board.' },
        { title: 'Choose one feature', desc: 'Assign one category per country: geography, language, culture, government, weather, or food. Students choose the best example.' },
        { title: 'Name the country', desc: 'Invent a simple name. Example: "Braziland" or "Sunland".' },
        { title: 'Share 3 sentences', desc: 'Each group says 3 sentences about their country using simple present: "Our country has tropical weather. We speak English. We eat sushi."' },
      ],
      tip: 'Provide a sentence frame on the board: "Our country is called ___. It has ___ weather. People speak ___ and eat ___."'
    },
    int: {
      steps: [
        { title: 'Research & select', desc: 'Each group randomly picks 6 countries (use a random spinner or folded cards). Assign each country one category.' },
        { title: 'Describe each feature', desc: 'Write 2–3 sentences for each feature, explaining why it was chosen and what it\'s like.' },
        { title: 'Build a profile', desc: 'Create a short country profile: flag colors, capital city, national sport or hobby.' },
        { title: 'Name & present', desc: 'Name the country with a creative hybrid name. Present for 2 minutes using descriptive language.' },
        { title: 'Q&A', desc: 'Other groups ask at least 2 questions using "What / Why / How".' },
      ],
      tip: 'Encourage use of comparatives: "Unlike Brazil, our country has…" or "Similar to Japan, we value…"'
    },
    adv: {
      steps: [
        { title: 'Random selection', desc: 'Randomly assign 6 countries. Each member researches their assigned aspect independently.' },
        { title: 'Deep dive', desc: 'Each feature must include: one real-world example, one original adaptation, and one potential challenge. E.g., "We adopted Japan\'s train system but adapted it for our mountainous geography."' },
        { title: 'Conflicts & solutions', desc: 'Identify at least 2 cultural or logistical conflicts that might arise from combining these aspects and propose solutions.' },
        { title: 'Full presentation', desc: 'Deliver a structured 4–5 minute presentation with an intro, body (one speaker per feature), and conclusion. Create a simple visual aid if possible.' },
        { title: 'Class vote & debate', desc: 'The class votes on which new country they\'d most want to live in, then defends or debates their choice.' },
      ],
      tip: 'Push for conditional structures: "If we combined German efficiency with Brazilian hospitality, we would…" Great for practicing cohesive devices (however, therefore, on the other hand).'
    }
  },
  {
    title: 'Endangered Animal',
    icon: '🦏',
    tagline: 'Explore the story of a species fighting for survival.',
    steps: ['Origin','Characteristics','Curiosities','Current situation','Future'],
    beg: {
      steps: [
        { title: 'Pick an animal', desc: 'Choose a well-known endangered animal (e.g. panda, tiger, whale). Teacher can provide a list with pictures.' },
        { title: 'Basic facts', desc: 'Find out: where it lives, what it eats, what it looks like. Use simple vocabulary.' },
        { title: 'Why is it endangered?', desc: 'One sentence: "The ___ is endangered because ___."' },
        { title: 'Share', desc: 'Say 4–5 sentences about the animal to the class.' },
      ],
      tip: 'Use visual support — show pictures and label body parts together before students present.'
    },
    int: {
      steps: [
        { title: 'Research', desc: 'Find origin, habitat, diet, appearance, and one surprising curiosity.' },
        { title: 'Current situation', desc: 'How many are left? Why are they endangered? (habitat loss, hunting, climate)' },
        { title: 'Curiosity spotlight', desc: 'Share one unusual or little-known fact to engage the audience.' },
        { title: 'What\'s being done?', desc: 'Mention one conservation effort in place.' },
        { title: 'Present', desc: '2–3 minute group presentation using past and present tenses.' },
      ],
      tip: 'Teach "used to" for before/now contrast: "Polar bears used to live in larger territories, but now…"'
    },
    adv: {
      steps: [
        { title: 'Origin & evolution', desc: 'Where and when did this species evolve? What ecological role does it play? Discuss food chains and ecosystems.' },
        { title: 'Full profile', desc: 'Characteristics (physical and behavioral), lifespan, reproduction, and unique adaptations.' },
        { title: 'Threat analysis', desc: 'Rank the top 3 threats by severity. Support with approximate statistics.' },
        { title: 'Intervention & future', desc: 'Evaluate current conservation efforts. Are they working? What more could be done? Project whether the species will survive 50 years from now.' },
        { title: 'Persuasive close', desc: 'End with a call to action. Students must persuade classmates to care about this species specifically.' },
      ],
      tip: 'Challenge students with passive voice: "This species is threatened by…" and modal verbs of speculation: "It could disappear by 2050 unless…"'
    }
  },
  {
    title: 'Invention',
    icon: '💡',
    tagline: 'Design a never-before-seen product to solve a real problem.',
    steps: ['Choose a modern day problem','Set the rules (realistic, magic, etc.)','Create an innovative product','Share the results'],
    beg: {
      steps: [
        { title: 'Name a problem', desc: 'What is something that bothers people daily? (e.g. forgetting your keys, being late, feeling tired)' },
        { title: 'Invent!', desc: 'Think of a simple invention. Give it a name. What does it do in one sentence?' },
        { title: 'Draw it', desc: 'Quick sketch of the invention with labeled parts.' },
        { title: 'Share', desc: 'Say: "My invention is called ___. It ___. It helps people because ___."' },
      ],
      tip: 'Limit to one problem + one solution to avoid overwhelm. Focus on fluency over accuracy.'
    },
    int: {
      steps: [
        { title: 'Problem first', desc: 'Identify and describe a real, specific problem. Who is affected? How often?' },
        { title: 'Set parameters', desc: 'Is the invention realistic or futuristic/magical? What are the rules?' },
        { title: 'Design the product', desc: 'Name, appearance, how it works, who uses it, how much it costs.' },
        { title: 'Pitch it', desc: '2-minute pitch using persuasive language: "Our invention will… People need this because…"' },
        { title: 'Field questions', desc: 'Classmates ask questions about the product.' },
      ],
      tip: 'Model a simple product pitch structure: Problem → Solution → Benefits → Call to action.'
    },
    adv: {
      steps: [
        { title: 'Market research', desc: 'Identify an existing problem in society. Who are the main groups affected? Discuss scale and impact.' },
        { title: 'Prototype planning', desc: 'Design the product in detail: materials, mechanism, user experience, cost of production vs retail price.' },
        { title: 'Ethics & drawbacks', desc: 'What could go wrong? Any ethical concerns? Environmental impact? Potential misuse?' },
        { title: 'Marketing angle', desc: 'Who is the target audience? How would you sell it? Name, slogan, and one advertisement concept.' },
        { title: 'Full pitch', desc: '4–5 minutes. Simulate a Shark Tank-style presentation. Other students role-play as investors with questions.' },
      ],
      tip: 'Great opportunity for conditionals (second/third) and modals: "If we launched this in Brazil, it would…" / "This could revolutionize the way people…"'
    }
  },
  {
    title: 'Travel Credits',
    icon: '✈️',
    tagline: 'Budget your way around the world on a limited credit allowance.',
    steps: ['Students start with 5–10 credits','Each credit lets them go to a different place','Plan the trip','Share the results'],
    beg: {
      steps: [
        { title: 'Set the credits', desc: 'Each student has 5 credits. Each credit = one destination.' },
        { title: 'Choose destinations', desc: 'Pick 3–5 places from a teacher-provided list with pictures.' },
        { title: 'Why?', desc: 'Say one sentence per destination: "I want to go to Japan because I like sushi."' },
        { title: 'Share', desc: 'Tell the class your top 3 destinations in order.' },
      ],
      tip: 'Use a world map on the board. Students point to their destinations as they present.'
    },
    int: {
      steps: [
        { title: 'Budget your trip', desc: '7 credits total. Each destination costs 1–2 credits depending on distance or cost (teacher decides).' },
        { title: 'Plan the itinerary', desc: 'For each destination: where, when, what activity, how long.' },
        { title: 'Justify choices', desc: 'Why these places? What will you learn or experience?' },
        { title: 'Present', desc: 'Present as a travel agent pitch. Use future tense: "We will visit… We are going to…"' },
        { title: 'Class vote', desc: 'Which trip sounds the most interesting?' },
      ],
      tip: 'Good chance to practice "would rather" and "prefer": "I would rather spend 2 credits in Southeast Asia than one credit in Europe because…"'
    },
    adv: {
      steps: [
        { title: 'Strategic budget planning', desc: '10 credits with a cost table (long-haul = 3 credits, regional = 1). Groups must justify each credit spent.' },
        { title: 'Full itinerary', desc: 'Dates, accommodations, activities, transport. Create a day-by-day plan for each location.' },
        { title: 'Cultural preparation', desc: 'For each destination: local customs, language basics, things to avoid, recommended food.' },
        { title: 'Challenges & contingencies', desc: 'What could go wrong? Lost passport, bad weather, budget overrun — how do you handle it?' },
        { title: 'Presentation + defense', desc: 'Present the trip and defend credit allocations when classmates challenge your choices.' },
      ],
      tip: 'Excellent for reported speech, hypotheticals, and travel vocabulary. Encourage students to use authentic travel resources for research.'
    }
  },
  {
    title: 'Perfect School',
    icon: '🏫',
    tagline: 'Redesign education from the ground up.',
    steps: ['Routine','Food','Classes','Extra Activities'],
    beg: {
      steps: [

        { title: 'Basic needs', desc: 'Air, water, food, temperature, radiation protection. How does the colony solve each?' },
        { title: 'Community life', desc: 'How many people? What are their jobs? How is the colony governed?' },
        { title: 'Top 3 challenges', desc: 'Identify and propose solutions for the three hardest problems.' },
        { title: 'Present', desc: '2–3 minutes. Detailed description using future and conditional forms.' },
      ],
      tip: 'Challenge vs. solution structure: "One major challenge is ___, however we would solve this by ___." Clean and transferable.'
    },
    adv: {
      steps: [
        { title: 'Scientific feasibility', desc: 'What does current science say about colonizing this location? What problems remain unsolved?' },
        { title: 'Colony design', desc: 'Architecture, life support systems, power, food production, medical care, communication with Earth.' },
        { title: 'Governance & culture', desc: 'Who makes decisions? What laws apply? How does a unique colony culture develop over generations?' },
        { title: 'Ethics', desc: 'Who gets to go? How are people selected? What are the rights of colonists? What happens if someone wants to return?' },
        { title: 'Mission briefing', desc: '5 minutes. Present as if briefing a team of astronauts preparing for the first mission. Authoritative, technical, and inspiring.' },
      ],
      tip: 'Excellent for passive voice in scientific contexts: "Oxygen will be extracted from… / Water is recycled through a closed loop…" and complex conditionals.'
    }
  },
];

// Build category lookup
const itemToCategory = {};
const itemToColor = {};
Object.entries(CATEGORIES).forEach(([cat, { items, color }]) => {
  items.forEach(item => {
    itemToCategory[item] = cat;
    itemToColor[item] = color;
  });
});

// All unique categories in data
const allCats = [...new Set(DATA.map(d => itemToCategory[d.title] || 'Other'))];

let activeFilter = 'All';
let activeTab = 'beg';
let currentCard = null;

function getCat(title) { return itemToCategory[title] || 'Other'; }
function getColor(title) { return itemToColor[title] || '#a0a0c0'; }

function buildFilters() {
  const wrap = document.getElementById('catFilters');
  const allBtn = document.createElement('button');
  allBtn.className = 'cat-btn active';
  allBtn.textContent = 'All';
  allBtn.onclick = () => setFilter('All', allBtn);
  wrap.appendChild(allBtn);

  Object.entries(CATEGORIES).forEach(([cat, { icon }]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.textContent = icon + ' ' + cat;
    btn.onclick = () => setFilter(cat, btn);
    wrap.appendChild(btn);
  });
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
}

function filterCards() {
  renderCards();
}

function renderCards() {
  const query = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('grid');
  const bar = document.getElementById('countBar');
  grid.innerHTML = '';

  const filtered = DATA.filter(d => {
    const cat = getCat(d.title);
    const matchCat = activeFilter === 'All' || cat === activeFilter;
    const matchQuery = !query || d.title.toLowerCase().includes(query) || d.tagline.toLowerCase().includes(query);
    return matchCat && matchQuery;
  });

  bar.textContent = filtered.length + ' activit' + (filtered.length === 1 ? 'y' : 'ies');

  if (filtered.length === 0) {
    const el = document.createElement('div');
    el.className = 'no-results';
    el.textContent = 'No activities match your search.';
    grid.appendChild(el);
    return;
  }

  filtered.forEach((d, i) => {
    const cat = getCat(d.title);
    const color = getColor(d.title);
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--card-accent', color);
    card.style.animationDelay = (i * 30) + 'ms';
    card.innerHTML = `
      <div class="card-icon">${d.icon}</div>
      <div class="card-title">${d.title}</div>
      <div class="card-subtitle">${d.tagline}</div>
      <div class="card-footer">
        <span class="tag tag-cat">${cat}</span>
        <span class="tag tag-beg">A1–A2</span>
        <span class="tag tag-int">B1</span>
        <span class="tag tag-adv">B2</span>
      </div>
    `;
    card.onclick = () => openModal(d);
    grid.appendChild(card);
  });
}

function buildSteps(levelData, color) {
  return `
    <div class="steps">
      ${levelData.steps.map((s, i) => `
        <div class="step" style="--step-color:${color}">
          <div class="step-num">${i + 1}</div>
          <div class="step-content">
            <strong>${s.title}</strong>
            <p>${s.desc}</p>
          </div>
        </div>
      `).join('')}
    </div>
    ${levelData.tip ? `<div class="tips-box"><strong>💡 Teacher tip</strong>${levelData.tip}</div>` : ''}
  `;
}

function openModal(d) {
  currentCard = d;
  document.getElementById('modalIcon').textContent = d.icon;
  document.getElementById('modalTitle').textContent = d.title;
  document.getElementById('modalTagline').textContent = d.tagline;

  document.getElementById('panel-beg').innerHTML = buildSteps(d.beg, 'var(--accent2)');
  document.getElementById('panel-int').innerHTML = buildSteps(d.int, 'var(--accent)');
  document.getElementById('panel-adv').innerHTML = buildSteps(d.adv, 'var(--accent3)');

  switchTab('beg');

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.level-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('.level-tab.' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});

buildFilters();
renderCards();
</script>
</body>
</html>
