<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Resistance — Operation Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
    --font-display:'Playfair Display',serif;
    --font-body:'DM Sans',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
    --radius:12px;
    --radius-sm:8px;
}
html[data-theme="dark"]{
    --bg:#0a0d13;
    --bg-glow:radial-gradient(1200px 600px at 50% -10%, rgba(91,157,255,.08), transparent 60%);
    --panel:#121722;
    --panel-2:#1a2130;
    --line:#27314a;
    --line-soft:#1e2638;
    --text:#e8ecf4;
    --muted:#8a94ac;
    --res:#5b9dff;
    --res-soft:rgba(91,157,255,.14);
    --spy:#ff5c5c;
    --spy-soft:rgba(255,92,92,.14);
    --gold:#f0b441;
    --gold-soft:rgba(240,180,65,.12);
    --ok:#3ecf8e;
    --ok-soft:rgba(62,207,142,.14);
    --shadow:0 10px 30px rgba(0,0,0,.35);
}
html[data-theme="light"]{
    --bg:#edf0f6;
    --bg-glow:radial-gradient(1200px 600px at 50% -10%, rgba(37,99,235,.07), transparent 60%);
    --panel:#ffffff;
    --panel-2:#f3f5fa;
    --line:#d3dae8;
    --line-soft:#e2e7f1;
    --text:#161c2b;
    --muted:#5a6478;
    --res:#2563eb;
    --res-soft:rgba(37,99,235,.10);
    --spy:#d93030;
    --spy-soft:rgba(217,48,48,.10);
    --gold:#b97e14;
    --gold-soft:rgba(185,126,20,.12);
    --ok:#189a66;
    --ok-soft:rgba(24,154,102,.10);
    --shadow:0 10px 30px rgba(22,28,43,.08);
}

/* ============ BASE ============ */
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:var(--font-body);
    background:var(--bg);
    background-image:var(--bg-glow);
    background-attachment:fixed;
    min-height:100vh;
    color:var(--text);
    padding:1rem;
    transition:background-color .3s,color .3s;
}
.container{max-width:1100px;margin:0 auto}

/* ============ TOP BAR ============ */
.topbar{
    display:flex;justify-content:space-between;align-items:flex-end;
    gap:1rem;flex-wrap:wrap;
    padding:1rem .25rem 1.25rem;
}
.brand .eyebrow{
    font-family:var(--font-mono);font-size:.68rem;letter-spacing:.22em;
    text-transform:uppercase;color:var(--muted);
}
.brand h1{
    font-family:var(--font-display);font-weight:800;
    font-size:clamp(1.6rem,4vw,2.3rem);letter-spacing:.02em;line-height:1.1;
}
.brand h1 .accent{color:var(--gold)}
.topbar-actions{display:flex;gap:.5rem;flex-wrap:wrap}

/* ============ CARDS ============ */
.card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:1.25rem 1.5rem;
    margin-bottom:1.25rem;
    box-shadow:var(--shadow);
}
.card-title{
    font-family:var(--font-display);font-size:1.15rem;font-weight:700;
    margin-bottom:.25rem;
}
.card-sub{color:var(--muted);font-size:.875rem}
.card-header{margin-bottom:1rem}
.section-tag{
    font-family:var(--font-mono);font-size:.65rem;letter-spacing:.2em;
    text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.35rem;
}

/* ============ BUTTONS ============ */
.button{
    font-family:var(--font-body);font-weight:500;
    background:var(--res);color:#fff;border:none;
    padding:.55rem 1.1rem;border-radius:var(--radius-sm);
    cursor:pointer;font-size:.875rem;
    transition:transform .12s,filter .15s,background .15s;
}
.button:hover{filter:brightness(1.12)}
.button:active{transform:scale(.97)}
.button:disabled{opacity:.4;cursor:not-allowed;filter:none;transform:none}
.button-outline{
    background:transparent;border:1px solid var(--line);color:var(--text);
}
.button-outline:hover{background:var(--panel-2);filter:none}
.button-destructive{background:var(--spy)}
.button-green{background:var(--ok)}
.button-gold{background:var(--gold);color:#1a1305}
.button-block{width:100%}
.button-icon{
    padding:.5rem .7rem;font-size:.95rem;line-height:1;
}

/* ============ INPUTS ============ */
.input{
    font-family:var(--font-body);
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    padding:.55rem .7rem;border-radius:var(--radius-sm);width:100%;font-size:.9rem;
    transition:border-color .15s;
}
.input:focus{outline:none;border-color:var(--res)}
label{font-size:.8rem;color:var(--muted);display:block;margin-bottom:.35rem}

/* ============ BADGES ============ */
.badge{
    display:inline-block;padding:.22rem .55rem;border-radius:999px;
    font-size:.7rem;font-weight:600;letter-spacing:.03em;
    font-family:var(--font-mono);text-transform:uppercase;
}
.badge-res{background:var(--res-soft);color:var(--res);border:1px solid var(--res)}
.badge-spy{background:var(--spy-soft);color:var(--spy);border:1px solid var(--spy)}
.badge-ok{background:var(--ok-soft);color:var(--ok);border:1px solid var(--ok)}
.badge-outline{background:transparent;border:1px solid var(--line);color:var(--muted)}

/* ============ LAYOUT UTILS ============ */
.grid{display:grid;gap:1rem}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-players{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
.flex{display:flex}
.items-center{align-items:center}
.justify-center{justify-content:center}
.justify-between{justify-content:space-between}
.gap-2{gap:.5rem}
.gap-4{gap:1rem}
.wrap{flex-wrap:wrap}
.text-center{text-align:center}
.mono{font-family:var(--font-mono)}
.muted{color:var(--muted)}
.mt-2{margin-top:.5rem}.mt-4{margin-top:1rem}.mb-2{margin-bottom:.5rem}.mb-4{margin-bottom:1rem}
.separator{height:1px;background:var(--line-soft);margin:1.1rem 0}

/* ============ STATUS STRIP ============ */
.stat-num{
    font-family:var(--font-mono);font-weight:600;font-size:1.8rem;line-height:1.1;
}
.stat-label{
    font-family:var(--font-mono);font-size:.65rem;letter-spacing:.18em;
    text-transform:uppercase;color:var(--muted);margin-top:.3rem;
}
.leader-name{
    font-family:var(--font-display);font-size:1.4rem;font-weight:700;
    color:var(--gold);
}
.score-strip{display:flex;justify-content:center;align-items:baseline;gap:.75rem}
.score-strip .res-score{color:var(--res)}
.score-strip .spy-score{color:var(--spy)}

/* ============ MISSION TRACK (signature) ============ */
.op-track{
    display:flex;align-items:flex-start;justify-content:space-between;
    position:relative;padding:.5rem .25rem 0;
}
.op-track::before{
    content:'';position:absolute;top:calc(.5rem + 2rem);left:8%;right:8%;
    border-top:2px dashed var(--line);z-index:0;
}
.op-node{position:relative;z-index:1;text-align:center;flex:1}
.op-circle{
    width:4rem;height:4rem;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    border:2px solid var(--line);background:var(--panel-2);
    margin:0 auto;font-family:var(--font-mono);font-weight:600;font-size:1.1rem;
    position:relative;transition:background .2s,border-color .2s;
}
.op-circle.op-success{background:var(--res);border-color:var(--res);color:#fff}
.op-circle.op-fail{background:var(--spy);border-color:var(--spy);color:#fff}
.op-circle.op-current{border-color:var(--gold);color:var(--gold)}
.op-circle.op-current::after{
    content:'';position:absolute;inset:-2px;border-radius:50%;
    border:2px solid var(--gold);
    animation:radar 1.8s ease-out infinite;
}
@keyframes radar{
    0%{transform:scale(1);opacity:.8}
    100%{transform:scale(1.55);opacity:0}
}
@media (prefers-reduced-motion:reduce){
    .op-circle.op-current::after{animation:none;display:none}
}
.op-meta{
    margin-top:.6rem;font-family:var(--font-mono);font-size:.68rem;
    color:var(--muted);letter-spacing:.05em;
}
.op-meta .warn{color:var(--gold);display:block;margin-top:.15rem}

/* ============ REJECTION TRACK ============ */
.reject-track{
    display:flex;align-items:center;gap:.45rem;justify-content:center;
    margin-top:1.25rem;font-family:var(--font-mono);font-size:.68rem;
    letter-spacing:.15em;text-transform:uppercase;color:var(--muted);
}
.reject-pip{
    width:.65rem;height:.65rem;border-radius:50%;
    border:1.5px solid var(--line);background:transparent;
}
.reject-pip.used{background:var(--spy);border-color:var(--spy)}
.reject-pip.hammer{border-color:var(--spy)}

/* ============ PLAYER BUTTONS ============ */
.player-button{
    font-family:var(--font-body);
    padding:.8rem .6rem;display:flex;flex-direction:column;align-items:center;gap:.45rem;
    background:var(--panel-2);border:1px solid var(--line);color:var(--text);
    border-radius:var(--radius-sm);cursor:pointer;
    transition:border-color .15s,background .15s,transform .12s;
}
.player-button:hover:not(:disabled){border-color:var(--res)}
.player-button:active:not(:disabled){transform:scale(.97)}
.player-button.selected{background:var(--res-soft);border-color:var(--res)}
.player-button.on-mission{background:var(--ok-soft);border-color:var(--ok)}
.player-button:disabled{cursor:not-allowed;opacity:.45}
.player-name{font-size:.9rem;font-weight:500}
.crown{color:var(--gold);font-size:.9rem}

/* ============ HISTORY ============ */
.history-item{
    border:1px solid var(--line-soft);border-radius:var(--radius-sm);
    padding:.9rem 1rem;margin-bottom:.9rem;background:var(--panel-2);
    font-size:.85rem;
}
.history-item:last-child{margin-bottom:0}
.text-res{color:var(--res)}.text-spy{color:var(--spy)}.text-ok{color:var(--ok)}.text-gold{color:var(--gold)}

/* ============ FINISHED ============ */
.verdict{
    font-family:var(--font-display);font-weight:800;
    font-size:clamp(1.8rem,5vw,2.6rem);
}
.verdict.res{color:var(--res)}
.verdict.spy{color:var(--spy)}
.role-chip{
    padding:.75rem;background:var(--panel-2);border:1px solid var(--line-soft);
    border-radius:var(--radius-sm);text-align:center;
}

/* ============ RESPONSIVE ============ */
@media (max-width:768px){
    body{padding:.6rem}
    .card{padding:1rem}
    .grid-3{grid-template-columns:1fr}
    .grid-2{grid-template-columns:1fr}
    .op-circle{width:2.9rem;height:2.9rem;font-size:.9rem}
    .op-track::before{top:calc(.5rem + 1.45rem)}
    .op-meta{font-size:.6rem}
    .topbar{align-items:flex-start;flex-direction:column}
}
</style>
</head>
<body>
<div class="container">
    <div class="topbar">
        <div class="brand">
            <span class="eyebrow">Operation Tracker · Social Deduction</span>
            <h1>The <span class="accent">Resistance</span></h1>
        </div>
        <div class="topbar-actions" id="topbarActions"></div>
    </div>
    <div id="app"></div>
</div>

<script>
'use strict';

/* ==================== CONFIG ==================== */
const MISSION_SIZES = {
    5:[2,3,2,3,3], 6:[2,3,4,3,4], 7:[2,3,3,4,4],
    8:[3,4,4,5,5], 9:[3,4,4,5,5], 10:[3,4,4,5,5]
};
const TEAM_COMPOSITION = {
    5:{resistance:3,spies:2}, 6:{resistance:4,spies:2}, 7:{resistance:4,spies:3},
    8:{resistance:5,spies:3}, 9:{resistance:6,spies:3}, 10:{resistance:6,spies:4}
};
const LS = { theme:'rt_theme', sound:'rt_sound', totals:'rt_totals', names:'rt_names' };

/* ==================== SOUND ENGINE ==================== */
const Sound = (() => {
    let ctx = null;
    let enabled = localStorage.getItem(LS.sound) !== 'off';

    function ac(){
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') ctx.resume();
        return ctx;
    }
    function tone(freq, start, dur, {type='sine', gain=0.14, slideTo=null} = {}){
        const c = ac();
        const t0 = c.currentTime + start;
        const osc = c.createOscillator();
        const g = c.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t0);
        if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(gain, t0 + 0.015);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        osc.connect(g).connect(c.destination);
        osc.start(t0);
        osc.stop(t0 + dur + 0.05);
    }
    function play(fn){ if (enabled) { try { fn(); } catch(e){} } }

    return {
        get enabled(){ return enabled; },
        toggle(){
            enabled = !enabled;
            localStorage.setItem(LS.sound, enabled ? 'on' : 'off');
            if (enabled) this.click();
            return enabled;
        },
        click(){ play(() => tone(660, 0, .07, {type:'triangle', gain:.09})); },
        select(){ play(() => tone(520, 0, .08, {type:'triangle', gain:.1, slideTo:700})); },
        deselect(){ play(() => tone(700, 0, .08, {type:'triangle', gain:.08, slideTo:480})); },
        propose(){ play(() => { tone(440, 0, .1, {type:'square', gain:.07}); tone(587, .11, .12, {type:'square', gain:.07}); }); },
        accept(){ play(() => { [523,659,784].forEach((f,i)=>tone(f, i*.09, .14, {type:'triangle', gain:.11})); }); },
        reject(){ play(() => tone(180, 0, .3, {type:'sawtooth', gain:.1, slideTo:110})); },
        success(){ play(() => { [523,659,784,1047].forEach((f,i)=>tone(f, i*.1, .18, {type:'triangle', gain:.12})); }); },
        fail(){ play(() => { [392,311,233].forEach((f,i)=>tone(f, i*.13, .22, {type:'sawtooth', gain:.09})); }); },
        winResistance(){ play(() => { [523,659,784,1047,1319].forEach((f,i)=>tone(f, i*.12, .3, {type:'triangle', gain:.12})); }); },
        winSpies(){ play(() => { [440,415,370,311,233].forEach((f,i)=>tone(f, i*.15, .35, {type:'sawtooth', gain:.08})); }); }
    };
})();

/* ==================== STATE ==================== */
function loadTotals(){
    try { return JSON.parse(localStorage.getItem(LS.totals)) || {res:0,spy:0}; }
    catch(e){ return {res:0,spy:0}; }
}
function saveTotals(){
    localStorage.setItem(LS.totals, JSON.stringify({res:gameState.totalResistanceWins, spy:gameState.totalSpyWins}));
}

let gameState = {
    phase:'setup',               // setup | role-assignment | playing | finished
    playerCount:5,
    players:[],                  // {id, name, role}
    currentMission:1,
    currentLeaderIndex:0,        // single source of truth for leadership
    startingLeaderIndex:0,
    missions:[],
    selectedPlayers:[],
    showRoles:false,
    resistanceWins:0,
    spyWins:0,
    winner:null,
    totalResistanceWins:loadTotals().res,
    totalSpyWins:loadTotals().spy
};

/* ==================== HELPERS ==================== */
function esc(s){
    return String(s ?? '').replace(/[&<>"']/g, c => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
    ));
}
function playerName(id){
    const p = gameState.players.find(p => p.id === id);
    return p ? p.name : '?';
}
function currentLeader(){
    return gameState.players[gameState.currentLeaderIndex] || null;
}
function currentMissionData(){
    return gameState.missions[gameState.currentMission - 1];
}
function initializeMissions(){
    const sizes = MISSION_SIZES[gameState.playerCount] || MISSION_SIZES[5];
    gameState.missions = sizes.map((size, i) => ({
        number:i+1, teamSize:size, team:[], leader:'', approved:false,
        proposalCount:0, result:null, failCards:0, rejectedProposals:[]
    }));
}

/* ==================== GAME LOGIC ==================== */
function setPlayerCount(v){
    gameState.playerCount = Math.max(5, Math.min(10, parseInt(v) || 5));
    initializeMissions();
    render();
}

function setupPlayers(){
    Sound.click();
    let savedNames = [];
    try { savedNames = JSON.parse(localStorage.getItem(LS.names)) || []; } catch(e){}
    gameState.players = [];
    for (let i = 0; i < gameState.playerCount; i++){
        gameState.players.push({
            id:`player-${i}`,
            name:savedNames[i] || `Player ${i+1}`,
            role:null
        });
    }
    gameState.startingLeaderIndex = gameState.startingLeaderIndex % gameState.playerCount;
    gameState.currentLeaderIndex = gameState.startingLeaderIndex;
    gameState.phase = 'role-assignment';
    render();
}

function updatePlayerName(id, name){
    const p = gameState.players.find(p => p.id === id);
    if (p) p.name = name.trim() || p.name;
    localStorage.setItem(LS.names, JSON.stringify(gameState.players.map(p => p.name)));
}

function assignRoles(){
    Sound.accept();
    const composition = TEAM_COMPOSITION[gameState.playerCount];

    // Remember who the leader is BY ID before any reordering
    const leaderId = gameState.players[gameState.currentLeaderIndex]?.id;

    // Shuffle for role assignment
    const shuffled = [...gameState.players].sort(() => Math.random() - 0.5);
    shuffled.forEach((p, i) => { p.role = i < composition.spies ? 'spy' : 'resistance'; });

    // Sort alphabetically for display, then RE-SYNC the leader index
    gameState.players = shuffled.sort((a,b) => a.name.localeCompare(b.name));
    const idx = gameState.players.findIndex(p => p.id === leaderId);
    gameState.currentLeaderIndex = idx >= 0 ? idx : 0;
    gameState.startingLeaderIndex = gameState.currentLeaderIndex;

    gameState.phase = 'playing';
    render();
}

function togglePlayerSelection(playerId){
    const m = currentMissionData();
    if (m.team.length > 0) return; // team already proposed
    const i = gameState.selectedPlayers.indexOf(playerId);
    if (i > -1){
        gameState.selectedPlayers.splice(i, 1);
        Sound.deselect();
    } else if (gameState.selectedPlayers.length < m.teamSize){
        gameState.selectedPlayers.push(playerId);
        Sound.select();
    }
    render();
}

function proposeTeam(){
    Sound.propose();
    const m = currentMissionData();
    m.team = [...gameState.selectedPlayers];
    m.leader = currentLeader()?.name || '';
    m.proposalCount++;
    render();
}

function rotateLeader(){
    gameState.currentLeaderIndex = (gameState.currentLeaderIndex + 1) % gameState.players.length;
}

function rejectProposal(){
    const m = currentMissionData();
    if (m.team.length > 0){
        m.rejectedProposals.push({
            leader:currentLeader()?.name || '',
            team:[...m.team],
            proposalNumber:m.proposalCount
        });
    }

    // Five rejected proposals in one mission: spies win
    if (m.proposalCount >= 5){
        Sound.winSpies();
        gameState.winner = 'spies';
        gameState.totalSpyWins++;
        saveTotals();
        gameState.phase = 'finished';
        render();
        return;
    }

    Sound.reject();
    m.team = [];
    m.leader = '';
    m.approved = false;
    rotateLeader();
    gameState.selectedPlayers = [];
    render();
}

function acceptProposal(){
    Sound.accept();
    currentMissionData().approved = true;
    gameState.selectedPlayers = [];
    render();
}

function executeMission(failCards){
    const requiredFails = (gameState.playerCount >= 7 && gameState.currentMission === 4) ? 2 : 1;
    const success = failCards < requiredFails;
    const m = currentMissionData();
    m.result = success ? 'success' : 'fail';
    m.failCards = failCards;

    if (success){
        gameState.resistanceWins++;
        if (gameState.resistanceWins >= 3){
            Sound.winResistance();
            gameState.winner = 'resistance';
            gameState.totalResistanceWins++;
            saveTotals();
            gameState.phase = 'finished';
            render();
            return;
        }
        Sound.success();
    } else {
        gameState.spyWins++;
        if (gameState.spyWins >= 3){
            Sound.winSpies();
            gameState.winner = 'spies';
            gameState.totalSpyWins++;
            saveTotals();
            gameState.phase = 'finished';
            render();
            return;
        }
        Sound.fail();
    }

    if (gameState.currentMission < 5){
        gameState.currentMission++;
        rotateLeader();
    }
    gameState.selectedPlayers = [];
    render();
}

function resetGame(){
    Sound.click();
    // Rotate the starting leader between games for fairness
    if (gameState.players.length > 0){
        gameState.startingLeaderIndex = (gameState.startingLeaderIndex + 1) % gameState.players.length;
    }
    gameState.currentLeaderIndex = gameState.startingLeaderIndex;
    gameState.players.forEach(p => { p.role = null; });
    gameState.phase = gameState.players.length > 0 ? 'role-assignment' : 'setup';
    gameState.currentMission = 1;
    gameState.selectedPlayers = [];
    gameState.resistanceWins = 0;
    gameState.spyWins = 0;
    gameState.winner = null;
    gameState.showRoles = false;
    initializeMissions();
    render();
}

function fullReset(){
    Sound.click();
    gameState.players = [];
    gameState.startingLeaderIndex = 0;
    gameState.currentLeaderIndex = 0;
    gameState.phase = 'setup';
    gameState.currentMission = 1;
    gameState.selectedPlayers = [];
    gameState.resistanceWins = 0;
    gameState.spyWins = 0;
    gameState.winner = null;
    gameState.showRoles = false;
    initializeMissions();
    render();
}

function toggleTheme(){
    Sound.click();
    const html = document.documentElement;
    const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
    html.dataset.theme = next;
    localStorage.setItem(LS.theme, next);
    render();
}

function toggleSound(){
    Sound.toggle();
    render();
}

function toggleRoles(){
    Sound.click();
    gameState.showRoles = !gameState.showRoles;
    render();
}

/* ==================== RENDER ==================== */
function renderTopbar(){
    const el = document.getElementById('topbarActions');
    const inGame = gameState.phase === 'playing';
    el.innerHTML = `
        <button class="button button-outline button-icon" onclick="toggleSound()" title="Sound ${Sound.enabled ? 'on' : 'off'}">
            ${Sound.enabled ? '🔊' : '🔇'}
        </button>
        <button class="button button-outline button-icon" onclick="toggleTheme()" title="Toggle theme">
            ${document.documentElement.dataset.theme === 'dark' ? '☀️' : '🌙'}
        </button>
        ${inGame ? `
            <button class="button button-outline" onclick="toggleRoles()">
                ${gameState.showRoles ? '🙈 Hide roles' : '👁️ Show roles'}
            </button>
            <button class="button button-outline" onclick="resetGame()">New game</button>
        ` : ''}
    `;
}

function renderSetup(){
    const comp = TEAM_COMPOSITION[gameState.playerCount];
    const sizes = MISSION_SIZES[gameState.playerCount] || MISSION_SIZES[5];
    return `
        <div class="card">
            <div class="card-header text-center">
                <span class="section-tag">Briefing</span>
                <h2 class="card-title" style="font-size:1.4rem">New Operation</h2>
                <p class="card-sub">Set up the group, then hand out roles.</p>
            </div>
            <div style="max-width:340px;margin:0 auto 1.25rem">
                <label for="pcount">Number of players (5–10)</label>
                <input id="pcount" type="number" min="5" max="10" value="${gameState.playerCount}"
                       class="input mono" onchange="setPlayerCount(this.value)">
            </div>
            <div class="grid grid-2">
                <div class="card" style="margin-bottom:0">
                    <span class="section-tag">Team composition</span>
                    <div class="flex justify-between mb-2">
                        <span class="muted">Resistance</span>
                        <span class="badge badge-res">${comp.resistance}</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="muted">Spies</span>
                        <span class="badge badge-spy">${comp.spies}</span>
                    </div>
                </div>
                <div class="card" style="margin-bottom:0">
                    <span class="section-tag">Mission team sizes</span>
                    ${sizes.map((s,i) => `
                        <div class="flex justify-between" style="margin-bottom:.3rem">
                            <span class="muted mono" style="font-size:.8rem">OP-${i+1}</span>
                            <span class="badge badge-outline">${s}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
            <button class="button button-block mt-4" onclick="setupPlayers()">Start setup</button>
        </div>
    `;
}

function renderRoleAssignment(){
    return `
        <div class="card">
            <div class="card-header text-center">
                <span class="section-tag">Recruitment</span>
                <h2 class="card-title" style="font-size:1.4rem">Player Setup</h2>
                <p class="card-sub">Enter names, then assign roles secretly.</p>
            </div>
            <div class="grid grid-2">
                ${gameState.players.map((p, i) => `
                    <div class="flex items-center gap-2">
                        ${i === gameState.currentLeaderIndex ? '<span class="crown">👑</span>' : '<span style="width:.9rem"></span>'}
                        <input value="${esc(p.name)}" class="input"
                               onchange="updatePlayerName('${p.id}', this.value); render();"
                               placeholder="Player ${i+1}">
                    </div>
                `).join('')}
            </div>
            <div class="separator"></div>
            <div class="text-center">
                <p class="card-sub mb-4">The crowned player leads the first mission.</p>
                <button class="button button-destructive" onclick="assignRoles()">Assign roles secretly</button>
            </div>
            <div class="text-center mt-4">
                <button class="button button-outline" onclick="fullReset()">Back to briefing</button>
            </div>
        </div>
    `;
}

function renderMissionTrack(){
    const m = currentMissionData();
    const rejections = m ? m.rejectedProposals.length : 0;
    return `
        <div class="card">
            <span class="section-tag">Operation timeline</span>
            <div class="op-track">
                ${gameState.missions.map(mi => `
                    <div class="op-node">
                        <div class="op-circle ${
                            mi.result === 'success' ? 'op-success' :
                            mi.result === 'fail' ? 'op-fail' :
                            mi.number === gameState.currentMission ? 'op-current' : ''
                        }">
                            ${mi.result === 'success' ? '✓' : mi.result === 'fail' ? '✗' : mi.number}
                        </div>
                        <div class="op-meta">
                            TEAM ${mi.teamSize}
                            ${mi.number === 4 && gameState.playerCount >= 7 ? '<span class="warn">2 FAILS REQ.</span>' : ''}
                        </div>
                    </div>
                `).join('')}
            </div>
            <div class="reject-track">
                <span>Rejections</span>
                ${[0,1,2,3,4].map(i => `
                    <span class="reject-pip ${i < rejections ? 'used' : ''} ${i === 4 ? 'hammer' : ''}"></span>
                `).join('')}
                <span class="${rejections >= 4 ? 'text-spy' : ''}">${rejections >= 4 ? 'Next rejection: spies win!' : '5th = spies win'}</span>
            </div>
        </div>
    `;
}

function renderHistory(missions){
    if (missions.length === 0) return '';
    return `
        <div class="card">
            <div class="card-header">
                <span class="section-tag">Debrief</span>
                <h2 class="card-title">Mission History</h2>
            </div>
            ${missions.map(m => `
                <div class="history-item">
                    <div class="flex justify-between items-center wrap gap-2 mb-2">
                        <div class="flex items-center gap-2">
                            <span class="badge badge-outline">OP-${m.number}</span>
                            <span class="badge ${m.result === 'success' ? 'badge-res' : 'badge-spy'}">
                                ${m.result === 'success' ? 'Success' : 'Failed'}
                            </span>
                        </div>
                        <span class="muted" style="font-size:.8rem">Final leader: <strong class="text-gold">${esc(m.leader)}</strong></span>
                    </div>
                    ${m.rejectedProposals.length > 0 ? `
                        <div class="muted mb-2" style="font-size:.8rem">
                            <div class="mb-2">Rejected proposals:</div>
                            ${m.rejectedProposals.map(r => `
                                <div style="margin-left:1rem;margin-bottom:.2rem">
                                    <span class="text-spy">✗</span>
                                    <strong>${esc(r.leader)}</strong> proposed ${r.team.map(id => esc(playerName(id))).join(', ')}
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                    <div style="font-size:.85rem">
                        <span class="text-ok">✓</span>
                        <strong>Final team</strong> (${m.team.length}): ${m.team.map(id => esc(playerName(id))).join(', ')}
                    </div>
                    ${m.result === 'fail' ? `<div class="text-spy mt-2" style="font-size:.8rem">Fail cards: ${m.failCards}</div>` : ''}
                    ${m.proposalCount > 1 ? `<div class="text-gold mt-2" style="font-size:.8rem">Total proposals: ${m.proposalCount}</div>` : ''}
                </div>
            `).join('')}
        </div>
    `;
}

function renderPlaying(){
    const m = currentMissionData();
    const leader = currentLeader();
    const completed = gameState.missions.filter(x => x.result !== null);
    const comp = TEAM_COMPOSITION[gameState.playerCount];
    const teamProposed = m.team.length > 0;

    return `
        <div class="grid grid-3">
            <div class="card text-center" style="margin-bottom:0">
                <div class="stat-num">OP-${gameState.currentMission}</div>
                <div class="stat-label">Team size ${m.teamSize}</div>
            </div>
            <div class="card text-center" style="margin-bottom:0">
                <div class="leader-name">👑 ${esc(leader?.name || '—')}</div>
                <div class="stat-label">Current leader</div>
            </div>
            <div class="card text-center" style="margin-bottom:0">
                <div class="score-strip">
                    <span class="stat-num res-score">${gameState.resistanceWins}</span>
                    <span class="muted mono">—</span>
                    <span class="stat-num spy-score">${gameState.spyWins}</span>
                </div>
                <div class="stat-label">Resistance · Spies (${comp.resistance}R / ${comp.spies}S in play)</div>
            </div>
        </div>
        <div style="height:1.25rem"></div>

        ${renderMissionTrack()}

        <div class="card">
            <div class="card-header">
                <span class="section-tag">Field agents</span>
                <h2 class="card-title">Players</h2>
                <p class="card-sub">
                    ${!teamProposed
                        ? `${esc(leader?.name || 'Leader')}, pick ${m.teamSize} players for the mission.`
                        : !m.approved
                        ? 'Team proposed — vote to accept or reject.'
                        : 'Team accepted — run the mission.'}
                </p>
            </div>
            <div class="grid grid-players">
                ${gameState.players.map((p, i) => `
                    <button class="player-button ${
                        gameState.selectedPlayers.includes(p.id) ? 'selected' :
                        m.team.includes(p.id) ? 'on-mission' : ''
                    }"
                    onclick="togglePlayerSelection('${p.id}')"
                    ${teamProposed ? 'disabled' : ''}>
                        <span class="flex items-center gap-2">
                            ${i === gameState.currentLeaderIndex ? '<span class="crown">👑</span>' : ''}
                            <span class="player-name">${esc(p.name)}</span>
                        </span>
                        ${gameState.showRoles ? `
                            <span class="badge ${p.role === 'spy' ? 'badge-spy' : 'badge-res'}">
                                ${p.role === 'spy' ? 'Spy' : 'Resistance'}
                            </span>
                        ` : ''}
                        ${m.team.includes(p.id) ? '<span class="badge badge-ok">On mission</span>' : ''}
                    </button>
                `).join('')}
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="section-tag">Command</span>
                <h2 class="card-title">Mission Actions</h2>
            </div>
            ${!teamProposed ? `
                <p class="card-sub mono mb-4">Selected: ${gameState.selectedPlayers.length}/${m.teamSize} · Proposal ${m.proposalCount + 1}/5</p>
                <button class="button" onclick="proposeTeam()"
                        ${gameState.selectedPlayers.length !== m.teamSize ? 'disabled' : ''}>
                    Propose team
                </button>
            ` : !m.approved ? `
                <p class="card-sub mb-4">Team proposed by <strong class="text-gold">${esc(leader?.name || '')}</strong>. The group votes aloud.</p>
                <div class="flex gap-4 wrap">
                    <button class="button button-green" onclick="acceptProposal()">Accept team</button>
                    <button class="button button-destructive" onclick="rejectProposal()">Reject team</button>
                </div>
            ` : `
                <p class="card-sub mb-2">Team accepted. Run mission — how many fail cards were played?</p>
                <div class="flex gap-2 wrap">
                    ${Array.from({length:m.teamSize + 1}, (_, i) => `
                        <button class="button button-outline mono" onclick="executeMission(${i})">${i} fail${i === 1 ? '' : 's'}</button>
                    `).join('')}
                </div>
                ${gameState.playerCount >= 7 && gameState.currentMission === 4
                    ? '<p class="text-gold mt-4" style="font-size:.8rem">Mission 4 needs 2 fail cards to fail with 7+ players.</p>' : ''}
            `}
        </div>

        ${renderHistory(completed)}
    `;
}

function renderFinished(){
    const completed = gameState.missions.filter(m => m.result !== null);
    const res = gameState.winner === 'resistance';
    return `
        <div class="card text-center">
            <span class="section-tag">Verdict</span>
            <div class="verdict ${res ? 'res' : 'spy'}">${res ? 'Resistance Wins!' : 'Spies Win!'}</div>
            <div class="grid grid-2 mt-4">
                <div>
                    <div class="stat-label mb-2">This game</div>
                    <div class="score-strip">
                        <span class="stat-num res-score">${gameState.resistanceWins}</span>
                        <span class="muted mono">—</span>
                        <span class="stat-num spy-score">${gameState.spyWins}</span>
                    </div>
                </div>
                <div>
                    <div class="stat-label mb-2">All-time games won</div>
                    <div class="score-strip">
                        <span class="stat-num res-score">${gameState.totalResistanceWins}</span>
                        <span class="muted mono">—</span>
                        <span class="stat-num spy-score">${gameState.totalSpyWins}</span>
                    </div>
                </div>
            </div>
            <button class="button button-block mt-4" onclick="resetGame()">Play again</button>
        </div>

        <div class="card">
            <div class="card-header">
                <span class="section-tag">Declassified</span>
                <h2 class="card-title">Player Roles</h2>
            </div>
            <div class="grid grid-players">
                ${gameState.players.map(p => `
                    <div class="role-chip">
                        <div style="margin-bottom:.4rem;font-weight:500">${esc(p.name)}</div>
                        <span class="badge ${p.role === 'spy' ? 'badge-spy' : 'badge-res'}">
                            ${p.role === 'spy' ? 'Spy' : 'Resistance'}
                        </span>
                    </div>
                `).join('')}
            </div>
        </div>

        ${renderHistory(completed)}
    `;
}

function render(){
    renderTopbar();
    const app = document.getElementById('app');
    switch (gameState.phase){
        case 'setup': app.innerHTML = renderSetup(); break;
        case 'role-assignment': app.innerHTML = renderRoleAssignment(); break;
        case 'playing': app.innerHTML = renderPlaying(); break;
        case 'finished': app.innerHTML = renderFinished(); break;
    }
}

/* ==================== INIT ==================== */
(function init(){
    const savedTheme = localStorage.getItem(LS.theme);
    if (savedTheme) document.documentElement.dataset.theme = savedTheme;
    initializeMissions();
    render();
})();
</script>
</body>
</html>
