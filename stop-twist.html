<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STOP TWIST</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --accent: #f0e040;
    --accent2: #ff5c3a;
    --text: #f0ede6;
    --muted: #666;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 70% 20%, rgba(240,224,64,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 40% 40% at 20% 80%, rgba(255,92,58,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* HEADER */
  .logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(44px, 10vw, 72px);
    letter-spacing: -1px;
    line-height: 1;
    color: var(--text);
  }
  .logo span {
    color: var(--accent);
    position: relative;
  }
  .logo span::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
    height: 4px;
    background: var(--accent2);
    border-radius: 2px;
  }
  .tagline {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* SECTIONS */
  .section-label {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 600;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-top: 20px;
  }

  /* CATEGORIES GRID */
  .cat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
  }

  .cat-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  .cat-btn .cat-icon { font-size: 16px; }
  .cat-btn:hover { border-color: var(--accent); color: var(--accent); }
  .cat-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0d0d;
    font-weight: 600;
  }
  .cat-count {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
  }
  .cat-count span { color: var(--accent); font-weight: 600; }

  /* CUSTOM CATEGORIES */
  .custom-cats {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 8px;
    margin-top: 8px;
  }
  .custom-cat-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }
  .custom-cat-wrap .cat-icon-fixed {
    position: absolute;
    left: 11px;
    font-size: 15px;
    pointer-events: none;
    z-index: 1;
  }
  .custom-cat-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 10px 12px 10px 34px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
    outline: none;
  }
  .custom-cat-input::placeholder { color: var(--muted); }
  .custom-cat-input:focus { border-color: var(--accent); border-style: solid; }
  .custom-cat-input.active-custom {
    border-style: solid;
    border-color: var(--accent);
  }

  /* TIMER OPTIONS */
  .timer-options {
    display: flex;
    gap: 8px;
  }
  .timer-btn {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    color: var(--text);
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .timer-btn:hover { border-color: var(--accent); color: var(--accent); }
  .timer-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0d0d;
  }
  .timer-btn small {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    opacity: 0.7;
    margin-top: 2px;
  }

  /* MAIN BUTTON */
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #0d0d0d;
    border: none;
    border-radius: var(--radius);
    padding: 18px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 24px;
  }
  .btn-primary:hover { background: #f7e930; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
  }

  .btn-stop {
    background: var(--accent2);
  }
  .btn-stop:hover { background: #ff7055; }

  .btn-next {
    background: var(--surface);
    color: var(--text);
    border: 1.5px solid var(--border);
  }
  .btn-next:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }

  /* GAME SCREEN */
  .game-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
  }

  .round-badge {
    background: var(--accent2);
    color: white;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    display: inline-block;
    margin-bottom: 6px;
  }

  .rule-box {
    background: var(--surface);
    border: 2px solid var(--accent);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .rule-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .rule-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .rule-text {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(28px, 6vw, 44px);
    line-height: 1.1;
    color: var(--text);
  }
  .rule-text .highlight {
    color: var(--accent);
  }
  .rule-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* TIMER */
  .timer-display {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .timer-label { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
  .timer-value {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 48px;
    line-height: 1;
    color: var(--text);
    transition: color 0.3s;
    font-variant-numeric: tabular-nums;
  }
  .timer-value.urgent { color: var(--accent2); }

  .timer-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }
  .timer-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 1s linear, background 0.3s;
  }
  .timer-bar.urgent { background: var(--accent2); }

  /* CATEGORIES LIST (game) */
  .game-cats {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 6px;
    margin-bottom: 16px;
  }
  .game-cat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text);
  }
  .game-cat .cat-icon { font-size: 14px; }

  /* ROUND OVER */
  .round-over-box {
    text-align: center;
    padding: 32px 20px;
  }
  .round-over-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 48px;
    color: var(--accent2);
    margin-bottom: 8px;
  }
  .round-over-sub { color: var(--muted); font-size: 15px; margin-bottom: 24px; }

  /* END SCREEN */
  .end-box {
    text-align: center;
    padding: 40px 20px;
  }
  .end-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: clamp(36px, 8vw, 60px);
    line-height: 1;
    margin-bottom: 12px;
  }

  .confetti-emoji {
    font-size: 48px;
    display: block;
    margin-bottom: 16px;
    animation: bounce 0.6s ease infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-10px); }
  }

  /* START BUTTON area */
  .start-area { margin-top: 12px; }

  /* fade in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.35s ease both; }

  /* PULSE animation for timer when running */
  @keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(240,224,64,0.4); }
    70% { box-shadow: 0 0 0 12px rgba(240,224,64,0); }
    100% { box-shadow: 0 0 0 0 rgba(240,224,64,0); }
  }
  .timer-display.running { animation: pulse-ring 2s ease-out infinite; }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* FLASH EFFECT */
  @keyframes flashRed {
    0%, 100% { background: var(--bg); }
    50% { background: rgba(255, 60, 30, 0.18); }
  }
  body.flashing {
    animation: flashRed 0.5s ease infinite;
  }
  .timer-display.flash-urgent {
    border-color: var(--accent2) !important;
    box-shadow: 0 0 0 2px rgba(255,92,58,0.4);
  }
</style>
</head>
<body>
<div class="container">

  <!-- ═══════════ SETUP SCREEN ═══════════ -->
  <div id="screen-setup" class="screen active">
    <div class="fade-up">
      <div class="logo">STOP <span>TWIST</span></div>
      <div class="tagline">Scattergories with a twist</div>
    </div>

    <div class="section fade-up" style="animation-delay:0.05s">
      <div class="section-label">Categories <span id="cat-count-label" style="color:var(--accent);font-size:12px;margin-left:4px;">(choose 6–12)</span></div>
      <div class="cat-grid" id="cat-grid"></div>
      <div class="section-label" style="margin-top:16px;margin-bottom:8px;">Custom Categories <span style="color:var(--muted);font-size:11px;">(type a name to activate)</span></div>
      <div class="custom-cats" id="custom-cats">
        <div class="custom-cat-wrap"><span class="cat-icon-fixed">✏️</span><input class="custom-cat-input" id="custom-0" type="text" maxlength="20" placeholder="Custom 1" oninput="updateCustom(0)" /></div>
        <div class="custom-cat-wrap"><span class="cat-icon-fixed">✏️</span><input class="custom-cat-input" id="custom-1" type="text" maxlength="20" placeholder="Custom 2" oninput="updateCustom(1)" /></div>
        <div class="custom-cat-wrap"><span class="cat-icon-fixed">✏️</span><input class="custom-cat-input" id="custom-2" type="text" maxlength="20" placeholder="Custom 3" oninput="updateCustom(2)" /></div>
      </div>
      <div class="cat-count">Selected: <span id="selected-count">0</span> / 12</div>
    </div>

    <div class="section fade-up" style="animation-delay:0.1s">
      <div class="section-label">Timer per Round</div>
      <div class="timer-options">
        <button class="timer-btn" data-mins="1" onclick="selectTimer(1)">1<small>min</small></button>
        <button class="timer-btn selected" data-mins="2" onclick="selectTimer(2)">2<small>min</small></button>
        <button class="timer-btn" data-mins="3" onclick="selectTimer(3)">3<small>min</small></button>
        <button class="timer-btn" data-mins="4" onclick="selectTimer(4)">4<small>min</small></button>
        <button class="timer-btn" data-mins="5" onclick="selectTimer(5)">5<small>min</small></button>
      </div>
    </div>

    <div class="start-area fade-up" style="animation-delay:0.15s">
      <button class="btn-primary" id="btn-start" onclick="startGame()" disabled>START GAME</button>
    </div>
  </div>

  <!-- ═══════════ GAME SCREEN ═══════════ -->
  <div id="screen-game" class="screen">

    <div class="game-header fade-up">
      <div>
        <div class="round-badge" id="round-badge">ROUND 1</div>
        <div class="logo" style="font-size:32px;">STOP <span>TWIST</span></div>
      </div>
    </div>

    <div class="rule-box fade-up" id="rule-box">
      <div class="rule-label">⚡ This Round's Rule</div>
      <div class="rule-text" id="rule-text">—</div>
      <div class="rule-sub" id="rule-sub"></div>
    </div>

    <div class="timer-display" id="timer-display">
      <div>
        <div class="timer-label">Time left</div>
        <div class="timer-value" id="timer-value">2:00</div>
        <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
      </div>
    </div>

    <div class="game-cats" id="game-cats"></div>

    <div id="btn-area">
      <button class="btn-primary" id="btn-begin" onclick="beginTimer()" style="display:none;">▶ START TIMER</button>
      <button class="btn-primary btn-stop" id="btn-stop" onclick="stopRound()" style="display:none;">✋ STOP!</button>
    </div>

    <!-- Round over state (shown inline) -->
    <div id="round-over" style="display:none;">
      <div class="round-over-box fade-up">
        <div class="round-over-title">STOP!</div>
        <div class="round-over-sub" id="round-over-sub">Check your answers out loud.</div>
      </div>
      <button class="btn-primary btn-next" id="btn-next" onclick="nextRound()">NEXT ROUND →</button>
    </div>

  </div>

  <!-- ═══════════ END SCREEN ═══════════ -->
  <div id="screen-end" class="screen">
    <div class="end-box fade-up">
      <span class="confetti-emoji">🎉</span>
      <div class="end-title">GAME<br>OVER!</div>
      <p style="color:var(--muted);margin:16px 0 32px;font-size:15px;">That was all 10 rounds.<br>Tally up your points!</p>
      <button class="btn-primary" onclick="resetGame()">PLAY AGAIN</button>
    </div>
  </div>

</div>

<script>
// ── DATA ────────────────────────────────────────────────
const CATEGORIES = [
  { id:'name',    label:'Name',         icon:'👤' },
  { id:'animal',  label:'Animal',       icon:'🐾' },
  { id:'food',    label:'Food',         icon:'🍕' },
  { id:'object',  label:'Object',       icon:'📦' },
  { id:'place',   label:'Place',        icon:'🌍' },
  { id:'movie',   label:'Movie / Series',icon:'🎬' },
  { id:'brand',   label:'Brand',        icon:'🏷️' },
  { id:'adj',     label:'Adjective',    icon:'✨' },
  { id:'verb',    label:'Verb',         icon:'⚡' },
  { id:'band',    label:'Band / Artist',icon:'🎵' },
  { id:'game',    label:'Game',         icon:'🎮' },
  { id:'app',     label:'App',          icon:'📱' },
];

const COMMON_LETTERS  = 'ABCDEFGHIJKLMNOPRSTUW'.split('');
const COMMON_2ND      = 'AEHILORUNST'.split('');
const COMMON_ENDINGS  = 'AEILYNSRTD'.split('');
const VOWELS          = ['A','E','I','O','U'];

const ROUND_RULES = [
  // 1 – first letter
  () => {
    const l = pick(COMMON_LETTERS);
    return { main: `First letter: <span class="highlight">${l}</span>`, sub: 'Every answer must start with this letter.' };
  },
  // 2 – second letter
  () => {
    const l = pick(COMMON_2ND);
    return { main: `2nd letter: <span class="highlight">${l}</span>`, sub: 'The second letter of every answer must be this.' };
  },
  // 3 – ends with
  () => {
    const l = pick(COMMON_ENDINGS);
    return { main: `Ends with: <span class="highlight">${l}</span>`, sub: 'Every answer must end with this letter.' };
  },
  // 4 – exactly N letters
  () => {
    const n = randInt(4, 8);
    return { main: `Exactly <span class="highlight">${n}</span> letters`, sub: `Every answer must have exactly ${n} letters.` };
  },
  // 5 – no repeated letters
  () => {
    return { main: `No repeated letters`, sub: 'No letter may appear more than once in a single answer.' };
  },
  // 6 – starts with either
  () => {
    const a = pick(COMMON_LETTERS);
    let b = pick(COMMON_LETTERS.filter(x => x !== a));
    return { main: `Starts with <span class="highlight">${a}</span> or <span class="highlight">${b}</span>`, sub: 'Each answer must start with one of these two letters.' };
  },
  // 7 – exactly N vowels
  () => {
    const n = randInt(1, 3);
    return { main: `Exactly <span class="highlight">${n}</span> vowel${n>1?'s':''}`, sub: `Each answer must contain exactly ${n} vowel${n>1?'s':''} (A, E, I, O, U).` };
  },
  // 8 – contains letter
  () => {
    const l = pick('ABCDEFGHIJKLMNOPRSTUW'.split(''));
    return { main: `Contains: <span class="highlight">${l}</span>`, sub: `Every answer must contain the letter ${l} at least once.` };
  },
  // 9 – 6+ letters
  () => {
    return { main: `6+ letters`, sub: 'Every answer must have at least 6 letters.' };
  },
  // 10 – double letters
  () => {
    return { main: `Double letters`, sub: 'Every answer must contain at least one pair of consecutive repeated letters (e.g. LL, SS, EE).' };
  },
];

// ── STATE ────────────────────────────────────────────────
let selectedCats = new Set();
let customCats = ['', '', ''];
let timerMins = 2;
let currentRound = 0;
let timerInterval = null;
let timerSeconds = 0;
let timerTotal = 0;
let roundActive = false;
let shuffledRules = [];

// ── UTILS ────────────────────────────────────────────────
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── BUILD SETUP ──────────────────────────────────────────
function buildCatGrid() {
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.innerHTML = `<span class="cat-icon">${cat.icon}</span>${cat.label}`;
    btn.onclick = () => toggleCat(cat.id, btn);
    grid.appendChild(btn);
  });
}

function toggleCat(id, btn) {
  if (selectedCats.has(id)) {
    selectedCats.delete(id);
    btn.classList.remove('selected');
  } else {
    if (selectedCats.size >= 12) return;
    selectedCats.add(id);
    btn.classList.add('selected');
  }
  updateStartBtn();
}


function updateCustom(idx) {
  const input = document.getElementById('custom-' + idx);
  const val = input.value.trim();
  customCats[idx] = val;
  if (val) {
    input.classList.add('active-custom');
  } else {
    input.classList.remove('active-custom');
  }
  updateStartBtn();
}

function updateStartBtn() {
  const customActive = customCats.filter(c => c.length > 0).length;
  const total = selectedCats.size + customActive;
  document.getElementById('selected-count').textContent = total;
  document.getElementById('btn-start').disabled = (total < 6);
}

function selectTimer(mins) {
  timerMins = mins;
  document.querySelectorAll('.timer-btn').forEach(b => {
    b.classList.toggle('selected', parseInt(b.dataset.mins) === mins);
  });
}

// ── GAME FLOW ────────────────────────────────────────────
function startGame() {
  currentRound = 0;
  // Shuffle rules so round 1 is always rule[0] (first letter), rest randomised
  const rest = shuffle(ROUND_RULES.slice(1));
  shuffledRules = [ROUND_RULES[0], ...rest];

  showScreen('screen-game');
  showRound();
}

function showRound() {
  currentRound++;
  if (currentRound > 10) { showScreen('screen-end'); return; }

  // Round badge
  document.getElementById('round-badge').textContent = `ROUND ${currentRound} / 10`;

  // Rule
  const rule = shuffledRules[currentRound - 1]();
  document.getElementById('rule-text').innerHTML = rule.main;
  document.getElementById('rule-sub').textContent = rule.sub;

  // Categories
  const gameCats = document.getElementById('game-cats');
  gameCats.innerHTML = '';
  selectedCats.forEach(id => {
    const cat = CATEGORIES.find(c => c.id === id);
    const el = document.createElement('div');
    el.className = 'game-cat';
    el.innerHTML = `<span class="cat-icon">${cat.icon}</span>${cat.label}`;
    gameCats.appendChild(el);
  });
  customCats.filter(c => c.length > 0).forEach(label => {
    const el = document.createElement('div');
    el.className = 'game-cat';
    el.innerHTML = `<span class="cat-icon">✏️</span>${label}`;
    gameCats.appendChild(el);
  });

  // Timer reset (don't start yet)
  timerSeconds = timerMins * 60;
  timerTotal = timerSeconds;
  updateTimerDisplay();

  // Show START TIMER button, hide stop + round-over
  document.getElementById('btn-begin').style.display = 'block';
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('round-over').style.display = 'none';
  document.getElementById('timer-display').classList.remove('running');
  roundActive = false;
  clearInterval(timerInterval);
}

function beginTimer() {
  document.getElementById('btn-begin').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'block';
  roundActive = true;
  document.getElementById('timer-display').classList.add('running');
  soundStart();
  timerInterval = setInterval(tick, 1000);
}

function tick() {
  if (!roundActive) return;
  timerSeconds--;
  updateTimerDisplay();
  if (timerSeconds <= 0) {
    soundTimeUp();
    document.body.classList.remove('flashing');
    endRound(true);
  } else if (timerSeconds <= 10) {
    soundUrgentTick();
  } else if (timerSeconds <= 20) {
    soundTick();
  }
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  const display = `${m}:${String(s).padStart(2,'0')}`;
  const el = document.getElementById('timer-value');
  const bar = document.getElementById('timer-bar');
  const td = document.getElementById('timer-display');
  el.textContent = display;
  const pct = (timerSeconds / timerTotal) * 100;
  bar.style.width = pct + '%';
  const urgent = timerSeconds <= 20;
  const veryUrgent = timerSeconds <= 10;
  el.classList.toggle('urgent', urgent);
  bar.classList.toggle('urgent', urgent);
  td.classList.toggle('flash-urgent', urgent);
  document.body.classList.toggle('flashing', veryUrgent && roundActive);
}

function stopRound() {
  soundStop();
  document.body.classList.remove('flashing');
  endRound(false);
}

function endRound(timeUp) {
  roundActive = false;
  clearInterval(timerInterval);
  document.body.classList.remove('flashing');
  document.getElementById('timer-display').classList.remove('running');
  document.getElementById('timer-display').classList.remove('flash-urgent');

  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('round-over').style.display = 'block';

  const sub = timeUp ? "Time's up! Check your answers out loud." : "STOP! Check your answers out loud.";
  document.getElementById('round-over-sub').textContent = sub;

  // Last round?
  const btnNext = document.getElementById('btn-next');
  if (currentRound >= 10) {
    btnNext.textContent = 'SEE RESULTS 🎉';
  } else {
    btnNext.textContent = 'NEXT ROUND →';
  }
}

function nextRound() {
  soundNextRound();
  if (currentRound >= 10) {
    showScreen('screen-end');
  } else {
    showRound();
  }
}

function resetGame() {
  selectedCats.clear();
  customCats = ['', '', ''];
  currentRound = 0;
  // Reset cat buttons
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
  [0,1,2].forEach(i => {
    const inp = document.getElementById('custom-' + i);
    if (inp) { inp.value = ''; inp.classList.remove('active-custom'); }
  });
  document.getElementById('selected-count').textContent = '0';
  document.getElementById('btn-start').disabled = true;
  showScreen('screen-setup');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}


// ── SOUND ENGINE ─────────────────────────────────────────
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, volume, delay=0, fadeOut=true) {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
  gain.gain.setValueAtTime(volume, ctx.currentTime + delay);
  if (fadeOut) gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
  osc.start(ctx.currentTime + delay);
  osc.stop(ctx.currentTime + delay + duration + 0.05);
}

function soundStart() {
  // Rising 3-note fanfare
  playTone(330, 'triangle', 0.12, 0.4, 0);
  playTone(440, 'triangle', 0.12, 0.4, 0.13);
  playTone(550, 'triangle', 0.25, 0.5, 0.26);
}

function soundTick() {
  playTone(880, 'sine', 0.06, 0.15);
}

function soundUrgentTick() {
  playTone(1100, 'square', 0.08, 0.25);
}

function soundStop() {
  // Descending buzz
  playTone(440, 'sawtooth', 0.12, 0.5, 0);
  playTone(330, 'sawtooth', 0.12, 0.5, 0.1);
  playTone(220, 'sawtooth', 0.25, 0.6, 0.2);
}

function soundTimeUp() {
  // Alarm-like triple beep
  [0, 0.18, 0.36].forEach(d => {
    playTone(880, 'square', 0.12, 0.5, d);
    playTone(660, 'square', 0.12, 0.3, d + 0.06);
  });
  playTone(440, 'sawtooth', 0.5, 0.6, 0.6);
}

function soundNextRound() {
  playTone(440, 'sine', 0.1, 0.3, 0);
  playTone(550, 'sine', 0.15, 0.3, 0.1);
}
