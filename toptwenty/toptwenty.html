<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RANK IT — Trivia Game</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3a;
    --accent: #f0c040;
    --accent2: #e05a5a;
    --green: #4cdb8a;
    --text: #e8e8f0;
    --muted: #666688;
    --radius: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── NOISE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  /* ─── SCREENS ─── */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ─── START SCREEN ─── */
  #screen-start {
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 40px;
  }

  .logo {
    text-align: center;
  }
  .logo h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 10vw, 120px);
    letter-spacing: 8px;
    color: var(--accent);
    line-height: 1;
    text-shadow: 0 0 60px rgba(240,192,64,0.3);
  }
  .logo p {
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .setup-section label {
    display: block;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 600;
  }

  /* Team input */
  .team-input-row {
    display: flex;
    gap: 8px;
  }
  .team-input-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .team-input-row input:focus { border-color: var(--accent); }
  .team-input-row input::placeholder { color: var(--muted); }
  .team-input-row button {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #000;
    font-weight: 700;
    font-size: 18px;
    width: 42px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  .team-input-row button:hover { opacity: 0.85; transform: scale(1.05); }

  .teams-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 10px;
    min-height: 20px;
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    color: #000;
    animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .pill .pill-x {
    cursor: pointer;
    opacity: 0.6;
    font-size: 16px;
    line-height: 1;
    transition: opacity 0.15s;
  }
  .pill .pill-x:hover { opacity: 1; }
  @keyframes popIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  /* Rounds slider */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(240,192,64,0.5);
  }
  .slider-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--accent);
    min-width: 40px;
    text-align: center;
  }

  /* Timer pills */
  .timer-options {
    display: flex;
    gap: 10px;
  }
  .timer-opt {
    flex: 1;
    padding: 12px 0;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    color: var(--muted);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .timer-opt.selected {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(240,192,64,0.08);
    box-shadow: 0 0 16px rgba(240,192,64,0.15);
  }
  .timer-opt:hover:not(.selected) { border-color: var(--muted); color: var(--text); }

  .start-btn {
    width: 100%;
    padding: 18px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 30px rgba(240,192,64,0.3);
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(240,192,64,0.4); }
  .start-btn:active { transform: translateY(0); }
  .start-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* ─── GAME SCREEN ─── */
  #screen-game {
    padding: 0;
    flex-direction: column;
  }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 16px;
    flex-wrap: wrap;
  }

  .teams-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .team-badge {
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0.4;
    transition: opacity 0.3s, transform 0.3s, box-shadow 0.3s;
    color: #000;
  }
  .team-badge.active {
    opacity: 1;
    transform: scale(1.08);
    box-shadow: 0 0 16px rgba(0,0,0,0.4);
  }

  .round-info {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
  }
  .round-info span { color: var(--text); font-weight: 600; }

  /* Timer */
  .timer-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .timer-wrap .next-btn {
    padding: 8px 14px;
    font-size: 16px;
    letter-spacing: 2px;
    white-space: nowrap;
  }
  .timer-ring {
    position: relative;
    width: 44px;
    height: 44px;
  }
  .timer-ring svg {
    transform: rotate(-90deg);
    width: 44px; height: 44px;
  }
  .timer-ring circle {
    fill: none;
    stroke-width: 4;
  }
  .timer-ring .bg-ring { stroke: var(--border); }
  .timer-ring .progress-ring {
    stroke: var(--accent);
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.3s;
  }
  .timer-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 15px;
    color: var(--accent);
  }

  /* Category */
  .category-bar {
    padding: 10px 24px 8px;
    text-align: center;
  }
  .category-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .category-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(22px, 4vw, 36px);
    color: var(--accent);
    letter-spacing: 3px;
    text-shadow: 0 0 30px rgba(240,192,64,0.2);
  }

  .guess-counter {
    display: flex;
    gap: 14px;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    flex-wrap: wrap;
  }

  /* Answer grid */
  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
    padding: 0 16px;
  }
  .answer-cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.3s, border-color 0.3s;
    min-height: 32px;
  }
  .answer-cell.revealed {
    background: rgba(76,219,138,0.08);
    border-color: var(--green);
    animation: revealPop 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes revealPop {
    0%   { transform: scale(0.94); }
    100% { transform: scale(1); }
  }
  .answer-rank {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    min-width: 18px;
  }
  .answer-cell.revealed .answer-rank { color: var(--green); }
  .answer-text {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: transparent;
    transition: color 0.3s;
  }
  .answer-cell.revealed .answer-text { color: var(--text); }
  .answer-detail {
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
    text-align: right;
    display: none;
  }
  .answer-cell.revealed .answer-detail { display: block; }

  /* Locked placeholder */
  .answer-lock {
    width: 48px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    flex: 1;
  }
  .answer-cell.revealed .answer-lock { display: none; }

  /* Input area */
  .input-area {
    padding: 10px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .answer-input-wrap {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  #answerInput {
    flex: 1;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  #answerInput:focus { border-color: var(--accent); }
  #answerInput.correct-flash {
    border-color: var(--green);
    background: rgba(76,219,138,0.06);
  }
  #answerInput.wrong-flash {
    border-color: var(--accent2);
    background: rgba(224,90,90,0.06);
  }

  .pass-btn {
    padding: 10px 16px;
    background: transparent;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pass-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .score-strip {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .score-item {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .score-item .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .score-item .score-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    line-height: 1;
  }

  .reveal-btn {
    width: 100%;
    padding: 14px;
    background: var(--green);
    border: none;
    border-radius: var(--radius);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(76,219,138,0.3);
    transition: transform 0.1s, opacity 0.2s;
  }
  .reveal-btn:hover { opacity: 0.85; transform: scale(1.01); }

  /* Fixed bottom bar — no overlay, board fully visible above */
  .round-end-bar {
    background: var(--surface2);
    border-top: 2px solid var(--accent);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .round-end-bar.visible {
    display: flex;
  }
  .round-end-scores {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .re-score-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  .re-score-item .re-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .re-score-item .re-name { font-weight: 600; }
  .re-score-item .re-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
  }

  /* ─── BETWEEN ROUNDS ─── */
  #screen-between {
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 24px;
    text-align: center;
  }
  .between-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    letter-spacing: 6px;
    color: var(--accent);
  }
  .between-subtitle {
    color: var(--muted);
    letter-spacing: 2px;
    font-size: 12px;
    text-transform: uppercase;
  }
  .scores-table {
    width: 100%;
    max-width: 400px;
    border-collapse: collapse;
  }
  .scores-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 16px;
  }
  .scores-table td:first-child { font-weight: 600; }
  .scores-table td:last-child {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    text-align: right;
    color: var(--accent);
  }
  .next-btn {
    padding: 16px 48px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 30px rgba(240,192,64,0.3);
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(240,192,64,0.4); }

  /* ─── END SCREEN ─── */
  #screen-end {
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    gap: 24px;
    text-align: center;
  }
  .winner-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
  }
  .winner-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 90px);
    color: var(--accent);
    letter-spacing: 6px;
    text-shadow: 0 0 60px rgba(240,192,64,0.4);
    animation: winPulse 2s ease-in-out infinite;
  }
  @keyframes winPulse {
    0%, 100% { text-shadow: 0 0 40px rgba(240,192,64,0.3); }
    50%       { text-shadow: 0 0 80px rgba(240,192,64,0.6); }
  }
  .play-again-btn {
    padding: 16px 48px;
    background: transparent;
    border: 2px solid var(--accent);
    border-radius: var(--radius);
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .play-again-btn:hover { background: rgba(240,192,64,0.1); }

  /* ─── TEAM COLORS ─── */
  .tc-0 { background: #f0c040; }
  .tc-1 { background: #e05a5a; }
  .tc-2 { background: #4cdb8a; }
  .tc-3 { background: #5aade0; }
  .tc-4 { background: #c05ae0; }
  .tc-5 { background: #e07a5a; }

  .ts-0 { color: #f0c040; }
  .ts-1 { color: #e05a5a; }
  .ts-2 { color: #4cdb8a; }
  .ts-3 { color: #5aade0; }
  .ts-4 { color: #c05ae0; }
  .ts-5 { color: #e07a5a; }

  /* Did-you-mean prompt */
  .did-you-mean {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 10px 14px;
    animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .dym-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }
  .dym-chips {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .dym-chip {
    padding: 8px 18px;
    border-radius: 999px;
    border: 2px solid var(--accent);
    background: rgba(240,192,64,0.08);
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .dym-chip:hover { background: var(--accent); color: #000; }
  .dym-chip.dym-none {
    border-color: var(--border);
    background: transparent;
    color: var(--muted);
  }
  .dym-chip.dym-none:hover { border-color: var(--accent2); color: var(--accent2); background: transparent; }

  /* Feedback toast */
  .toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--green);
    color: #000;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    padding: 10px 28px;
    border-radius: 999px;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    transition: opacity 0.2s, transform 0.2s;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.wrong {
    background: var(--accent2);
    color: #fff;
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════
     START SCREEN
══════════════════════════════════════════ -->
<div id="screen-start" class="screen active">
  <div class="logo">
    <h1>RANK IT</h1>
    <p>The Top 20 Trivia Game</p>
  </div>

  <div class="setup-card">
    <!-- Teams -->
    <div class="setup-section">
      <label>Teams</label>
      <div class="team-input-row">
        <input type="text" id="teamNameInput" placeholder="Team name…" maxlength="24">
        <button id="addTeamBtn">+</button>
      </div>
      <div class="teams-pills" id="teamsPills"></div>
    </div>

    <!-- Rounds -->
    <div class="setup-section">
      <label>Rounds</label>
      <div class="slider-row">
        <input type="range" id="roundsSlider" min="1" max="20" value="5">
        <div class="slider-val" id="roundsVal">5</div>
      </div>
    </div>

    <!-- Timer -->
    <div class="setup-section">
      <label>Timer (seconds)</label>
      <div class="timer-options" id="timerOptions">
        <button class="timer-opt" data-val="30">30</button>
        <button class="timer-opt selected" data-val="45">45</button>
        <button class="timer-opt" data-val="60">60</button>
        <button class="timer-opt" data-val="90">90</button>
      </div>
    </div>

    <button class="start-btn" id="startBtn" disabled>START GAME</button>
  </div>
</div>

<!-- ══════════════════════════════════════════
     GAME SCREEN
══════════════════════════════════════════ -->
<div id="screen-game" class="screen">
  <div class="game-header">
    <div class="teams-bar" id="teamsBar"></div>
    <div class="round-info" id="roundInfo">Round <span id="roundNum">1</span> of <span id="roundTotal">5</span></div>
    <div class="timer-wrap">
      <div class="timer-ring">
        <svg viewBox="0 0 52 52">
          <circle class="bg-ring" cx="26" cy="26" r="22"/>
          <circle class="progress-ring" id="progressRing" cx="26" cy="26" r="22"/>
        </svg>
        <div class="timer-num" id="timerNum">45</div>
      </div>
      <button class="next-btn" id="nextRoundBtn" style="display:none">NEXT ROUND</button>
    </div>
  </div>

  <div class="category-bar">
    <div class="category-label">Category</div>
    <div class="category-name" id="categoryName">—</div>
  </div>

  <div class="answers-grid" id="answersGrid"></div>

  <div id="roundEndBar" class="round-end-bar">
    <div class="round-end-scores" id="roundEndScores"></div>
  </div>

  <div class="input-area">
    <div class="did-you-mean" id="didYouMean" style="display:none">
      <span class="dym-label">Did you mean…</span>
      <div class="dym-chips" id="dymChips"></div>

      <input type="text" id="answerInput" placeholder="Type your answer…" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="pass-btn" id="passBtn">PASS</button>
    </div>

</div>

<!-- ══════════════════════════════════════════
     END SCREEN
══════════════════════════════════════════ -->
<div id="screen-end" class="screen">
  <div class="winner-label">🏆 Winner — highest score</div>
  <div class="winner-name" id="winnerName">—</div>
  <table class="scores-table" id="finalScoresTable"></table>
  <button class="play-again-btn" id="playAgainBtn">PLAY AGAIN</button>
</div>

<div class="toast" id="toast"></div>

<script src="../shared/triviaData.js"></script>
<script>

// ══════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, type, duration, vol = 0.3, delay = 0) {
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, ctx.currentTime + delay);
  g.gain.setValueAtTime(0, ctx.currentTime + delay);
  g.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
  o.start(ctx.currentTime + delay);
  o.stop(ctx.currentTime + delay + duration + 0.05);
}

function playCorrect() {
  beep(440, 'sine', 0.08, 0.25);
  beep(660, 'sine', 0.12, 0.25, 0.09);
  beep(880, 'sine', 0.18, 0.25, 0.18);
}

function playWrong() {
  beep(200, 'sawtooth', 0.15, 0.2);
  beep(150, 'sawtooth', 0.15, 0.2, 0.15);
}

function playTick() {
  beep(800, 'square', 0.04, 0.08);
}

function playTimerEnd() {
  beep(300, 'sawtooth', 0.1, 0.3);
  beep(220, 'sawtooth', 0.15, 0.3, 0.1);
  beep(160, 'sawtooth', 0.25, 0.3, 0.22);
}

function playRoundEnd() {
  [440, 550, 660, 880].forEach((f, i) => beep(f, 'sine', 0.2, 0.3, i * 0.1));
}

function playStart() {
  [330, 440, 550, 660].forEach((f, i) => beep(f, 'triangle', 0.15, 0.3, i * 0.08));
}

// ══════════════════════════════════════════
// FUZZY MATCH
// ══════════════════════════════════════════
function normalize(s) {
  return s.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')   // fold accents: são → sao
    .replace(/[^a-z0-9\s]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i === 0 ? j : j === 0 ? i : 0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j-1], dp[i-1][j], dp[i][j-1]);
  return dp[m][n];
}

// Sequel/variant tokens: if the answer has one of these and the input doesn't,
// the input is ambiguous even when it's a listed alias ("toy story" → "Toy Story 4")
const SEQUEL_TOKEN = /^(\d+|ii|iii|iv|v|vi|z)$/;
function hasSequelToken(ansNorm, inpNorm) {
  const inpWords = new Set(inpNorm.split(' '));
  return ansNorm.split(' ').some(w => !inpWords.has(w) && SEQUEL_TOKEN.test(w));
}

// Does the input appear as a whole word/phrase inside the answer?
function wordContains(ansNorm, inpNorm) {
  return (' ' + ansNorm + ' ').includes(' ' + inpNorm + ' ');
}

function getCategoryAliases() {
  return (triviaData[currentCategory] && triviaData[currentCategory].aliases) || {};
}

// Classify how the input relates to one answer:
// 'typo'    — whole-string near-miss, safe to auto-accept ("brazl" → "Brazil")
// 'partial' — incomplete answer, needs confirmation ("toy story" → "Toy Story 4")
// null      — no match
function classifyMatch(input, answerName) {
  const inp = normalize(input);
  const ans = normalize(answerName);
  if (!inp || ans === inp) return null; // exact handled separately in checkInput

  // Typo: full-string closeness
  const lenDiff = Math.abs(inp.length - ans.length);
  if (lenDiff <= 3) {
    const maxDist = inp.length <= 4 ? 0 : inp.length <= 10 ? 1 : 2;
    if (levenshtein(inp, ans) <= maxDist) return 'typo';
  }

  // Partial: input is a whole word/phrase inside the answer ("lion king" in "the lion king")
  if (inp.length >= 4 && wordContains(ans, inp)) return 'partial';

  // Partial: strong substring (≥80% of the answer's length — "austri" → "austria")
  if (ans.includes(inp) && inp.length >= 4 && inp.length >= ans.length * 0.8) return 'partial';

  // Partial: fuzzy match against one significant word of the answer
  const words = ans.split(' ').filter(w => w.length > 3);
  for (const word of words) {
    if (inp.length >= 6 && levenshtein(inp, word) <= 1) return 'partial';
    if (inp.length >= 8 && levenshtein(inp, word) <= 2) return 'partial';
  }

  return null;
}

// ══════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════
const TEAM_COLORS = ['#f0c040','#e05a5a','#4cdb8a','#5aade0','#c05ae0','#e07a5a'];

let teams = [];
let scores = [];          // cumulative scores (higher = better)
let totalRounds = 5;
let timerSeconds = 45;
let currentRound = 0;
let currentTeamIdx = 0;   // whose turn it is
let firstTeamThisRound = 0; // who started this round
let categoryKeys = [];
let usedCategories = [];
let currentCategory = null;
let currentAnswers = [];
let revealed = [];        // bool per answer slot
let revealedBy = [];      // which team revealed each slot (-1 = not revealed)
let timerInterval = null;
let timeLeft = 0;
let gameRunning = false;

// Per-round turn tracking
// Each team gets 3 guesses per round, alternating.
// guessesLeft[teamIdx] counts remaining guesses this round.
let guessesLeft = [];

// ══════════════════════════════════════════
// SETUP SCREEN
// ══════════════════════════════════════════
const teamNameInput = document.getElementById('teamNameInput');
const addTeamBtn    = document.getElementById('addTeamBtn');
const teamsPills    = document.getElementById('teamsPills');
const roundsSlider  = document.getElementById('roundsSlider');
const roundsVal     = document.getElementById('roundsVal');
const timerOptions  = document.querySelectorAll('.timer-opt');
const startBtn      = document.getElementById('startBtn');

function addTeam() {
  const name = teamNameInput.value.trim();
  if (!name || teams.length >= 6) return;
  teams.push(name);
  scores.push(0);
  teamNameInput.value = '';
  renderPills();
  updateStartBtn();
}

teamNameInput.addEventListener('keydown', e => { if (e.key === 'Enter') addTeam(); });
addTeamBtn.addEventListener('click', addTeam);

function removeTeam(idx) {
  teams.splice(idx, 1);
  scores.splice(idx, 1);
  renderPills();
  updateStartBtn();
}

function renderPills() {
  teamsPills.innerHTML = '';
  teams.forEach((t, i) => {
    const pill = document.createElement('div');
    pill.className = 'pill';
    pill.style.background = TEAM_COLORS[i];
    pill.innerHTML = `<span>${t}</span><span class="pill-x" data-idx="${i}">×</span>`;
    pill.querySelector('.pill-x').addEventListener('click', () => removeTeam(i));
    teamsPills.appendChild(pill);
  });
}

roundsSlider.addEventListener('input', () => {
  totalRounds = parseInt(roundsSlider.value);
  roundsVal.textContent = totalRounds;
});

timerOptions.forEach(btn => {
  btn.addEventListener('click', () => {
    timerOptions.forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    timerSeconds = parseInt(btn.dataset.val);
  });
});

function updateStartBtn() {
  startBtn.disabled = teams.length < 2;
}

startBtn.addEventListener('click', startGame);

// ══════════════════════════════════════════
// GAME LOGIC
// ══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startGame() {
  ctx.resume();
  playStart();
  scores = teams.map(() => 0);
  categoryKeys = Object.keys(triviaData);
  usedCategories = [];
  currentRound = 0;
  currentTeamIdx = 0;
  firstTeamThisRound = 0;
  showScreen('screen-game');
  startRound();
}

function pickCategory() {
  const available = categoryKeys.filter(k => !usedCategories.includes(k));
  if (available.length === 0) { usedCategories = []; return categoryKeys[Math.floor(Math.random() * categoryKeys.length)]; }
  return available[Math.floor(Math.random() * available.length)];
}

function startRound() {
  hideDidYouMean();
  currentRound++;
  currentCategory = pickCategory();
  usedCategories.push(currentCategory);
  currentAnswers = triviaData[currentCategory].items;
  revealed = new Array(currentAnswers.length).fill(false);
  revealedBy = new Array(currentAnswers.length).fill(-1);
  guessesLeft = teams.map(() => 3);

  document.getElementById('roundNum').textContent = currentRound;
  document.getElementById('roundTotal').textContent = totalRounds;
  document.getElementById('categoryName').textContent = triviaData[currentCategory].label;

  buildTeamsBar();
  buildAnswerGrid();
  buildScoreStrip();
  startTimer();
  updateGuessCounter();

  const input = document.getElementById('answerInput');
  input.value = '';
  input.className = '';
  input.focus();
}

// ── UI builders ──

function buildTeamsBar() {
  const bar = document.getElementById('teamsBar');
  bar.innerHTML = '';
  teams.forEach((t, i) => {
    const badge = document.createElement('div');
    badge.className = `team-badge tc-${i}${i === currentTeamIdx ? ' active' : ''}`;
    badge.id = `badge-${i}`;
    badge.textContent = t;
    bar.appendChild(badge);
  });
}

function highlightTeam(idx) {
  document.querySelectorAll('.team-badge').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });
}

function buildAnswerGrid() {
  const grid = document.getElementById('answersGrid');
  grid.innerHTML = '';
  const left  = currentAnswers.slice(0, 10);
  const right = currentAnswers.slice(10, 20);
  for (let i = 0; i < 10; i++) {
    [left[i], right[i]].forEach((item, col) => {
      const idx = col === 0 ? i : i + 10;
      const cell = document.createElement('div');
      cell.className = 'answer-cell';
      cell.id = `cell-${idx}`;
      cell.innerHTML = `
        <span class="answer-rank">${item.rank}</span>
        <span class="answer-text">${item.name}</span>
        <div class="answer-lock"></div>
        <span class="answer-detail">${item.detail}</span>
      `;
      grid.appendChild(cell);
    });
  }
}

function buildScoreStrip() {
  const strip = document.getElementById('scoreStrip');
  strip.innerHTML = '';
  teams.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'score-item';
    item.innerHTML = `<div class="dot" style="background:${TEAM_COLORS[i]}"></div><span style="color:${TEAM_COLORS[i]};font-weight:600">${t}</span>: <span class="score-val ts-${i}" id="score-${i}" style="color:${TEAM_COLORS[i]}">${scores[i]}</span>`;
    strip.appendChild(item);
  });
}

function updateScoreStrip() {
  teams.forEach((_, i) => {
    const el = document.getElementById(`score-${i}`);
    if (el) el.textContent = scores[i];
  });
}

function updateGuessCounter() {
  const el = document.getElementById('guessCounter');
  if (!el) return;
  const left = guessesLeft[currentTeamIdx];
  const color = TEAM_COLORS[currentTeamIdx];
  el.innerHTML = teams.map((t, i) =>
    `<span style="color:${TEAM_COLORS[i]};opacity:${i===currentTeamIdx?1:0.4};font-weight:${i===currentTeamIdx?700:400}">${t}: ${guessesLeft[i]}▸</span>`
  ).join(' ');
}

// ── Timer ──
const circumference = 2 * Math.PI * 22;
document.querySelector('.progress-ring').style.strokeDasharray = circumference;

function timerTick() {
  timeLeft--;
  updateTimerUI();
  if (timeLeft <= 5 && timeLeft > 0) playTick();
  if (timeLeft <= 0) {
    clearInterval(timerInterval);
    gameRunning = false;
    playTimerEnd();
    onTimerEnd();
  }
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = timerSeconds;
  updateTimerUI();
  gameRunning = true;
  timerInterval = setInterval(timerTick, 1000);
}

function pauseTimer() {
  clearInterval(timerInterval);
}

function resumeTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(timerTick, 1000);
}

function updateTimerUI() {
  const ring = document.getElementById('progressRing');
  const num  = document.getElementById('timerNum');
  const frac = timeLeft / timerSeconds;
  ring.style.strokeDashoffset = circumference * (1 - frac);
  num.textContent = timeLeft;
  const color = timeLeft > 10 ? 'var(--accent)' : timeLeft > 5 ? '#e07a5a' : 'var(--accent2)';
  ring.style.stroke = color;
  num.style.color = color;
}

function onTimerEnd() {
  const input = document.getElementById('answerInput');
  input.value = '';
  showToast(`Time's up — guess lost!`, false);
  playWrong();
  guessesLeft[currentTeamIdx]--;
  advanceTurn();
}

function revealAll() {
  currentAnswers.forEach((_, i) => { if (!revealed[i]) revealCell(i); });
}

// ── Answer checking ──
document.getElementById('answerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkInput();
});
document.getElementById('passBtn').addEventListener('click', passTurn);

function checkInput() {
  if (!gameRunning || awaitingChoice) return;
  const input = document.getElementById('answerInput');
  const val = input.value.trim();
  if (!val) return;
  const inpNorm = normalize(val);
  if (!inpNorm) return;

  // 1. Exact name match — accept, or flag if already revealed
  const exactIdx = currentAnswers.findIndex(a => normalize(a.name) === inpNorm);
  if (exactIdx !== -1) {
    if (revealed[exactIdx]) { rejectGuess(`Already on the board — guess lost!`); }
    else acceptAnswer(exactIdx);
    return;
  }

  // 2. Alias match — accept only if unambiguous, otherwise confirm
  const aliases = getCategoryAliases();
  const aliasKey = Object.keys(aliases).find(k => aliases[k].some(alt => normalize(alt) === inpNorm));
  if (aliasKey) {
    const targetNorm = normalize(aliasKey);
    const targetIdx = currentAnswers.findIndex(a => normalize(a.name) === targetNorm);
    if (targetIdx !== -1) {
      if (revealed[targetIdx]) { rejectGuess(`Already on the board — guess lost!`); return; }
      // Siblings: other unrevealed answers that also contain the input as a whole word/phrase
      const siblings = [];
      currentAnswers.forEach((a, i) => {
        if (i !== targetIdx && !revealed[i] && wordContains(normalize(a.name), inpNorm)) siblings.push(i);
      });
      if (siblings.length || hasSequelToken(targetNorm, inpNorm)) {
        showDidYouMean([targetIdx, ...siblings]);
      } else {
        acceptAnswer(targetIdx);
      }
      return;
    }
  }

  // 3. Fuzzy: classify against every unrevealed answer
  const typo = [], partial = [];
  for (let i = 0; i < currentAnswers.length; i++) {
    if (revealed[i]) continue;
    const c = classifyMatch(val, currentAnswers[i].name);
    if (c === 'typo') typo.push(i);
    else if (c === 'partial') partial.push(i);
  }

  // Single clean typo with no competing partials → auto-accept
  if (typo.length === 1 && partial.length === 0 && !hasSequelToken(normalize(currentAnswers[typo[0]].name), inpNorm)) {
    acceptAnswer(typo[0]);
    return;
  }

  const candidates = [...typo, ...partial.filter(i => !typo.includes(i))];
  if (candidates.length) {
    showDidYouMean(candidates);
    return;
  }

  // 4. No match — wrong answer, guess lost
  rejectGuess(`Not on the board — guess lost!`);
}

function acceptAnswer(i) {
  hideDidYouMean();
  const input = document.getElementById('answerInput');
  const rank = currentAnswers[i].rank;
  const pts = 21 - rank;
  scores[currentTeamIdx] += pts;
  revealCellForTeam(i, currentTeamIdx);
  input.value = '';
  flashInput(true);
  showToast(`+${pts} pts — #${rank} ${currentAnswers[i].name}`, true);
  updateScoreStrip();
  playCorrect();

  guessesLeft[currentTeamIdx]--;
  advanceTurn();
}

function rejectGuess(msg) {
  const input = document.getElementById('answerInput');
  input.value = '';
  flashInput(false);
  showToast(msg, false);
  playWrong();

  guessesLeft[currentTeamIdx]--;
  advanceTurn();
}

// ── Did-you-mean prompt ──
let awaitingChoice = false;

function showDidYouMean(indices) {
  awaitingChoice = true;
  pauseTimer();
  const input = document.getElementById('answerInput');
  input.disabled = true;
  const chips = document.getElementById('dymChips');
  chips.innerHTML = '';
  indices.forEach(i => {
    const chip = document.createElement('button');
    chip.className = 'dym-chip';
    chip.textContent = currentAnswers[i].name;
    chip.addEventListener('click', () => acceptAnswer(i));
    chips.appendChild(chip);
  });
  const none = document.createElement('button');
  none.className = 'dym-chip dym-none';
  none.textContent = '✕ None of these';
  none.addEventListener('click', () => {
    hideDidYouMean();
    resumeTimer();
    input.focus();
  });
  chips.appendChild(none);
  document.getElementById('didYouMean').style.display = 'flex';
}

function hideDidYouMean() {
  awaitingChoice = false;
  document.getElementById('didYouMean').style.display = 'none';
  document.getElementById('answerInput').disabled = false;
}

function advanceTurn() {
  // Check if round is over: all teams have 0 guesses left, OR all answers revealed
  const roundDone = guessesLeft.every(g => g <= 0) || revealed.every(Boolean);
  if (roundDone) {
    clearInterval(timerInterval);
    gameRunning = false;
    showRevealButton();
    return;
  }

  // Skip teams with 0 guesses left — gameRunning stays TRUE, timer keeps going
  let next = (currentTeamIdx + 1) % teams.length;
  let tries = 0;
  while (guessesLeft[next] <= 0 && tries < teams.length) {
    next = (next + 1) % teams.length;
    tries++;
  }
  currentTeamIdx = next;
  highlightTeam(currentTeamIdx);
  updateGuessCounter();
  startTimer();

  const input = document.getElementById('answerInput');
  input.value = '';
  input.focus();
}

function passTurn() {
  if (!gameRunning || awaitingChoice) return;
  guessesLeft[currentTeamIdx]--;
  showToast(`Pass — guess skipped`, false);
  advanceTurn();
}

function revealCell(idx) {
  revealed[idx] = true;
  const cell = document.getElementById(`cell-${idx}`);
  if (cell) cell.classList.add('revealed');
}

function revealCellForTeam(idx, teamIdx) {
  revealed[idx] = true;
  revealedBy[idx] = teamIdx;
  const cell = document.getElementById(`cell-${idx}`);
  if (cell) {
    cell.classList.add('revealed');
    // Tint the cell border with the team's color
    cell.style.borderColor = TEAM_COLORS[teamIdx];
    cell.style.background = TEAM_COLORS[teamIdx] + '18';
  }
}

function flashInput(correct) {
  const input = document.getElementById('answerInput');
  input.className = correct ? 'correct-flash' : 'wrong-flash';
  setTimeout(() => { input.className = ''; }, 500);
}

let toastTimeout;
function showToast(msg, correct) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast${correct ? '' : ' wrong'} show`;
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 1800);
}

function showRevealButton() {
  document.getElementById('revealBtn').style.display = 'block';
  document.getElementById('answerInput').style.display = 'none';
  document.getElementById('passBtn').style.display = 'none';
  document.getElementById('guessCounter').style.display = 'none';
}

document.getElementById('revealBtn').addEventListener('click', () => {
  revealAll();
  document.getElementById('revealBtn').style.display = 'none';
  endRound();
  const btn = document.getElementById('nextRoundBtn');
  btn.textContent = currentRound >= totalRounds ? 'FINAL RESULTS' : 'NEXT ROUND';
  btn.style.display = 'inline-block';
});

// ── Round end ──
function endRound() {
  playRoundEnd();

  // Next round starts with the trailing team (lowest score gets first shot)
  const minScore = Math.min(...scores);
  let trailing = scores.indexOf(minScore);
  firstTeamThisRound = trailing;
  currentTeamIdx = trailing;

  // Build bottom bar scores — highest first
  const sorted = teams.map((t, i) => ({name: t, score: scores[i], color: TEAM_COLORS[i]}))
                       .sort((a, b) => b.score - a.score);
  document.getElementById('roundEndScores').innerHTML = sorted.map((t, i) =>
    `<div class="re-score-item">
      <div class="re-dot" style="background:${t.color}"></div>
      <span class="re-name" style="color:${t.color}">${i === 0 ? '⭐ ' : ''}${t.name}</span>
      <span class="re-pts" style="color:${t.color}">${t.score}</span>
    </div>`
  ).join('');

  document.getElementById('roundEndBar').classList.add('visible');
}

document.getElementById('nextRoundBtn').addEventListener('click', () => {
  document.getElementById('nextRoundBtn').style.display = 'none';
  document.getElementById('roundEndBar').classList.remove('visible');
  document.getElementById('answerInput').style.display = '';
  document.getElementById('passBtn').style.display = '';
  document.getElementById('guessCounter').style.display = '';
  if (currentRound >= totalRounds) {
    showEndScreen();
  } else {
    highlightTeam(currentTeamIdx);
    startRound();
  }
});

// ── End screen ──
function showEndScreen() {
  // Sort descending — highest score wins
  const sorted = teams.map((t, i) => ({name: t, score: scores[i], color: TEAM_COLORS[i]}))
                       .sort((a, b) => b.score - a.score);
  document.getElementById('winnerName').textContent = sorted[0].name;
  document.getElementById('winnerName').style.color = sorted[0].color;

  const table = document.getElementById('finalScoresTable');
  table.innerHTML = `
    <tr style="opacity:0.4"><td colspan="2" style="font-size:10px;letter-spacing:2px;text-transform:uppercase;padding-bottom:4px">FINAL SCORES (higher wins)</td></tr>
    ${sorted.map((t, i) =>
      `<tr><td style="color:${t.color}">${i === 0 ? '🏆 ' : ''}${t.name}</td><td style="color:${t.color};font-family:'Bebas Neue',sans-serif;font-size:28px;text-align:right">${t.score}</td></tr>`
    ).join('')}
  `;

  showScreen('screen-end');
  [262,330,392,523,659,784].forEach((f,i) => beep(f,'sine',0.3,0.3,i*0.1));
}

document.getElementById('playAgainBtn').addEventListener('click', () => {
  teams = [];
  scores = [];
