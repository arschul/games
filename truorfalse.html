<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRUE OR FALSE?</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d1a;
    --surface: #16162a;
    --card: #1e1e35;
    --border: #2e2e55;
    --accent-true: #00e5a0;
    --accent-false: #ff4b6e;
    --accent-gold: #ffd700;
    --accent-orange: #ff8c00;
    --text: #f0f0ff;
    --text-dim: #8888aa;
    --hot: #ff8c00;
    --fire: #ff4422;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(0,229,160,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(255,75,110,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .screen {
    display: none;
    position: relative;
    z-index: 1;
  }
  .screen.active { display: flex; }

  /* ─── SETUP SCREEN ─── */
  #setup-screen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 20px;
    gap: 32px;
  }

  .logo {
    text-align: center;
  }
  .logo h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(56px, 12vw, 96px);
    letter-spacing: 4px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent-true) 0%, #00b4d8 50%, var(--accent-false) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 30px rgba(0,229,160,0.3));
  }
  .logo p {
    font-size: 14px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .setup-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    width: 100%;
    max-width: 580px;
  }

  .setup-card h2 {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
  }

  /* Teams */
  .teams-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .team-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--text-dim);
    position: relative;
  }
  .team-pill:hover { border-color: #5555aa; color: var(--text); }
  .team-pill.active {
    border-color: var(--team-color);
    color: var(--team-color);
    background: rgba(255,255,255,0.04);
    box-shadow: 0 0 12px -2px var(--team-color);
  }
  .team-pill .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: currentColor;
  }
  .team-pill input {
    background: none;
    border: none;
    outline: none;
    color: inherit;
    font: inherit;
    width: 80px;
  }
  .team-pill .remove-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 0 0 2px;
    opacity: 0.6;
    transition: opacity 0.2s;
  }
  .team-pill .remove-btn:hover { opacity: 1; color: var(--accent-false); }

  .add-team-btn {
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 999px;
    padding: 8px 16px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    transition: all 0.2s;
  }
  .add-team-btn:hover { border-color: var(--accent-true); color: var(--accent-true); }

  /* Slider */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .slider-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    color: var(--accent-true);
    min-width: 44px;
    text-align: center;
  }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent-true);
    box-shadow: 0 0 8px var(--accent-true);
    cursor: pointer;
  }

  /* Timer options */
  .timer-opts {
    display: flex;
    gap: 10px;
  }
  .timer-opt {
    flex: 1;
    padding: 12px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--text-dim);
  }
  .timer-opt span { display: block; font-family: 'Nunito', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
  .timer-opt:hover { border-color: #5555aa; color: var(--text); }
  .timer-opt.active {
    border-color: var(--accent-false);
    color: var(--accent-false);
    box-shadow: 0 0 12px -2px var(--accent-false);
  }

  .start-btn {
    width: 100%;
    max-width: 580px;
    padding: 18px;
    background: linear-gradient(135deg, var(--accent-true), #00b4d8);
    border: none;
    border-radius: var(--radius);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 3px;
    color: #0d0d1a;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 24px rgba(0,229,160,0.3);
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,229,160,0.5); }
  .start-btn:active { transform: translateY(0); }

  /* ─── GAME SCREEN ─── */
  #game-screen {
    flex-direction: column;
    min-height: 100vh;
    padding: 16px;
    gap: 12px;
  }

  .game-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .round-info {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }
  .round-info span { color: var(--text); }

  /* Timer ring */
  .timer-wrap {
    position: relative;
    width: 64px; height: 64px;
    flex-shrink: 0;
  }
  .timer-wrap svg { transform: rotate(-90deg); }
  .timer-bg { fill: none; stroke: var(--border); stroke-width: 5; }
  .timer-arc {
    fill: none;
    stroke: var(--accent-true);
    stroke-width: 5;
    stroke-linecap: round;
    transition: stroke 0.3s;
    stroke-dasharray: 170;
    stroke-dashoffset: 0;
  }
  .timer-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--text);
  }

  /* Fact card */
  .fact-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    text-align: center;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  .fact-card::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,229,160,0.05) 0%, transparent 70%);
  }
  .fact-text {
    font-size: clamp(26px, 5vw, 44px);
    font-weight: 900;
    line-height: 1.3;
    color: var(--text);
    position: relative;
    z-index: 1;
    text-align: center;
    letter-spacing: -0.5px;
  }

  /* Team voting panels */
  .teams-row {
    display: grid;
    gap: 10px;
  }

  .team-panel {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    transition: border-color 0.3s;
    position: relative;
    overflow: hidden;
  }
  .team-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .team-panel.correct { border-color: var(--accent-true); }
  .team-panel.correct::before { background: rgba(0,229,160,0.07); opacity: 1; }
  .team-panel.wrong { border-color: var(--accent-false); }
  .team-panel.wrong::before { background: rgba(255,75,110,0.07); opacity: 1; }
  .team-panel.voted { border-color: #5555aa; }

  .team-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .team-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .team-name {
    font-weight: 900;
    font-size: 15px;
    flex: 1;
  }
  .team-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent-gold);
  }

  .vote-btns {
    display: flex;
    gap: 10px;
  }
  .vote-btn {
    flex: 1;
    padding: 14px 8px;
    border-radius: 12px;
    border: 2px solid transparent;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    z-index: 1;
  }
  .vote-btn.true-btn {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.35);
    color: var(--accent-true);
  }
  .vote-btn.true-btn:hover {
    background: rgba(0,229,160,0.2);
    border-color: var(--accent-true);
  }
  .vote-btn.true-btn.selected {
    background: var(--accent-true);
    color: #0d0d1a;
    border-color: var(--accent-true);
    box-shadow: 0 0 16px rgba(0,229,160,0.5);
  }
  .vote-btn.false-btn {
    background: rgba(255,75,110,0.1);
    border-color: rgba(255,75,110,0.35);
    color: var(--accent-false);
  }
  .vote-btn.false-btn:hover {
    background: rgba(255,75,110,0.2);
    border-color: var(--accent-false);
  }
  .vote-btn.false-btn.selected {
    background: var(--accent-false);
    color: #fff;
    border-color: var(--accent-false);
    box-shadow: 0 0 16px rgba(255,75,110,0.5);
  }
  .vote-btn:disabled {
    opacity: 0.45;
    cursor: default;
    box-shadow: none;
  }

  .reveal-btn {
    padding: 14px;
    background: linear-gradient(135deg, #6644ff, #aa44ff);
    border: none;
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(102,68,255,0.4);
    flex-shrink: 0;
  }
  .reveal-btn:hover { transform: translateY(-2px); }
  .reveal-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

  .next-btn {
    padding: 14px;
    background: linear-gradient(135deg, var(--accent-true), #00b4d8);
    border: none;
    border-radius: 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: #0d0d1a;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(0,229,160,0.3);
    flex-shrink: 0;
  }
  .next-btn:hover { transform: translateY(-2px); }
  .hidden { display: none !important; }

  .action-row {
    display: flex;
    gap: 10px;
  }
  .action-row > * { flex: 1; }

  .answer-banner {
    display: none;
    text-align: center;
    padding: 10px;
    border-radius: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
  }
  .answer-banner.true-answer { background: rgba(0,229,160,0.15); color: var(--accent-true); border: 1px solid rgba(0,229,160,0.3); }
  .answer-banner.false-answer { background: rgba(255,75,110,0.15); color: var(--accent-false); border: 1px solid rgba(255,75,110,0.3); }

  /* ─── RESULTS SCREEN ─── */
  #results-screen {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 32px 20px;
    gap: 20px;
  }

  .results-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    letter-spacing: 4px;
    background: linear-gradient(135deg, var(--accent-gold), #ffaa00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
  }

  .podium {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .result-row {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    transition: all 0.3s;
  }
  .result-row:first-child {
    border-color: var(--accent-gold);
    box-shadow: 0 0 20px -4px var(--accent-gold);
  }

  .result-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--text-dim);
    width: 32px;
    text-align: center;
  }
  .result-row:first-child .result-rank { color: var(--accent-gold); }

  .result-name { font-weight: 900; font-size: 16px; flex: 1; }
  .result-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .result-streak { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
  .result-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--accent-gold);
  }

  .tiebreaker-banner {
    width: 100%;
    max-width: 500px;
    border-radius: 14px;
    padding: 16px 20px;
    text-align: center;
  }
  .tb-winner {
    background: rgba(255,140,0,0.12);
    border: 1.5px solid rgba(255,140,0,0.5);
  }
  .tb-draw {
    background: rgba(0,180,216,0.1);
    border: 1.5px solid rgba(0,180,216,0.4);
  }
  .tb-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: var(--accent-gold);
    margin-bottom: 4px;
  }
  .tb-winner .tb-title { color: var(--hot); }
  .tb-draw .tb-title { color: #00b4d8; }
  .tb-sub {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dim);
  }

  .play-again-btn {
    padding: 16px 48px;
    background: linear-gradient(135deg, var(--accent-true), #00b4d8);
    border: none;
    border-radius: var(--radius);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: #0d0d1a;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 24px rgba(0,229,160,0.3);
    margin-top: 10px;
  }
  .play-again-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,229,160,0.5); }

  /* confetti */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 14px;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    border-radius: 2px;
    animation: confettiFall 3s ease-in forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ON FIRE flash */
  @keyframes firePulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,34,0); }
    50% { box-shadow: 0 0 24px 4px rgba(255,68,34,0.5); }
  }
  .on-fire { animation: firePulse 0.8s ease-in-out 3; }

  @keyframes hotPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,140,0,0); }
    50% { box-shadow: 0 0 20px 2px rgba(255,140,0,0.5); }
  }
  .just-hot { animation: hotPulse 0.8s ease-in-out 2; }

  /* fact reveal animation */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .slide-in { animation: slideIn 0.3s ease forwards; }

  .multiplier-tag {
    font-size: 11px;
    font-weight: 900;
    padding: 2px 7px;
    border-radius: 999px;
    letter-spacing: 1px;
    margin-left: 4px;
  }
  .mult-hot { background: rgba(255,140,0,0.2); color: var(--hot); }
  .mult-fire { background: rgba(255,68,34,0.2); color: var(--fire); }

  /* small screens */
  @media (max-width: 480px) {
    .timer-opts { gap: 6px; }
    .fact-text { font-size: 16px; }
    .vote-btn { font-size: 16px; padding: 10px 4px; }
  }
</style>
</head>
<body>

<!-- ═══ SETUP SCREEN ═══ -->
<div id="setup-screen" class="screen active">
  <div class="logo">
    <h1>TRUE OR FALSE</h1>
    <p>The Trivia Party Game</p>
  </div>

  <div class="setup-card">
    <h2>🧑‍🤝‍🧑 Teams</h2>
    <div class="teams-grid" id="teams-grid"></div>
    <button class="add-team-btn" id="add-team-btn" onclick="addTeam()" style="margin-top:10px">+ Add Team</button>
  </div>

  <div class="setup-card">
    <h2>🔁 Number of Rounds</h2>
    <div class="slider-row">
      <input type="range" id="rounds-slider" min="1" max="20" value="5" oninput="document.getElementById('rounds-val').textContent=this.value">
      <div class="slider-val" id="rounds-val">5</div>
    </div>
  </div>

  <div class="setup-card">
    <h2>⏱ Timer Per Question</h2>
    <div class="timer-opts">
      <div class="timer-opt" data-val="30" onclick="selectTimer(30)">30<span>seconds</span></div>
      <div class="timer-opt active" data-val="45" onclick="selectTimer(45)">45<span>seconds</span></div>
      <div class="timer-opt" data-val="60" onclick="selectTimer(60)">60<span>seconds</span></div>
    </div>
  </div>

  <button class="start-btn" onclick="startGame()">LET'S PLAY →</button>
</div>

<!-- ═══ GAME SCREEN ═══ -->
<div id="game-screen" class="screen">
  <div class="game-header">
    <div class="round-info">ROUND <span id="round-display">1</span> / <span id="rounds-total">5</span></div>
    <div class="timer-wrap">
      <svg viewBox="0 0 64 64" width="64" height="64">
        <circle class="timer-bg" cx="32" cy="32" r="27"/>
        <circle class="timer-arc" id="timer-arc" cx="32" cy="32" r="27"/>
      </svg>
      <div class="timer-num" id="timer-num">45</div>
    </div>
  </div>

  <div class="fact-card" id="fact-card">
    <div class="fact-text" id="fact-text">Loading...</div>
  </div>

  <div class="answer-banner" id="answer-banner"></div>

  <div class="teams-row" id="teams-row"></div>

  <div class="action-row">
    <button class="reveal-btn" id="reveal-btn" onclick="revealAnswer()">REVEAL</button>
    <button class="next-btn hidden" id="next-btn" onclick="nextQuestion()">NEXT →</button>
  </div>
</div>

<!-- ═══ RESULTS SCREEN ═══ -->
<div id="results-screen" class="screen">
  <div class="results-title">🏆 FINAL SCORES</div>
  <div id="tiebreaker-banner" class="tiebreaker-banner" style="display:none"></div>
  <div class="podium" id="podium"></div>
  <button class="play-again-btn" onclick="playAgain()">PLAY AGAIN</button>
</div>

<script src="facts_database.js"></script>
<script>
// ──────────────────────────────────────────────
// AUDIO ENGINE
// ──────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let ctx;
function getCtx() {
  if (!ctx) ctx = new AudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
  return ctx;
}

function playTone(freq, type, duration, gain=0.3, delay=0) {
  try {
    const ac = getCtx();
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.connect(g);
    g.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
    g.gain.setValueAtTime(gain, ac.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + duration);
    osc.start(ac.currentTime + delay);
    osc.stop(ac.currentTime + delay + duration);
  } catch(e){}
}

function playNoise(duration, gain=0.15) {
  try {
    const ac = getCtx();
    const bufferSize = ac.sampleRate * duration;
    const buffer = ac.createBuffer(1, bufferSize, ac.sampleRate);
    const output = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
    const source = ac.createBufferSource();
    source.buffer = buffer;
    const g = ac.createGain();
    source.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(gain, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    source.start(ac.currentTime);
    source.stop(ac.currentTime + duration);
  } catch(e){}
}

const sounds = {
  click()    { playTone(800, 'square', 0.08, 0.15); },
  tick()     { playTone(1200, 'square', 0.05, 0.1); },
  warning()  { playTone(400, 'sawtooth', 0.15, 0.2); },
  timeup()   { playTone(200, 'sawtooth', 0.4, 0.3); playTone(150, 'sawtooth', 0.4, 0.3, 0.2); },
  correct()  { playTone(523, 'triangle', 0.1, 0.25); playTone(659, 'triangle', 0.15, 0.25, 0.1); playTone(784, 'triangle', 0.2, 0.25, 0.2); },
  wrong()    { playTone(330, 'sawtooth', 0.15, 0.3); playTone(220, 'sawtooth', 0.2, 0.3, 0.15); },
  hot()      { [523,659,784,1046].forEach((f,i) => playTone(f,'triangle',0.15,0.3,i*0.08)); },
  fire()     { [523,659,784,1046,1319].forEach((f,i) => playTone(f,'triangle',0.15,0.3,i*0.06)); playNoise(0.5,0.1); },
  reveal()   { playTone(440, 'sine', 0.2, 0.3); playTone(880, 'sine', 0.2, 0.3, 0.15); },
  start()    { [261,329,392,523].forEach((f,i) => playTone(f,'triangle',0.2,0.3,i*0.1)); },
  win()      { [523,659,784,1046,1319,1568].forEach((f,i) => playTone(f,'triangle',0.3,0.3,i*0.1)); },
  vote()     { playTone(600, 'sine', 0.08, 0.1); }
};

// ──────────────────────────────────────────────
// TEAM COLORS
// ──────────────────────────────────────────────
const TEAM_COLORS = ['#ff4b6e','#00e5a0','#ffd700','#00b4d8','#aa44ff','#ff8c00'];
const DEFAULT_NAMES = ['Team Red','Team Green','Team Gold','Team Blue','Team Purple','Team Orange'];

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let teams = [];
let totalRounds = 5;
let timerDuration = 45;
let currentRound = 0;
let currentFact = null;
let timerInterval = null;
let timeLeft = 0;
let revealed = false;
let usedFactIds = new Set();
let circumference = 2 * Math.PI * 27; // ~169.6

// ──────────────────────────────────────────────
// SETUP
// ──────────────────────────────────────────────
function init() {
  teams = [];
  renderTeamPills();
}

function addTeam(nameOverride) {
  if (teams.length >= 6) return;
  const idx = teams.length;
  const color = TEAM_COLORS[idx];
  const n = nameOverride || '';
  teams.push({ id: idx, name: n, color, score: 0, streak: 0, bestStreak: 0, vote: null });
  renderTeamPills();
  document.getElementById('add-team-btn').style.display = teams.length >= 6 ? 'none' : '';
  // Focus the new pill's input
  if (!nameOverride) {
    setTimeout(() => {
      const inputs = document.querySelectorAll('.team-pill input');
      if (inputs.length) inputs[inputs.length - 1].focus();
    }, 30);
  }
  sounds.click();
}

function removeTeam(idx) {
  teams.splice(idx, 1);
  teams.forEach((t,i) => { t.id = i; t.color = TEAM_COLORS[i]; });
  renderTeamPills();
  document.getElementById('add-team-btn').style.display = teams.length >= 6 ? 'none' : '';
  sounds.click();
}

function renderTeamPills() {
  const grid = document.getElementById('teams-grid');
  grid.innerHTML = '';
  teams.forEach((t, i) => {
    const pill = document.createElement('div');
    pill.className = 'team-pill active';
    pill.style.setProperty('--team-color', t.color);
    pill.innerHTML = `
      <div class="dot"></div>
      <input
        placeholder="Team name…"
        value="${t.name}"
        oninput="teams[${i}].name=this.value"
        onclick="this.select()"
        onkeydown="if(event.key==='Enter'){this.blur();if(teams.length<6)addTeam();}"
      />
      <button class="remove-btn" onclick="event.stopPropagation();removeTeam(${i})">✕</button>
    `;
    grid.appendChild(pill);
  });
  // Show hint if no teams yet
  if (teams.length === 0) {
    const hint = document.createElement('div');
    hint.style.cssText = 'color:var(--text-dim);font-size:13px;padding:6px 2px;';
    hint.textContent = 'Click "+ Add Team" to get started';
    grid.appendChild(hint);
  }
}

function selectTimer(val) {
  timerDuration = val;
  document.querySelectorAll('.timer-opt').forEach(el => el.classList.toggle('active', +el.dataset.val === val));
  sounds.click();
}

function startGame() {
  // Fill blank names with defaults
  teams.forEach((t, i) => { if (!t.name.trim()) t.name = DEFAULT_NAMES[i] || `Team ${i+1}`; });
  if (teams.length < 2) { alert('Add at least 2 teams!'); return; }
  totalRounds = +document.getElementById('rounds-slider').value;
  teams.forEach(t => { t.score = 0; t.streak = 0; t.bestStreak = 0; });
  currentRound = 0;
  usedFactIds.clear();
  sounds.start();
  showScreen('game-screen');
  loadQuestion();
}

// ──────────────────────────────────────────────
// GAME LOGIC
// ──────────────────────────────────────────────
function getRandomFact() {
  const allFacts = [
    ...factsDatabase.trueFacts.map(f => ({...f, isTrue: true})),
    ...factsDatabase.falseFacts.map(f => ({...f, isTrue: false}))
  ];
  const pool = allFacts.filter(f => !usedFactIds.has(`${f.isTrue?'t':'f'}_${f.id}`));
  if (!pool.length) { usedFactIds.clear(); return getRandomFact(); }
  const fact = pool[Math.floor(Math.random() * pool.length)];
  usedFactIds.add(`${fact.isTrue?'t':'f'}_${fact.id}`);
  return fact;
}

function loadQuestion() {
  currentRound++;
  if (currentRound > totalRounds) { endGame(); return; }

  revealed = false;
  currentFact = getRandomFact();
  teams.forEach(t => t.vote = null);

  document.getElementById('round-display').textContent = currentRound;
  document.getElementById('rounds-total').textContent = totalRounds;

  const factEl = document.getElementById('fact-text');
  factEl.textContent = currentFact.fact;
  factEl.classList.remove('slide-in');
  void factEl.offsetWidth;
  factEl.classList.add('slide-in');

  document.getElementById('answer-banner').style.display = 'none';
  document.getElementById('reveal-btn').classList.remove('hidden');
  document.getElementById('reveal-btn').disabled = false;
  document.getElementById('next-btn').classList.add('hidden');

  renderTeamPanels();
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = timerDuration;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 5 && timeLeft > 0) sounds.tick();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      sounds.timeup();
      revealAnswer();
    }
  }, 1000);
}

function updateTimerDisplay() {
  document.getElementById('timer-num').textContent = timeLeft;
  const arc = document.getElementById('timer-arc');
  const pct = timeLeft / timerDuration;
  arc.style.strokeDashoffset = circumference * (1 - pct);
  if (pct > 0.5) arc.style.stroke = 'var(--accent-true)';
  else if (pct > 0.25) arc.style.stroke = '#ffd700';
  else arc.style.stroke = 'var(--accent-false)';
  if (timeLeft <= 10) sounds.warning && timeLeft === 10 && sounds.warning();
}

function revealAnswer() {
  if (revealed) return;
  revealed = true;
  clearInterval(timerInterval);
  sounds.reveal();

  const banner = document.getElementById('answer-banner');
  banner.style.display = 'block';
  if (currentFact.isTrue) {
    banner.className = 'answer-banner true-answer';
    banner.textContent = '✅ THIS IS TRUE';
  } else {
    banner.className = 'answer-banner false-answer';
    banner.textContent = `❌ THIS IS FALSE${currentFact.truth ? ' — ' + currentFact.truth : ''}`;
  }

  // Score teams
  teams.forEach((t, i) => {
    const panel = document.querySelectorAll('.team-panel')[i];
    const correct = t.vote !== null && ((t.vote === 'true') === currentFact.isTrue);
    if (correct) {
      t.streak++;
      if (t.streak > t.bestStreak) t.bestStreak = t.streak;
      const mult = t.streak >= 5 ? 2 : t.streak >= 3 ? 1.5 : 1;
      t.score += Math.round(100 * mult);
      panel.classList.add('correct');
      sounds.correct();
      if (t.streak === 3) { panel.classList.add('just-hot'); sounds.hot(); }
      if (t.streak === 5) { panel.classList.add('on-fire'); sounds.fire(); }
    } else if (t.vote !== null) {
      t.streak = 0;
      panel.classList.add('wrong');
      sounds.wrong();
    }
    updateTeamPanel(i);
  });

  // Lock vote buttons
  document.querySelectorAll('.vote-btn').forEach(b => b.disabled = true);
  document.getElementById('reveal-btn').classList.add('hidden');
  document.getElementById('next-btn').classList.remove('hidden');
}

function nextQuestion() {
  sounds.click();
  if (currentRound >= totalRounds) { endGame(); return; }
  loadQuestion();
}

// ──────────────────────────────────────────────
// TEAM PANELS
// ──────────────────────────────────────────────
function renderTeamPanels() {
  const row = document.getElementById('teams-row');
  const cols = teams.length <= 2 ? 1 : 2;
  row.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  row.innerHTML = '';
  teams.forEach((t, i) => {
    const panel = document.createElement('div');
    panel.className = 'team-panel';
    panel.id = `panel-${i}`;
    row.appendChild(panel);
    renderSinglePanel(i);
  });
}

function renderSinglePanel(i) {
  const t = teams[i];
  const panel = document.getElementById(`panel-${i}`);
  if (!panel) return;

  const badge = t.streak >= 5 ? ' 🔥' : t.streak >= 3 ? ' 🥵' : '';
  const multLabel = t.streak >= 5 ? '<span class="multiplier-tag mult-fire">2×</span>' : t.streak >= 3 ? '<span class="multiplier-tag mult-hot">1.5×</span>' : '';

  panel.className = 'team-panel' + (t.vote ? ' voted' : '');
  panel.innerHTML = `
    <div class="team-top">
      <div class="team-dot" style="background:${t.color}"></div>
      <div class="team-name">${t.name}${badge} ${multLabel}</div>
      <div class="team-score">${t.score}</div>
    </div>
    <div class="vote-btns">
      <button class="vote-btn true-btn${t.vote === 'true' ? ' selected' : ''}" data-team="${i}" data-vote="true">✅ TRUE</button>
      <button class="vote-btn false-btn${t.vote === 'false' ? ' selected' : ''}" data-team="${i}" data-vote="false">❌ FALSE</button>
    </div>
  `;

  // Attach events directly to the buttons
  panel.querySelectorAll('.vote-btn').forEach(btn => {
    if (revealed) {
      btn.disabled = true;
    } else {
      btn.addEventListener('click', function() {
        castVote(parseInt(this.dataset.team), this.dataset.vote);
      });
    }
  });
}

function updateTeamPanel(i) {
  renderSinglePanel(i);
  if (revealed) {
    const panel = document.getElementById(`panel-${i}`);
    if (panel) panel.querySelectorAll('.vote-btn').forEach(b => b.disabled = true);
  }
}

function castVote(teamIdx, vote) {
  if (revealed) return;
  teams[teamIdx].vote = vote;
  sounds.vote();
  renderSinglePanel(teamIdx);
}

// ──────────────────────────────────────────────
// END GAME
// ──────────────────────────────────────────────
function endGame() {
  const sorted = [...teams].sort((a, b) => {
    if (b.score !== a.score) return b.score - a.score;
    return b.bestStreak - a.bestStreak; // tiebreaker
  });

  const topScore = sorted[0].score;
  const tied = sorted.filter(t => t.score === topScore);
  const isTie = tied.length > 1;
  const topStreak = isTie ? Math.max(...tied.map(t => t.bestStreak)) : 0;
  const stillTied = isTie && tied.filter(t => t.bestStreak === topStreak).length > 1;

  const podium = document.getElementById('podium');
  const tiebreakerBanner = document.getElementById('tiebreaker-banner');
  podium.innerHTML = '';

  // Show tiebreaker banner if needed
  if (isTie) {
    tiebreakerBanner.style.display = 'block';
    if (stillTied) {
      tiebreakerBanner.innerHTML = `<div class="tb-title">🤝 IT'S A PERFECT TIE!</div><div class="tb-sub">Equal scores and equal best streaks — share the glory!</div>`;
      tiebreakerBanner.className = 'tiebreaker-banner tb-draw';
    } else {
      const winner = tied.find(t => t.bestStreak === topStreak);
      tiebreakerBanner.innerHTML = `<div class="tb-title">⚡ TIEBREAKER!</div><div class="tb-sub">${winner.name} wins with a best streak of ${topStreak} in a row!</div>`;
      tiebreakerBanner.className = 'tiebreaker-banner tb-winner';
    }
  } else {
    tiebreakerBanner.style.display = 'none';
  }

  // Assign display ranks respecting tiebreaker
  let displayRank = 1;
  sorted.forEach((t, i) => {
    if (i > 0 && sorted[i].score === sorted[i-1].score && sorted[i].bestStreak === sorted[i-1].bestStreak) {
      // same rank as previous
    } else if (i > 0) {
      displayRank = i + 1;
    }

    const row = document.createElement('div');
    row.className = 'result-row';
    if (i === 0) row.classList.add('result-first');

    const medal = displayRank === 1 ? '🥇' : displayRank === 2 ? '🥈' : displayRank === 3 ? '🥉' : `${displayRank}.`;
    const streakNote = isTie && t.score === topScore
      ? `<div class="result-streak">Best streak: ${t.bestStreak}</div>` : '';

    row.innerHTML = `
      <div class="result-rank">${medal}</div>
      <div class="team-dot" style="background:${t.color};width:12px;height:12px;border-radius:50%;flex-shrink:0"></div>
      <div class="result-info">
        <div class="result-name">${t.name}</div>
        ${streakNote}
      </div>
      <div class="result-pts">${t.score} pts</div>
    `;
    podium.appendChild(row);
  });

  showScreen('results-screen');
  sounds.win();
  spawnConfetti();
}

function spawnConfetti() {
  const colors = ['#ffd700','#ff4b6e','#00e5a0','#00b4d8','#aa44ff','#ff8c00'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left:${Math.random()*100}vw;
        top:-20px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-delay:${Math.random()*0.5}s;
        animation-duration:${2+Math.random()*2}s;
        transform:rotate(${Math.random()*360}deg);
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, Math.random()*800);
  }
}

function playAgain() {
  sounds.click();
  teams.forEach(t => { t.score = 0; t.streak = 0; t.bestStreak = 0; t.vote = null; });
  renderTeamPills();
  document.getElementById('add-team-btn').style.display = teams.length >= 6 ? 'none' : '';
  showScreen('setup-screen');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ──────────────────────────────────────────────
// INIT
// ──────────────────────────────────────────────
// Unlock audio on first interaction
document.addEventListener('click', () => getCtx(), { once: true });
init();
</script>
