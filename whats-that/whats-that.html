<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's That? — Object Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff4757;
    --red-light: #ff6b81;
    --red-bg: #fff0f1;
    --blue: #1e90ff;
    --blue-light: #74b9ff;
    --blue-bg: #f0f7ff;
    --card: #ffffff;
    --text: #2d3436;
    --shadow: rgba(0,0,0,0.12);
    --T: 0.5s cubic-bezier(.4,0,.2,1);
    --TC: var(--red);
    --TB: var(--red-bg);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--TB);
    min-height: 100vh;
    transition: background var(--T);
    overflow-x: hidden;
    color: var(--text);
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(circle at 10% 20%, color-mix(in srgb, var(--TC) 12%, transparent) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, color-mix(in srgb, var(--TC) 8%, transparent) 0%, transparent 50%);
    pointer-events: none;
    transition: background var(--T);
    z-index: 0;
  }
  #app {
    position: relative; z-index: 1;
    max-width: 860px; margin: 0 auto;
    padding: 16px;
    min-height: 100vh;
    display: flex; flex-direction: column; gap: 14px;
  }

  header { text-align: center; position: relative; }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    color: var(--TC);
    text-shadow: 3px 3px 0 color-mix(in srgb, var(--TC) 20%, transparent);
    transition: color var(--T), text-shadow var(--T);
  }
  header p {
    font-weight: 700; color: #888; font-size: 0.92rem; margin-top: 4px;
  }

  .topbar { display: flex; justify-content: flex-end; }
  .link-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 0.82rem; color: #999; padding: 4px 10px;
    border-radius: 8px; transition: color 0.2s, background 0.2s;
  }
  .link-btn:hover { color: var(--TC); background: var(--card); }

  .scoreboard { display: flex; gap: 10px; justify-content: center; }
  .team-score {
    flex: 1; max-width: 210px;
    padding: 12px 18px;
    border-radius: 18px;
    background: var(--card);
    box-shadow: 0 4px 20px var(--shadow);
    display: flex; align-items: center; gap: 10px;
    transition: all 0.3s;
    border: 3px solid transparent;
  }
  .team-score.active-red  { border-color: var(--red);  box-shadow: 0 4px 24px rgba(255,71,87,0.3); }
  .team-score.active-blue { border-color: var(--blue); box-shadow: 0 4px 24px rgba(30,144,255,0.3); }
  .team-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
  .dot-red  { background: var(--red); }
  .dot-blue { background: var(--blue); }
  .team-name { font-weight: 800; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text); }
  .team-pts  { font-family: 'Fredoka One', cursive; font-size: 1.5rem; line-height: 1; color: var(--text); }

  .turn-banner {
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 1.25rem;
    padding: 9px 24px;
    border-radius: 50px;
    background: var(--TC);
    color: white;
    box-shadow: 0 4px 16px color-mix(in srgb, var(--TC) 40%, transparent);
    transition: background var(--T), box-shadow var(--T);
    align-self: center;
  }

  /* SETUP */
  #setup-screen {
    display: flex; flex-direction: column; align-items: center; gap: 22px; padding: 26px 16px;
  }
  .setup-title { font-family: 'Fredoka One', cursive; font-size: 2.1rem; color: var(--text); text-align: center; }
  .setup-title span { color: var(--red); }
  .setup-subtitle { font-family: 'Fredoka One', cursive; font-size: 1.25rem; color: var(--text); text-align: center; }
  .setup-subtitle span { color: var(--red); }

  .mode-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; width: 100%; max-width: 460px; }
  .mode-grid.narrow { max-width: 320px; }
  .mode-btn {
    padding: 18px 14px; border-radius: 20px; border: 3px solid #e0e0e0;
    background: var(--card); cursor: pointer; text-align: center;
    transition: all 0.2s; font-family: 'Nunito', sans-serif;
  }
  .mode-btn:hover { border-color: var(--red); transform: translateY(-3px); box-shadow: 0 8px 24px var(--shadow); }
  .mode-btn.selected { border-color: var(--red); background: color-mix(in srgb, var(--red) 8%, white); box-shadow: 0 8px 24px color-mix(in srgb, var(--red) 25%, transparent); }
  .mode-btn .mode-emoji { font-size: 1.9rem; display: block; margin-bottom: 5px; }
  .mode-btn .mode-label { font-family: 'Fredoka One', cursive; font-size: 1.15rem; color: var(--text); display: block; }
  .mode-btn .mode-desc  { font-size: 0.78rem; color: #888; }

  .start-btn {
    padding: 15px 46px; border-radius: 50px; border: none;
    background: linear-gradient(135deg, var(--red), var(--red-light));
    color: white; font-family: 'Fredoka One', cursive; font-size: 1.4rem;
    cursor: pointer; box-shadow: 0 8px 24px rgba(255,71,87,0.4);
    transition: all 0.2s;
  }
  .start-btn:hover { transform: translateY(-3px) scale(1.05); }

  /* GAME */
  #game-screen { display: none; flex-direction: column; gap: 14px; align-items: center; }
  #play-phase { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; }

  .grid-wrap {
    width: 100%; max-width: 520px;
    background: var(--card); border-radius: 24px;
    padding: 10px; box-shadow: 0 8px 32px var(--shadow);
  }
  #gameCanvas {
    display: block; width: 100%; height: auto;
    border-radius: 14px;
  }

  /* TIMER */
  .timer-wrap { text-align: center; transition: color 0.3s; }
  .timer-value {
    font-family: 'Fredoka One', cursive;
    font-size: 4rem; line-height: 1;
    color: var(--TC);
    transition: color var(--T);
  }
  .timer-label {
    font-weight: 800; font-size: 0.78rem; color: #888;
    text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px;
  }
  .timer-wrap.low .timer-value { color: #ff9f43; animation: pulse 0.8s infinite; }
  .timer-wrap.critical .timer-value { color: var(--red); animation: none; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12); } }

  /* ACTION BUTTONS */
  .action-row { width: 100%; max-width: 520px; }
  .btn-action {
    width: 100%;
    padding: 16px 20px; border-radius: 16px; border: none;
    font-family: 'Fredoka One', cursive; font-size: 1.3rem;
    color: white; cursor: pointer; transition: all 0.2s;
  }
  .btn-action:hover { transform: translateY(-2px); }
  .btn-start {
    background: linear-gradient(135deg,#00b894,#00cec9);
    box-shadow: 0 4px 16px rgba(0,184,148,0.4);
  }
  .btn-stop {
    background: var(--TC);
    box-shadow: 0 4px 16px color-mix(in srgb, var(--TC) 40%, transparent);
    transition: background var(--T), box-shadow var(--T), transform 0.2s;
  }

  .judge-row { width: 100%; max-width: 520px; display: flex; gap: 10px; }
  .btn-judge {
    flex: 1; padding: 16px; border-radius: 16px; border: none;
    font-family: 'Fredoka One', cursive; font-size: 1.1rem;
    color: white; cursor: pointer; transition: all 0.2s;
  }
  .btn-judge:hover { transform: translateY(-2px); }
  .btn-correct { background: linear-gradient(135deg,#00b894,#00cec9); box-shadow: 0 4px 16px rgba(0,184,148,0.4); }
  .btn-wrong   { background: linear-gradient(135deg,#ff7675,#d63031); box-shadow: 0 4px 16px rgba(214,48,49,0.4); }

  .feedback { min-height: 26px; text-align: center; font-weight: 700; font-size: 0.95rem; border-radius: 8px; padding: 6px 12px; transition: all 0.3s; width: 100%; max-width: 520px; }
  .feedback.correct { color: #00b894; background: #e6fff9; }
  .feedback.wrong   { color: #d63031; background: #fff5f5; }
  .feedback.pass    { color: #636e72; background: #f5f5f5; }

  /* RESULT OVERLAY */
  #result-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(6px);
    z-index: 100; align-items: center; justify-content: center;
  }
  #result-overlay.show { display: flex; }
  .win-card {
    background: white; border-radius: 32px;
    padding: 44px 36px; text-align: center;
    max-width: 400px; width: 90%;
    box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    animation: winPop 0.5s cubic-bezier(.175,.885,.32,1.275);
  }
  @keyframes winPop { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  #resultCanvas { display: block; margin: 0 auto 14px; border-radius: 16px; border: 3px solid #eee; }
  .win-title { font-family: 'Fredoka One', cursive; font-size: 1.7rem; margin-bottom: 6px; }
  .win-team-red  { color: var(--red); }
  .win-team-blue { color: var(--blue); }
  .win-points { font-size: 1rem; color: #636e72; margin-bottom: 20px; font-weight: 700; }
  .win-scores { display: flex; gap: 14px; justify-content: center; margin-bottom: 24px; }
  .win-score-item { padding: 10px 18px; border-radius: 14px; background: #f8f9fa; }
  .ws-name { font-size: 0.78rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
  .ws-pts  { font-family: 'Fredoka One', cursive; font-size: 1.9rem; }
  .ws-red  { color: var(--red); }
  .ws-blue { color: var(--blue); }
  .win-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn-next { background: linear-gradient(135deg,#00b894,#00cec9); color:white; padding: 11px 20px; border-radius: 12px; border: none; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
  .btn-new  { background: linear-gradient(135deg,#636e72,#2d3436); color:white; padding: 11px 20px; border-radius: 12px; border: none; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
  .btn-next:hover, .btn-new:hover { transform: translateY(-2px); }

  .confetti-piece {
    position: fixed; top: -10px;
    animation: confettiFall linear forwards;
    z-index: 200; border-radius: 2px;
  }
  @keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🔍 What's That?</h1>
    <p>Watch it appear, shout your answer, then hit STOP before time runs out!</p>
  </header>

  <!-- SETUP -->
  <div id="setup-screen">
    <div class="setup-title">Choose <span>Mode</span></div>
    <div class="mode-grid">
      <button class="mode-btn selected" data-group="mode" data-value="square" onclick="selectOption(this)">
        <span class="mode-emoji">🟦</span><span class="mode-label">Square Reveal</span><span class="mode-desc">Tiles appear over time</span>
      </button>
      <button class="mode-btn" data-group="mode" data-value="pixel" onclick="selectOption(this)">
        <span class="mode-emoji">🌫️</span><span class="mode-label">Pixelation</span><span class="mode-desc">Photo sharpens over time</span>
      </button>
    </div>

    <div class="setup-subtitle">Choose <span>Difficulty</span></div>
    <div class="mode-grid">
      <button class="mode-btn selected" data-group="diff" data-value="easy" onclick="selectOption(this)">
        <span class="mode-emoji">🌱</span><span class="mode-label">Easy</span><span class="mode-desc">20s · big reveals</span>
      </button>
      <button class="mode-btn" data-group="diff" data-value="medium" onclick="selectOption(this)">
        <span class="mode-emoji">🔥</span><span class="mode-label">Medium</span><span class="mode-desc">15s · steady reveals</span>
      </button>
      <button class="mode-btn" data-group="diff" data-value="hard" onclick="selectOption(this)">
        <span class="mode-emoji">💀</span><span class="mode-label">Hard</span><span class="mode-desc">12s · fine reveals</span>
      </button>
      <button class="mode-btn" data-group="diff" data-value="expert" onclick="selectOption(this)">
        <span class="mode-emoji">👑</span><span class="mode-label">Expert</span><span class="mode-desc">10s · finest reveals</span>
      </button>
    </div>

    <div class="setup-subtitle">First To <span>?</span></div>
    <div class="mode-grid narrow">
      <button class="mode-btn selected" data-group="win" data-value="3" onclick="selectOption(this)">
        <span class="mode-emoji">🥉</span><span class="mode-label">3</span><span class="mode-desc">rounds to win</span>
      </button>
      <button class="mode-btn" data-group="win" data-value="5" onclick="selectOption(this)">
        <span class="mode-emoji">🏆</span><span class="mode-label">5</span><span class="mode-desc">rounds to win</span>
      </button>
    </div>

    <button class="start-btn" onclick="startGame()">Let's Play! 🎉</button>
  </div>

  <!-- GAME -->
  <div id="game-screen">
    <div class="topbar">
      <button class="link-btn" onclick="if(confirm('Start a new match? Current scores will be lost.')) newMatch();">⚙ New Match</button>
    </div>

    <div class="scoreboard">
      <div class="team-score" id="score-red">
        <div class="team-dot dot-red"></div>
        <div><div class="team-name">Team Red</div><div class="team-pts" id="pts-red">0</div></div>
      </div>
      <div class="team-score" id="score-blue">
        <div class="team-dot dot-blue"></div>
        <div><div class="team-name">Team Blue</div><div class="team-pts" id="pts-blue">0</div></div>
      </div>
    </div>

    <div class="turn-banner" id="turn-banner">🔴 Team Red's Turn</div>

    <div id="play-phase">
      <div class="timer-wrap" id="timer-wrap">
        <div class="timer-value" id="timer-value">15</div>
        <div class="timer-label">seconds left = points</div>
      </div>

      <div class="grid-wrap"><canvas id="gameCanvas" width="480" height="480"></canvas></div>

      <div class="action-row">
        <button class="btn-action btn-start" id="main-btn" onclick="onMainButton()">▶ Start Round</button>
      </div>

      <div class="judge-row" id="judge-row" style="display:none;">
        <button class="btn-judge btn-correct" onclick="onCorrect()">✅ Correct</button>
        <button class="btn-judge btn-wrong" onclick="onWrong()">❌ Wrong (−3s)</button>
      </div>

      <div class="feedback" id="feedback"></div>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="result-overlay">
  <div class="win-card">
    <canvas id="resultCanvas" width="140" height="140"></canvas>
    <div class="win-title" id="result-title">Team Red Got It!</div>
    <div class="win-points" id="result-points">It was a Backpack! +12 points</div>
    <div class="win-scores">
      <div class="win-score-item"><div class="ws-name ws-red">Team Red</div><div class="ws-pts ws-red" id="ws-red">0</div></div>
      <div class="win-score-item"><div class="ws-name ws-blue">Team Blue</div><div class="ws-pts ws-blue" id="ws-blue">0</div></div>
    </div>
    <div class="win-actions">
      <button class="btn-next" id="btn-next" onclick="nextRound()">Next Object →</button>
      <button class="btn-new"  onclick="newMatch()">New Match 🔄</button>
    </div>
  </div>
</div>

<script>
/* ── DATA ── */
const OBJECTS = [
  { id:'umbrella',   img:'images/umbrella.jpg',   names:['umbrella'] },
  { id:'bicycle',    img:'images/bicycle.jpg',    names:['bicycle','bike'] },
  { id:'backpack',   img:'images/backpack.jpg',   names:['backpack','rucksack','bag'] },
  { id:'guitar',     img:'images/guitar.jpg',     names:['guitar'] },
  { id:'telescope',  img:'images/telescope.jpg',  names:['telescope'] },
  { id:'skateboard', img:'images/skateboard.jpg', names:['skateboard'] },
  { id:'teapot',     img:'images/teapot.jpg',     names:['teapot','tea pot'] },
  { id:'camera',     img:'images/camera.jpg',     names:['camera'] },
  { id:'cactus',     img:'images/cactus.jpg',     names:['cactus'] },
  { id:'balloon',    img:'images/balloon.jpg',    names:['hot air balloon','balloon','air balloon'] },
];

/* time = starting seconds (also starting points).
   grid  = square tiles per side.
   maxBlocks = pixelation detail reached by the time the clock hits 0
               (lower = stays blockier longer = harder). */
const DIFF = {
  easy:   { time:20, grid:4, maxBlocks:56 },
  medium: { time:15, grid:5, maxBlocks:48 },
  hard:   { time:12, grid:6, maxBlocks:40 },
  expert: { time:10, grid:7, maxBlocks:32 },
};

const CS = 480;
const PENALTY = 3; // seconds lost on a wrong guess

/* ── STATE ── */
let mode       = 'square';
let difficulty = 'easy';
let winTarget  = 3;

let gridSize, totalCells, maxBlocks, initialTime;
let currentTeam = 'red';
let roundsWon   = { red:0, blue:0 };

let revealed     = [];
let revealOrder  = [];
let currentBlocks = 2;

let timeLeft       = 0;
let timerInterval  = null;
let phase          = 'ready'; // ready | running | judging | over

let currentObject = null;
let usedObjects   = [];

const bakedCanvas = document.createElement('canvas');
const tinyCanvas  = document.createElement('canvas');

/* ── SETUP SCREEN ── */
function selectOption(btn) {
  const group = btn.dataset.group;
  document.querySelectorAll(`.mode-btn[data-group="${group}"]`).forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const val = btn.dataset.value;
  if (group === 'mode') mode = val;
  else if (group === 'diff') difficulty = val;
  else if (group === 'win') winTarget = parseInt(val);
}

function startGame() {
  const d    = DIFF[difficulty];
  gridSize   = d.grid;
  totalCells = gridSize * gridSize;
  maxBlocks  = d.maxBlocks;
  initialTime = d.time;

  roundsWon   = { red:0, blue:0 };
  usedObjects = [];
  currentTeam = 'red';
  updateScoreUI();
  updateTurnUI();

  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'flex';

  startRound();
}

/* ── ROUND ── */
function startRound() {
  stopTimer();
  phase = 'ready';
  clearFeedback();
  showJudgeButtons(false);

  let pool = OBJECTS.filter(o => !usedObjects.includes(o.id));
  if (!pool.length) { usedObjects = []; pool = [...OBJECTS]; }
  currentObject = pool[Math.floor(Math.random() * pool.length)];
  usedObjects.push(currentObject.id);

  updateTurnUI();

  timeLeft = initialTime;
  updateTimerDisplay();

  if (mode === 'square') {
    revealOrder = shuffle([...Array(totalCells).keys()]);
    revealed    = new Array(totalCells).fill(false);
  } else {
    currentBlocks = 2;
  }

  const img = new Image();
  img.onload = () => {
    bakedCanvas.width  = CS;
    bakedCanvas.height = CS;
    bakedCanvas.getContext('2d').drawImage(img, 0, 0, CS, CS);
    render();
    setMainButton();
  };
  img.src = currentObject.img;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ── REVEAL PROGRESSION ── */
function updateReveal() {
  const progress = Math.min(1, Math.max(0, (initialTime - timeLeft) / initialTime));
  if (mode === 'square') {
    const count = Math.floor(progress * totalCells);
    revealed = new Array(totalCells).fill(false);
    for (let i = 0; i < count; i++) revealed[revealOrder[i]] = true;
  } else {
    currentBlocks = Math.min(maxBlocks, Math.max(2, Math.round(2 * Math.pow(maxBlocks / 2, progress))));
  }
}

/* ── RENDERING ── */
function render() {
  if (mode === 'square') renderSquare();
  else renderPixel();
}

function renderSquare() {
  const ctx  = document.getElementById('gameCanvas').getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.clearRect(0, 0, CS, CS);
  const cell = CS / gridSize;

  for (let i = 0; i < totalCells; i++) {
    const col = i % gridSize;
    const row = Math.floor(i / gridSize);
    const px  = col * cell;
    const py  = row * cell;

    if (revealed[i]) {
      ctx.drawImage(bakedCanvas, px, py, cell, cell, px, py, cell, cell);
    } else {
      const isRed = currentTeam === 'red';
      ctx.fillStyle = isRed ? '#3a0f1e' : '#0a1831';
      ctx.fillRect(px, py, cell, cell);

      const g = ctx.createLinearGradient(px, py, px, py + cell * 0.4);
      g.addColorStop(0, 'rgba(255,255,255,0.09)');
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g;
      ctx.fillRect(px, py, cell, cell);
    }
  }
}

function renderPixel() {
  const blocks = currentBlocks;

  tinyCanvas.width  = blocks;
  tinyCanvas.height = blocks;
  const tctx = tinyCanvas.getContext('2d');
  tctx.imageSmoothingEnabled = true;
  tctx.clearRect(0, 0, blocks, blocks);
  tctx.drawImage(bakedCanvas, 0, 0, CS, CS, 0, 0, blocks, blocks);

  const ctx = document.getElementById('gameCanvas').getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, CS, CS);
  ctx.drawImage(tinyCanvas, 0, 0, blocks, blocks, 0, 0, CS, CS);
}

function renderFull() {
  const ctx = document.getElementById('gameCanvas').getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.clearRect(0, 0, CS, CS);
  ctx.drawImage(bakedCanvas, 0, 0, CS, CS);
}

function revealFully() {
  if (mode === 'square') {
    revealed.fill(true);
    render();
  } else {
    renderFull();
  }
}

/* ── TIMER ── */
function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(tick, 1000);
}
function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function tick() {
  timeLeft = Math.max(0, timeLeft - 1);
  updateReveal();
  render();
  updateTimerDisplay();

  if (timeLeft <= 0) {
    stopTimer();
    phase = 'over';
    setMainButton();
    showFeedback('pass', "⏰ Time's up!");
    setTimeout(() => { revealFully(); showRoundResult(null, 0); }, 900);
  }
}

function updateTimerDisplay() {
  document.getElementById('timer-value').textContent = timeLeft;
  const wrap = document.getElementById('timer-wrap');
  wrap.classList.toggle('low', timeLeft > 0 && timeLeft <= 5);
  wrap.classList.toggle('critical', timeLeft <= 0);
}

/* ── MAIN ACTION (Start → Stop) ── */
function setMainButton() {
  const btn = document.getElementById('main-btn');
  if (phase === 'ready') {
    btn.textContent = '▶ Start Round';
    btn.className = 'btn-action btn-start';
    btn.style.display = '';
  } else if (phase === 'running') {
    btn.textContent = '⏹ STOP';
    btn.className = 'btn-action btn-stop';
    btn.style.display = '';
  } else {
    btn.style.display = 'none';
  }
}

function onMainButton() {
  if (phase === 'ready') {
    phase = 'running';
    setMainButton();
    startTimer();
  } else if (phase === 'running') {
    stopTimer();
    phase = 'judging';
    setMainButton();
    showJudgeButtons(true);
  }
}

function showJudgeButtons(show) {
  document.getElementById('judge-row').style.display = show ? 'flex' : 'none';
}

/* ── JUDGING ── */
function onCorrect() {
  if (phase !== 'judging') return;
  phase = 'over';
  const pts = timeLeft;
  roundsWon[currentTeam]++;
  updateScoreUI();
  revealFully();
  showJudgeButtons(false);
  showFeedback('correct', `✅ Correct! +${pts} point${pts === 1 ? '' : 's'}!`);
  setTimeout(() => showRoundResult(currentTeam, pts), 700);
}

function onWrong() {
  if (phase !== 'judging') return;
  timeLeft = Math.max(0, timeLeft - PENALTY);
  updateReveal();
  render();
  updateTimerDisplay();
  showJudgeButtons(false);

  if (timeLeft <= 0) {
    phase = 'over';
    setMainButton();
    showFeedback('wrong', "❌ Not quite — and time's up!");
    setTimeout(() => { revealFully(); showRoundResult(null, 0); }, 900);
  } else {
    showFeedback('wrong', `❌ Not quite! −${PENALTY}s... back to the clock!`);
    phase = 'running';
    setMainButton();
    startTimer();
    setTimeout(clearFeedback, 1300);
  }
}

/* ── TEAMS / SCORE ── */
function switchTeam() {
  currentTeam = currentTeam === 'red' ? 'blue' : 'red';
  updateTurnUI();
}

function updateTurnUI() {
  const r = currentTeam === 'red';
  document.documentElement.style.setProperty('--TC', r ? 'var(--red)'    : 'var(--blue)');
  document.documentElement.style.setProperty('--TB', r ? 'var(--red-bg)' : 'var(--blue-bg)');
  document.getElementById('turn-banner').textContent = r ? "🔴 Team Red's Turn" : "🔵 Team Blue's Turn";
  document.getElementById('score-red').classList.toggle('active-red',   r);
  document.getElementById('score-red').classList.toggle('active-blue',  false);
  document.getElementById('score-blue').classList.toggle('active-blue', !r);
  document.getElementById('score-blue').classList.toggle('active-red',  false);
}

function updateScoreUI() {
  document.getElementById('pts-red').textContent  = `${roundsWon.red} / ${winTarget}`;
  document.getElementById('pts-blue').textContent = `${roundsWon.blue} / ${winTarget}`;
}

function showFeedback(type, msg) {
  const el = document.getElementById('feedback');
  el.className = 'feedback ' + type;
  el.textContent = msg;
}
function clearFeedback() {
  const el = document.getElementById('feedback');
  el.className = 'feedback';
  el.textContent = '';
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

/* ── ROUND / MATCH RESULT ── */
function showRoundResult(team, pts) {
  const rc = document.getElementById('resultCanvas');
  const rctx = rc.getContext('2d');
  rctx.clearRect(0, 0, 140, 140);
  rctx.drawImage(bakedCanvas, 0, 0, CS, CS, 0, 0, 140, 140);

  const titleEl  = document.getElementById('result-title');
  const pointsEl = document.getElementById('result-points');
  const objName  = capitalize(currentObject.names[0]);

  if (team) {
    titleEl.textContent = `Team ${team === 'red' ? 'Red' : 'Blue'} Got It!`;
    titleEl.className   = 'win-title ' + (team === 'red' ? 'win-team-red' : 'win-team-blue');
    pointsEl.textContent = `It was a ${objName}! +${pts} point${pts === 1 ? '' : 's'}`;
  } else {
    titleEl.textContent = "Time's Up!";
    titleEl.className   = 'win-title';
    pointsEl.textContent = `It was a ${objName}.`;
  }

  document.getElementById('ws-red').textContent  = roundsWon.red;
  document.getElementById('ws-blue').textContent = roundsWon.blue;

  const matchWon = team && roundsWon[team] >= winTarget;
  document.getElementById('btn-next').style.display = matchWon ? 'none' : 'inline-block';
  if (matchWon) {
    titleEl.textContent = `🏆 Team ${team === 'red' ? 'Red' : 'Blue'} Wins the Match!`;
  }

  if (team) spawnConfetti(team);
  document.getElementById('result-overlay').classList.add('show');
}

function nextRound() {
  document.getElementById('result-overlay').classList.remove('show');
  switchTeam();
  startRound();
}

function newMatch() {
  stopTimer();
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('game-screen').style.display  = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  document.documentElement.style.setProperty('--TC', 'var(--red)');
  document.documentElement.style.setProperty('--TB', 'var(--red-bg)');
}

/* ── CONFETTI ── */
function spawnConfetti(team) {
  const colors = team === 'red'
    ? ['#ff4757','#ff6b81','#ffd32a','#ff6348']
    : ['#1e90ff','#74b9ff','#00cec9','#ffd32a'];
  for (let i = 0; i < 70; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left            = Math.random()*100+'vw';
    el.style.background      = colors[Math.floor(Math.random()*colors.length)];
    el.style.width           = (7+Math.random()*9)+'px';
    el.style.height          = (7+Math.random()*9)+'px';
    el.style.animationDuration = (2+Math.random()*2)+'s';
    el.style.animationDelay    = (Math.random()*0.6)+'s';
    el.style.borderRadius      = Math.random()>0.5 ? '50%' : '3px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4500);
  }
}
</script>
