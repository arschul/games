<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ESL Wheel Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Share+Tech+Mono&family=Exo+2:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #2a3a55;
      --neon-gold: #ffd700;
      --neon-cyan: #00f5ff;
      --neon-pink: #ff2d78;
      --neon-green: #39ff14;
      --neon-purple: #bf5fff;
      --text: #e8edf5;
      --text-dim: #6b7a99;
      --team-colors: #00f5ff, #ff2d78, #39ff14, #ffd700, #bf5fff, #ff8c00;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { font-size: 18px; }

    body {
      font-family: 'Exo 2', sans-serif;
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0,245,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(255,45,120,0.04) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255,255,255,0.015) 40px, rgba(255,255,255,0.015) 41px);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .container {
      max-width: 1100px;
      width: 100%;
    }

    /* HEADER */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .header h1 {
      font-family: 'Boogaloo', cursive;
      font-size: 5rem;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--neon-gold);
      text-shadow:
        0 0 10px rgba(255,215,0,0.8),
        0 0 30px rgba(255,215,0,0.5),
        0 0 60px rgba(255,215,0,0.3);
      animation: titlePulse 3s ease-in-out infinite;
    }
    .header .subtitle {
      font-size: 1.05rem;
      letter-spacing: 8px;
      color: var(--neon-cyan);
      text-transform: uppercase;
      opacity: 0.7;
      margin-top: 0.3rem;
    }
    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 10px rgba(255,215,0,0.8), 0 0 30px rgba(255,215,0,0.5), 0 0 60px rgba(255,215,0,0.3); }
      50% { text-shadow: 0 0 20px rgba(255,215,0,1), 0 0 50px rgba(255,215,0,0.8), 0 0 100px rgba(255,215,0,0.5); }
    }

    /* SETUP PANEL */
    .setup-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .setup-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.75rem;
    }
    .setup-row:last-child { margin-bottom: 0; }

    .team-count-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .team-count-row label {
      font-size: 1.05rem;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .team-count-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2px solid var(--neon-cyan);
      background: transparent;
      color: var(--neon-cyan);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
      font-family: 'Exo 2', sans-serif;
    }
    .team-count-btn:hover { background: rgba(0,245,255,0.15); }
    .team-count-display {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.8rem;
      color: var(--neon-cyan);
      min-width: 2rem;
      text-align: center;
    }

    .timer-row {
      display: flex; align-items: center; gap: 1rem;
      justify-content: center; flex-wrap: wrap;
    }
    .timer-row label { font-size: 1.05rem; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
    .timer-select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--neon-cyan);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.1rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
    }

    input[type="text"] {
      padding: 0.85rem 1.2rem;
      font-size: 1.1rem;
      font-family: 'Exo 2', sans-serif;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface2);
      color: var(--text);
      width: 100%;
      max-width: 340px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--neon-cyan);
      box-shadow: 0 0 0 2px rgba(0,245,255,0.2), 0 0 12px rgba(0,245,255,0.1);
    }
    input::placeholder { color: var(--text-dim); }

    /* BUTTONS */
    .btn {
      padding: 0.85rem 1.7rem;
      font-size: 1.05rem;
      font-weight: 700;
      font-family: 'Exo 2', sans-serif;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .btn-primary {
      background: var(--neon-cyan);
      color: var(--bg);
      box-shadow: 0 0 12px rgba(0,245,255,0.4);
    }
    .btn-primary:hover { box-shadow: 0 0 22px rgba(0,245,255,0.7); transform: translateY(-1px); }
    .btn-reset {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-reset:hover { border-color: var(--text-dim); color: var(--text); }
    .btn-vowel {
      background: var(--neon-pink);
      color: #fff;
      box-shadow: 0 0 12px rgba(255,45,120,0.4);
    }
    .btn-vowel:hover { box-shadow: 0 0 22px rgba(255,45,120,0.7); transform: translateY(-1px); }
    .btn-spin {
      background: var(--neon-gold);
      color: var(--bg);
      font-size: 1.3rem;
      padding: 1rem 3rem;
      box-shadow: 0 0 20px rgba(255,215,0,0.5);
    }
    .btn-spin:hover { box-shadow: 0 0 35px rgba(255,215,0,0.9); transform: translateY(-2px); }
    .btn-solve {
      background: var(--neon-green);
      color: var(--bg);
      box-shadow: 0 0 12px rgba(57,255,20,0.4);
    }
    .btn-solve:hover { box-shadow: 0 0 22px rgba(57,255,20,0.7); transform: translateY(-1px); }

    /* GAME HUD */
    .hud {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      align-items: start;
      margin-bottom: 1.5rem;
    }
    .round-info {
      text-align: center;
    }
    .round-label {
      font-size: 0.9rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .round-number {
      font-family: 'Boogaloo', cursive;
      font-size: 2.8rem;
      color: var(--neon-gold);
      text-shadow: 0 0 15px rgba(255,215,0,0.6);
    }

    /* TIMER */
    .timer-display {
      text-align: center;
    }
    .timer-ring-wrap {
      position: relative;
      width: 110px;
      height: 110px;
      margin: 0 auto;
    }
    .timer-ring {
      transform: rotate(-90deg);
    }
    .timer-ring-bg { fill: none; stroke: var(--border); stroke-width: 6; }
    .timer-ring-fg {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 283;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.5s;
    }
    .timer-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.8rem;
      font-weight: bold;
    }

    /* TEAM CARDS */
    .teams-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }
    .team-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.4rem;
      min-width: 150px;
      text-align: center;
      transition: all 0.3s;
    }
    .team-card.active {
      box-shadow: 0 0 20px var(--team-color), 0 0 40px rgba(0,0,0,0.3);
      transform: translateY(-3px);
    }
    .team-card.active .team-name {
      color: var(--team-color);
      text-shadow: 0 0 10px var(--team-color);
    }
    .team-name {
      font-family: 'Boogaloo', cursive;
      font-size: 1.4rem;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
      transition: color 0.3s;
    }
    .team-score {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.9rem;
      color: var(--text);
    }
    .team-temp {
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-top: 0.3rem;
    }
    .team-temp span {
      color: var(--neon-green);
      font-family: 'Share Tech Mono', monospace;
    }

    /* INSTRUCTIONS */
    #instructions {
      text-align: center;
      font-size: 1rem;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      margin-bottom: 1.5rem;
      line-height: 1.8;
    }

    /* SPIN VALUE */
    .spin-zone {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    #spin-value {
      font-family: 'Boogaloo', cursive;
      font-size: 2.4rem;
      min-width: 210px;
      text-align: center;
      padding: 0.7rem 1.8rem;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      color: var(--text-dim);
      transition: all 0.3s;
    }
    #spin-value.has-value {
      border-color: var(--neon-gold);
      color: var(--neon-gold);
      box-shadow: 0 0 20px rgba(255,215,0,0.3);
    }
    #spin-value.bankrupt {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      box-shadow: 0 0 20px rgba(255,45,120,0.4);
    }
    #spin-value.lose {
      border-color: var(--text-dim);
      color: var(--text-dim);
    }

    /* PUZZLE */
    #puzzle {
      margin: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      min-height: 80px;
    }
    .row {
      display: flex;
      justify-content: center;
      gap: 6px;
    }
    .square {
      width: 64px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-weight: bold;
      font-size: 2.1rem;
      border-radius: 6px;
      user-select: none;
      transition: all 0.3s;
      position: relative;
    }
    .hidden {
      background: var(--surface2);
      border: 2px solid var(--border);
      color: transparent;
    }
    .visible {
      background: var(--surface);
      border: 2px solid rgba(255,255,255,0.1);
      color: var(--text);
    }
    .highlight {
      border-color: var(--neon-gold) !important;
      color: var(--neon-gold) !important;
      box-shadow: 0 0 14px rgba(255,215,0,0.5), inset 0 0 8px rgba(255,215,0,0.1);
      animation: letterPop 0.4s ease;
    }
    .invisible {
      visibility: hidden;
      background: transparent;
      border: none;
    }
    @keyframes letterPop {
      0% { transform: scale(0.7); opacity: 0; }
      60% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ALPHABET */
    .alphabet {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
      margin: 1.5rem 0;
    }
    .letter-btn {
      width: 56px;
      height: 56px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.15rem;
      font-weight: bold;
      border-radius: 6px;
      border: 2px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
    }
    .letter-btn:hover:not(:disabled) {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      box-shadow: 0 0 10px rgba(0,245,255,0.3);
      transform: translateY(-2px);
    }
    .letter-btn.vowel:hover:not(:disabled) {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      box-shadow: 0 0 10px rgba(255,45,120,0.3);
    }
    .letter-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      border-color: var(--border);
      color: var(--text-dim);
    }
    .letter-btn.used {
      opacity: 0.2;
      text-decoration: line-through;
    }

    /* SOLVE ROW */
    .solve-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    /* MESSAGE */
    #message {
      text-align: center;
      font-family: 'Boogaloo', cursive;
      font-size: 2rem;
      letter-spacing: 2px;
      min-height: 2.5rem;
      padding: 0.5rem;
      transition: all 0.3s;
    }
    #message.success {
      color: var(--neon-green);
      text-shadow: 0 0 20px rgba(57,255,20,0.7);
    }
    #message.error {
      color: var(--neon-pink);
      text-shadow: 0 0 20px rgba(255,45,120,0.7);
    }
    #message.info {
      color: var(--neon-cyan);
      text-shadow: 0 0 15px rgba(0,245,255,0.5);
    }
    #message.warn {
      color: var(--neon-gold);
      text-shadow: 0 0 15px rgba(255,215,0,0.6);
    }

    /* FLASH OVERLAY */
    #flash-overlay {
      pointer-events: none;
      position: fixed;
      inset: 0;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 100;
    }

    /* DIVIDER */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 1.5rem 0;
    }

    @media (max-width: 640px) {
      html { font-size: 15px; }
      .header h1 { font-size: 3.2rem; }
      .hud { grid-template-columns: 1fr; }
      .square { width: 48px; height: 52px; font-size: 1.5rem; }
      .letter-btn { width: 44px; height: 44px; font-size: 0.95rem; }
    }
  </style>
</head>
<body>
<div id="flash-overlay"></div>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>⚡ Wheel of English</h1>
    <div class="subtitle">The Ultimate ESL Challenge</div>
  </div>

  <!-- SETUP PANEL -->
  <div class="setup-panel">
    <div class="setup-row">
      <input id="puzzle-input" type="text" placeholder="Enter a phrase or word" />
      <button class="btn btn-primary" onclick="generatePuzzle()">▶ Start Puzzle</button>
      <button class="btn btn-reset" onclick="resetGame()">↺ Reset Game</button>
    </div>
    <div class="setup-row">
      <div class="team-count-row">
        <label>Teams:</label>
        <button class="team-count-btn" onclick="changeTeamCount(-1)">−</button>
        <div class="team-count-display" id="team-count-display">2</div>
        <button class="team-count-btn" onclick="changeTeamCount(1)">+</button>
      </div>
      <div class="timer-row">
        <label>Turn Timer:</label>
        <select class="timer-select" id="timer-select">
          <option value="0">Off</option>
          <option value="30">30s</option>
          <option value="45" selected>45s</option>
          <option value="60">60s</option>
          <option value="90">90s</option>
        </select>
      </div>
    </div>
  </div>

  <!-- HUD -->
  <div class="hud">
    <div class="round-info">
      <div class="round-label">Round</div>
      <div class="round-number" id="round-display">1</div>
    </div>
    <div class="timer-display">
      <div class="timer-ring-wrap" id="timer-wrap" style="display:none">
        <svg class="timer-ring" viewBox="0 0 110 110" width="110" height="110">
          <circle class="timer-ring-bg" cx="55" cy="55" r="45"/>
          <circle class="timer-ring-fg" id="timer-ring-fg" cx="55" cy="55" r="45"/>
        </svg>
        <div class="timer-text" id="timer-text">45</div>
      </div>
    </div>
    <div></div>
  </div>

  <!-- TEAMS -->
  <div class="teams-grid" id="teams-grid"></div>

  <div class="divider"></div>

  <!-- INSTRUCTIONS -->
  <div id="instructions">
    Spin → Guess a consonant for points &nbsp;|&nbsp; Buy Vowel (250pts) → Reveal a vowel &nbsp;|&nbsp; Solve at any time
  </div>

  <!-- PUZZLE -->
  <div id="puzzle"></div>

  <!-- ALPHABET -->
  <div class="alphabet" id="alphabet"></div>

  <!-- SPIN ZONE -->
  <div class="spin-zone">
    <button class="btn btn-spin" id="spin-btn" onclick="spinWheel()">🎡 Spin!</button>
    <div id="spin-value">—</div>
    <button class="btn btn-vowel" id="buy-vowel-btn" onclick="buyVowel()" disabled>Buy Vowel (250)</button>
  </div>

  <!-- SOLVE -->
  <div class="solve-row">
    <input id="solve-input" type="text" placeholder="Solve the puzzle…" style="max-width:280px" />
    <button class="btn btn-solve" id="solve-btn" onclick="attemptSolve()" disabled>✔ Solve</button>
  </div>

  <!-- MESSAGE -->
  <div id="message"></div>

</div>

<script>
  // ─────────────────────────────────────────────
  // SOUND ENGINE
  // ─────────────────────────────────────────────
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
  }

  function playTone(freq, type, duration, gain = 0.3, fadeOut = true) {
    try {
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gainNode = ctx.createGain();
      osc.connect(gainNode);
      gainNode.connect(ctx.destination);
      osc.type = type;
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      gainNode.gain.setValueAtTime(gain, ctx.currentTime);
      if (fadeOut) gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    } catch(e) {}
  }

  function playClick() { playTone(880, 'square', 0.05, 0.15); }
  function playTick() { playTone(440 + Math.random()*200, 'square', 0.04, 0.1); }
  function playBuzz() {
    playTone(120, 'sawtooth', 0.4, 0.4);
    setTimeout(() => playTone(100, 'sawtooth', 0.3, 0.35), 100);
  }
  function playCorrect() {
    [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.2, 0.4), i * 80));
  }
  function playBankrupt() {
    [400, 350, 300, 250, 200].forEach((f, i) => setTimeout(() => playTone(f, 'sawtooth', 0.15, 0.3), i * 60));
  }
  function playWin() {
    const melody = [523,659,784,1047,784,1047,1175,1047];
    melody.forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.3, 0.5), i * 120));
  }
  function playSpinTick() { playTone(600 + Math.random()*400, 'square', 0.03, 0.08); }
  function playTimerWarn() { playTone(880, 'square', 0.08, 0.2); }
  function playTimerOut() { playBuzz(); }

  // ─────────────────────────────────────────────
  // STATE
  // ─────────────────────────────────────────────
  const VOWELS = ['A','E','I','O','U'];
  const ALWAYS_REVEALED = [" ",",",".",'"',"'","-","!","?",";",":","(",")"];
  const TEAM_COLORS = ['#00f5ff','#ff2d78','#39ff14','#ffd700','#bf5fff','#ff8c00'];
  const TEAM_NAMES = ['Team 1','Team 2','Team 3','Team 4','Team 5','Team 6'];

  let numTeams = 2;
  let puzzle = [];
  let revealed = [];
  let usedLetters = [];
  let lastRevealedIndices = [];
  let spinValue = null;
  let currentTeam = 0;
  let scores = [0, 0];
  let temporaryScores = [0, 0];
  let hasSpun = false;
  let spinning = false;
  let buyingVowel = false;
  let round = 1;
  let timerDuration = 45;
  let timerRemaining = 0;
  let timerInterval = null;

  // ─────────────────────────────────────────────
  // FLASH OVERLAY
  // ─────────────────────────────────────────────
  function flashColor(color, duration = 300) {
    const el = document.getElementById('flash-overlay');
    el.style.background = color;
    el.style.opacity = '0.25';
    setTimeout(() => { el.style.opacity = '0'; }, duration);
  }

  // ─────────────────────────────────────────────
  // TEAM MANAGEMENT
  // ─────────────────────────────────────────────
  function changeTeamCount(delta) {
    const newVal = Math.min(6, Math.max(2, numTeams + delta));
    if (newVal === numTeams) return;
    numTeams = newVal;
    document.getElementById('team-count-display').textContent = numTeams;
    // Resize arrays
    while (scores.length < numTeams) scores.push(0);
    while (temporaryScores.length < numTeams) temporaryScores.push(0);
    scores = scores.slice(0, numTeams);
    temporaryScores = temporaryScores.slice(0, numTeams);
    if (currentTeam >= numTeams) currentTeam = 0;
    renderTeams();
  }

  function renderTeams() {
    const grid = document.getElementById('teams-grid');
    grid.innerHTML = '';
    for (let i = 0; i < numTeams; i++) {
      const color = TEAM_COLORS[i];
      const card = document.createElement('div');
      card.className = `team-card${i === currentTeam ? ' active' : ''}`;
      card.style.setProperty('--team-color', color);
      if (i === currentTeam) card.style.borderColor = color;
      card.innerHTML = `
        <div class="team-name">${TEAM_NAMES[i]}</div>
        <div class="team-score" id="score-${i}">${scores[i]}</div>
        <div class="team-temp">Temp: $<span id="temp-${i}">${temporaryScores[i]}</span></div>
      `;
      grid.appendChild(card);
    }
  }

  // ─────────────────────────────────────────────
  // TIMER
  // ─────────────────────────────────────────────
  function getTimerDuration() {
    return parseInt(document.getElementById('timer-select').value, 10);
  }

  function startTimer() {
    stopTimer();
    timerDuration = getTimerDuration();
    if (!timerDuration) return;
    timerRemaining = timerDuration;
    document.getElementById('timer-wrap').style.display = 'block';
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timerRemaining--;
      updateTimerDisplay();
      if (timerRemaining <= 5 && timerRemaining > 0) playTimerWarn();
      if (timerRemaining <= 0) {
        stopTimer();
        playTimerOut();
        showMessage("⏰ Time's up! Turn passes.", 'error', 3000);
        flashColor('#ff2d78');
        setTimeout(() => passTurn(), 1500);
      }
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
  }

  function updateTimerDisplay() {
    if (!getTimerDuration()) {
      document.getElementById('timer-wrap').style.display = 'none';
      return;
    }
    document.getElementById('timer-wrap').style.display = 'block';
    const el = document.getElementById('timer-text');
    const fg = document.getElementById('timer-ring-fg');
    el.textContent = timerRemaining;
    const pct = timerRemaining / timerDuration;
    const circumference = 2 * Math.PI * 45;
    fg.style.strokeDashoffset = circumference * (1 - pct);
    // Color shift
    if (pct > 0.5) {
      fg.style.stroke = '#00f5ff';
      el.style.color = '#00f5ff';
    } else if (pct > 0.25) {
      fg.style.stroke = '#ffd700';
      el.style.color = '#ffd700';
    } else {
      fg.style.stroke = '#ff2d78';
      el.style.color = '#ff2d78';
    }
  }

  // ─────────────────────────────────────────────
  // MESSAGES
  // ─────────────────────────────────────────────
  function showMessage(text, type = 'info', duration = 0) {
    const el = document.getElementById('message');
    el.textContent = text;
    el.className = type;
    if (duration > 0) {
      setTimeout(() => { if (el.textContent === text) el.textContent = ''; }, duration);
    }
  }

  // ─────────────────────────────────────────────
  // CORE GAME
  // ─────────────────────────────────────────────
  function startNewRound() {
    puzzle = [];
    revealed = [];
    usedLetters = [];
    lastRevealedIndices = [];
    spinValue = null;
    hasSpun = false;
    spinning = false;
    buyingVowel = false;
    temporaryScores = Array(numTeams).fill(0);
    document.getElementById('puzzle-input').value = '';
    document.getElementById('solve-input').value = '';
    document.getElementById('message').textContent = '';
    const sv = document.getElementById('spin-value');
    sv.textContent = '—';
    sv.className = '';
    stopTimer();
    renderPuzzle();
    renderAlphabet();
    updateDisplay();
  }

  function generatePuzzle() {
    const text = document.getElementById('puzzle-input').value.toUpperCase().trim();
    if (!text) return showMessage('Please enter a phrase.', 'warn', 3000);
    playClick();
    startNewRound();
    puzzle = text.split('');
    revealed = puzzle.map(c => ALWAYS_REVEALED.includes(c));
    renderPuzzle();
    renderAlphabet();
    updateDisplay();
    startTimer();
  }

  function resetGame() {
    scores = Array(numTeams).fill(0);
    round = 1;
    currentTeam = 0;
    stopTimer();
    startNewRound();
  }

  function passTurn() {
    stopTimer();
    currentTeam = (currentTeam + 1) % numTeams;
    hasSpun = false;
    spinValue = null;
    buyingVowel = false;
    document.getElementById('solve-input').value = '';
    lastRevealedIndices = [];
    const sv = document.getElementById('spin-value');
    sv.textContent = '—';
    sv.className = '';
    renderPuzzle();
    renderAlphabet();
    updateDisplay();
    if (puzzle.length > 0) startTimer();
  }

  // ─────────────────────────────────────────────
  // PUZZLE RENDER
  // ─────────────────────────────────────────────
  function renderPuzzle() {
    const puzzleDiv = document.getElementById('puzzle');
    puzzleDiv.innerHTML = '';
    if (!puzzle.length) {
      puzzleDiv.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:2rem;font-size:0.9rem;letter-spacing:2px;text-transform:uppercase;">Enter a phrase above to begin</div>';
      return;
    }
    const maxLen = 14;
    const words = puzzle.join('').split(' ');
    const lines = [];
    let cur = '';
    for (let w of words) {
      const sep = cur ? ' ' : '';
      if ((cur + sep + w).length <= maxLen) { cur += sep + w; }
      else { if (cur) lines.push(cur); cur = w; }
    }
    if (cur) lines.push(cur);

    let globalIdx = 0;
    lines.forEach(line => {
      const row = document.createElement('div');
      row.className = 'row';
      for (let ch of line) {
        let charIdx = -1;
        for (let j = globalIdx; j < puzzle.length; j++) {
          if (puzzle[j] === ch) { charIdx = j; break; }
        }
        const isRevealed = charIdx >= 0 && revealed[charIdx];
        const isHL = lastRevealedIndices.includes(charIdx);
        const div = document.createElement('div');
        if (ch === ' ') {
          div.className = 'square invisible';
        } else {
          div.className = `square ${isRevealed ? 'visible' : 'hidden'} ${isHL ? 'highlight' : ''}`;
          div.textContent = isRevealed ? ch : '';
        }
        row.appendChild(div);
        if (charIdx >= 0) globalIdx = charIdx + 1;
      }
      puzzleDiv.appendChild(row);
    });
  }

  // ─────────────────────────────────────────────
  // ALPHABET RENDER
  // ─────────────────────────────────────────────
  function renderAlphabet() {
    const div = document.getElementById('alphabet');
    div.innerHTML = '';
    'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(letter => {
      const isVowel = VOWELS.includes(letter);
      const isUsed = usedLetters.includes(letter);
      const btn = document.createElement('button');
      btn.textContent = letter;
      btn.className = `letter-btn${isVowel ? ' vowel' : ''}${isUsed ? ' used' : ''}`;
      btn.disabled = isUsed || spinning ||
        (isVowel ? !buyingVowel : (buyingVowel || !hasSpun));
      btn.onclick = () => handleLetter(letter);
      div.appendChild(btn);
    });

    document.getElementById('buy-vowel-btn').disabled =
      buyingVowel || temporaryScores[currentTeam] < 250 || !puzzle.length || spinning;
    document.getElementById('solve-btn').disabled = !puzzle.length || spinning;
  }

  // ─────────────────────────────────────────────
  // LETTER HANDLER
  // ─────────────────────────────────────────────
  function handleLetter(letter) {
    if (usedLetters.includes(letter) || spinning) return;
    playClick();
    const isVowel = VOWELS.includes(letter);
    let found = false;
    const indices = [];
    revealed = revealed.map((r, i) => {
      if (puzzle[i] === letter) { indices.push(i); found = true; return true; }
      return r;
    });
    usedLetters.push(letter);
    lastRevealedIndices = indices;

    if (isVowel) {
      if (!buyingVowel || temporaryScores[currentTeam] < 250) return;
      temporaryScores[currentTeam] -= 250;
      buyingVowel = false;
      if (!found) {
        playBuzz();
        flashColor('#ff2d78');
        showMessage(`'${letter}' not in puzzle — turn passes!`, 'error', 3000);
        setTimeout(() => passTurn(), 2000);
        return;
      } else {
        playCorrect();
        flashColor('#00f5ff', 400);
        showMessage(`'${letter}' found! Keep guessing!`, 'success', 3000);
        hasSpun = false; spinValue = null;
        document.getElementById('spin-value').textContent = '—';
        document.getElementById('spin-value').className = '';
      }
    } else {
      if (!hasSpun) return;
      if (!found) {
        playBuzz();
        flashColor('#ff2d78');
        showMessage(`'${letter}' not in puzzle — turn passes!`, 'error', 3000);
        setTimeout(() => passTurn(), 2000);
        return;
      } else {
        const earned = indices.length * spinValue;
        temporaryScores[currentTeam] += earned;
        playCorrect();
        flashColor('#ffd700', 400);
        showMessage(`'${letter}' ×${indices.length} = +$${earned}! Keep going!`, 'success', 3000);
        hasSpun = false; spinValue = null;
        document.getElementById('spin-value').textContent = '—';
        document.getElementById('spin-value').className = '';
      }
    }

    if (revealed.every(r => r)) {
      handlePuzzleSolved();
      return;
    }
    renderPuzzle();
    renderAlphabet();
    updateDisplay();
  }

  // ─────────────────────────────────────────────
  // SOLVE
  // ─────────────────────────────────────────────
  function attemptSolve() {
    if (!puzzle.length || spinning) return;
    const guess = document.getElementById('solve-input').value.toUpperCase().trim();
    if (!guess) return showMessage('Enter your guess first!', 'warn', 3000);
    if (guess === puzzle.join('')) {
      handlePuzzleSolved();
    } else {
      playBuzz();
      flashColor('#ff2d78');
      showMessage('WRONG! Turn passes…', 'error', 3000);
      setTimeout(() => passTurn(), 2500);
    }
  }

  function handlePuzzleSolved() {
    stopTimer();
    scores[currentTeam] += temporaryScores[currentTeam];
    temporaryScores[currentTeam] = 0;
    revealed = revealed.map(() => true);
    lastRevealedIndices = [];
    renderPuzzle();
    updateDisplay();
    playWin();
    flashColor('#39ff14', 800);
    showMessage(`🏆 ${TEAM_NAMES[currentTeam]} Wins the Round!`, 'success');
    let cd = 8;
    const iv = setInterval(() => {
      cd--;
      showMessage(`🏆 ${TEAM_NAMES[currentTeam]} Wins! Next round in ${cd}s…`, 'success');
      if (cd <= 0) {
        clearInterval(iv);
        round++;
        document.getElementById('round-display').textContent = round;
        startNewRound();
      }
    }, 1000);
    spinBtn.disabled = true;
  }

  // ─────────────────────────────────────────────
  // BUY VOWEL
  // ─────────────────────────────────────────────
  function buyVowel() {
    if (!puzzle.length || spinning) return;
    if (temporaryScores[currentTeam] < 250) {
      return showMessage('Need 250 points to buy a vowel!', 'warn', 3000);
    }
    playClick();
    buyingVowel = true;
    showMessage('Select a vowel (A E I O U)', 'info');
    renderAlphabet();
    updateDisplay();
  }

  // ─────────────────────────────────────────────
  // SPIN WHEEL
  // ─────────────────────────────────────────────
  function spinWheel() {
    if (spinning || !puzzle.length) return;
    if (hasSpun && !buyingVowel) {
      return showMessage('Guess a consonant, buy a vowel, or solve first!', 'warn', 3000);
    }
    stopTimer();
    spinning = true;
    document.getElementById('spin-btn').disabled = true;
    buyingVowel = false;
    lastRevealedIndices = [];
    const svEl = document.getElementById('spin-value');
    svEl.textContent = '…';
    svEl.className = '';
    renderAlphabet();

    const outcomes = [
      ...Array(1).fill('LOSE'),
      ...Array(1).fill('BANKRUPT'),
      ...Array(2).fill(100), ...Array(2).fill(200),
      ...Array(3).fill(300), ...Array(3).fill(400), ...Array(3).fill(500),
      ...Array(3).fill(600), ...Array(3).fill(700), ...Array(3).fill(800),
      ...Array(1).fill(900), ...Array(1).fill(1000)
    ];

    let count = 0, delay = 50;
    const go = () => {
      const v = outcomes[Math.floor(Math.random() * outcomes.length)];
      spinValue = v;
      svEl.textContent = v === 'LOSE' ? 'LOSE TURN' : v === 'BANKRUPT' ? 'BANKRUPT' : `$${v}`;
      svEl.className = v === 'BANKRUPT' ? 'bankrupt' : v === 'LOSE' ? 'lose' : 'has-value';
      playSpinTick();
      count++;
      delay += 18;
      if (count < 22) {
        setTimeout(go, delay);
      } else {
        spinning = false;
        if (v === 'LOSE') {
          playBuzz();
          flashColor('#444');
          showMessage('LOSE A TURN! 😬', 'error', 3000);
          setTimeout(() => passTurn(), 2000);
        } else if (v === 'BANKRUPT') {
          playBankrupt();
          flashColor('#ff2d78', 600);
          showMessage('BANKRUPT! 💸 Lose your temp money!', 'error', 3000);
          temporaryScores[currentTeam] = 0;
          setTimeout(() => passTurn(), 2500);
        } else {
          hasSpun = true;
          showMessage(`Landed on $${v} — guess a consonant!`, 'info', 4000);
          startTimer();
        }
        renderAlphabet();
        updateDisplay();
      }
    };
    setTimeout(go, delay);
  }

  // ─────────────────────────────────────────────
  // UPDATE DISPLAY
  // ─────────────────────────────────────────────
  function updateDisplay() {
    document.getElementById('round-display').textContent = round;
    for (let i = 0; i < numTeams; i++) {
      const sEl = document.getElementById(`score-${i}`);
      const tEl = document.getElementById(`temp-${i}`);
      if (sEl) sEl.textContent = scores[i];
      if (tEl) tEl.textContent = temporaryScores[i];
      // Highlight active card
      const cards = document.querySelectorAll('.team-card');
      if (cards[i]) {
        cards[i].className = `team-card${i === currentTeam ? ' active' : ''}`;
        cards[i].style.borderColor = i === currentTeam ? TEAM_COLORS[i] : '';
      }
    }
    document.getElementById('spin-btn').disabled =
      spinning || !puzzle.length || (hasSpun && !buyingVowel);
    document.getElementById('buy-vowel-btn').disabled =
      spinning || !puzzle.length || temporaryScores[currentTeam] < 250 || buyingVowel;
    document.getElementById('solve-btn').disabled = spinning || !puzzle.length;
  }

  // ─────────────────────────────────────────────
  // INIT
  // ─────────────────────────────────────────────
  const spinBtn = document.getElementById('spin-btn');
  renderTeams();
  renderPuzzle();
  renderAlphabet();
  updateDisplay();

  // Unlock audio on first interaction
  document.addEventListener('click', () => { try { getAudio(); } catch(e) {} }, { once: true });
</script>
</body>
</html>
