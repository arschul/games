<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Buzz</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #f0e040;
    --accent2: #40e0f0;
    --danger: #f04060;
    --success: #40f090;
    --text: #f0f0f5;
    --muted: #666680;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; width: 100vw; height: 100vh; }
  .screen.active { display: flex; }

  /* ══ SETUP SCREEN ══ */
  #setup {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }

  #setup::before {
    content: '';
    position: absolute;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(240,224,64,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  #setup::after {
    content: '';
    position: absolute;
    bottom: -150px; right: -100px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(64,224,240,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .setup-inner {
    width: 100%;
    max-width: 780px;
    padding: 40px 32px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    z-index: 1;
  }

  .game-title {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 40px rgba(240,224,64,0.3);
  }
  .game-title span { color: var(--text); }

  .setup-section { display: flex; flex-direction: column; gap: 10px; }
  .setup-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Team input */
  .team-input-row {
    display: flex;
    gap: 10px;
  }
  .team-input-row input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: var(--font-display);
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
  }
  .team-input-row input:focus { border-color: var(--accent); }
  .team-input-row input::placeholder { color: var(--muted); }

  .btn-add {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  .pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 36px;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 14px 6px 16px;
    font-size: 14px;
    font-weight: 700;
    animation: popIn 0.15s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .pill .pill-x {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0;
    transition: color 0.2s;
  }
  .pill .pill-x:hover { color: var(--danger); }

  /* Options row */
  .options-row {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }

  .option-group { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 180px; }

  .chip-row { display: flex; gap: 8px; }
  .chip {
    flex: 1;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 10px 0;
    text-align: center;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.selected { border-color: var(--accent); color: var(--accent); background: rgba(240,224,64,0.08); }

  /* Speed slider */
  .slider-row { display: flex; align-items: center; gap: 12px; }
  .slider-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  .slider-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }
  .slider-label { font-size: 12px; color: var(--muted); font-family: var(--font-mono); width: 36px; }

  .btn-start {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 18px;
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    opacity: 0.4;
    pointer-events: none;
  }
  .btn-start.ready {
    opacity: 1;
    pointer-events: all;
  }
  .btn-start.ready:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(240,224,64,0.3); }


  /* ══ GAME SCREEN ══ */
  #game {
    flex-direction: column;
    background: var(--bg);
  }

  /* Top bar */
  .top-bar {
    display: flex;
    align-items: center;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-shrink: 0;
  }

  .round-info {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  .scorecards {
    display: flex;
    gap: 10px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .scorecards::-webkit-scrollbar { display: none; }

  .scorecard {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .scorecard.buzzing {
    border-color: var(--accent);
    background: rgba(240,224,64,0.1);
    animation: pulse 0.6s ease infinite alternate;
  }
  .scorecard.locked {
    border-color: var(--danger);
    opacity: 0.5;
  }
  .scorecard.winner-card {
    border-color: var(--success);
    background: rgba(64,240,144,0.1);
  }
  @keyframes pulse {
    from { box-shadow: 0 0 0 0 rgba(240,224,64,0.4); }
    to { box-shadow: 0 0 0 8px rgba(240,224,64,0); }
  }
  .sc-name {
    font-size: 13px;
    font-weight: 700;
  }
  .sc-score {
    font-family: var(--font-mono);
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
    min-width: 20px;
    text-align: right;
  }
  .sc-score.negative { color: var(--danger); }

  .level-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--accent2);
    flex-shrink: 0;
  }

  /* Timer */
  .timer-wrap {
    flex-shrink: 0;
    padding: 0 24px;
    padding-top: 14px;
  }
  .timer-bar-bg {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .timer-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.1s linear, background 0.3s;
    width: 100%;
  }
  .timer-bar-fill.warning { background: #f09040; }
  .timer-bar-fill.danger { background: var(--danger); }
  .timer-digits {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--muted);
    text-align: right;
    margin-top: 4px;
  }

  /* Definition area */
  .definition-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 48px;
    position: relative;
  }

  .definition-text {
    font-size: clamp(24px, 3.5vw, 42px);
    font-weight: 700;
    line-height: 1.5;
    text-align: center;
    max-width: 900px;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .cursor {
    display: inline-block;
    width: 3px;
    height: 1.1em;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .cursor.hidden { display: none; }

  .word-reveal {
    display: none;
    font-family: var(--font-mono);
    font-size: clamp(32px, 5vw, 64px);
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    text-align: center;
    animation: fadeUp 0.3s ease;
  }
  .word-reveal.visible { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Action buttons */
  .action-bar {
    display: flex;
    gap: 12px;
    padding: 0 24px;
    justify-content: center;
    flex-shrink: 0;
    flex-wrap: wrap;
    min-height: 60px;
    align-items: center;
  }

  .btn-reveal, .btn-correct, .btn-wrong, .btn-skip, .btn-next {
    border: none;
    border-radius: 10px;
    padding: 14px 32px;
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    display: none;
  }
  .btn-reveal { background: var(--accent2); color: #000; }
  .btn-correct { background: var(--success); color: #000; font-size: 22px; padding: 14px 40px; }
  .btn-wrong { background: var(--danger); color: #fff; font-size: 22px; padding: 14px 40px; }
  .btn-skip { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-next { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  .btn-reveal:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-correct:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-wrong:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-skip:hover { border-color: var(--text); color: var(--text); }
  .btn-next:hover { border-color: var(--accent); color: var(--accent); }

  .btn-reveal.show, .btn-correct.show, .btn-wrong.show,
  .btn-skip.show, .btn-next.show { display: inline-flex; align-items: center; gap: 8px; }

  /* Team buzz buttons */
  .buzz-area {
    padding: 16px 24px 24px;
    flex-shrink: 0;
  }
  .buzz-grid {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn-buzz {
    flex: 1;
    min-width: 120px;
    max-width: 220px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px 12px;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .btn-buzz:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-2px);
  }
  .btn-buzz:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
  }
  .btn-buzz.buzzing {
    border-color: var(--accent);
    background: rgba(240,224,64,0.12);
    color: var(--accent);
  }

  /* Time's up overlay text */
  .times-up {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: 800;
    color: var(--danger);
    letter-spacing: 4px;
    text-transform: uppercase;
    animation: fadeUp 0.3s ease;
    pointer-events: none;
    text-shadow: 0 0 30px rgba(240,64,96,0.5);
  }
  .times-up.show { display: block; }

  /* ══ WINNER SCREEN ══ */
  #winner {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  #winner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(240,224,64,0.08) 0%, transparent 70%);
  }

  .winner-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .winner-name {
    font-size: clamp(48px, 8vw, 96px);
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -3px;
    text-align: center;
    text-shadow: 0 0 60px rgba(240,224,64,0.4);
    animation: winPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes winPop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .final-scores {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    z-index: 1;
  }
  .final-score-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 16px 24px;
    text-align: center;
    min-width: 120px;
  }
  .final-score-card.first { border-color: var(--accent); }
  .fsc-name { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .fsc-pts {
    font-family: var(--font-mono);
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
  }

  .btn-play-again {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 18px 48px;
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    z-index: 1;
    transition: all 0.2s;
  }
  .btn-play-again:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(240,224,64,0.3); }

  /* confetti particles */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    pointer-events: none;
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<!-- ══ SETUP SCREEN ══ -->
<div id="setup" class="screen active">
  <div class="setup-inner">
    <div class="game-title">WORD<span>BUZZ</span></div>

    <div class="setup-section">
      <div class="setup-label">Teams</div>
      <div class="team-input-row">
        <input type="text" id="teamInput" placeholder="Enter team name…" maxlength="20" />
        <button class="btn-add" onclick="addTeam()">Add</button>
      </div>
      <div class="pills" id="pills"></div>
    </div>

    <div class="options-row">
      <div class="option-group">
        <div class="setup-label">CEFR Level</div>
        <div class="chip-row" id="levelChips">
          <div class="chip" data-val="A1" onclick="selectChip('level',this)">A1</div>
          <div class="chip" data-val="A2" onclick="selectChip('level',this)">A2</div>
          <div class="chip" data-val="B1" onclick="selectChip('level',this)">B1</div>
          <div class="chip" data-val="B2" onclick="selectChip('level',this)">B2</div>
        </div>
      </div>
      <div class="option-group">
        <div class="setup-label">Timer (seconds)</div>
        <div class="chip-row" id="timerChips">
          <div class="chip" data-val="10" onclick="selectChip('timer',this)">10</div>
          <div class="chip" data-val="20" onclick="selectChip('timer',this)">20</div>
          <div class="chip" data-val="30" onclick="selectChip('timer',this)">30</div>
        </div>
      </div>
      <div class="option-group">
        <div class="setup-label">Reveal Speed</div>
        <div class="slider-row">
          <span class="slider-label">Slow</span>
          <input type="range" id="speedSlider" min="1" max="5" value="3" />
          <span class="slider-label" style="text-align:right">Fast</span>
        </div>
      </div>
    </div>

    <button class="btn-start" id="btnStart" onclick="startGame()">START GAME</button>
  </div>
</div>

<!-- ══ GAME SCREEN ══ -->
<div id="game" class="screen">
  <div class="top-bar">
    <div class="round-info" id="roundInfo">Round 1</div>
    <div class="scorecards" id="scorecards"></div>
    <div class="level-badge" id="levelBadge">A1</div>
  </div>

  <div class="timer-wrap" id="timerWrap">
    <div class="timer-bar-bg">
      <div class="timer-bar-fill" id="timerFill"></div>
    </div>
    <div class="timer-digits" id="timerDigits">—</div>
  </div>

  <div class="definition-area">
    <div class="definition-text" id="defText"><span id="defSpan"></span><span class="cursor hidden" id="cursor"></span></div>
    <div class="word-reveal" id="wordReveal"></div>
    <div class="times-up" id="timesUp">TIME'S UP</div>
  </div>

  <div class="action-bar" id="actionBar">
    <button class="btn-reveal" id="btnReveal" onclick="revealWord()">👁 REVEAL</button>
    <button class="btn-correct" id="btnCorrect" onclick="markCorrect()">✓</button>
    <button class="btn-wrong" id="btnWrong" onclick="markWrong()">✗</button>
    <button class="btn-skip" id="btnSkip" onclick="skipWord()">SKIP</button>
    <button class="btn-next" id="btnNext" onclick="nextWord()">NEXT WORD →</button>
  </div>

  <div class="buzz-area">
    <div class="buzz-grid" id="buzzGrid"></div>
  </div>
</div>

<!-- ══ WINNER SCREEN ══ -->
<div id="winner" class="screen">
  <div class="winner-title">Winner</div>
  <div class="winner-name" id="winnerName"></div>
  <div class="final-scores" id="finalScores"></div>
  <button class="btn-play-again" onclick="playAgain()">PLAY AGAIN</button>
</div>

<script>
// ══════════════════════════════════════════

// ══════════════════════════════════════════

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let teams = [];
let selectedLevel = null;
let selectedTimer = null;
let revealSpeedMs = 60; // ms per character

let gameState = {
  scores: {},
  pool: [],
  poolIndex: 0,
  round: 1,
  buzzedTeam: null,
  lockedTeams: new Set(),
  timerInterval: null,
  timerRemaining: 0,
  timerTotal: 0,
  timerRunning: false,
  revealed: false,
  typeInterval: null,
  wordRevealed: false
};

// ══════════════════════════════════════════
// SETUP
// ══════════════════════════════════════════
const teamColors = ['#f0e040','#40e0f0','#f040a0','#40f090','#f09040','#a040f0','#f06040','#40a0f0'];

document.getElementById('teamInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTeam();
});

function addTeam() {
  const input = document.getElementById('teamInput');
  const name = input.value.trim();
  if (!name || teams.includes(name)) return;
  teams.push(name);
  input.value = '';
  renderPills();
  checkStartReady();
}

function removeTeam(name) {
  teams = teams.filter(t => t !== name);
  renderPills();
  checkStartReady();
}

function renderPills() {
  const container = document.getElementById('pills');
  container.innerHTML = '';
  teams.forEach((name, i) => {
    const pill = document.createElement('div');
    pill.className = 'pill';
    pill.style.borderColor = teamColors[i % teamColors.length];
    pill.innerHTML = `<span>${name}</span><button class="pill-x" onclick="removeTeam('${name}')">×</button>`;
    container.appendChild(pill);
  });
}

function selectChip(group, el) {
  const row = el.closest('.chip-row');
  row.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  if (group === 'level') selectedLevel = el.dataset.val;
  if (group === 'timer') selectedTimer = parseInt(el.dataset.val);
  checkStartReady();
}

function checkStartReady() {
  const btn = document.getElementById('btnStart');
  const ready = teams.length >= 2 && selectedLevel && selectedTimer;
  btn.classList.toggle('ready', ready);
}

document.getElementById('speedSlider').addEventListener('input', function() {
  // 1=slow(120ms), 5=fast(20ms)
  revealSpeedMs = Math.round(120 - (this.value - 1) * 25);
});

// ══════════════════════════════════════════
// START GAME
// ══════════════════════════════════════════
function startGame() {
  if (teams.length < 2 || !selectedLevel || !selectedTimer) return;

  // Init scores
  gameState.scores = {};
  teams.forEach(t => { gameState.scores[t] = 0; });

  // Shuffle pool
  gameState.pool = shuffle([...WORDS[selectedLevel]]);
  gameState.poolIndex = 0;
  gameState.round = 1;

  document.getElementById('levelBadge').textContent = selectedLevel;
  document.getElementById('game').classList.add('active');
  document.getElementById('setup').classList.remove('active');

  renderScorecards();
  loadWord();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ══════════════════════════════════════════
// SCORECARDS
// ══════════════════════════════════════════
function renderScorecards() {
  const container = document.getElementById('scorecards');
  container.innerHTML = '';
  teams.forEach((name, i) => {
    const sc = document.createElement('div');
    sc.className = 'scorecard';
    sc.id = 'sc-' + name;
    sc.style.borderColor = (gameState.scores[name] < 0) ? 'var(--danger)' : 'var(--border)';
    const score = gameState.scores[name];
    sc.innerHTML = `
      <span class="sc-name" style="color:${teamColors[i % teamColors.length]}">${name}</span>
      <span class="sc-score ${score < 0 ? 'negative' : ''}">${score}</span>
    `;
    container.appendChild(sc);
  });
}

function updateScorecard(team) {
  const sc = document.getElementById('sc-' + team);
  if (!sc) return;
  const score = gameState.scores[team];
  sc.querySelector('.sc-score').textContent = score;
  sc.querySelector('.sc-score').className = 'sc-score' + (score < 0 ? ' negative' : '');
}

function setCardState(team, state) {
  // state: null | 'buzzing' | 'locked' | 'winner-card'
  const sc = document.getElementById('sc-' + team);
  if (!sc) return;
  sc.classList.remove('buzzing', 'locked', 'winner-card');
  if (state) sc.classList.add(state);
}

// ══════════════════════════════════════════
// BUZZ BUTTONS
// ══════════════════════════════════════════
function renderBuzzButtons(disabled = false) {
  const grid = document.getElementById('buzzGrid');
  grid.innerHTML = '';
  teams.forEach((name, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn-buzz';
    btn.id = 'buzz-' + name;
    btn.style.borderColor = teamColors[i % teamColors.length];
    btn.textContent = name;
    if (disabled || gameState.lockedTeams.has(name)) {
      btn.disabled = true;
    }
    if (gameState.lockedTeams.has(name)) btn.classList.add('locked');
    btn.addEventListener('click', () => buzz(name));
    grid.appendChild(btn);
  });
}

// ══════════════════════════════════════════
// LOAD WORD
// ══════════════════════════════════════════
function loadWord() {
  // Reset state
  clearTimeout(gameState.typeInterval);
  clearInterval(gameState.timerInterval);
  gameState.buzzedTeam = null;
  gameState.lockedTeams = new Set();
  gameState.revealed = false;
  gameState.timerRunning = false;

  // Reset team card states
  teams.forEach(t => setCardState(t, null));

  // Get word
  if (gameState.poolIndex >= gameState.pool.length) {
    gameState.pool = shuffle([...WORDS[selectedLevel]]);
    gameState.poolIndex = 0;
  }
  const item = gameState.pool[gameState.poolIndex++];
  gameState.currentWord = item.word;
  gameState.currentDef = item.def;

  document.getElementById('roundInfo').textContent = `Round ${gameState.round}`;

  // Reset UI
  document.getElementById('defSpan').textContent = '';
  document.getElementById('cursor').classList.remove('hidden');
  document.getElementById('wordReveal').classList.remove('visible');
  document.getElementById('wordReveal').textContent = '';
  document.getElementById('timesUp').classList.remove('show');

  setTimerBar(1, false);
  document.getElementById('timerDigits').textContent = '—';

  showButtons([]);
  renderBuzzButtons(true); // disabled during typing

  // Start typing
  typeDefinition(item.def, () => {
    // Typing done — enable buzz, start timer
    document.getElementById('cursor').classList.add('hidden');
    renderBuzzButtons(false);
    showButtons(['skip']);
    startTimer();
  });
}

// ══════════════════════════════════════════
// TYPING ANIMATION
// ══════════════════════════════════════════
function typeDefinition(text, onDone) {
  const span = document.getElementById('defSpan');
  span.textContent = '';
  let i = 0;
  function tick() {
    if (i >= text.length) {
      onDone();
      return;
    }
    span.textContent += text[i++];
    gameState.typeInterval = setTimeout(tick, revealSpeedMs);
  }
  tick();
}

// ══════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════
function startTimer() {
  gameState.timerRemaining = selectedTimer * 10; // tenths of seconds
  gameState.timerTotal = gameState.timerRemaining;
  gameState.timerRunning = true;
  runTimer();
}

function runTimer() {
  clearInterval(gameState.timerInterval);
  gameState.timerInterval = setInterval(() => {
    if (!gameState.timerRunning) return;
    gameState.timerRemaining--;
    const frac = gameState.timerRemaining / gameState.timerTotal;
    setTimerBar(frac, true);
    document.getElementById('timerDigits').textContent = (gameState.timerRemaining / 10).toFixed(1) + 's';

    if (gameState.timerRemaining <= 0) {
      clearInterval(gameState.timerInterval);
      onTimerExpired();
    }
  }, 100);
}

function pauseTimer() {
  gameState.timerRunning = false;
}

function resumeTimer() {
  if (gameState.timerRemaining > 0) {
    gameState.timerRunning = true;
  }
}

function setTimerBar(frac, colored) {
  const fill = document.getElementById('timerFill');
  fill.style.width = (frac * 100) + '%';
  if (!colored) {
    fill.className = 'timer-bar-fill';
    return;
  }
  fill.classList.remove('warning','danger');
  if (frac < 0.25) fill.classList.add('danger');
  else if (frac < 0.5) fill.classList.add('warning');
}

function onTimerExpired() {
  gameState.timerRunning = false;
  gameState.buzzedTeam = null;
  renderBuzzButtons(true);
  document.getElementById('timesUp').classList.add('show');
  showButtons(['reveal', 'next']);
}

// ══════════════════════════════════════════
// BUZZ
// ══════════════════════════════════════════
function buzz(teamName) {
  if (gameState.buzzedTeam) return; // already buzzing
  gameState.buzzedTeam = teamName;
  pauseTimer();
  renderBuzzButtons(true); // disable all
  setCardState(teamName, 'buzzing');
  document.getElementById('timesUp').classList.remove('show');
  showButtons(['reveal', 'skip']);
}

// ══════════════════════════════════════════
// REVEAL
// ══════════════════════════════════════════
function revealWord() {
  gameState.revealed = true;
  document.getElementById('wordReveal').textContent = gameState.currentWord.toUpperCase();
  document.getElementById('wordReveal').classList.add('visible');

  if (gameState.buzzedTeam) {
    showButtons(['correct', 'wrong']);
  } else {
    // revealed after time's up with no buzzer
    showButtons(['next']);
  }
}

// ══════════════════════════════════════════
// MARK CORRECT / WRONG
// ══════════════════════════════════════════
function markCorrect() {
  const team = gameState.buzzedTeam;
  gameState.scores[team]++;
  updateScorecard(team);
  setCardState(team, null);
  gameState.buzzedTeam = null;
  clearInterval(gameState.timerInterval);

  flashScore(team, '+1', 'var(--success)');

  if (gameState.scores[team] >= 7) {
    setTimeout(() => showWinner(team), 600);
    return;
  }
  gameState.round++;
  showButtons(['next']);
}

function markWrong() {
  const team = gameState.buzzedTeam;
  gameState.scores[team]--;
  updateScorecard(team);
  gameState.lockedTeams.add(team);
  setCardState(team, 'locked');
  gameState.buzzedTeam = null;

  flashScore(team, '−1', 'var(--danger)');

  // Hide reveal word
  document.getElementById('wordReveal').classList.remove('visible');
  document.getElementById('wordReveal').textContent = '';

  // Check if all teams locked
  if (gameState.lockedTeams.size >= teams.length) {
    clearInterval(gameState.timerInterval);
    document.getElementById('timesUp').classList.add('show');
    showButtons(['next']);
    return;
  }

  // Resume for remaining teams
  renderBuzzButtons(false);
  showButtons(['skip']);
  resumeTimer();
}

// ══════════════════════════════════════════
// SKIP
// ══════════════════════════════════════════
function skipWord() {
  clearInterval(gameState.timerInterval);
  clearTimeout(gameState.typeInterval);
  gameState.round++;
  loadWord();
}

// ══════════════════════════════════════════
// NEXT WORD
// ══════════════════════════════════════════
function nextWord() {
  gameState.round++;
  loadWord();
}

// ══════════════════════════════════════════
// SHOW BUTTONS HELPER
// ══════════════════════════════════════════
function showButtons(ids) {
  const all = ['reveal','correct','wrong','skip','next'];
  all.forEach(id => {
    const el = document.getElementById('btn' + id.charAt(0).toUpperCase() + id.slice(1));
    if (el) el.classList.toggle('show', ids.includes(id));
  });
}

// ══════════════════════════════════════════
// SCORE FLASH
// ══════════════════════════════════════════
function flashScore(team, text, color) {
  const sc = document.getElementById('sc-' + team);
  if (!sc) return;
  const flash = document.createElement('div');
  flash.textContent = text;
  flash.style.cssText = `
    position:fixed;
    color:${color};
    font-family:var(--font-mono);
    font-size:28px;
    font-weight:700;
    pointer-events:none;
    animation: fadeUp 0.8s ease forwards;
    z-index:999;
  `;
  const rect = sc.getBoundingClientRect();
  flash.style.left = rect.left + 'px';
  flash.style.top = (rect.top - 20) + 'px';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 800);
}

// ══════════════════════════════════════════
// WINNER
// ══════════════════════════════════════════
function showWinner(team) {
  clearInterval(gameState.timerInterval);
  document.getElementById('game').classList.remove('active');
  document.getElementById('winner').classList.add('active');
  document.getElementById('winnerName').textContent = team;

  // Final scores sorted
  const sorted = [...teams].sort((a,b) => gameState.scores[b] - gameState.scores[a]);
  const container = document.getElementById('finalScores');
  container.innerHTML = '';
  sorted.forEach((name, i) => {
    const card = document.createElement('div');
    card.className = 'final-score-card' + (i === 0 ? ' first' : '');
    const teamIndex = teams.indexOf(name);
    card.innerHTML = `
      <div class="fsc-name" style="color:${teamColors[teamIndex % teamColors.length]}">${name}</div>
      <div class="fsc-pts">${gameState.scores[name]}</div>
    `;
    container.appendChild(card);
  });

  launchConfetti();
}

function launchConfetti() {
  const colors = ['#f0e040','#40e0f0','#f040a0','#40f090','#f09040'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      p.style.animationDelay = (Math.random() * 0.5) + 's';
      p.style.transform = `rotate(${Math.random()*360}deg)`;
      p.style.width = (6 + Math.random() * 10) + 'px';
      p.style.height = (6 + Math.random() * 10) + 'px';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 4000);
    }, i * 30);
  }
}

function playAgain() {
  document.getElementById('winner').classList.remove('active');
  document.getElementById('setup').classList.add('active');
  teams = [];
  selectedLevel = null;
  selectedTimer = null;
  renderPills();
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
  document.getElementById('btnStart').classList.remove('ready');
}
</script>
